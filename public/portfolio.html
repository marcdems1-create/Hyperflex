<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio — HYPERFLEX</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e15;--surface:#111118;--border:rgba(255,255,255,.07);
  --ink:#f0f0f5;--ink2:rgba(240,240,245,.6);--muted:rgba(240,240,245,.32);
  --green:#00e68a;--red:#ff4d6a;--gold:#c9920d;--blue:#4d9fff;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
html,body{background:var(--bg);color:var(--ink);min-height:100vh;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:100;height:56px;display:flex;align-items:center;padding:0 24px;gap:0;background:rgba(14,14,21,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--sans);font-size:22px;font-weight:900;color:#fff;text-decoration:none;letter-spacing:-.03em;margin-right:24px;}
.nav-links{display:flex;gap:2px;flex:1;}
.nav-link{font-size:13px;font-weight:500;color:var(--ink2);text-decoration:none;padding:6px 12px;border-radius:6px;transition:color .12s,background .12s;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.06);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.main{max-width:900px;margin:0 auto;padding:32px 20px;}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
.page-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:28px;}
/* Summary row */
.summary-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink);}
.stat-val.pos{color:var(--green);}
.stat-val.neg{color:var(--red);}
/* Positions table */
.section-head{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.pos-table{width:100%;border-collapse:collapse;}
.pos-table th{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;text-align:left;padding:0 12px 8px;border-bottom:1px solid var(--border);}
.pos-table th:last-child,.pos-table td:last-child{text-align:right;}
.pos-row{border-bottom:1px solid var(--border);transition:background .1s;}
.pos-row:last-child{border-bottom:none;}
.pos-row:hover{background:rgba(255,255,255,.03);}
.pos-row td{padding:12px;}
.pos-q{font-size:13px;font-weight:500;color:var(--ink);max-width:340px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pos-q a{color:var(--ink);text-decoration:none;}
.pos-q a:hover{color:var(--blue);}
.side-badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:4px;}
.side-yes{background:rgba(0,230,138,.12);color:var(--green);border:1px solid rgba(0,230,138,.2);}
.side-no{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.2);}
.price-cell{font-family:var(--mono);font-size:12px;color:var(--ink2);}
.pnl-cell{font-family:var(--mono);font-size:13px;font-weight:700;}
.pnl-pos{color:var(--green);}
.pnl-neg{color:var(--red);}
.trade-btn{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink2);border:1px solid var(--border);border-radius:5px;padding:5px 10px;text-decoration:none;white-space:nowrap;transition:border-color .12s,color .12s;}
.trade-btn:hover{color:var(--ink);border-color:rgba(255,255,255,.2);}
/* Empty state */
.empty{text-align:center;padding:60px 20px;}
.empty-head{font-size:16px;font-weight:600;margin-bottom:8px;}
.empty-sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:20px;}
.btn-primary{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;color:#000;background:var(--green);border-radius:6px;padding:10px 22px;text-decoration:none;transition:opacity .12s;}
.btn-primary:hover{opacity:.85;}
/* Loading */
.sk{background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.05) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
.sk-row{height:60px;margin-bottom:2px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-msg{font-family:var(--mono);font-size:12px;color:var(--red);padding:20px;text-align:center;}
@media(max-width:600px){
  .summary-row{flex-direction:column;}
  .pos-table th:nth-child(3),.pos-table td:nth-child(3){display:none;}
  .pos-q{max-width:180px;}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">HYPERFLEX</a>
  <div class="nav-links" id="navLinks">
    <a href="/feed" class="nav-link">Feed</a>
    <a href="/alpha-live" class="nav-link">Alpha</a>
    <a href="/predictors" class="nav-link">Predictors</a>
  </div>
  <div class="nav-right" id="navRight">
    <a href="/creator/login" style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink2);text-decoration:none;border:1px solid var(--border);border-radius:5px;padding:7px 14px;" id="loginBtn">Log in</a>
  </div>
</nav>

<div class="main">
  <div class="page-title">Portfolio</div>
  <div class="page-sub" id="portfolioTs">Loading…</div>

  <div id="portfolioContent">
    <!-- Summary row skeleton -->
    <div class="summary-row">
      <div class="stat-card sk sk-row" style="height:72px;"></div>
      <div class="stat-card sk sk-row" style="height:72px;"></div>
      <div class="stat-card sk sk-row" style="height:72px;"></div>
      <div class="stat-card sk sk-row" style="height:72px;"></div>
    </div>
    <div class="sk sk-row"></div>
    <div class="sk sk-row"></div>
    <div class="sk sk-row"></div>
  </div>
</div>

<script>
(function(){
  var tok = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token') || '';
  if (!tok) {
    document.getElementById('portfolioContent').innerHTML = '<div class="empty"><div class="empty-head">Sign in to see your portfolio.</div><div class="empty-sub">Connect your Polymarket wallet to track open positions and P&amp;L.</div><a href="/creator/login" class="btn-primary">Log in</a></div>';
    document.getElementById('portfolioTs').textContent = '';
    return;
  }

  // Nav user link
  try {
    var p = JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    var uid = p.userId||p.sub||p.id;
    if (uid) {
      var a = document.createElement('a'); a.className='nav-link'; a.href='/m/'+uid; a.textContent='Profile';
      document.getElementById('navLinks').appendChild(a);
      document.getElementById('loginBtn').style.display='none';
    }
  } catch(e) {}

  fetch('/api/portfolio', { headers: { Authorization: 'Bearer ' + tok } })
    .then(function(r) {
      if (r.status === 401) { document.getElementById('portfolioContent').innerHTML='<div class="error-msg">Session expired. <a href="/creator/login" style="color:var(--blue)">Log in again →</a></div>'; return null; }
      return r.ok ? r.json() : null;
    })
    .then(function(d) {
      if (!d) return;
      document.getElementById('portfolioTs').textContent = 'Live prices · ' + d.positions.length + ' open position' + (d.positions.length !== 1 ? 's' : '');

      var pnlClass = d.total_pnl >= 0 ? 'pos' : 'neg';
      var pnlSign = d.total_pnl >= 0 ? '+' : '';
      var rpnlSign = d.realized_pnl >= 0 ? '+' : '';

      var summaryHtml =
        '<div class="summary-row">' +
        '<div class="stat-card"><div class="stat-label">Portfolio Value</div><div class="stat-val">$' + d.total_value.toFixed(2) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Invested</div><div class="stat-val">$' + d.total_invested.toFixed(2) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Unrealized P&amp;L</div><div class="stat-val ' + pnlClass + '">' + pnlSign + '$' + d.total_pnl.toFixed(2) + '<span style="font-size:.6em;opacity:.7;margin-left:4px">(' + pnlSign + d.total_pnl_pct + '%)</span></div></div>' +
        '<div class="stat-card"><div class="stat-label">Realized P&amp;L</div><div class="stat-val ' + (d.realized_pnl >= 0 ? 'pos' : 'neg') + '">' + rpnlSign + '$' + d.realized_pnl.toFixed(2) + '</div></div>' +
        '</div>';

      if (!d.positions.length) {
        document.getElementById('portfolioContent').innerHTML = summaryHtml +
          '<div class="empty"><div class="empty-head">No open positions.</div><div class="empty-sub">Positions from your connected Polymarket wallet appear here.</div><a href="/alpha-live" class="btn-primary">Browse markets →</a></div>';
        return;
      }

      var rows = d.positions.map(function(p) {
        var pnlSign2 = p.pnl >= 0 ? '+' : '';
        var pnlCls = p.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
        var link = p.market_url ? p.market_url : '#';
        var qHtml = p.market_url
          ? '<a href="' + link + '">' + esc(trunc(p.question, 80)) + '</a>'
          : esc(trunc(p.question, 80));
        return '<tr class="pos-row">' +
          '<td><div class="pos-q">' + qHtml + '</div><span class="side-badge ' + (p.side === 'YES' ? 'side-yes' : 'side-no') + '">' + p.side + '</span></td>' +
          '<td class="price-cell">' + p.avg_price + '¢<br><span style="font-size:.85em;opacity:.6">entry</span></td>' +
          '<td class="price-cell">' + p.cur_price + '¢<br><span style="font-size:.85em;opacity:.6">live</span></td>' +
          '<td class="pnl-cell ' + pnlCls + '">' + pnlSign2 + '$' + p.pnl.toFixed(2) + '<br><span style="font-size:.75em;opacity:.8">' + pnlSign2 + p.pnl_pct + '%</span></td>' +
          '<td><a href="' + link + '" class="trade-btn">Trade →</a></td>' +
          '</tr>';
      }).join('');

      document.getElementById('portfolioContent').innerHTML = summaryHtml +
        '<div class="section-head">Open Positions</div>' +
        '<table class="pos-table">' +
        '<thead><tr><th>Market</th><th>Entry</th><th>Current</th><th>P&amp;L</th><th></th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>';
    })
    .catch(function(err) {
      document.getElementById('portfolioContent').innerHTML = '<div class="error-msg">Could not load portfolio. Try refreshing.</div>';
    });

  function trunc(s, n) { return (s||'').length > n ? s.slice(0,n)+'…' : (s||''); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
})();
</script>
</body>
</html>
