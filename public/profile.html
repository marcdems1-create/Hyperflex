<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Creator Profile — HYPERFLEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:    #c9920d;
      --ink:     #141412;
      --paper:   #141412;
      --surface: #1c1c1a;
      --border:  rgba(255,255,255,.1);
      --text:    #f0ede8;
      --dim:     rgba(240,237,232,.45);
      --sans:    'Syne', sans-serif;
      --mono:    'Space Mono', monospace;
      --radius:  12px;
      --accent:  #c9920d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--paper); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(20,20,18,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
    }
    .nav-logo { font-family: var(--sans); font-weight: 800; font-size: 16px; letter-spacing: .04em; color: var(--gold); }
    .nav-actions { display: flex; gap: 10px; align-items: center; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: var(--sans); cursor: pointer; border: none; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-gold { background: var(--gold); color: var(--ink); }
    .btn-ghost { background: transparent; color: var(--dim); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.3); }

    /* ── HERO ── */
    .hero {
      position: relative; overflow: hidden;
      min-height: 280px;
    }
    .hero-banner {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a1a18 0%, #222220 100%);
      background-size: cover; background-position: center;
    }
    .hero-banner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(20,20,18,.3) 0%, rgba(20,20,18,.85) 100%);
    }
    .hero-content {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 48px 24px 36px;
      display: flex; gap: 24px; align-items: flex-end;
    }
    .hero-logo {
      width: 88px; height: 88px; border-radius: 16px;
      border: 3px solid rgba(255,255,255,.15);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800; color: var(--gold);
      flex-shrink: 0; overflow: hidden;
    }
    .hero-logo img { width: 100%; height: 100%; object-fit: cover; }
    .hero-meta { flex: 1; min-width: 0; }
    .hero-name { font-size: 28px; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
    .hero-url { font-family: var(--mono); font-size: 11px; color: var(--gold); margin-bottom: 10px; }
    .hero-desc { font-size: 13px; color: var(--dim); line-height: 1.6; max-width: 520px; }
    .hero-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .badge {
      padding: 3px 10px; border-radius: 99px; font-family: var(--mono);
      font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    }
    .badge-cat { background: rgba(255,255,255,.08); color: var(--dim); }
    .badge-plan-pro { background: rgba(201,146,13,.2); color: var(--gold); }
    .badge-plan-premium { background: rgba(201,146,13,.35); color: var(--gold); }

    /* ── BODY ── */
    .page { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; text-align: center;
    }
    .stat-val { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat-lbl { font-family: var(--mono); font-size: 11px; color: var(--dim); letter-spacing: .08em; text-transform: uppercase; }

    /* ── SOCIAL ── */
    .social-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
    .social-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700;
      background: var(--surface); border: 1px solid var(--border); color: var(--dim);
      cursor: pointer; transition: all .15s;
    }
    .social-btn:hover { color: var(--text); border-color: rgba(255,255,255,.3); }

    /* ── SECTIONS ── */
    .section { margin-bottom: 36px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title { font-size: 15px; font-weight: 800; letter-spacing: .01em; }
    .section-link { font-family: var(--mono); font-size: 11px; color: var(--gold); cursor: pointer; }
    .section-link:hover { text-decoration: underline; }

    /* ── MARKET CARDS ── */
    .markets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .mkt-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
      transition: border-color .15s; cursor: pointer;
    }
    .mkt-card:hover { border-color: rgba(255,255,255,.25); }
    .mkt-cat { font-family: var(--mono); font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
    .mkt-q { font-size: 13px; font-weight: 700; line-height: 1.45; color: var(--text); flex: 1; }
    .mkt-odds { display: flex; gap: 8px; }
    .mkt-yes { background: rgba(74,222,128,.12); color: #4ade80; padding: 5px 12px; border-radius: 6px; font-family: var(--mono); font-size: 13px; font-weight: 700; flex: 1; text-align: center; }
    .mkt-no  { background: rgba(248,113,113,.12); color: #f87171; padding: 5px 12px; border-radius: 6px; font-family: var(--mono); font-size: 13px; font-weight: 700; flex: 1; text-align: center; }
    .mkt-meta { font-family: var(--mono); font-size: 11px; color: var(--dim); }
    .mkt-bar-wrap { height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
    .mkt-bar-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #c9920d); border-radius: 2px; transition: width .4s; }

    /* ── LEADERBOARD ── */
    .lb-list { display: flex; flex-direction: column; gap: 8px; }
    .lb-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px;
    }
    .lb-rank { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--dim); width: 24px; text-align: center; flex-shrink: 0; }
    .lb-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--ink); flex-shrink: 0; }
    .lb-name { flex: 1; font-size: 13px; font-weight: 700; }
    .lb-trades { font-family: var(--mono); font-size: 11px; color: var(--dim); }
    .lb-pnl { font-family: var(--mono); font-size: 13px; font-weight: 700; }
    .lb-pnl.pos { color: #4ade80; }
    .lb-pnl.neg { color: #f87171; }

    /* ── DISCUSSION TABS ── */
    .disc-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .disc-tab {
      padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
      border: none; background: none; color: var(--dim); font-family: inherit;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s;
    }
    .disc-tab.active { color: var(--text); border-bottom-color: var(--gold); }
    .disc-tab:hover { color: var(--text); }
    .disc-panel { display: none; }
    .disc-panel.active { display: block; }

    /* Comment/post items */
    .disc-item {
      display: flex; gap: 12px; padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .disc-item:last-child { border-bottom: none; }
    .disc-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--ink); flex-shrink: 0;
    }
    .disc-body { flex: 1; min-width: 0; }
    .disc-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .disc-name { font-size: 13px; font-weight: 700; }
    .disc-time { font-family: var(--mono); font-size: 11px; color: var(--dim); }
    .disc-mkt-link {
      font-family: var(--mono); font-size: 11px; color: var(--gold);
      background: rgba(201,146,13,.1); border-radius: 4px; padding: 2px 7px;
      text-decoration: none; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle;
    }
    .disc-mkt-link:hover { text-decoration: underline; }
    .disc-text { font-size: 13px; line-height: 1.55; color: var(--text); word-break: break-word; }

    /* Compose box */
    .disc-compose {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 20px;
    }
    .disc-compose textarea {
      width: 100%; box-sizing: border-box; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 8px; color: var(--text);
      font-family: inherit; font-size: 13px; line-height: 1.5; padding: 10px 12px;
      resize: vertical; min-height: 68px; outline: none;
    }
    .disc-compose textarea:focus { border-color: rgba(201,146,13,.5); }
    .disc-compose-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .disc-char { font-family: var(--mono); font-size: 11px; color: var(--dim); }
    .disc-submit {
      background: var(--gold); color: var(--ink); border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 800; font-family: inherit; cursor: pointer;
    }
    .disc-submit:disabled { opacity: .45; cursor: default; }
    .disc-login-nudge { font-size: 12px; color: var(--dim); padding: 8px 0; }
    .disc-login-nudge a { color: var(--gold); }

    /* ── JOIN CTA ── */
    .join-cta {
      background: linear-gradient(135deg, rgba(201,146,13,.12) 0%, rgba(201,146,13,.04) 100%);
      border: 1px solid rgba(201,146,13,.3); border-radius: 16px;
      padding: 36px 32px; text-align: center;
    }
    .join-cta-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .join-cta-sub { font-size: 14px; color: var(--dim); line-height: 1.6; margin-bottom: 24px; max-width: 480px; margin-left: auto; margin-right: auto; }
    .join-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold); color: var(--ink); padding: 14px 32px;
      border-radius: 10px; font-size: 15px; font-weight: 800; border: none; cursor: pointer;
      transition: opacity .15s;
    }
    .join-btn:hover { opacity: .88; }

    /* ── EMPTY / LOADING ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 13px; }
    .loading-shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,.04) 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 8px; height: 20px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .hero-content { flex-direction: column; align-items: flex-start; padding: 32px 16px 24px; }
      .hero-logo { width: 64px; height: 64px; font-size: 24px; }
      .hero-name { font-size: 22px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .page { padding: 24px 16px 60px; }
      .join-cta { padding: 24px 20px; }
      /* Nav: hide Explore link on very small, keep Join */
      .nav { padding: 0 16px; }
      .btn-ghost { display: none; }
      /* Markets grid: single column */
      .markets-grid { grid-template-columns: 1fr; }
      /* Join CTA title */
      .join-cta-title { font-size: 18px; }
    }
    @media (max-width: 400px) {
      .hero-name { font-size: 18px; }
      .hero-desc { font-size: 12px; }
    }
    /* ── READABILITY & MOBILE POLISH ── */
    @media (max-width: 768px) {
      body { overflow-x: hidden; }
      input, textarea, select { font-size: 16px !important; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .markets-grid { grid-template-columns: 1fr; }
      .page { padding: 24px 16px 60px; }
      .nav { padding: 0 16px; }
      .btn-ghost { min-height: 44px; display: inline-flex; align-items: center; }
      .social-btn { min-height: 44px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<div id="nav-root"></div>
<script src="/nav.js?v=23"></script>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="hero-banner" id="heroBanner"></div>
  <div class="hero-content">
    <div class="hero-logo" id="heroLogo"></div>
    <div class="hero-meta">
      <div class="hero-name" id="heroName"><div class="loading-shimmer" style="width:200px;height:28px"></div></div>
      <div class="hero-url" id="heroUrl"></div>
      <div class="hero-desc" id="heroDesc"></div>
      <div class="hero-badges" id="heroBadges"></div>
    </div>
  </div>
</div>

<!-- PAGE BODY -->
<div class="page" id="profileContent">

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="loading-shimmer" style="height:26px;margin-bottom:6px"></div><div class="loading-shimmer" style="height:12px;width:60%;margin:0 auto"></div></div>
    <div class="stat-card"><div class="loading-shimmer" style="height:26px;margin-bottom:6px"></div><div class="loading-shimmer" style="height:12px;width:60%;margin:0 auto"></div></div>
    <div class="stat-card"><div class="loading-shimmer" style="height:26px;margin-bottom:6px"></div><div class="loading-shimmer" style="height:12px;width:60%;margin:0 auto"></div></div>
    <div class="stat-card"><div class="loading-shimmer" style="height:26px;margin-bottom:6px"></div><div class="loading-shimmer" style="height:12px;width:60%;margin:0 auto"></div></div>
  </div>

  <!-- Social -->
  <div class="social-row" id="socialRow" style="display:none"></div>

  <!-- Active Markets -->
  <div class="section">
    <div class="section-head">
      <div class="section-title">🔥 Active Markets</div>
      <a id="allMarketsLink" href="#" class="section-link">See all →</a>
    </div>
    <div style="margin-bottom:14px">
      <input type="search" id="profileMktSearch" placeholder="🔍 Search markets…" oninput="onProfileSearch(this.value)" style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;border:1.5px solid #2a2a27;background:#1c1c19;color:#e8e3d5;font-size:14px;font-family:inherit;outline:none;" />
    </div>
    <div class="markets-grid" id="marketsGrid">
      <div class="empty">Loading markets…</div>
    </div>
  </div>

  <!-- Top Predictors -->
  <div class="section" id="lbSection" style="display:none">
    <div class="section-head">
      <div class="section-title">🏆 Top Predictors</div>
    </div>
    <div class="lb-list" id="lbList"></div>
  </div>

  <!-- Discussion / Wall tabs -->
  <div class="section" id="discSection">
    <div class="disc-tabs">
      <button class="disc-tab active" onclick="switchDiscTab('discussion', this)">💬 Market Discussion</button>
      <!-- 📌 Community Wall tab removed in Phase 2 — community wall
           feature deleted post-pivot. -->
    </div>

    <!-- Market Discussion panel -->
    <div class="disc-panel active" id="discPanel-discussion">
      <div id="discList-discussion"><div class="empty">Loading discussion…</div></div>
    </div>

    <!-- Community Wall panel -->
    <div class="disc-panel" id="discPanel-wall">
      <!-- Compose box -->
      <div class="disc-compose" id="wallCompose" style="display:none">
        <textarea id="wallTextarea" placeholder="Leave a message for the community…" maxlength="280" oninput="updateWallChar()"></textarea>
        <div class="disc-compose-foot">
          <span class="disc-char"><span id="wallCharCount">0</span>/280</span>
          <button class="disc-submit" id="wallSubmitBtn" onclick="submitWallPost()">Post</button>
        </div>
      </div>
      <div class="disc-login-nudge" id="wallLoginNudge" style="display:none">
        <a href="#join" onclick="openJoinCta()">Join the community</a> to leave a message on the wall.
      </div>
      <div id="discList-wall"><div class="empty">Loading wall…</div></div>
    </div>
  </div>

  <!-- Join CTA -->
  <div class="join-cta" id="join">
    <div class="join-cta-title" id="ctaTitle">Join the community</div>
    <div class="join-cta-sub" id="ctaSub">Predict outcomes, earn points, and compete on the leaderboard.</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <a id="ctaBtn" href="#" class="join-btn">Start Predicting →</a>
      <button id="profileFollowBtn" onclick="toggleProfileFollow()" style="display:none;background:rgba(201,146,13,0.15);border:1px solid rgba(201,146,13,0.4);color:#c9920d;font-family:inherit;font-size:14px;font-weight:700;padding:13px 24px;border-radius:8px;cursor:pointer">🔔 Follow</button>
    </div>
  </div>

</div>

<script>
// Show Dashboard link if logged in
if (localStorage.getItem('hf_token') || localStorage.getItem('hf_creator_token')) {
  const dl = document.getElementById('navDashLink'); if (dl) dl.style.display = '';
}
const slug = location.pathname.replace(/^\/u\//, '').replace(/\/$/, '');
if (!slug) location.href = '/';

let profileActiveMarkets = [];
let _profileSearchTimer = null;

function onProfileSearch(val) {
  clearTimeout(_profileSearchTimer);
  _profileSearchTimer = setTimeout(() => {
    const q = val.trim().toLowerCase();
    const filtered = q ? profileActiveMarkets.filter(m => (m.question||'').toLowerCase().includes(q) || (m.category||'').toLowerCase().includes(q)) : profileActiveMarkets;
    renderProfileMarkets(filtered);
  }, 180);
}

function renderProfileMarkets(mktList) {
  const grid = document.getElementById('marketsGrid');
  if (!mktList.length) {
    grid.innerHTML = '<div class="empty">No markets found.</div>';
    return;
  }
  grid.innerHTML = mktList.map(m => {
    // Use yes_price/no_price (CPMM — always accurate)
    // Fall back to vote-share only if price fields absent
    let yp, np;
    if (m.yes_price != null && m.yes_price > 0) {
      yp = Math.round(m.yes_price * 100);
      np = 100 - yp;
    } else {
      const totalVotes = (m.yes_votes || 0) + (m.no_votes || 0);
      yp = totalVotes > 0 ? Math.round((m.yes_votes || 0) / totalVotes * 100) : null;
      np = yp !== null ? 100 - yp : null;
    }
    return `
      <div class="mkt-card" onclick="location.href='/${slug}?market=${m.id}'">
        <div class="mkt-cat">${cap(m.category || 'general')}</div>
        <div class="mkt-q">${m.question}</div>
        <div class="mkt-bar-wrap"><div class="mkt-bar-fill" style="width:${yp !== null ? yp : 50}%;opacity:${yp !== null ? 1 : 0.3}"></div></div>
        <div class="mkt-odds">
          ${yp !== null
            ? `<div class="mkt-yes">${yp}% YES</div><div class="mkt-no">${np}% NO</div>`
            : `<div class="mkt-yes" style="color:var(--muted);font-size:11px">Be first to predict</div>`}
        </div>
        ${yp !== null ? `<div style="display:flex;justify-content:space-between;margin:4px 0 0;font-family:var(--mono);font-size:10px;font-weight:700">
          <span style="color:var(--green)">YES ROI: ${yp > 0 ? Math.round((100 - yp) / yp * 100) : 0}%</span>
          <span style="color:var(--red)">NO ROI: ${np > 0 ? Math.round((100 - np) / np * 100) : 0}%</span>
        </div>` : ''}
        <div class="mkt-meta">${m.trader_count || 0} traders · closes ${new Date(m.expiry_date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      </div>`;
  }).join('');
}

// Update all community links
document.getElementById('navJoinBtn').href = '/' + slug;
document.getElementById('allMarketsLink').href = '/' + slug;
document.getElementById('ctaBtn').href = '/' + slug;

function fmt(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString();
}
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function initials(name) {
  return (name || '?').split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function timeAgo(iso) {
  if (!iso) return '';
  const ts = iso.endsWith('Z') || iso.includes('+') ? iso : iso + 'Z';
  const s  = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 0)    return 'just now';
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

async function load() {
  const [commRes, lbRes] = await Promise.all([
    fetch('/api/community/' + slug),
    fetch('/api/leaderboard?slug=' + slug)
  ]);

  if (!commRes.ok) {
    document.getElementById('hero').style.display = 'none';
    document.getElementById('profileContent').innerHTML = `
      <div style="text-align:center;padding:100px 24px">
        <div style="font-size:48px;margin-bottom:20px">🔍</div>
        <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px">Creator not found</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:28px">This creator profile doesn't exist or hasn't been set up yet.</div>
        <a href="/" style="background:var(--gold);color:#141412;font-weight:700;font-size:14px;padding:10px 24px;border-radius:8px;text-decoration:none">Browse Communities →</a>
      </div>`;
    return;
  }

  const { community: c, markets, member_count } = await commRes.json();
  const leaderboard = lbRes.ok ? await lbRes.json() : [];

  const accent = c.primary_color || '#c9920d';
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--gold', accent);

  // Meta / title
  document.title = (c.display_name || slug) + ' — HYPERFLEX';

  // Hero
  if (c.banner_url) {
    document.getElementById('heroBanner').style.backgroundImage = `url('${c.banner_url}')`;
  }
  const logoEl = document.getElementById('heroLogo');
  if (c.logo_url) {
    logoEl.innerHTML = `<img src="${c.logo_url}" alt="${c.display_name}"/>`;
  } else {
    logoEl.textContent = initials(c.display_name);
    logoEl.style.background = accent + '22';
    logoEl.style.color = accent;
  }
  document.getElementById('heroName').textContent = c.display_name || slug;
  document.getElementById('heroUrl').textContent = 'hyperflex.network/' + slug;
  if (c.community_description) document.getElementById('heroDesc').textContent = c.community_description;

  const badges = document.getElementById('heroBadges');
  if (c.community_category) {
    const catEmojis = { finance:'💹', crypto:'₿', sports:'🏆', politics:'🗳', entertainment:'🎬', tech:'💻', gaming:'🎮', other:'✦' };
    const em = catEmojis[c.community_category] || '✦';
    badges.innerHTML = `<span class="badge badge-cat">${em} ${cap(c.community_category)}</span>`;
  }
  if (c.plan === 'platinum') badges.innerHTML += `<span class="badge badge-plan-premium">⭐ Premium</span>`;
  else if (c.plan === 'pro')  badges.innerHTML += `<span class="badge badge-plan-pro">Pro</span>`;

  // Update CTAs
  document.getElementById('ctaTitle').textContent = `Join ${c.display_name || 'the community'}`;
  document.getElementById('ctaSub').textContent = `Predict outcomes, earn ${c.custom_points_name || 'Flex Points'}, and compete on the leaderboard.`;

  // Stats
  const active = (markets || []).filter(m => !m.resolved && !m.archived);
  const resolved = (markets || []).filter(m => m.resolved);
  const totalTrades = active.reduce((s, m) => s + (m.trader_count || 0), 0) + resolved.reduce((s, m) => s + (m.trader_count || 0), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${fmt(member_count || 0)}</div>
      <div class="stat-lbl">Members</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${fmt(active.length)}</div>
      <div class="stat-lbl">Live Markets</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${fmt(totalTrades)}</div>
      <div class="stat-lbl">Trades Made</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${fmt(resolved.length)}</div>
      <div class="stat-lbl">Resolved</div>
    </div>
  `;

  // Socials
  const socials = [
    c.social_twitter  && { icon: '𝕏', label: 'Twitter',  href: 'https://twitter.com/' + c.social_twitter.replace('@','') },
    c.social_youtube  && { icon: '▶', label: 'YouTube',  href: c.social_youtube.startsWith('http') ? c.social_youtube : 'https://youtube.com/' + c.social_youtube },
    c.social_discord  && { icon: '◈', label: 'Discord',  href: c.social_discord.startsWith('http') ? c.social_discord : 'https://discord.gg/' + c.social_discord },
    c.social_twitch   && { icon: '◉', label: 'Twitch',   href: 'https://twitch.tv/' + c.social_twitch.replace('@','') },
  ].filter(Boolean);

  if (socials.length) {
    const sr = document.getElementById('socialRow');
    sr.style.display = 'flex';
    sr.innerHTML = socials.map(s => `<a href="${s.href}" target="_blank" rel="noopener" class="social-btn">${s.icon} ${s.label}</a>`).join('');
  }

  // Markets
  profileActiveMarkets = [...active].sort((a,b) => (b.trader_count||0) - (a.trader_count||0));
  renderProfileMarkets(profileActiveMarkets);

  // Leaderboard
  const top = (Array.isArray(leaderboard) ? leaderboard : []).slice(0, 5);
  if (top.length) {
    const ptsName = c.custom_points_name || 'pts';
    const lbSection = document.getElementById('lbSection');
    lbSection.style.display = '';
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('lbList').innerHTML = top.map((l, i) => {
      const pnl = Math.round((l.pnl || 0) / 100);
      return `
        <div class="lb-item">
          <div class="lb-rank">${medals[i] || '#'+(i+1)}</div>
          <div class="lb-avatar" style="background:${accent}">${initials(l.display_name)}</div>
          <div class="lb-name">${l.display_name || 'Anonymous'}</div>
          <div class="lb-trades">${l.trade_count || 0} trades</div>
          <div class="lb-pnl ${pnl >= 0 ? 'pos' : 'neg'}">${pnl >= 0 ? '+' : ''}${pnl.toLocaleString()} ${ptsName}</div>
        </div>`;
    }).join('');
  }
}

load().catch(err => console.error('profile load error:', err));

// ── DISCUSSION + WALL ────────────────────────────────────────────────────────
let _activeDiscTab = 'discussion';
let _discLoaded = { discussion: false, wall: false };

function switchDiscTab(tab, btn) {
  _activeDiscTab = tab;
  document.querySelectorAll('.disc-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.disc-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('discPanel-' + tab).classList.add('active');
  if (!_discLoaded[tab]) {
    if (tab === 'discussion') loadDiscussion();
    else loadWall();
  }
}

function discInitials(name) {
  return (name || '?').split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function discTimeAgo(iso) {
  if (!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso.endsWith('Z')||iso.includes('+')?iso:iso+'Z')) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function renderDiscItems(items, container) {
  const el = document.getElementById(container);
  if (!items.length) { el.innerHTML = '<div class="empty">Nothing here yet — be the first to comment!</div>'; return; }
  el.innerHTML = items.map(item => `
    <div class="disc-item">
      <div class="disc-avatar">${discInitials(item.display_name)}</div>
      <div class="disc-body">
        <div class="disc-meta">
          <span class="disc-name">${escHtml(item.display_name)}</span>
          <span class="disc-time">${discTimeAgo(item.created_at)}</span>
          ${item.market_question ? `<a class="disc-mkt-link" href="/${slug}?market=${item.market_id}" title="${escHtml(item.market_question)}">📊 ${escHtml(item.market_question.slice(0,45))}${item.market_question.length>45?'…':''}</a>` : ''}
        </div>
        <div class="disc-text">${escHtml(item.content)}</div>
      </div>
    </div>`).join('');
}

async function loadDiscussion() {
  _discLoaded.discussion = true;
  try {
    const r = await fetch(`/api/profile/${slug}/comments`);
    const data = await r.json();
    renderDiscItems(data.comments || [], 'discList-discussion');
  } catch { document.getElementById('discList-discussion').innerHTML = '<div class="empty">Could not load discussion.</div>'; }
}

async function loadWall() {
  _discLoaded.wall = true;
  // Show compose box or login nudge
  const token = localStorage.getItem('hf_member_token') || localStorage.getItem('hf_token');
  if (token) {
    document.getElementById('wallCompose').style.display = '';
    document.getElementById('wallLoginNudge').style.display = 'none';
  } else {
    document.getElementById('wallCompose').style.display = 'none';
    document.getElementById('wallLoginNudge').style.display = '';
  }
  try {
    const r = await fetch(`/api/profile/${slug}/wall`);
    const data = await r.json();
    renderDiscItems(data.posts || [], 'discList-wall');
  } catch { document.getElementById('discList-wall').innerHTML = '<div class="empty">Could not load wall.</div>'; }
}

function updateWallChar() {
  const len = document.getElementById('wallTextarea').value.length;
  document.getElementById('wallCharCount').textContent = len;
  document.getElementById('wallSubmitBtn').disabled = len === 0;
}

async function submitWallPost() {
  const token = localStorage.getItem('hf_member_token') || localStorage.getItem('hf_token');
  if (!token) return;
  const textarea = document.getElementById('wallTextarea');
  const content = textarea.value.trim();
  if (!content) return;
  const btn = document.getElementById('wallSubmitBtn');
  btn.disabled = true;
  try {
    const r = await fetch(`/api/profile/${slug}/wall`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ content }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Post failed'); }
    const data = await r.json();
    textarea.value = '';
    document.getElementById('wallCharCount').textContent = '0';
    // Prepend new post to list
    const el = document.getElementById('discList-wall');
    const empty = el.querySelector('.empty');
    if (empty) el.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'disc-item';
    div.innerHTML = `
      <div class="disc-avatar">${discInitials(data.post.display_name)}</div>
      <div class="disc-body">
        <div class="disc-meta"><span class="disc-name">${escHtml(data.post.display_name)}</span><span class="disc-time">just now</span></div>
        <div class="disc-text">${escHtml(data.post.content)}</div>
      </div>`;
    el.insertBefore(div, el.firstChild);
  } catch (e) { alert(e.message); }
  btn.disabled = false;
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Auto-load discussion tab on page load
window.addEventListener('load', () => loadDiscussion());

// Follow button on profile page
let _profileFollowing = false;
(async function initFollowBtn() {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) return;
  const btn = document.getElementById('profileFollowBtn');
  if (!btn) return;
  btn.style.display = 'inline-block';
  try {
    const r = await fetch('/api/user/following', { headers: { Authorization: 'Bearer ' + token } });
    if (!r.ok) return;
    const d = await r.json();
    _profileFollowing = (d.following || []).includes(slug);
    updateProfileFollowBtn();
  } catch {}
})();

function updateProfileFollowBtn() {
  const btn = document.getElementById('profileFollowBtn');
  if (!btn) return;
  if (_profileFollowing) {
    btn.textContent = '✓ Following';
    btn.style.background = 'rgba(34,197,94,0.12)';
    btn.style.borderColor = 'rgba(34,197,94,0.4)';
    btn.style.color = '#4ade80';
  } else {
    btn.textContent = '🔔 Follow';
    btn.style.background = 'rgba(201,146,13,0.15)';
    btn.style.borderColor = 'rgba(201,146,13,0.4)';
    btn.style.color = '#c9920d';
  }
}

async function toggleProfileFollow() {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { location.href = '/' + slug; return; }
  try {
    const r = await fetch('/api/community/' + slug + '/follow-social', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    const d = await r.json();
    _profileFollowing = d.following;
    updateProfileFollowBtn();
  } catch {}
}
</script>
