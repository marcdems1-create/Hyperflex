<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — HYPERFLEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#1e1e2a;--text:#f0f0f5;--soft:#8888a0;--muted:#55556a;--gold:#d4a017;--green:#00e68a;--red:#ff4d6a;--blue:#4d9fff;--purple:#a855f7;--mono:'Space Mono',monospace;--sans:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:var(--gold);text-decoration:none}
.page{max-width:640px;margin:0 auto;padding:24px 20px 80px}

/* Hero */
.hero{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:0}
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:24px;font-weight:800;flex-shrink:0;border:2px solid var(--border)}
.name{font-size:22px;font-weight:800;letter-spacing:-0.03em}
.handle{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
.bio{font-size:14px;color:var(--soft);line-height:1.5;margin-bottom:12px;max-width:460px}
.social-row{display:flex;gap:20px;font-size:13px;margin-bottom:14px}
.social-row strong{color:var(--text);font-weight:700}
.social-row span{color:var(--muted)}
.action-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text);transition:all .15s;font-family:var(--sans)}
.btn:hover{background:rgba(255,255,255,.06)}
.btn-gold{border-color:rgba(212,160,23,.4);color:var(--gold)}
.btn-gold:hover{background:rgba(212,160,23,.1)}
.btn-fill{background:var(--text);color:var(--bg);border:none}
.btn-fill:hover{opacity:.85}

/* Tier */
.tier{text-align:center;padding:28px 0;border-bottom:1px solid var(--border)}
.tier-icon{font-size:40px;margin-bottom:4px}
.tier-label{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.tier-pct{font-family:var(--mono);font-size:56px;font-weight:700;line-height:1}
.tier-sub{font-size:12px;color:var(--muted);margin-top:6px}
.tier-bar{height:3px;background:var(--border);border-radius:2px;margin:12px auto 0;max-width:200px;overflow:hidden}
.tier-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* Stats */
.stats{display:flex;border-bottom:1px solid var(--border)}
.stat{flex:1;text-align:center;padding:16px 8px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
@media(max-width:480px){.stats{flex-wrap:wrap}.stat{flex:1 1 50%;border-bottom:1px solid var(--border)}.stat:nth-child(3),.stat:nth-child(4){border-bottom:none}}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:14px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--sans)}
.tab:hover{color:var(--soft)}
.tab.active{color:var(--text);border-bottom-color:var(--gold)}
.tab-content{display:none}.tab-content.active{display:block}

/* Take cards */
.take{padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.take:hover{background:rgba(255,255,255,.01)}
.take a{text-decoration:none;color:inherit}
.take-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.take-side{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
.take-side.yes{background:rgba(0,230,138,.1);color:var(--green)}
.take-side.no{background:rgba(255,77,106,.1);color:var(--red)}
.take-q{font-size:15px;font-weight:600;line-height:1.4}
.take-meta{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.take-thesis{font-size:14px;color:var(--soft);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.take-actions{display:flex;gap:16px;margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.badge-correct{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-correct.win{background:rgba(0,230,138,.1);color:var(--green)}
.badge-correct.loss{background:rgba(255,77,106,.1);color:var(--red)}

/* Trade rows */
.trade{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.trade-info{flex:1;min-width:0}
.trade-q{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trade-detail{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.trade-pnl{font-family:var(--mono);font-size:13px;font-weight:700;flex-shrink:0}

/* CTA */
.challenge{background:linear-gradient(135deg,rgba(212,160,23,.06),rgba(212,160,23,.02));border:1px solid rgba(212,160,23,.2);border-radius:16px;padding:24px;text-align:center;margin-top:24px}
.challenge-title{font-size:17px;font-weight:800;margin-bottom:4px}
.challenge-sub{font-size:13px;color:var(--muted);margin-bottom:14px}

/* Loading */
.loading{color:var(--muted);text-align:center;padding:80px 20px;font-size:13px}
.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:13px}

/* Mobile */
@media(max-width:480px){.page{padding:16px 16px 60px}.name{font-size:18px}.avatar{width:56px;height:56px;font-size:20px}.tier-pct{font-size:44px}}
</style>
</head>
<body>
<div id="nav-root"></div>
<script src="/nav.js?v=20"></script>
<div class="page" id="page"><div class="loading">Loading profile...</div></div>
<script>
var userId = location.pathname.split('/').pop();
var API = location.origin;

function timeAgo(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d.endsWith('Z')?d:d+'Z'))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<2592000)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString(undefined,{month:'short',year:'numeric'})}
function fmtK(n){return n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1000?'$'+Math.round(n/1000)+'K':'$'+Math.round(n)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function getToken(){return localStorage.getItem('hf_token')||localStorage.getItem('hf_creator_token')||''}

function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  var el=document.getElementById('tab-'+id);if(el)el.classList.add('active');
  if(btn)btn.classList.add('active');
}

async function toggleFollow(){
  var t=getToken();if(!t)return;
  try{
    var r=await fetch(API+'/api/predictors/'+userId+'/follow',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'}});
    var d=await r.json();
    var btn=document.getElementById('followBtn');
    if(btn){btn.textContent=d.following?'Following':'Follow';btn.className=d.following?'btn btn-gold':'btn btn-fill'}
  }catch(e){}
}

async function loadFollowStatus(){
  var t=getToken();if(!t)return;
  try{
    var r=await fetch(API+'/api/predictors/'+userId+'/follow-status',{headers:{'Authorization':'Bearer '+t}});
    var d=await r.json();
    var btn=document.getElementById('followBtn');
    if(btn&&d.is_following){btn.textContent='Following';btn.className='btn btn-gold'}
  }catch(e){}
}

async function promptSetName(){
  var name=prompt('Enter your display name:');
  if(!name||!name.trim())return;
  var t=getToken();if(!t)return;
  try{
    var r=await fetch(API+'/api/user/display-name',{method:'PUT',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({display_name:name.trim()})});
    if(r.ok){location.reload()}else{alert('Failed to update name')}
  }catch(e){alert('Error: '+e.message)}
}

async function load(){
  var page=document.getElementById('page');
  try{
    var res=await fetch(API+'/api/member/'+userId);
    if(!res.ok){page.innerHTML='<div class="loading">Profile not found</div>';return}
    var data=await res.json();
    var u=data.user,s=data.stats,ts=data.take_stats||{},takes=data.recent_takes||[];
    var ps=data.polymarket_stats||{},trades=data.recent_trades||[];

    var isOwner=false;
    try{var tok=getToken();if(tok){var p=JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));if((p.userId||p.sub||p.id)==userId)isOwner=true}}catch(e){}

    var winPct=s.settled_predictions>0?Math.round((s.wins/s.settled_predictions)*100):0;
    var polyWinPct=ps.win_rate||0;
    var bestWin=Math.max(winPct,polyWinPct);
    var initials=(u.display_name||'?').split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2);

    // Tier
    var tier,tierIcon,tierColor;
    if(bestWin>=70&&(s.settled_predictions>=10||ps.total_trades>=10)){tier='ORACLE';tierIcon='🎯';tierColor='#d4a017'}
    else if(bestWin>=60&&(s.settled_predictions>=5||ps.total_trades>=5)){tier='SHARP';tierIcon='🎯';tierColor='#00e68a'}
    else if(bestWin>=50&&(s.settled_predictions>=5||ps.total_trades>=5)){tier='SOLID';tierIcon='📊';tierColor='#4d9fff'}
    else if(s.settled_predictions>=3||ps.total_trades>=3){tier='SPECULATOR';tierIcon='🎲';tierColor='#8888a0'}
    else{tier='NEWCOMER';tierIcon='🆕';tierColor='#8888a0'}

    document.title=u.display_name+' — HYPERFLEX';

    var volStr=ps.volume_usd?fmtK(ps.volume_usd):'$0';
    var pnlVal=ps.pnl_usd||0;
    var pnlColor=pnlVal>=0?'var(--green)':'var(--red)';
    var pnlStr=pnlVal>=0?'+'+fmtK(pnlVal):'-'+fmtK(Math.abs(pnlVal));

    // Takes HTML
    var takesHtml=takes.length?takes.map(function(t){
      var side=(t.side||'').toUpperCase();
      var href=t.market_slug?'/market/'+t.market_slug:'#';
      var correctBadge=t.is_correct===true?'<span class="badge-correct win">✓ CORRECT</span>':t.is_correct===false?'<span class="badge-correct loss">✗ WRONG</span>':'';
      return '<div class="take"><a href="'+href+'"><div class="take-head"><span class="take-side '+(side==='YES'?'yes':'no')+'">'+side+'</span><span class="take-q">'+esc(t.question||'')+'</span></div></a>'+
        '<div class="take-meta">'+(t.entry_price?'<span>'+Math.round(t.entry_price*100)+'¢</span>':'')+
        '<span>'+timeAgo(t.created_at)+'</span>'+correctBadge+'</div>'+
        (t.thesis?'<div class="take-thesis">'+esc(t.thesis)+'</div>':'')+
        '<div class="take-actions"><span style="color:var(--green)">↑ '+(t.agree_count||0)+'</span><span style="color:var(--red)">↓ '+(t.disagree_count||0)+'</span></div></div>'
    }).join(''):(isOwner?'<div class="empty"><div style="font-size:28px;margin-bottom:8px">✍️</div><div style="font-weight:600;margin-bottom:6px">Share your first prediction</div><div style="margin-bottom:16px">Every take is scored when the market resolves.</div><a href="/feed" class="btn btn-gold">Post a take →</a></div>':'<div class="empty">No predictions yet</div>');

    // Trades HTML
    var tradesHtml=trades.length?trades.map(function(t){
      var side=(t.side||'').toUpperCase();
      var pnl=t.pnl!=null?parseFloat(t.pnl):null;
      var pnlC=pnl!=null?(pnl>=0?'var(--green)':'var(--red)'):'var(--muted)';
      var pnlS=pnl!=null?(pnl>=0?'+':'')+'$'+Math.abs(pnl).toFixed(2):(t.status==='open'?'OPEN':'—');
      return '<div class="trade"><span class="take-side '+(side==='YES'?'yes':'no')+'">'+side+'</span>'+
        '<div class="trade-info"><div class="trade-q">'+esc(t.market_question||'')+'</div>'+
        '<div class="trade-detail">$'+parseFloat(t.amount_usd||0).toFixed(2)+' · '+(t.entry_price?Math.round(t.entry_price*100)+'¢':'—')+' · '+timeAgo(t.created_at)+'</div></div>'+
        '<div class="trade-pnl" style="color:'+pnlC+'">'+pnlS+'</div></div>'
    }).join(''):'<div class="empty">No trades yet</div>';

    var passportUrl='https://hyperflex.network/passport/'+userId;

    page.innerHTML=
      '<div class="hero">'+
        '<div class="hero-top">'+
          '<div class="avatar" style="background:var(--card);color:'+tierColor+';border-color:'+tierColor+'44">'+initials+'</div>'+
          '<div><div class="name">'+esc(u.display_name)+'</div>'+(u.username?'<div class="handle">@'+esc(u.username)+'</div>':'')+'</div>'+
        '</div>'+
        (u.bio?'<div class="bio">'+esc(u.bio)+'</div>':'')+
        '<div class="social-row">'+
          '<div><strong>'+(s.followers||0)+'</strong> <span>Followers</span></div>'+
          '<div><strong>'+(s.following||0)+'</strong> <span>Following</span></div>'+
          (ts.total_agrees?'<div><strong>'+ts.total_agrees+'</strong> <span>Agrees</span></div>':'')+
        '</div>'+
        '<div class="action-row">'+
          '<button class="btn btn-fill" id="followBtn" onclick="toggleFollow()">Follow</button>'+
          (isOwner?'<button class="btn btn-gold" onclick="promptSetName()">✏️ Edit Name</button>':'')+
          '<button class="btn" onclick="navigator.clipboard.writeText(location.href);this.textContent=\'Copied!\';setTimeout(()=>this.textContent=\'📋 Copy\',2000)">📋 Copy</button>'+
          '<button class="btn" onclick="window.open(\'https://x.com/intent/tweet?text=\'+encodeURIComponent(\'Check out \'+\''+esc(u.display_name)+'\'+ \' on HYPERFLEX\\n\\n\'+location.href),\'_blank\')">🐦 Share</button>'+
          '<a href="/passport/'+userId+'" class="btn btn-gold">🛂 Passport</a>'+
        '</div>'+
      '</div>'+

      '<div class="tier" style="background:radial-gradient(ellipse at center top,'+tierColor+'08,transparent 70%)">'+
        '<div class="tier-icon">'+tierIcon+'</div>'+
        '<div class="tier-label" style="color:'+tierColor+'">'+tier+'</div>'+
        '<div class="tier-pct" style="color:'+tierColor+'">'+bestWin+'%</div>'+
        '<div class="tier-sub">'+(ps.total_trades>0?ps.closed_wins+' wins / '+(ps.closed_wins+ps.closed_losses)+' closed trades':s.wins+' correct / '+(s.settled_predictions||0)+' predictions')+'</div>'+
        '<div class="tier-bar"><div class="tier-bar-fill" style="width:'+bestWin+'%;background:'+tierColor+'"></div></div>'+
      '</div>'+

      '<div class="stats">'+
        '<div class="stat"><div class="stat-val" style="color:var(--gold)">'+(s.flex_score_alltime!=null?s.flex_score_alltime:s.flex_score_90d!=null?s.flex_score_90d:'—')+'</div><div class="stat-lbl">Flex Score</div></div>'+
        '<div class="stat"><div class="stat-val" style="color:var(--green)">'+volStr+'</div><div class="stat-lbl">Volume</div></div>'+
        '<div class="stat"><div class="stat-val" style="color:'+pnlColor+'">'+pnlStr+'</div><div class="stat-lbl">P&L</div></div>'+
        '<div class="stat"><div class="stat-val" style="color:var(--purple)">'+(s.flex_points>=1000?(s.flex_points/1000).toFixed(1)+'K':s.flex_points||0)+'</div><div class="stat-lbl">FLEX Pts</div></div>'+
      '</div>'+

      '<div class="tabs">'+
        '<button class="tab active" onclick="switchTab(\'takes\',this)">Takes'+(ts.total?' ('+ts.total+')':'')+'</button>'+
        '<button class="tab" onclick="switchTab(\'trades\',this)">Trades'+(ps.total_trades?' ('+ps.total_trades+')':'')+'</button>'+
        '<button class="tab" onclick="switchTab(\'record\',this)">Track Record</button>'+
      '</div>'+

      '<div id="tab-takes" class="tab-content active">'+takesHtml+'</div>'+
      '<div id="tab-trades" class="tab-content">'+tradesHtml+'</div>'+
      '<div id="tab-record" class="tab-content"><div class="empty" style="padding:40px 16px">Track record details coming soon</div></div>'+

      '<div class="challenge">'+
        '<div class="challenge-title">⚔️ Challenge '+esc(u.display_name)+'</div>'+
        '<div class="challenge-sub">Think you can predict better? Challenge them to a prediction duel.</div>'+
        '<button class="btn btn-gold" onclick="window.location.href=\'/feed\'">Challenge →</button>'+
      '</div>';

    loadFollowStatus();
  }catch(err){
    console.error(err);
    page.innerHTML='<div class="loading">Failed to load profile</div>';
  }
}
load();
</script>
</body>
</html>
