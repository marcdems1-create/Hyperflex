<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Profile — HYPERFLEX</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #c9920d;
  --paper: #141412;
  --surface: #1a1a17;
  --card: #1e1e1b;
  --border: #2a2a26;
  --text: #f0ebe3;
  --text-soft: #b0ab9f;
  --muted: #70706a;
  --green: #22c55e;
  --red: #ef4444;
}
body { background: var(--paper); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(20,20,18,0.94); backdrop-filter: blur(12px); z-index: 50; }
.nav-logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--gold); text-decoration: none; letter-spacing: -0.5px; }
.nav-back { color: var(--muted); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
.nav-back:hover { color: var(--text-soft); }
.page { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
/* Hero */
.hero { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 32px; }
.avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; flex-shrink: 0; border: 3px solid var(--border); }
.hero-info { flex: 1; min-width: 0; }
.hero-name { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
.hero-since { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.hero-badges { display: flex; flex-wrap: wrap; gap: 6px; }
.badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 100px; letter-spacing: 0.3px; }
.badge-streak { background: rgba(255,140,0,0.15); color: #ff8c00; border: 1px solid rgba(255,140,0,0.3); }
.badge-oracle { background: rgba(201,146,13,0.2); color: var(--gold); border: 1px solid rgba(201,146,13,0.4); }
.badge-sharp { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
@media(max-width:500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; }
.stat-value { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
/* Sections */
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 14px; }
.section { margin-bottom: 28px; }
/* Win cards */
.win-list { display: flex; flex-direction: column; gap: 10px; }
.win-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text); transition: border-color 0.15s; }
.win-item:hover { border-color: rgba(34,197,94,0.5); }
.win-check { width: 32px; height: 32px; border-radius: 50%; background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.win-body { flex: 1; min-width: 0; }
.win-question { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.win-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
.win-side { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.win-side.yes { background: rgba(34,197,94,0.12); color: var(--green); }
.win-side.no  { background: rgba(239,68,68,0.12); color: var(--red); }
/* Communities */
.community-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.community-chip { display: flex; align-items: center; gap: 7px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 6px 12px 6px 8px; text-decoration: none; color: var(--text-soft); font-size: 12px; font-weight: 600; transition: border-color 0.15s; }
.community-chip:hover { border-color: var(--gold); color: var(--text); }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
/* Share button */
.share-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: var(--text-soft); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.15s; margin-top: 4px; }
.share-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.loading { color: var(--muted); font-size: 13px; text-align: center; padding: 60px 20px; }
.error-state { text-align: center; padding: 80px 20px; }
.error-icon { font-size: 48px; margin-bottom: 16px; }
.error-msg { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.error-sub { font-size: 13px; color: var(--muted); }
/* Win rate bar */
.wr-bar-wrap { background: var(--surface); border-radius: 4px; height: 6px; margin-top: 8px; overflow: hidden; }
.wr-bar { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.4s ease; }
/* CTA */
.cta-card { background: linear-gradient(135deg, #1d1b13 0%, #1a1a17 100%); border: 1px solid rgba(201,146,13,0.25); border-radius: 12px; padding: 20px 22px; text-align: center; margin-top: 32px; }
.cta-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--gold); margin-bottom: 6px; }
.cta-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.cta-link { display: inline-block; background: var(--gold); color: #141412; font-weight: 700; font-size: 14px; padding: 10px 24px; border-radius: 8px; text-decoration: none; }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">HYPERFLEX</a>
  <a href="javascript:history.back()" class="nav-back">← Back</a>
</nav>
<div class="page" id="page">
  <div class="loading">Loading profile...</div>
</div>

<script>
const userId = location.pathname.split('/').pop();
const API = location.origin;

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const ts   = dateStr.endsWith('Z') || dateStr.includes('+') ? dateStr : dateStr + 'Z';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 0)    return 'just now';
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 86400*30) return `${Math.floor(diff/86400)}d ago`;
  return new Date(ts).toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function tierBadge(winRate, streak) {
  let badges = '';
  if (streak >= 7)       badges += `<span class="badge badge-oracle">⚡ ${streak} STREAK</span>`;
  else if (streak >= 3)  badges += `<span class="badge badge-streak">🔥 ${streak} WIN STREAK</span>`;
  if (winRate >= 70)     badges += `<span class="badge badge-oracle">🎯 ORACLE</span>`;
  else if (winRate >= 60) badges += `<span class="badge badge-sharp">🎯 SHARP</span>`;
  return badges;
}

function shareProfile() {
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareBtn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.innerHTML = '📋 Copy profile link', 2000); }
  });
}

async function load() {
  const page = document.getElementById('page');
  try {
    const res = await fetch(`${API}/api/member/${userId}`);
    if (res.status === 404) {
      page.innerHTML = `<div class="error-state"><div class="error-icon">🔍</div><div class="error-msg">Member not found</div><div class="error-sub">This profile doesn't exist or has been removed.</div></div>`;
      return;
    }
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const { user, stats, communities, recent_wins } = data;

    const winPct = stats.settled_predictions > 0 ? Math.round((stats.wins / stats.settled_predictions) * 100) : 0;
    const avgColor = winPct >= 70 ? '#c9920d' : winPct >= 55 ? '#22c55e' : winPct >= 40 ? '#60a5fa' : '#ef4444';
    const initials = getInitials(user.display_name);
    const avatarBg = '#1e1e1b';

    document.title = `${user.display_name} — HYPERFLEX`;

    // Build community chips
    const commHtml = communities.length
      ? `<div class="community-chips">${communities.map(c =>
          `<a href="/${c.slug}" class="community-chip">
            <span class="chip-dot" style="background:${c.primary_color || '#c9920d'}"></span>
            ${c.display_name || c.slug}
          </a>`
        ).join('')}</div>`
      : `<div style="color:var(--muted);font-size:13px">No communities yet.</div>`;

    // Build wins list
    const winsHtml = recent_wins.length
      ? `<div class="win-list">${recent_wins.map(w =>
          `<a href="/${w.community_slug}" class="win-item">
            <div class="win-check">✓</div>
            <div class="win-body">
              <div class="win-question">${w.question}</div>
              <div class="win-meta">
                <span style="color:${w.community_color || '#c9920d'}">${w.community_name}</span>
                <span>·</span>
                <span>${timeAgo(w.resolved_at)}</span>
                ${w.payout > 0 ? `<span>· <strong style="color:var(--green)">+${w.payout.toLocaleString()} pts</strong></span>` : ''}
              </div>
            </div>
            <span class="win-side ${(w.side || '').toUpperCase() === 'YES' ? 'yes' : 'no'}">${(w.side || '').toUpperCase()}</span>
          </a>`
        ).join('')}</div>`
      : `<div style="color:var(--muted);font-size:13px;padding:16px 0">No wins yet — get predicting!</div>`;

    page.innerHTML = `
      <div class="hero">
        <div class="avatar" style="background:${avatarBg};color:${avgColor};border-color:${avgColor}44">${initials}</div>
        <div class="hero-info">
          <div class="hero-name">${user.display_name}</div>
          <div class="hero-since">Member since ${new Date(user.member_since).toLocaleDateString(undefined, { month: 'long', year: 'numeric' })}</div>
          <div class="hero-badges">
            ${tierBadge(stats.win_rate, stats.streak)}
          </div>
          <button id="shareBtn" class="share-btn" onclick="shareProfile()">📋 Copy profile link</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" style="color:${avgColor}">${stats.win_rate}%</div>
          <div class="stat-label">Win Rate</div>
          <div class="wr-bar-wrap"><div class="wr-bar" style="width:${stats.win_rate}%;background:${avgColor}"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.settled_predictions}</div>
          <div class="stat-label">Predictions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:var(--green)">${stats.wins}</div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:${stats.streak >= 3 ? '#ff8c00' : 'var(--text)'}">${stats.streak > 0 ? `🔥${stats.streak}` : '—'}</div>
          <div class="stat-label">Streak</div>
        </div>
      </div>

      ${recent_wins.length ? `
      <div class="section">
        <div class="section-title">Recent Wins</div>
        ${winsHtml}
      </div>` : ''}

      ${communities.length ? `
      <div class="section">
        <div class="section-title">Active Communities</div>
        ${commHtml}
      </div>` : ''}

      <div class="cta-card">
        <div class="cta-title">Think you can beat them?</div>
        <div class="cta-sub">Join a prediction market community and put your knowledge to the test.</div>
        <a href="/explore" class="cta-link">Explore Communities →</a>
      </div>
    `;
  } catch (err) {
    console.error(err);
    page.innerHTML = `<div class="error-state"><div class="error-icon">⚡</div><div class="error-msg">Failed to load profile</div><div class="error-sub">Please try again later.</div></div>`;
  }
}

load();
</script>
</body>
</html>
