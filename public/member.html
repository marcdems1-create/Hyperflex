<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Profile — HYPERFLEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07050F;--bg-2:#0D0A1F;--paper:#07050F;--paper-2:#0D0A1F;
  --panel:#14102A;--panel-2:#1B1638;
  --line:rgba(140,120,255,0.10);--line-strong:rgba(140,120,255,0.22);
  --border:rgba(140,120,255,0.10);--border-strong:rgba(140,120,255,0.22);
  --surface:rgba(255,255,255,0.025);--surface-2:rgba(255,255,255,0.05);
  --ink:#F5F0E8;--ink-2:#C5BEDD;--muted:#6E6790;--muted-2:#4A4570;--faint:#3A3458;
  --text:#F5F0E8;--text-soft:#C5BEDD;
  --indigo:#5B4DFF;--indigo-deep:#3B2FB8;
  --electric:#00FF94;--green:#00FF94;--electric-glow:rgba(0,255,148,0.45);
  --danger:#FF3D5A;--red:#FF3D5A;
  --gold:#FFB800;--gold-2:#FFD96B;--gold-soft:#FFB800;
  --cyan:#00D4FF;--blue:#00D4FF;
  --magenta:#FF3D9A;--purple:#9D5BFF;--amber:#FFB800;
  --display:'Anton',sans-serif;
  --serif:'Instrument Serif',serif;
  --sans:'Geist','Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --shadow-lg:0 24px 60px -20px rgba(0,0,0,0.7),0 12px 32px -8px rgba(0,0,0,0.5);
  --shadow-glow:0 0 48px -12px rgba(255,184,0,0.35);
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;overflow-x:hidden}
/* Atmosphere — grid + radial glow + grain */
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 30%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 30%,transparent 80%);pointer-events:none;z-index:0}
body::after{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(91,77,255,0.18),transparent 70%),radial-gradient(ellipse 50% 40% at 90% 20%,rgba(255,61,154,0.10),transparent 70%),radial-gradient(ellipse 80% 50% at 50% 100%,rgba(0,255,148,0.06),transparent 70%);pointer-events:none;z-index:0}
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.05;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
/* ── Nav ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;position:sticky;top:0;z-index:50;background:rgba(7,5,15,0.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--line)}
.nav-logo{font-family:var(--display);font-size:22px;letter-spacing:0.18em;color:var(--ink);display:inline-flex;align-items:center;gap:8px}
.nav-logo .x{color:var(--electric);filter:drop-shadow(0 0 12px var(--electric-glow))}
.nav-logo:hover{color:var(--gold-2)}
.nav-back{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;display:inline-flex;align-items:center;min-height:44px;padding:0 10px;transition:color .15s}
.nav-back:hover{color:var(--ink)}
@media(max-width:640px){nav{padding:14px 18px}.nav-logo{font-size:18px}}
/* ── Page shell ── */
.page,.wrap{position:relative;z-index:2;max-width:1240px;margin:0 auto;padding:28px 36px 80px}
@media(max-width:980px){.page,.wrap{padding:20px}}
/* ── Glass cards ── */
.glass{background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.015));border:1px solid var(--line);border-radius:4px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:var(--shadow-lg)}
.glass-inset{background:var(--panel);border:1px solid var(--line);border-radius:4px}
/* ── HERO ── */
.hero{position:relative;display:grid;grid-template-columns:auto 1fr auto;gap:36px;align-items:center;padding:40px 44px;background:linear-gradient(135deg,rgba(91,77,255,0.08),rgba(0,212,255,0.02) 60%,transparent),var(--panel);border:1px solid var(--line-strong);border-radius:4px;overflow:hidden;animation:rise 0.7s 0.05s both cubic-bezier(.2,.8,.2,1);margin-bottom:16px}
.hero::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px);pointer-events:none}
.hero::after{content:"";position:absolute;inset:12px;pointer-events:none;background:linear-gradient(to right,var(--electric) 0,var(--electric) 18px,transparent 18px) 0 0/100% 1px no-repeat,linear-gradient(to bottom,var(--electric) 0,var(--electric) 18px,transparent 18px) 0 0/1px 100% no-repeat,linear-gradient(to left,var(--electric) 0,var(--electric) 18px,transparent 18px) 100% 100%/100% 1px no-repeat,linear-gradient(to top,var(--electric) 0,var(--electric) 18px,transparent 18px) 100% 100%/1px 100% no-repeat;opacity:0.5}
/* Avatar with holographic ring */
.avatar-wrap{position:relative;width:132px;height:132px;flex-shrink:0;z-index:1}
.holo-ring{position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(from 0deg,#FF3D9A,#FFB800,#00FF94,#00D4FF,#5B4DFF,#FF3D9A);animation:spin 6s linear infinite;filter:blur(0.5px)}
.holo-ring::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--bg-2)}
.avatar{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 30%,#FFD96B,#FFB800 40%,#B07A00);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:56px;color:#2A1A00;text-shadow:0 2px 0 rgba(255,255,255,0.3);z-index:1;box-shadow:inset 0 -8px 24px rgba(0,0,0,0.4),0 12px 40px rgba(255,184,0,0.3)}
.avatar-whale{background:radial-gradient(circle at 30% 30%,#C4A3FF,#9D5BFF 40%,#5B2FB8);color:#1A0030}
.live-dot{position:absolute;bottom:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--electric);border:3px solid var(--bg-2);z-index:2;box-shadow:0 0 12px var(--electric);animation:pulse 1.6s ease-in-out infinite}
/* Identity block */
.ident{display:flex;flex-direction:column;gap:10px;min-width:0;position:relative;z-index:1}
.handle-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.handle{font-family:var(--display);font-size:60px;line-height:0.9;letter-spacing:0.02em;color:var(--ink);max-width:100%;overflow-wrap:break-word}
.handle .at{color:var(--muted);font-size:34px;margin-right:4px}
.display-name{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink-2);line-height:1.3}
.display-name .verify{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;background:var(--cyan);border-radius:50%;color:#001a23;font-size:11px;font-weight:900;font-family:var(--sans);font-style:normal;margin-left:6px;vertical-align:middle}
.meta{display:flex;gap:14px;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:4px;flex-wrap:wrap}
.meta .sep{color:var(--muted-2)}
.tier-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:linear-gradient(135deg,rgba(255,184,0,0.18),rgba(255,184,0,0.04));border:1px solid rgba(255,184,0,0.4);color:var(--gold-2);font-weight:700;letter-spacing:0.22em;font-family:var(--mono);font-size:11px}
.tier-badge::before{content:"★";font-size:14px;color:var(--gold)}
.tier-badge.tier-whale{background:linear-gradient(135deg,rgba(157,91,255,0.22),rgba(157,91,255,0.04));border-color:rgba(157,91,255,0.45);color:#D4B5FF}
.tier-badge.tier-whale::before{content:"●";color:var(--purple)}
.tier-badge.tier-shark{background:linear-gradient(135deg,rgba(0,212,255,0.22),rgba(0,212,255,0.04));border-color:rgba(0,212,255,0.45);color:#9BEBFF}
.tier-badge.tier-shark::before{content:"◆";color:var(--cyan)}
.tier-badge.tier-sharp,.tier-badge.tier-profitable{background:linear-gradient(135deg,rgba(0,255,148,0.20),rgba(0,255,148,0.04));border-color:rgba(0,255,148,0.45);color:#9BFFD0}
.tier-badge.tier-sharp::before,.tier-badge.tier-profitable::before{content:"▲";color:var(--electric)}
.tier-badge.tier-trader,.tier-badge.tier-building{background:rgba(255,255,255,0.03);border-color:var(--line-strong);color:var(--ink-2)}
.tier-badge.tier-trader::before,.tier-badge.tier-building::before{content:"○";color:var(--muted)}
/* FLEX score block */
.flex-score{text-align:right;padding-left:28px;border-left:1px solid var(--line-strong);align-self:stretch;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1;min-width:200px}
.flex-label{font-family:var(--mono);font-size:11px;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.flex-num{font-family:var(--display);font-size:96px;line-height:0.85;background:linear-gradient(180deg,#FFFFFF 0%,#FFD96B 60%,#FFB800 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 24px rgba(255,184,0,0.25));letter-spacing:-0.01em}
.flex-num.mute{background:linear-gradient(180deg,#9590B0,#6E6790);-webkit-background-clip:text;background-clip:text;color:transparent;filter:none}
.flex-num .denom{font-size:32px;color:var(--muted);background:none;-webkit-text-fill-color:var(--muted);filter:none;margin-left:4px}
.flex-delta{font-family:var(--mono);font-size:12px;color:var(--electric);margin-top:8px;letter-spacing:0.1em}
.whale-badge{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:8px 12px;border-radius:8px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.25);align-self:flex-end}
.whale-badge-label{font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:0.18em;color:#a855f7;text-transform:uppercase}
.whale-badge-num{font-family:var(--mono);font-size:16px;font-weight:800;color:#e0c7fa;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
.whale-badge-meta{font-family:var(--mono);font-size:9px;color:#a855f7;letter-spacing:0.06em;opacity:0.78}
@media(max-width:720px){.whale-badge{align-self:flex-start;margin-top:10px}}
.flex-delta.muted{color:var(--muted)}
/* Action row in hero */
.hero-actions{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase}
.hero-actions .stat-chip{padding:6px 10px;border:1px solid var(--line);background:rgba(255,255,255,0.02);color:var(--ink-2);cursor:pointer;transition:all .15s}
.hero-actions .stat-chip:hover{border-color:var(--electric);color:var(--ink)}
.hero-actions .stat-chip strong{font-family:var(--display);font-size:14px;color:var(--ink);margin-right:6px;letter-spacing:0.04em}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 16px;letter-spacing:0.2em;text-transform:uppercase;transition:all .18s;min-height:40px;white-space:nowrap;border:1px solid var(--line-strong);background:rgba(255,255,255,0.02);color:var(--ink-2);border-radius:0;cursor:pointer}
.btn:hover{color:var(--ink);border-color:var(--electric);box-shadow:0 0 24px var(--electric-glow)}
.btn-primary{background:var(--electric);color:#001A0F;border-color:var(--electric);box-shadow:0 0 24px var(--electric-glow)}
.btn-primary:hover{transform:translateY(-1px);color:#001A0F}
.btn-ghost{background:rgba(255,255,255,0.02);border-color:var(--line-strong);color:var(--ink-2)}
.btn-gold{background:linear-gradient(135deg,rgba(255,184,0,0.18),rgba(255,184,0,0.04));border-color:rgba(255,184,0,0.4);color:var(--gold-2)}
.btn-gold:hover{background:linear-gradient(135deg,rgba(255,184,0,0.32),rgba(255,184,0,0.08));border-color:var(--gold);box-shadow:0 0 24px rgba(255,184,0,0.4);color:#FFE9A8}
.btn-purple{background:linear-gradient(135deg,rgba(157,91,255,0.16),rgba(157,91,255,0.04));border-color:rgba(157,91,255,0.45);color:#D4B5FF}
.btn-purple:hover{border-color:var(--purple);box-shadow:0 0 24px rgba(157,91,255,0.4);color:#fff}
.btn-challenge{background:linear-gradient(135deg,rgba(255,61,90,0.16),rgba(255,184,0,0.06));border-color:rgba(255,61,90,0.45);color:#FFB5C2}
.btn-challenge:hover{border-color:var(--danger);box-shadow:0 0 24px rgba(255,61,90,0.4);color:#fff}
.btn.following{background:rgba(0,255,148,0.06);border-color:rgba(0,255,148,0.45);color:var(--electric)}
/* Wallet / username strip */
.wallet-row{font-family:var(--mono);font-size:11px;color:var(--muted);margin:4px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;letter-spacing:0.06em}
.wallet-row button,.wallet-row a{font-family:var(--mono);font-size:10px;color:var(--ink-2);background:rgba(255,255,255,0.02);border:1px solid var(--line);padding:4px 10px;letter-spacing:0.14em;text-transform:uppercase;transition:all .15s}
.wallet-row button:hover,.wallet-row a:hover{border-color:var(--electric);color:var(--ink)}
.hero-bio{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink-2);line-height:1.5;margin:8px 0 4px;max-width:520px}
/* ── STATS GRID ── */
.stats,.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px;margin-bottom:14px}
.stat{position:relative;padding:24px 24px 22px;background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden;transition:border-color 0.2s ease,transform 0.2s ease;animation:rise 0.6s both cubic-bezier(.2,.8,.2,1);cursor:default}
.stat:nth-child(1){animation-delay:0.10s}
.stat:nth-child(2){animation-delay:0.16s}
.stat:nth-child(3){animation-delay:0.22s}
.stat:nth-child(4){animation-delay:0.28s}
.stat.interactive{cursor:pointer}
.stat:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.stat-label,.stat-lbl{font-family:var(--mono);font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:0}
.stat-label .ticker,.stat-lbl .ticker{color:var(--muted-2);font-size:9px;letter-spacing:0.18em}
.stat-num,.stat-val{font-family:var(--display);font-size:60px;line-height:0.95;margin-top:14px;color:var(--ink);letter-spacing:-0.005em;font-weight:400}
.stat-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:0.06em}
.stat.green .stat-num,.stat.green .stat-val{color:var(--electric);text-shadow:0 0 32px var(--electric-glow)}
.stat.green::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--electric)}
.stat.red .stat-num,.stat.red .stat-val{color:var(--danger);text-shadow:0 0 24px rgba(255,61,90,0.35)}
.stat.red::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--danger)}
.stat.gold .stat-num,.stat.gold .stat-val{background:linear-gradient(180deg,#FFFFFF,#FFD96B 55%,#FFB800);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 18px rgba(255,184,0,0.3))}
.stat.gold::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#FFD96B,#FFB800)}
.stat.fire .stat-num,.stat.fire .stat-val{background:linear-gradient(180deg,#FFFFFF,#FF6B3D 60%,#FF3D5A);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat.fire::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#FFB800,#FF3D5A)}
.stat .pct-bar{margin-top:14px;height:4px;background:rgba(255,255,255,0.05);overflow:hidden;border-radius:1px}
.stat .pct-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--indigo));width:0;transition:width 1.4s 0.4s cubic-bezier(.2,.8,.2,1)}
/* Connect-wallet banner */
.unlock-banner{display:flex;align-items:center;gap:18px;padding:18px 24px;background:linear-gradient(135deg,rgba(255,184,0,0.08),rgba(157,91,255,0.06));border:1px solid rgba(255,184,0,0.3);border-radius:4px;margin-bottom:16px;flex-wrap:wrap;animation:rise 0.6s both cubic-bezier(.2,.8,.2,1)}
.unlock-banner .glyph{font-family:var(--display);font-size:32px;color:var(--gold-2);letter-spacing:0.04em;flex-shrink:0}
.unlock-banner .body{flex:1;min-width:200px}
.unlock-banner .body strong{font-family:var(--display);font-size:18px;letter-spacing:0.06em;color:var(--ink);display:block;margin-bottom:2px}
.unlock-banner .body p{font-size:13px;color:var(--ink-2);line-height:1.5}
/* ── ROW: chart + best calls ── */
.row{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:14px}
.chart-card,.calls-card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:24px 28px;animation:rise 0.6s 0.34s both cubic-bezier(.2,.8,.2,1)}
.calls-card{animation-delay:0.40s}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.card-title{font-family:var(--display);font-size:22px;letter-spacing:0.1em;color:var(--ink)}
.card-tabs{display:flex;gap:4px;font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase}
.card-tabs .tab{padding:6px 10px;color:var(--muted);cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:none}
.card-tabs .tab.active{color:var(--electric);border-color:var(--line-strong);background:rgba(0,255,148,0.05)}
.card-tabs .tab:hover{color:var(--ink-2)}
.chart-wrap{position:relative;height:240px}
.chart-svg{width:100%;height:100%;display:block}
.chart-meta{display:flex;justify-content:space-between;margin-top:12px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase}
.chart-marker{position:absolute;background:var(--bg-2);border:1px solid var(--electric);padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--electric);pointer-events:none;transform:translate(-50%,-120%);box-shadow:0 4px 16px rgba(0,255,148,0.2);letter-spacing:0.06em}
.chart-empty{height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;text-align:center;flex-direction:column;gap:8px}
.chart-empty small{font-size:10px;letter-spacing:0.12em;color:var(--muted-2);text-transform:none;font-family:var(--sans);font-style:italic}
/* Best calls list */
.call{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 0;border-top:1px solid var(--line);transition:background 0.2s;text-decoration:none;color:inherit}
.call:first-of-type{border-top:none;padding-top:4px}
.call:hover{background:rgba(255,255,255,0.015)}
.call-rank{font-family:var(--display);font-size:28px;color:var(--muted-2);width:30px;text-align:center;letter-spacing:0.04em}
.call.top .call-rank{color:var(--gold)}
.call-body{display:flex;flex-direction:column;gap:4px;min-width:0}
.call-market{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.call-side{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase}
.call-side .yes{color:var(--electric)}
.call-side .no{color:var(--danger)}
.call-return{font-family:var(--display);font-size:24px;color:var(--electric);text-align:right;line-height:1;letter-spacing:0.02em}
.call-return small{font-family:var(--mono);font-size:9px;color:var(--muted);display:block;letter-spacing:0.14em;margin-top:4px;font-weight:400}
.calls-empty{padding:32px 12px;text-align:center}
.calls-empty .glyph{font-family:var(--display);font-size:32px;color:var(--muted-2);letter-spacing:0.04em}
.calls-empty .lbl{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-top:8px}
.calls-empty .hint{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-2);margin-top:8px}
/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin:24px 0 18px;position:sticky;top:64px;background:rgba(7,5,15,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:20;padding:0 2px}
.tab-btn{flex:1;background:none;border:none;padding:14px 12px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;min-height:48px;letter-spacing:0.18em;text-transform:uppercase}
.tab-btn:hover{color:var(--ink-2)}
.tab-btn.active{color:var(--electric);border-bottom-color:var(--electric)}
.tab-btn .tab-count{color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:500;margin-left:4px;letter-spacing:0.12em}
.tab-pane{display:none;animation:fadeIn .25s ease}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--electric-glow);transform:scale(1)}50%{box-shadow:0 0 0 10px transparent;transform:scale(1.08)}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
/* ── Take / Trade cards ── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s,background .15s}
.card:hover{border-color:var(--line-strong);background:var(--panel-2)}
.card a{color:inherit}
.card-q{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:4px}
.card-thesis{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-2);line-height:1.55;margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:0.06em}
.card-actions{display:flex;gap:14px;margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em}
.side{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;letter-spacing:0.16em;display:inline-block;text-transform:uppercase;border-radius:0}
.side-yes{background:rgba(0,255,148,0.12);color:var(--electric);border:1px solid rgba(0,255,148,0.4)}
.side-no{background:rgba(255,61,90,0.12);color:var(--danger);border:1px solid rgba(255,61,90,0.4)}
.badge-correct{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;background:rgba(0,255,148,0.12);color:var(--electric);letter-spacing:0.16em;text-transform:uppercase}
.badge-correct::before{content:"✓ "}
.badge-wrong{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;background:rgba(255,61,90,0.12);color:var(--danger);letter-spacing:0.16em;text-transform:uppercase}
.badge-wrong::before{content:"✕ "}
/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;border:1px dashed var(--line);border-radius:4px;background:rgba(255,255,255,0.01)}
.empty-emoji,.empty-glyph{font-family:var(--display);font-size:36px;color:var(--muted-2);letter-spacing:0.04em;margin-bottom:8px}
.empty-title{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;color:var(--ink)}
.empty-sub{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-2);margin-bottom:18px;max-width:380px;margin-left:auto;margin-right:auto;line-height:1.5}
/* ── Loading/error states ── */
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase}
.loading-spinner{width:28px;height:28px;border:2px solid var(--line);border-top-color:var(--electric);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
.error-state{text-align:center;padding:80px 20px}

.error-sub{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-2)}
/* Hero secondary badges (streak, sharp etc) */
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;letter-spacing:0.16em;text-transform:uppercase;border:1px solid transparent}
.badge-streak{background:rgba(255,107,61,0.12);color:#FF9A6B;border-color:rgba(255,107,61,0.4)}
.badge-oracle{background:rgba(255,184,0,0.14);color:var(--gold-2);border-color:rgba(255,184,0,0.4)}
.badge-sharp{background:rgba(0,255,148,0.12);color:var(--electric);border-color:rgba(0,255,148,0.4)}
.badge-verified{background:rgba(0,212,255,0.12);color:var(--cyan);border-color:rgba(0,212,255,0.4)}
/* ── Mobile ── */
@media(max-width:980px){
  .hero{grid-template-columns:1fr;text-align:left;padding:28px;gap:20px}
  .flex-score{padding-left:0;border-left:none;border-top:1px solid var(--line-strong);padding-top:20px;text-align:left;min-width:0}
  .handle{font-size:44px}
  .handle .at{font-size:28px}
  .flex-num{font-size:72px}
  .stats,.stats-grid{grid-template-columns:repeat(2,1fr)}

}
@media(max-width:600px){
  .page,.wrap{padding:18px 14px 60px}
  .nav-back{font-size:10px;padding:0 6px}

  .avatar-wrap{width:96px;height:96px}

  .stat-num,.stat-val{font-size:48px}
  .chart-card,.calls-card{padding:18px 18px}
  .btn{font-size:10px;padding:9px 12px}
  input,textarea,select{font-size:16px!important}
}

/* ── Flex score component bars (rendered inside chart-card on Track Record tab) ── */
.flex-components{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}

<body>
<div class="grain"></div>
<nav>
  <a href="/" class="nav-logo">HYPER<span class="x">FLEX</span></a>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/predictors" class="nav-back">Predictors</a>
    <a href="/" class="nav-back">Explore</a>
    <a id="creatorDashPill" href="/creator/dashboard" class="btn btn-gold" style="display:none">Dashboard</a>
    <a href="javascript:history.back()" class="nav-back">← Back</a>
  </div>
</nav>
<div class="page" id="page">
  <div class="loading">Loading profile...</div>
</div>

<script>
// userId is resolved asynchronously for /@handle URLs (canonical). Legacy
// /m/:userId URLs skip the lookup and use the path segment directly.
// Set to null until resolution completes; downstream functions run inside
// load() which is kicked by the resolver at the bottom of this script.
let userId = null;
const API = location.origin;

async function _resolveProfileUserId() {
  const path = location.pathname;
  if (path.startsWith('/@')) {
    const handle = path.slice(2).split('/')[0];
    if (!handle) return null;
    try {
      const r = await fetch(API + '/api/user-by-handle/' + encodeURIComponent(handle));
      if (r.ok) {
        const d = await r.json();
        if (d && d.id) { window._profilePayload = d; return d.id; }
      }
    } catch {}
    return null;
  }
  return path.split('/').pop() || null;
}

// timeAgo + getInitials defined in utils.js

function tierBadge(winRate, streak) {
  let badges = '';
  if (streak >= 7)       badges += `<span class="badge badge-oracle">${streak} STREAK</span>`;
  else if (streak >= 3)  badges += `<span class="badge badge-streak">${streak} WIN STREAK</span>`;
  if (winRate >= 70)     badges += `<span class="badge badge-oracle">ORACLE</span>`;
  else if (winRate >= 60) badges += `<span class="badge badge-sharp">SHARP</span>`;
  return badges;
}

function shareProfile() {
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareBtn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.innerHTML = '📋 Copy profile link', 2000); }
  });
}

// Minimal info modal — no deps, no CSS class pollution. Used by the ⓘ
// buttons next to Flex Score and FLEX Points in the stats grid so visitors
// actually understand what the gold and purple numbers mean.
// Unified Flex Score hero card. Reads window._profilePayload (populated by
// _resolveProfileUserId → /api/user-by-handle). Inserts the card at the
// top of #profileContent so it's the first thing visible below the hero.
// Charter §8 compliance: bounded score out of 100, single-surface, tier
// read directly from the server-computed value.
function renderFlexScoreCard() {
  const p = window._profilePayload;
  if (!p) return;  // legacy /m/:userId path — handle resolved without payload

  // PR 2026-05-12: FLEX SCORE is the canonical signal across the site.
  // Show the score whenever it's set (any sample size). `qualifies` only
  // governs public-leaderboard ranking eligibility, not score visibility.
  // Sub-5-settled users see the score + a "low sample" indicator so they
  // can read the number AND understand the confidence level.
  const score     = p.flex_score != null ? p.flex_score : null;
  const settled   = p.flex_settled_events || 0;
  const qualifies = p.flex_qualifies === true;
  const comps     = p.flex_components || {};
  const LOW_SAMPLE_THRESHOLD = 5;  // mirrors lib/flex-score.js BUILDING_MAX_SETTLED

  // Update the inline FLEX score in the hero. Only show "—" when there
  // is literally no data (score=null + settled=0).
  const numEl = document.getElementById('flexScoreNum');
  if (numEl && score != null) {
    numEl.classList.remove('mute');
    numEl.innerHTML = `${score}<span class="denom">/100</span>`;
  } else if (numEl) {
    numEl.classList.add('mute');
    numEl.innerHTML = `—<span class="denom">/100</span>`;
  }

  // Update the delta line under the FLEX number.
  const deltaEl = document.getElementById('flexScoreDelta');
  if (deltaEl) {
    if (p.flex_raw_win_rate != null && settled > 0) {
      const lowSample = settled < LOW_SAMPLE_THRESHOLD;
      deltaEl.classList.toggle('muted', lowSample);
      const baseText = `${(p.flex_raw_win_rate * 100).toFixed(1)}% win rate · ${settled} settled`;
      deltaEl.textContent = lowSample ? `${baseText} · low sample` : baseText;
    } else {
      deltaEl.classList.add('muted');
      deltaEl.textContent = settled > 0 ? `${settled} settled` : 'No trades resolved yet';
    }
  }

  // Whale Score badge. Conditional render — only for wallets with an
  // actual flex_score_90d value (whale-imported or actively-trading).
  // Distinct visual treatment (purple) so it can't be confused with the
  // gold Flex Score hero. Decision #1 Option C semantic split.
  const whaleBadge = document.getElementById('whaleScoreBadge');
  const whaleNum   = document.getElementById('whaleScoreNum');
  const whaleMeta  = document.getElementById('whaleScoreMeta');
  if (whaleBadge && whaleNum) {
    const ws  = p.flex_score_90d != null ? Number(p.flex_score_90d) : null;
    const wsa = p.flex_score_alltime != null ? Number(p.flex_score_alltime) : null;
    const displayScore = ws != null && ws > 0 ? ws : (wsa != null && wsa > 0 ? wsa : null);
    if (displayScore != null) {
      whaleNum.textContent = Math.round(displayScore);
      if (whaleMeta) {
        const rankPart = (p.whale_rank != null && p.whale_rank > 0) ? `· rank #${p.whale_rank}` : '';
        whaleMeta.textContent = rankPart || (p.is_whale ? '· top tier' : '· capital flow');
      }
      whaleBadge.style.display = '';
    } else {
      whaleBadge.style.display = 'none';
    }
  }

  // Render the 5-component breakdown into the Track Record tab so visitors
  // who care about composition can see it without crowding the hero.
  const recordPane = document.getElementById('tab-record');
  if (!recordPane || document.getElementById('flexComponentsHost')) return;

  const maxes = { accuracy: 35, calibration: 25, pnl: 20, consistency: 10, breadth: 10 };
  const labels = { accuracy: 'Accuracy', calibration: 'Calibration', pnl: 'PnL', consistency: 'Consistency', breadth: 'Breadth' };
  const compHtml = Object.keys(maxes).map(k => {
    const v = comps[k];
    const hasVal = v != null && Number.isFinite(Number(v));
    const pct = hasVal ? Math.max(0, Math.min(100, (Number(v) / maxes[k]) * 100)) : 0;
    const valCls = hasVal ? '' : 'mute';
    const valStr = hasVal ? Number(v).toFixed(1) : '—';
    return `
      <div class="flex-comp">
        <div class="flex-comp-label">${labels[k]}</div>
        <div class="flex-comp-bar"><div class="fill" style="width:${pct}%"></div></div>
        <div class="flex-comp-val ${valCls}">${valStr}<span style="opacity:0.45;font-weight:400"> / ${maxes[k]}</span></div>
      </div>`;
  }).join('');

  const buildingNote = !qualifies ? `
    <div class="flex-building-note">
      <strong>Building</strong>
      Score unlocks at 25 settled events — ${Math.max(0, 25 - settled)} to go. Sample size below that makes the number a lie.
    </div>` : '';

  const host = document.createElement('div');
  host.id = 'flexComponentsHost';
  host.className = 'chart-card';
  host.style.marginBottom = '16px';
  host.innerHTML = `
    <div class="card-head">
      <div class="card-title">FLEX SCORE BREAKDOWN</div>
      <div class="card-tabs"><div class="tab active">${qualifies ? 'LIVE' : 'BUILDING'}</div></div>
    </div>
    <div class="flex-components">${compHtml}</div>
    ${buildingNote}
  `;
  recordPane.insertBefore(host, recordPane.firstChild);
}

function _showInfoModal(title, bodyHtml) {
  // Dismiss any prior instance so repeated clicks don't stack.
  const prior = document.getElementById('hfxInfoModal');
  if (prior) prior.remove();
  const wrap = document.createElement('div');
  wrap.id = 'hfxInfoModal';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(5,5,10,0.72);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)';
  wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
  wrap.innerHTML = `
    <div style="background:#15151d;border:1px solid #2a2a36;border-radius:14px;max-width:420px;width:100%;padding:22px 22px 18px;box-shadow:0 24px 60px rgba(0,0,0,0.6)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:15px;font-weight:700;color:var(--text)">${title}</div>
        <button onclick="document.getElementById('hfxInfoModal').remove()" aria-label="Close" style="background:none;border:0;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:4px 8px">×</button>
      </div>
      <div style="font-size:13px;line-height:1.55;color:var(--text-soft)">${bodyHtml}</div>
    </div>`;
  document.body.appendChild(wrap);
}

function switchProfileTab(tabId, btn) {
  document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  var el = document.getElementById('tab-' + tabId);
  if (el) el.classList.add('active');
  if (btn) btn.classList.add('active');
  if (tabId === 'record') { setTimeout(() => loadAnalytics(window._profileUserId), 60); }
  if (tabId === 'sports') { setTimeout(() => loadSportsFlexScore(window._profileUserId), 60); }
}

// Lazy-load the Sports tab content. Reads /api/sports-predictors/:userId
// (T5) and renders the Flex Score for Sports + five-component breakdown.
// Re-entrant: if already loaded, no-op on subsequent tab switches.
var _sportsFlexLoaded = false;
async function loadSportsFlexScore(userId) {
  if (_sportsFlexLoaded || !userId) return;
  _sportsFlexLoaded = true;
  const host = document.getElementById('tab-sports');
  if (!host) return;
  try {
    const res = await fetch(`/api/sports-predictors/${encodeURIComponent(userId)}`);
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    host.innerHTML = renderSportsTab(data);
  } catch (e) {
    host.innerHTML = '<div class="empty"><div class="empty-title">Could not load sports record</div><div class="empty-sub">Try again in a minute.</div></div>';
  }
}

function _fmtSigned(n, suffix) {
  if (n == null || !isFinite(n)) return '—';
  const v = parseFloat(n);
  return (v >= 0 ? '+' : '') + v.toFixed(2) + (suffix || '');
}
function _fmtPct(n) {
  if (n == null || !isFinite(n)) return '—';
  return parseFloat(n).toFixed(1) + '%';
}
function _fmtCLV(n) {
  if (n == null || !isFinite(n)) return '—';
  const v = parseFloat(n);
  return (v >= 0 ? '+' : '') + v.toFixed(1) + '¢';
}
function _sportsTier(score) {
  if (score == null) return { label: 'UNRANKED', color: 'var(--muted)' };
  if (score >= 90) return { label: 'ORACLE',  color: 'var(--gold)' };
  if (score >= 70) return { label: 'SHARP',   color: 'var(--green)' };
  if (score >= 50) return { label: 'SOLID',   color: 'var(--blue)' };
  return { label: 'SPECULATOR', color: 'var(--text-soft)' };
}

function _componentBar(label, value, max, color) {
  const pct = max > 0 ? Math.max(0, Math.min(100, (value / max) * 100)) : 0;
  return `
    <div class="sfs-comp">
      <div class="sfs-comp-head">
        <span class="sfs-comp-label">${label}</span>
        <span class="sfs-comp-val"><b>${(+value).toFixed(1)}</b><span class="sfs-comp-max">/${max}</span></span>
      </div>
      <div class="sfs-comp-bar"><div class="sfs-comp-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
}

function renderSportsTab(d) {
  if (!d.has_score) {
    return `
      <div class="empty" style="padding:40px 20px;text-align:center">
        <div class="empty-title" style="font-size:16px;font-weight:800;margin-bottom:6px">No sports record yet</div>
        <div class="empty-sub" style="font-size:13px;color:var(--text-soft);max-width:360px;margin:0 auto 18px;line-height:1.55">Post a settled sports pick to start your Flex Score for Sports.</div>
        <a href="/picks/new" class="btn btn-gold">Lock your first pick →</a>
      </div>`;
  }

  const score = d.score;
  const qualifies = d.qualifies;
  const tier = _sportsTier(score);
  const t = d.thresholds || { MIN_SETTLED_BETS: 25, MIN_STAKED_UNITS: 500, MIN_ACTIVE_DAYS: 14 };

  // Gauge at the top — big score + tier
  const scoreHtml = qualifies
    ? `<div class="sfs-gauge">
         <div class="sfs-score" style="color:${tier.color}">${score}</div>
         <div class="sfs-score-denom">/100</div>
       </div>
       <div class="sfs-tier" style="color:${tier.color};border-color:${tier.color}40;background:${tier.color}12">${tier.label}</div>`
    : `<div class="sfs-gauge">
         <div class="sfs-score" style="color:var(--muted);font-size:42px">—</div>
       </div>
       <div class="sfs-tier" style="color:var(--muted);border-color:var(--border)">BELOW THRESHOLD</div>`;

  const components = qualifies ? `
    <div class="sfs-comps">
      ${_componentBar('P&L',         d.pnl_component         || 0, 40, 'var(--gold)')}
      ${_componentBar('Volume',      d.volume_component      || 0, 20, 'var(--blue)')}
      ${_componentBar('Consistency', d.consistency_component || 0, 15, 'var(--green)')}
      ${_componentBar('CLV',         d.clv_component         || 0, 15, 'var(--gold)')}
      ${_componentBar('Diversity',   d.diversity_component   || 0, 10, 'var(--purple)')}
    </div>` : '';

  // Threshold coaching when below the gate
  const coachHtml = !qualifies ? `
    <div class="sfs-coach glass-inset">
      <div class="sfs-coach-head">Unlocks at</div>
      <div class="sfs-coach-row">
        <span>${t.MIN_SETTLED_BETS} settled picks</span>
        <span class="sfs-coach-have">${parseInt(d.settled_bets || 0, 10)} / ${t.MIN_SETTLED_BETS}</span>
      </div>
      <div class="sfs-coach-row">
        <span>${t.MIN_STAKED_UNITS}u staked</span>
        <span class="sfs-coach-have">${(parseFloat(d.total_staked_units) || 0).toFixed(0)} / ${t.MIN_STAKED_UNITS}</span>
      </div>
      <div class="sfs-coach-row">
        <span>${t.MIN_ACTIVE_DAYS} active days</span>
        <span class="sfs-coach-have">${parseInt(d.active_days || 0, 10)} / ${t.MIN_ACTIVE_DAYS}</span>
      </div>
    </div>` : '';

  const stats = `
    <div class="sfs-stats">
      <div class="sfs-stat"><div class="sfs-stat-l">NET P&amp;L</div><div class="sfs-stat-v" style="color:${parseFloat(d.net_units||0) >= 0 ? 'var(--green)' : 'var(--red)'}">${_fmtSigned(d.net_units, 'u')}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">SETTLED</div><div class="sfs-stat-v">${parseInt(d.settled_bets || 0, 10)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">CLV (AVG)</div><div class="sfs-stat-v" style="color:${parseFloat(d.avg_clv_cents||0) > 0 ? 'var(--green)' : parseFloat(d.avg_clv_cents||0) < 0 ? 'var(--red)' : 'var(--muted)'}">${_fmtCLV(d.avg_clv_cents)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">SPORTS</div><div class="sfs-stat-v">${parseInt(d.distinct_sports || 0, 10)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">BET TYPES</div><div class="sfs-stat-v">${parseInt(d.distinct_bet_types || 0, 10)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">ACTIVE</div><div class="sfs-stat-v">${parseInt(d.active_days || 0, 10)}d</div></div>
    </div>`;

  const clvEducation = `
    <div class="glass-inset sfs-edu">
      <div class="sfs-edu-head">
        <span class="sfs-edu-title">CLV · Closing Line Value</span>
        <span class="sfs-edu-val" style="color:${parseFloat(d.avg_clv_cents||0) > 0 ? 'var(--green)' : 'var(--muted)'}">${_fmtCLV(d.avg_clv_cents)}</span>
      </div>
      <div class="sfs-edu-body">Beating the close by <b>${_fmtCLV(d.avg_clv_cents)}</b> means you're getting better prices than the market thinks fair. Over time, positive CLV is the single best signal of sharp picks — more predictive than win rate.</div>
      <div class="sfs-edu-foot">Time-decayed: 90d = 100%, 90-180d = 50%, older = 25%</div>
    </div>`;

  const ctas = `
    <div class="sfs-ctas">
      <a href="/picks/new" class="btn btn-gold">Lock another pick →</a>
      <a href="/sports-predictors" class="btn btn-ghost">See leaderboard</a>
    </div>`;

  return `
    <div class="sfs-head">
      <div>
        <div class="sfs-eyebrow">FLEX SCORE FOR SPORTS · v1</div>
        <div class="sfs-title">${qualifies ? 'Ranked' : 'Tracking'} across <b>${parseInt(d.distinct_sports || 0, 10)}</b> sport${(d.distinct_sports || 0) === 1 ? '' : 's'}</div>
      </div>
      ${scoreHtml}
    </div>
    ${components}
    ${coachHtml}
    ${stats}
    ${clvEducation}
    ${ctas}
  `;
}

// ── Challenge flow — opens modal for counter-prediction, posts to X ──
function openChallenge() {
  const m = document.getElementById('challengeModal');
  if (!m) return;
  m.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  m.onclick = e => { if (e.target === m) closeChallenge(); };
  setTimeout(() => { const t = document.getElementById('challengeThesis'); if (t) t.focus(); }, 50);
}
function closeChallenge() {
  const m = document.getElementById('challengeModal');
  if (!m) return;
  m.style.display = 'none';
  document.body.style.overflow = '';
  // Reset picker state so leftover side / stake don't leak into the
  // next challenge the user opens.
  _challengeSide = null;
  const yes = document.getElementById('challengeSideYes');
  const no  = document.getElementById('challengeSideNo');
  if (yes) { yes.style.background = 'rgba(0,230,138,0.08)'; yes.style.borderColor = 'rgba(0,230,138,0.28)'; }
  if (no)  { no.style.background  = 'rgba(255,77,106,0.08)'; no.style.borderColor  = 'rgba(255,77,106,0.28)'; }
  const stake = document.getElementById('challengeStake');
  const stakeLbl = document.getElementById('challengeStakeLabel');
  if (stake) stake.value = '0';
  if (stakeLbl) stakeLbl.textContent = '0';
}
var _challengeSide = null;
function setChallengeSide(side) {
  _challengeSide = side;
  const yes = document.getElementById('challengeSideYes');
  const no  = document.getElementById('challengeSideNo');
  if (yes) yes.style.background = side === 'YES' ? 'rgba(0,230,138,0.22)'  : 'rgba(0,230,138,0.08)';
  if (yes) yes.style.borderColor = side === 'YES' ? 'rgba(0,230,138,0.6)'   : 'rgba(0,230,138,0.28)';
  if (no)  no.style.background  = side === 'NO'  ? 'rgba(255,77,106,0.22)' : 'rgba(255,77,106,0.08)';
  if (no)  no.style.borderColor = side === 'NO'  ? 'rgba(255,77,106,0.6)'  : 'rgba(255,77,106,0.28)';
}

async function submitChallenge() {
  const input = document.getElementById('challengeThesis');
  const thesis = (input?.value || '').trim();
  if (!thesis) { input?.focus(); return; }
  if (!_challengeSide) { alert('Pick YES or NO — the side you\'re staking.'); return; }
  const stake = parseInt(document.getElementById('challengeStake')?.value || '0', 10) || 0;
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) {
    alert('Sign in to challenge predictors.');
    return;
  }
  const challengedId = window._profileUserId || userId;
  if (!challengedId) { alert('Profile not loaded yet.'); return; }
  // Pull display name from new hero structure. Handle text starts with "@"
  // when there's a username; otherwise the handle IS the display name.
  const handleText = (document.querySelector('.handle')?.textContent || '').trim();
  const u = (document.querySelector('.display-name')?.textContent || handleText || 'this predictor').trim().replace(/\s*✓\s*$/, '');
  const tag = handleText.startsWith('@') ? handleText : '';
  try {
    const res = await fetch(`${API}/api/challenges`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({
        challenged_id: challengedId,
        thesis,
        challenger_side: _challengeSide,
        stake_flex: stake,
      }),
    });
    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem('hf_token');
      localStorage.removeItem('hf_member_token');
      alert('Session expired. Sign in again.');
      return;
    }
    if (!res.ok) {
      let msg = 'Challenge failed (HTTP ' + res.status + ')';
      try { const err = await res.json(); if (err && err.error) msg = err.error; } catch (_) {}
      alert(msg);
      return;
    }
    // Challenge posted — fire the X share intent as a secondary step so
    // users can still amplify on-platform. Close the modal regardless.
    const text = `Challenging ${tag || u} on @hyperflex:\n\n"${thesis}"\n\nWinner takes the track record.\nhyperflex.network/m/${challengedId}`;
    window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
    closeChallenge();
    if (input) input.value = '';
    // Lightweight confirmation — no toast infra on this page, so alert.
    setTimeout(() => alert('Challenge posted. They\'ll see it in their notifications.'), 200);
  } catch (err) {
    console.warn('[challenge]', err);
    alert('Network error — try again.');
  }
}

async function load() {
  const page = document.getElementById('page');
  try {
    const res = await fetch(`${API}/api/member/${userId}`);
    if (res.status === 404) {
      // Step 2 failed: handle resolved to a user_id but /api/member returned 404.
      // This usually means a stale/orphaned user row — the handle exists but
      // the full profile record doesn't. Log the specific user_id for debug.
      console.warn('[member] /api/member 404 for user_id=', userId);
      page.innerHTML = `<div class="error-state"><div class="error-icon">🔍</div><div class="error-msg">Profile data missing</div><div class="error-sub">User <code style="font-family:'Space Mono',monospace;font-size:12px;color:var(--gold)">${userId}</code> resolved from the handle but the profile record is empty. <br>This is usually a stale-row issue — contact support.</div></div>`;
      return;
    }
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const { user, stats, communities, recent_wins, take_stats, recent_takes, polymarket_stats, recent_trades } = data;

    // Surface the merged user+stats payload for renderFlexScoreCard and
    // the WHALE SCORE badge — both read window._profilePayload. Was only
    // populated for /@handle URLs before; /m/:userId visitors silently
    // missed the FLEX hero render and Whale badge.
    window._profilePayload = Object.assign({}, user || {}, stats || {});
    const pStats = polymarket_stats || { total_trades:0, open_positions:0, closed_wins:0, closed_losses:0, volume_usd:0, pnl_usd:0, win_rate:0 };
    const pTrades = recent_trades || [];

    // Synchronous owner check — decoded JWT's userId must match the profile
    // we're rendering. Used to show the "post your first take" empty-state
    // for the profile owner only (visitors see nothing if there are no takes).
    let isOwner = false;
    try {
      const ownTok = localStorage.getItem('hf_token');
      if (ownTok) {
        const payload = JSON.parse(atob(ownTok.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        const selfId = payload.userId || payload.sub || payload.id;
        if (selfId && String(selfId) === String(userId)) isOwner = true;
      }
    } catch {}

    const winPct = stats.settled_predictions > 0 ? Math.round((stats.wins / stats.settled_predictions) * 100) : 0;
    const avgColor = winPct >= 70 ? '#c9920d' : winPct >= 55 ? '#22c55e' : winPct >= 40 ? '#60a5fa' : '#ef4444';
    const initials = getInitials(user.display_name);
    const avatarBg = '#1e1e1b';

    document.title = `${user.display_name} — HYPERFLEX`;

    // Build community chips (use btn-ghost styling)
    const commHtml = communities.length
      ? `<div style="display:flex;flex-wrap:wrap;gap:8px">${communities.map(c =>
          `<a href="/${c.slug}" class="btn btn-ghost" style="padding:6px 12px 6px 10px;font-weight:600;text-transform:none;letter-spacing:0">
            <span style="width:8px;height:8px;border-radius:50%;background:${c.primary_color || '#c9920d'};display:inline-block;margin-right:6px"></span>
            ${c.display_name || c.slug}
          </a>`
        ).join('')}</div>`
      : `<div style="color:var(--muted);font-size:13px">No communities yet.</div>`;

    // Build wins list as premium cards
    const winsHtml = recent_wins.length
      ? `<div style="display:flex;flex-direction:column;gap:8px">${recent_wins.map(w => {
          const sideUp = (w.side || '').toUpperCase();
          return `<div class="card" style="display:flex;align-items:center;gap:12px">
            <div style="width:30px;height:30px;border-radius:50%;background:rgba(0,230,138,0.12);border:1px solid rgba(0,230,138,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--green);flex-shrink:0">✓</div>
            <div style="flex:1;min-width:0">
              <div class="card-q" style="margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${w.question}</div>
              <div class="card-meta" style="margin-top:2px">
                <span style="color:${w.community_color || '#c9920d'}">${w.community_name}</span>
                <span>·</span>
                <span>${timeAgo(w.resolved_at)}</span>
                ${w.payout > 0 ? `<span>· <strong style="color:var(--green)">+${w.payout.toLocaleString()}</strong></span>` : ''}
              </div>
            </div>
            <span class="side ${sideUp === 'YES' ? 'side-yes' : 'side-no'}">${sideUp}</span>
          </div>`;
        }).join('')}</div>`
      : `<div class="empty"><div class="empty-title">No wins yet.</div><div class="empty-sub">Every resolved market scores your takes.</div></div>`;

    // Whale-specific data (needed for tier calculation)
    const isWhale = user.is_whale || false;
    const whaleRank = user.whale_rank;
    const whalePnl = user.whale_pnl;
    const walletAddr = user.polymarket_address || '';
    const shortWallet = walletAddr ? (walletAddr.slice(0, 6) + '...' + walletAddr.slice(-4)) : '';
    const pnlDisplay = whalePnl != null ? (whalePnl >= 0 ? '+$' + (whalePnl >= 1000000 ? (whalePnl/1000000).toFixed(1) + 'M' : whalePnl >= 1000 ? Math.round(whalePnl/1000) + 'K' : Math.round(whalePnl)) : '-$' + Math.abs(whalePnl >= 1000 ? Math.round(whalePnl/1000) + 'K' : Math.round(whalePnl))) : null;
    const whaleAvatarBg = isWhale ? 'linear-gradient(135deg,#a855f7,#6d28d9)' : avatarBg;
    const whaleAvatarColor = isWhale ? '#fff' : avgColor;

    // Polymarket-native tier system — optimised for how real traders behave.
    // Measures: realized P&L × close-at-profit rate × sample size. Does NOT
    // penalise traders for exiting before resolution (that's capital efficiency,
    // not weakness). FLEXIN is the top tier for six-figure P&L or top-50 whales.
    const polyPnl       = pStats.pnl_usd || 0;
    const closedCount   = (pStats.closed_wins || 0) + (pStats.closed_losses || 0);
    const closeRate     = closedCount > 0 ? Math.round((pStats.closed_wins / closedCount) * 100) : 0;
    const positionCount = pStats.total_trades || 0;
    const isTopWhale    = isWhale && whaleRank && whaleRank <= 50;

    // Hero P&L resolution — if a verified top-50 whale is momentarily red
    // on one open position but has a substantial lifetime track record,
    // showing the small loss as the hero undersells them badly (saw a
    // rank-#2 / +$736k whale display "-$25K" as the hero because one
    // open bet was underwater). Prefer lifetime whale_pnl when it's
    // materially larger than current open P&L AND positive. Keeps honest
    // losers displaying losses, but stops the hero from hiding a $700k
    // lifetime track record behind a $25k floating drawdown.
    const lifetimePnl = window._profilePayload && window._profilePayload.whale_pnl != null
      ? Number(window._profilePayload.whale_pnl)
      : (pStats.whale_pnl != null ? Number(pStats.whale_pnl) : null);
    const displayPnl = (lifetimePnl != null && lifetimePnl > 0 && lifetimePnl > Math.abs(polyPnl) * 3)
      ? lifetimePnl
      : polyPnl;
    const displayPnlIsLifetime = displayPnl !== polyPnl;

    let tierEmoji, tierLabel, tierColorCss, rankDesc, rankClass;
    let tierProgress = null; // { current, target } only set for 'building' state

    if (polyPnl >= 200000) {
      tierEmoji = '💎'; tierLabel = 'FLEXIN'; tierColorCss = 'var(--gold)'; rankClass = 'flexin';
      rankDesc = 'Quarter-million+ realized P&L. Top 0.05% of Polymarket.';
    } else if (polyPnl >= 100000 || isTopWhale) {
      tierEmoji = '🐋'; tierLabel = 'WHALE'; tierColorCss = 'var(--purple)'; rankClass = 'whale';
      rankDesc = 'Six-figure P&L or top-50 Polymarket all-time.';
    } else if (polyPnl >= 25000 && closeRate >= 60 && positionCount >= 50) {
      tierEmoji = '🦈'; tierLabel = 'SHARK'; tierColorCss = 'var(--blue)'; rankClass = 'shark';
      rankDesc = 'Institutional-sized moves with sharp exit discipline.';
    } else if (polyPnl >= 5000 && closeRate >= 60 && positionCount >= 25) {
      tierEmoji = '🎯'; tierLabel = 'SHARP'; tierColorCss = 'var(--green)'; rankClass = 'sharp';
      rankDesc = 'Consistent profits, strong market reads.';
    } else if (polyPnl >= 500 && closeRate >= 55 && positionCount >= 10) {
      tierEmoji = '✅'; tierLabel = 'PROFITABLE'; tierColorCss = 'var(--green)'; rankClass = 'profitable';
      rankDesc = 'Trading at a real profit — the track record is working.';
    } else if (closedCount >= 5) {
      tierEmoji = '📊'; tierLabel = 'TRADER'; tierColorCss = 'var(--text-soft)'; rankClass = 'trader';
      rankDesc = 'Actively trading Polymarket — building toward profit.';
    } else {
      tierEmoji = '🌱'; tierLabel = 'Building track record'; tierColorCss = 'var(--text-soft)'; rankClass = 'building';
      tierProgress = { current: closedCount, target: 5 };
      rankDesc = `${closedCount}/5 closed positions before your first tier unlocks`;
    }
    const isBuilding = rankClass === 'building';

    // Legacy aliases (still referenced in a couple of share-CTA strings below)
    const rankTier = tierEmoji + ' ' + tierLabel;
    const rankColor = tierColorCss;
    const volFmt = pStats.volume_usd >= 1000000 ? '$' + (pStats.volume_usd/1000000).toFixed(1) + 'M' : pStats.volume_usd >= 1000 ? '$' + Math.round(pStats.volume_usd/1000) + 'K' : '$' + Math.round(pStats.volume_usd);
    const pnlFmt = (pStats.pnl_usd >= 0 ? '+$' : '-$') + (Math.abs(pStats.pnl_usd) >= 1000 ? Math.round(Math.abs(pStats.pnl_usd)/1000) + 'K' : Math.round(Math.abs(pStats.pnl_usd)));
    const flexPointsFmt = (stats.flex_points || 0) >= 1000 ? ((stats.flex_points/1000).toFixed(1) + 'K') : (stats.flex_points || 0);
    const flexScoreFmt = stats.flex_score_alltime != null ? stats.flex_score_alltime : stats.flex_score_90d != null ? stats.flex_score_90d : '—';

    // ── New layout: tier slug for badge styling
    const tierSlug = (tierLabel || 'building').toLowerCase().split(/\s+/)[0];
    // Display name resolution: handle (Anton) + display name (serif italic)
