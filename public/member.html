<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Profile — HYPERFLEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #c9920d;
  --green: #00e68a;
  --red: #ff4d6a;
  --blue: #4d9fff;
  --purple: #a855f7;
  --amber: #f59e0b;
  --paper: #0e0e15;
  --surface: #12121c;
  --card: #16162a;
  --card-hover: #1a1a32;
  --border: #1e1e2a;
  --border-soft: #252535;
  --ink: #f0f0f5;
  --ink-soft: #a0a0b8;
  --muted: #52526a;
  --mono: 'JetBrains Mono', monospace;
}
body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { color: inherit; }

/* Nav */
nav { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(14,14,21,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 50; }
.nav-logo { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 800; color: var(--gold); text-decoration: none; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; min-height: 44px; }
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-link { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; padding: 8px 12px; border-radius: 8px; transition: color 0.15s, background 0.15s; min-height: 44px; display: inline-flex; align-items: center; }
.nav-link:hover { color: var(--ink-soft); background: rgba(255,255,255,0.04); }
.nav-pill { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--gold); background: rgba(201,146,13,0.1); border: 1px solid rgba(201,146,13,0.25); padding: 6px 14px; border-radius: 20px; text-decoration: none; transition: background 0.15s; min-height: 36px; display: inline-flex; align-items: center; }
.nav-pill:hover { background: rgba(201,146,13,0.18); }

/* Page */
.page { max-width: 680px; margin: 0 auto; padding: 32px 20px 80px; }

/* Loading / error */
.loading { color: var(--muted); font-size: 13px; text-align: center; padding: 80px 20px; }
.error-state { text-align: center; padding: 100px 20px; }
.error-icon { font-size: 48px; margin-bottom: 16px; }
.error-msg { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.error-sub { font-size: 13px; color: var(--muted); }

/* ── Hero ── */
.hero { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
.avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; flex-shrink: 0; border: 2px solid var(--border); }
.hero-info { flex: 1; min-width: 0; }
.hero-name { font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 2px; }
.hero-username { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.hero-bio { font-size: 13px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 10px; max-width: 420px; }
.hero-meta-row { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.hero-stat { font-family: var(--mono); font-size: 12px; }
.hero-stat strong { font-size: 15px; font-weight: 700; color: var(--ink); }
.hero-stat span { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 3px; }
.hero-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid; transition: all 0.15s; font-family: var(--mono); min-height: 36px; text-decoration: none; background: none; }
.btn-follow { border-color: var(--gold); color: var(--gold); }
.btn-follow:hover, .btn-follow.active { background: rgba(201,146,13,0.12); }
.btn-copy { border-color: rgba(168,85,247,0.4); color: var(--purple); }
.btn-copy:hover, .btn-copy.active { background: rgba(168,85,247,0.1); }
.btn-share { border-color: var(--border-soft); color: var(--ink-soft); }
.btn-share:hover { border-color: var(--muted); color: var(--ink); }
.badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 100px; letter-spacing: 0.3px; font-family: var(--mono); display: inline-block; }
.badge-oracle  { background: rgba(201,146,13,0.15); color: var(--gold); border: 1px solid rgba(201,146,13,0.35); }
.badge-sharp   { background: rgba(0,230,138,0.1); color: var(--green); border: 1px solid rgba(0,230,138,0.25); }
.badge-streak  { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
.badge-verified { background: rgba(0,230,138,0.08); color: var(--green); border: 1px solid rgba(0,230,138,0.25); }
.badge-whale   { background: rgba(168,85,247,0.15); color: var(--purple); border: 1px solid rgba(168,85,247,0.3); }

/* ── Tier Card (glass morphism) ── */
.tier-card {
  position: relative; overflow: hidden;
  border-radius: 16px; padding: 28px 24px; margin-bottom: 20px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.tier-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 20% 30%, var(--tier-glow, rgba(201,146,13,0.12)), transparent 65%);
  pointer-events: none;
}
.tier-card-inner { position: relative; z-index: 1; display: flex; align-items: center; gap: 24px; }
.tier-big-pct { font-family: var(--mono); font-size: 56px; font-weight: 700; line-height: 1; flex-shrink: 0; }
.tier-body { flex: 1; min-width: 0; }
.tier-rank { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--mono); margin-bottom: 4px; opacity: 0.85; }
.tier-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 10px; }
.tier-bar-wrap { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.07); overflow: hidden; margin-bottom: 10px; }
.tier-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.tier-ctas { display: flex; gap: 8px; flex-wrap: wrap; }
.tier-cta { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 7px 16px; border-radius: 20px; text-decoration: none; cursor: pointer; transition: background 0.15s; border: 1px solid; background: none; }
@media (max-width: 480px) {
  .tier-card-inner { flex-direction: column; gap: 12px; align-items: flex-start; }
  .tier-big-pct { font-size: 44px; }
}

/* ── Score Strip ── */
.score-strip { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.score-item { flex: 1; padding: 14px 12px; text-align: center; border-right: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.score-item:last-child { border-right: none; }
.score-item:hover { background: rgba(255,255,255,0.02); }
.score-val { font-family: var(--mono); font-size: 19px; font-weight: 700; line-height: 1.2; }
.score-lbl { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
@media (max-width: 480px) {
  .score-strip { flex-wrap: wrap; }
  .score-item { flex: 1 1 50%; border-bottom: 1px solid var(--border); }
  .score-item:nth-child(3), .score-item:nth-child(4) { border-bottom: none; }
  .score-item:nth-child(2) { border-right: none; }
}

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab { flex: 1; text-align: center; padding: 12px 8px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; background: none; border-top: 0; border-left: 0; border-right: 0; letter-spacing: 0.01em; }
.tab:hover { color: var(--ink-soft); }
.tab.active { color: var(--ink); border-bottom-color: var(--gold); }
.tab-count { font-family: var(--mono); font-size: 10px; color: var(--muted); font-weight: 400; margin-left: 4px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── Take Cards ── */
.take-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; transition: border-color 0.15s, background 0.15s; }
.take-card:hover { border-color: var(--border-soft); background: var(--card-hover); }
.take-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.take-side { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; font-family: var(--mono); margin-top: 1px; }
.take-side.yes { background: rgba(0,230,138,0.1); color: var(--green); }
.take-side.no  { background: rgba(255,77,106,0.1); color: var(--red); }
.take-q { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.take-q a { text-decoration: none; color: inherit; }
.take-q a:hover { color: var(--ink-soft); }
.take-thesis { font-size: 13px; color: var(--ink-soft); line-height: 1.55; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.take-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; color: var(--muted); }
.take-correct { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; font-family: var(--mono); }
.take-correct.win  { background: rgba(0,230,138,0.1); color: var(--green); }
.take-correct.loss { background: rgba(255,77,106,0.1); color: var(--red); }
.take-footer { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
.take-react { font-size: 12px; font-family: var(--mono); color: var(--muted); }
.take-react.agree   { color: var(--green); }
.take-react.disagree { color: var(--red); }
.btn-challenge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 20px; background: none; border: 1px solid rgba(77,159,255,0.3); color: var(--blue); cursor: pointer; transition: all 0.15s; margin-left: auto; }
.btn-challenge:hover { background: rgba(77,159,255,0.08); border-color: var(--blue); }

/* ── Empty states ── */
.empty { text-align: center; padding: 48px 16px; background: rgba(201,146,13,0.03); border: 1px dashed rgba(201,146,13,0.2); border-radius: 12px; }
.empty-icon { font-size: 32px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; max-width: 300px; margin-left: auto; margin-right: auto; line-height: 1.5; }
.empty-cta { display: inline-block; background: var(--gold); color: var(--paper); font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 9px 22px; border-radius: 20px; text-decoration: none; }
.empty-plain { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 13px; }

/* ── Trades tab ── */
.platform-cards { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.platform-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; min-width: 130px; flex: 1; }
.platform-card-name { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.platform-card-pct { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1.1; }
.platform-card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.platform-card-pnl { font-family: var(--mono); font-size: 13px; font-weight: 700; margin-top: 6px; }
.trade-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
.trade-row-name { flex: 1; min-width: 0; font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trade-row-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.trade-row-pnl  { font-family: var(--mono); font-size: 12px; font-weight: 700; flex-shrink: 0; }
.connect-cta { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px 20px; text-align: center; }
.connect-cta-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.connect-cta-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
.connect-cta-btn { display: inline-block; background: var(--gold); color: var(--paper); font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 9px 20px; border-radius: 20px; text-decoration: none; }

/* ── Track Record tab ── */
.score-card { border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
.score-card.oracle  { background: linear-gradient(135deg,rgba(201,146,13,0.1),rgba(201,146,13,0.03)); border: 1px solid rgba(201,146,13,0.3); }
.score-card.sharp   { background: linear-gradient(135deg,rgba(0,230,138,0.08),rgba(0,230,138,0.02)); border: 1px solid rgba(0,230,138,0.25); }
.score-card.solid   { background: linear-gradient(135deg,rgba(77,159,255,0.08),rgba(77,159,255,0.02)); border: 1px solid rgba(77,159,255,0.22); }
.score-card.default { background: var(--card); border: 1px solid var(--border); }
.score-card-pct  { font-family: var(--mono); font-size: 48px; font-weight: 700; line-height: 1; flex-shrink: 0; }
.score-card-body { flex: 1; min-width: 0; }
.score-card-rank { font-size: 14px; font-weight: 800; letter-spacing: 0.02em; margin-bottom: 4px; }
.score-card-sub  { font-size: 12px; color: var(--muted); line-height: 1.5; }
.score-card-bar  { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.07); margin-top: 8px; overflow: hidden; }
.score-card-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
@media (max-width: 480px) { .score-card { flex-direction: column; gap: 10px; align-items: flex-start; } .score-card-pct { font-size: 38px; } }

.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-family: var(--mono); margin-bottom: 12px; }
.section-block { margin-bottom: 28px; }
.win-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); transition: border-color 0.15s, background 0.15s; margin-bottom: 8px; }
.win-item:hover { border-color: var(--border-soft); background: var(--card-hover); }
.win-check { width: 30px; height: 30px; border-radius: 50%; background: rgba(0,230,138,0.1); border: 1px solid rgba(0,230,138,0.25); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; color: var(--green); }
.win-body { flex: 1; min-width: 0; }
.win-q { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.win-meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; font-family: var(--mono); }
.win-side { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; font-family: var(--mono); }
.win-side.yes { background: rgba(0,230,138,0.1); color: var(--green); }
.win-side.no  { background: rgba(255,77,106,0.1); color: var(--red); }
.community-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.community-chip { display: flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 6px 12px 6px 8px; text-decoration: none; color: var(--ink-soft); font-size: 12px; font-weight: 600; transition: border-color 0.15s, color 0.15s; min-height: 36px; }
.community-chip:hover { border-color: var(--gold); color: var(--ink); }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
@media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.chart-card-title { font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

/* ── Trophy card ── */
.trophy-card { display: none; background: linear-gradient(135deg, rgba(201,146,13,0.1), rgba(201,146,13,0.03)); border: 1px solid rgba(201,146,13,0.3); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
.trophy-label { font-size: 10px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--mono); margin-bottom: 8px; }
.trophy-q { font-size: 15px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
.trophy-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ── Owner tools ── */
.owner-block { margin: 16px 0; display: none; }
.bio-area { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--ink); font-family: 'Inter', sans-serif; font-size: 13px; resize: none; outline: none; min-height: 52px; margin: 6px 0; transition: border-color 0.15s; }
.bio-area:focus { border-color: var(--border-soft); }
.bio-save { background: var(--gold); color: var(--paper); border: none; border-radius: 6px; padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--mono); }

/* ── CTA ── */
.cta-card { background: linear-gradient(135deg, rgba(201,146,13,0.07), rgba(201,146,13,0.02)); border: 1px solid rgba(201,146,13,0.2); border-radius: 12px; padding: 22px; text-align: center; margin-top: 32px; }
.cta-title { font-size: 17px; font-weight: 800; color: var(--gold); margin-bottom: 6px; }
.cta-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.cta-link { display: inline-block; background: var(--gold); color: var(--paper); font-weight: 700; font-size: 13px; padding: 10px 22px; border-radius: 20px; text-decoration: none; font-family: var(--mono); }

/* ── Whale wallet row ── */
.wallet-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-family: var(--mono); font-size: 11px; color: var(--muted); flex-wrap: wrap; }
.wallet-copy { font-family: var(--mono); font-size: 9px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; cursor: pointer; transition: border-color 0.15s; }
.wallet-copy:hover { border-color: var(--border-soft); }

/* ── Challenge Modal ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(5,5,10,0.75); z-index: 1000; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.modal-bg.open { display: flex; }
@media (max-width: 500px) { .modal-bg { align-items: flex-end; padding: 0; } }
.modal { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 16px; max-width: 460px; width: 100%; padding: 24px; box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
@media (max-width: 500px) { .modal { border-radius: 16px 16px 0 0; max-height: 88vh; overflow-y: auto; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.4; }
.modal-context { background: rgba(201,146,13,0.06); border: 1px solid rgba(201,146,13,0.2); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; font-size: 13px; color: var(--ink-soft); line-height: 1.4; }
.modal-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--mono); margin-bottom: 6px; }
.side-pick { display: flex; gap: 8px; margin-bottom: 14px; }
.side-btn { flex: 1; padding: 10px; border-radius: 8px; font-family: var(--mono); font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid; transition: all 0.15s; background: none; }
.side-btn.yes { border-color: rgba(0,230,138,0.3); color: var(--green); }
.side-btn.yes.picked { background: rgba(0,230,138,0.12); border-color: var(--green); }
.side-btn.no  { border-color: rgba(255,77,106,0.3); color: var(--red); }
.side-btn.no.picked  { background: rgba(255,77,106,0.1); border-color: var(--red); }
.modal-textarea { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--ink); font-family: 'Inter', sans-serif; font-size: 13px; resize: none; outline: none; min-height: 80px; margin-bottom: 6px; transition: border-color 0.15s; }
.modal-textarea:focus { border-color: var(--border-soft); }

<!-- Challenge modal -->
<div class="modal-bg" id="challengeModal">

    </div>

    </div>

<!-- Info modal placeholder -->
<script>
const userId = location.pathname.split('/').pop();
window._profileUserId = userId;
const API = location.origin;

// ── Utilities ──────────────────────────────────────────────────────────────
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const ts = dateStr.endsWith('Z') || dateStr.includes('+') ? dateStr : dateStr + 'Z';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 0)    return 'just now';
  if (diff < 60)   return `${diff}s`;
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  if (diff < 86400*30) return `${Math.floor(diff/86400)}d`;
  return new Date(ts).toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function fmtPnl(v) {
  if (v == null) return null;
  const abs = Math.abs(v);
  const s = v >= 0 ? '+$' : '-$';
  if (abs >= 1000000) return s + (abs/1000000).toFixed(1) + 'M';
  if (abs >= 1000) return s + Math.round(abs/1000) + 'K';
  return s + Math.round(abs);
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('pane-' + tabId);
  if (el) el.classList.add('active');
  if (btn) btn.classList.add('active');
  // Lazy-load trades tab
  if (tabId === 'trades' && !window._tradesLoaded) {
    window._tradesLoaded = true;
    loadTrades(userId);
  }
}

// ── Info modal ──────────────────────────────────────────────────────────────
function _showInfoModal(title, bodyHtml) {
  const prior = document.getElementById('hfxInfoModal');
  if (prior) prior.remove();
  const wrap = document.createElement('div');
  wrap.id = 'hfxInfoModal';
  wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
  wrap.innerHTML = `<div class="inner"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-size:15px;font-weight:700;color:var(--ink)">${title}</div><button onclick="document.getElementById('hfxInfoModal').remove()" style="background:none;border:0;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:4px 8px">×</button></div><div style="font-size:13px;line-height:1.55;color:var(--ink-soft)">${bodyHtml}</div></div>`;
  document.body.appendChild(wrap);
}

function showFlexScoreInfo() {
  _showInfoModal('Flex Score', `
    <p style="margin:0 0 10px">A single 0–100 number measuring how sharp a trader is.</p>
    <p style="margin:0 0 8px"><strong style="color:var(--ink)">Components:</strong></p>
    <ul style="margin:0 0 10px;padding-left:18px;line-height:1.8">
      <li>Win rate (accuracy across resolved predictions)</li>
      <li>Volume (number of predictions made)</li>
      <li>Calibration (predicted % vs actual outcomes)</li>
      <li>Recency (active in last 30d)</li>
    </ul>
    <p style="margin:0;color:var(--muted)">Higher = sharper. 80+ is ORACLE tier.</p>`);
}

function showFlexPointsInfo() {
  _showInfoModal('FLEX Points', `
    <p style="margin:0 0 10px">⚡ The reputation currency of HYPERFLEX.</p>
    <p style="margin:0 0 8px">Earned by:</p>
    <ul style="margin:0 0 10px;padding-left:18px;line-height:1.8">
      <li>Correct predictions (1–5× multiplier by odds)</li>
      <li>Getting agrees on your takes</li>
      <li>Posting takes that others quote-predict</li>
      <li>Daily login streaks</li>
    </ul>
    <p style="margin:0;color:var(--muted)">Points are on-platform reputation — not redeemable for cash.</p>`);
}

// ── Challenge modal ─────────────────────────────────────────────────────────
let _challengeTake = null;
let _challengeSide = null;

function openChallenge(take) {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to challenge a take'); return; }
  _challengeTake = take;
  _challengeSide = null;
  document.getElementById('challengeContext').textContent = take.question || take.market_question || '';
  document.getElementById('challengeThesis').value = '';
  document.getElementById('challengeCharCount').textContent = '0/280';
  document.getElementById('challengeSideYes').classList.remove('picked');
  document.getElementById('challengeSideNo').classList.remove('picked');
  document.getElementById('challengeSubmitBtn').disabled = false;
  document.getElementById('challengeModal').classList.add('open');
}

function closeChallenge() {
  document.getElementById('challengeModal').classList.remove('open');
  _challengeTake = null;
  _challengeSide = null;
}

function pickChallengeSide(side) {
  _challengeSide = side;
  document.getElementById('challengeSideYes').classList.toggle('picked', side === 'YES');
  document.getElementById('challengeSideNo').classList.toggle('picked', side === 'NO');
}

async function submitChallenge() {
  if (!_challengeSide) { alert('Pick a side (YES or NO)'); return; }
  if (!_challengeTake) return;
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to challenge'); return; }
  const btn = document.getElementById('challengeSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Posting…';
  try {
    const body = {
      market_slug: _challengeTake.market_slug || null,
      condition_id: _challengeTake.condition_id || null,
      question: _challengeTake.question || _challengeTake.market_question || '',
      side: _challengeSide,
      entry_price: null,
      amount: null,
      thesis: document.getElementById('challengeThesis').value.trim() || null,
      parent_take_id: _challengeTake.id,
    };
    const r = await fetch('/api/takes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.error || 'Failed to post');
    }
    closeChallenge();
    // Toast
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border-soft);color:var(--ink);padding:12px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 8px 32px rgba(0,0,0,0.5)';
    t.textContent = '⚔️ Counter-take posted!';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Post Counter-Take';
    alert(e.message || 'Failed to post');
  }
}

// Close challenge on backdrop click
document.getElementById('challengeModal').addEventListener('click', function(e) {
  if (e.target === this) closeChallenge();
});

// ── Main load ──────────────────────────────────────────────────────────────
async function load() {
  const page = document.getElementById('page');
  try {
    const res = await fetch(`${API}/api/member/${userId}`);
    if (res.status === 404) {
      page.innerHTML = `<div class="error-state"><div class="error-icon">🔍</div><div class="error-msg">Member not found</div><div class="error-sub">This profile doesn't exist or has been removed.</div></div>`;
      return;
    }
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const { user, stats, communities, recent_wins, take_stats, recent_takes } = data;

    let isOwner = false;
    try {
      const ownTok = localStorage.getItem('hf_token');
      if (ownTok) {
        const payload = JSON.parse(atob(ownTok.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        const selfId = payload.userId || payload.sub || payload.id;
        if (selfId && String(selfId) === String(userId)) isOwner = true;
      }
    } catch {}

    const winPct = stats.settled_predictions > 0 ? Math.round((stats.wins / stats.settled_predictions) * 100) : 0;
    const settled = stats.settled_predictions || 0;
    const initials = getInitials(user.display_name);

    document.title = `${user.display_name} — HYPERFLEX`;

    // Tier

    else if (winPct >= 60 && settled >= 5) { rankTier = 'SHARP';       rankClass = 'sharp';   rankColor = '#00e68a'; rankGlow = 'rgba(0,230,138,0.12)';   rankDesc = 'Above average — reads markets better than most'; }
    else if (winPct >= 50 && settled >= 5) { rankTier = 'SOLID';       rankClass = 'solid';   rankColor = '#4d9fff'; rankGlow = 'rgba(77,159,255,0.12)';  rankDesc = 'Reliable predictor — more right than wrong'; }
    else if (settled >= 3)                 { rankTier = 'SPECULATOR';  rankClass = 'default'; rankColor = '#6b7280'; rankGlow = 'rgba(107,114,128,0.08)'; rankDesc = 'Still building their track record'; }
    else                                   { rankTier = 'NEWCOMER';    rankClass = 'default'; rankColor = '#6b7280'; rankGlow = 'rgba(107,114,128,0.08)'; rankDesc = 'Just getting started — post more predictions'; }

    // Whale
    const isWhale = user.is_whale || false;
    const whaleRank = user.whale_rank;
    const whalePnl = user.whale_pnl;
    const walletAddr = user.polymarket_address || '';
    const shortWallet = walletAddr ? walletAddr.slice(0, 6) + '…' + walletAddr.slice(-4) : '';
    const pnlDisplay = fmtPnl(whalePnl);
    const avatarBg = isWhale ? 'linear-gradient(135deg,#a855f7,#6d28d9)' : `rgba(${rankColor === '#c9920d' ? '201,146,13' : rankColor === '#00e68a' ? '0,230,138' : rankColor === '#4d9fff' ? '77,159,255' : '107,114,128'},0.15)`;
    const avatarBorder = isWhale ? '#a855f740' : rankColor + '44';

    // Community chips
    const commHtml = communities.length
      ? `<div class="community-chips">${communities.map(c =>
          `<a href="/${c.slug}" class="community-chip"><span class="chip-dot" style="background:${c.primary_color||'#c9920d'}"></span>${c.display_name||c.slug}</a>`
        ).join('')}</div>`
      : '';

    // Wins list
    const winsHtml = recent_wins.length
      ? recent_wins.map(w => `
          <a href="/${w.community_slug}" class="win-item">
            <div class="win-check">✓</div>
            <div class="win-body">
              <div class="win-q">${w.question}</div>

                <span style="color:${w.community_color||'#c9920d'}">${w.community_name}</span>
                <span>·</span><span>${timeAgo(w.resolved_at)}</span>
                ${w.payout > 0 ? `<span>·</span><span style="color:var(--green)">+${w.payout.toLocaleString()} pts</span>` : ''}
              </div>
            </div>
            <span class="win-side ${(w.side||'').toUpperCase()==='YES'?'yes':'no'}">${(w.side||'').toUpperCase()}</span>
          </a>`).join('')
      : '';

    // Score card
    const scoreCardHTML = settled >= 3 ? `
      <div class="score-card ${rankClass}">
        <div class="score-card-pct" style="color:${rankColor}">${winPct}%</div>
        <div class="score-card-body">
          <div class="score-card-rank" style="color:${rankColor}">🎯 ${rankTier}</div>

        </div>
      </div>` : '';

    // Takes list
    const takesHtml = (take_stats && take_stats.total > 0) ? `
      ${take_stats.accuracy > 0 ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">

          <div class="hero-meta-row">
            <div class="hero-stat"><strong>${(stats.followers||0).toLocaleString()}</strong><span>Followers</span></div>
            <div class="hero-stat"><strong>${(stats.following||0).toLocaleString()}</strong><span>Following</span></div>

// ── Trades tab ──────────────────────────────────────────────────────────────
async function loadTrades(uid) {
  const el = document.getElementById('tradesContent');
  if (!el) return;
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');

  // Check if viewing own profile
  let isOwn = false;
  try {
    if (token) {
      const p = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      const self = p.userId || p.sub || p.id;
      if (String(self) === String(uid)) isOwn = true;
    }
  } catch {}

  try {
    const r = await fetch(`/api/predictors/${uid}/analytics`, token ? { headers: { Authorization: 'Bearer ' + token } } : {});
    if (!r.ok) throw new Error('analytics failed');
    const d = await r.json();

    if (!d.platforms || Object.values(d.platforms).every(p => p.total === 0)) {
      el.innerHTML = isOwn
        ? `<div class="connect-cta">
            <div class="connect-cta-title">Connect your trading accounts</div>
            <div class="connect-cta-sub">Link Polymarket, Kalshi, and Manifold to show your trade history and P&L here.</div>
            <a href="/creator/dashboard" class="connect-cta-btn">Connect accounts →</a>
          </div>`
        : `<div class="empty-plain">No trade history available.</div>`;
      return;
    }

    const platformColors = { hyperflex: '#c9920d', polymarket: '#6366f1', kalshi: '#8b5cf6', manifold: '#10b981' };
    const platformNames  = { hyperflex: 'HYPERFLEX', polymarket: 'Polymarket', kalshi: 'Kalshi', manifold: 'Manifold' };

    const cardsHtml = Object.entries(d.platforms).filter(([,p]) => p.total > 0).map(([name, p]) => {
      const wr = (p.wins + p.losses) > 0 ? Math.round(p.wins / (p.wins + p.losses) * 100) : 0;
      const pnlColor = p.pnl >= 0 ? 'var(--green)' : 'var(--red)';
      return `<div class="platform-card" style="border-color:${platformColors[name]||'#444'}44">
        <div class="platform-card-name" style="color:${platformColors[name]||'#888'}">${platformNames[name]||name}</div>
        <div class="platform-card-pct">${wr}%</div>
        <div class="platform-card-sub">win rate · ${p.total} positions</div>
        <div class="platform-card-pnl" style="color:${pnlColor}">${p.pnl>=0?'+':''}${Math.round(p.pnl)} pts</div>
      </div>`;
    }).join('');

    let posHtml = '';
    if (d.recent_positions && d.recent_positions.length) {
      posHtml = `<div class="section-label" style="margin-top:20px">Recent Positions</div>`;
      posHtml += d.recent_positions.map(p => {
        const pnlColor = (p.pnl||0) >= 0 ? 'var(--green)' : 'var(--red)';
        return `<div class="trade-row">
          <div class="trade-row-name">${(p.market_title||p.title||p.question||'').replace(/</g,'&lt;')}</div>
          <div class="trade-row-meta">${(p.platform||'').toUpperCase()}</div>
          <div class="trade-row-pnl" style="color:${pnlColor}">${(p.pnl||0)>=0?'+':''}${Math.round(p.pnl||0)}</div>
        </div>`;
      }).join('');
    }

    let totalPnlHtml = '';
    if (d.total_pnl != null) {
      const pnlColor = d.total_pnl >= 0 ? 'var(--green)' : 'var(--red)';
      totalPnlHtml = `<div style="display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px">
        <div style="flex:1"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Total P&L</div>
          <div style="font-family:var(--mono);font-size:24px;font-weight:700;color:${pnlColor}">${d.total_pnl>=0?'+':''}${Math.round(d.total_pnl)} pts</div></div>
        ${d.sharp_score ? `<div style="text-align:right"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Sharp Score</div><div style="font-family:var(--mono);font-size:24px;font-weight:700;color:var(--gold)">${d.sharp_score}</div></div>` : ''}
      </div>`;
    }

    el.innerHTML = totalPnlHtml + `<div class="platform-cards">${cardsHtml}</div>` + posHtml;
  } catch(e) {
    console.warn('loadTrades', e);
    el.innerHTML = `<div class="empty-plain">Trade data unavailable.</div>`;
  }
}

// ── P&L Analytics (track record tab) ────────────────────────────────────────
async function loadAnalytics(uid) {
  try {
    const r = await fetch(`/api/predictors/${uid}/analytics`);
    const d = await r.json();
    if (!d.platforms) return;
    document.getElementById('analyticsSection').style.display = 'block';

    const platformColors = { hyperflex: '#c9920d', polymarket: '#6366f1', kalshi: '#8b5cf6', manifold: '#10b981' };
    const platformNames  = { hyperflex: 'HYPERFLEX', polymarket: 'Polymarket', kalshi: 'Kalshi', manifold: 'Manifold' };
    document.getElementById('platformCards').innerHTML = Object.entries(d.platforms)
      .filter(([,p]) => p.total > 0)
      .map(([name, p]) => {
        const wr = (p.wins + p.losses) > 0 ? Math.round(p.wins / (p.wins + p.losses) * 100) : 0;
        return `<div class="platform-card" style="border-color:${platformColors[name]||'#444'}44">
          <div class="platform-card-name" style="color:${platformColors[name]||'#888'}">${platformNames[name]||name}</div>
          <div class="platform-card-pct">${wr}%</div>
          <div class="platform-card-sub">win rate</div>
          <div class="platform-card-pnl" style="color:${p.pnl>=0?'var(--green)':'var(--red)'}">${p.pnl>=0?'+':''}${Math.round(p.pnl)} pts</div>
        </div>`;
      }).join('');

    const sharpEl = document.getElementById('sharpBadge');
    if (sharpEl && d.sharp_score) {
      sharpEl.textContent = `⚡ ${d.sharp_score} Sharp`;
      sharpEl.style.display = 'inline-block';
    }

    const calCtx = document.getElementById('calibrationChart')?.getContext('2d');
    if (calCtx) {
      const calData = (d.calibration||[]).filter(c => c.predicted > 0);
      const barW = calData.length > 0 ? 220 / calData.length : 30;
      calCtx.clearRect(0, 0, 280, 170);
      calData.forEach((c, i) => {
        const x = 20 + i * (barW + 4);
        const actualH = c.actual != null ? (c.actual / 100) * 130 : 0;
        const expectedH = (c.predicted / 100) * 130;
        calCtx.fillStyle = 'rgba(201,146,13,0.45)';
        calCtx.fillRect(x, 140 - actualH, barW - 2, actualH);
        calCtx.fillStyle = 'rgba(255,255,255,0.15)';
        calCtx.fillRect(x, 140 - expectedH, barW - 2, 2);
        calCtx.fillStyle = '#52526a';
        calCtx.font = '9px "JetBrains Mono", monospace';
        calCtx.fillText(c.predicted + '%', x, 155);
      });
      calCtx.fillStyle = '#52526a';
      calCtx.font = '9px "JetBrains Mono", monospace';
      calCtx.fillText('gold=actual  gray=expected', 8, 168);
    }

    const pnlCtx = document.getElementById('pnlChart')?.getContext('2d');
    if (pnlCtx && (d.timeline||[]).length > 1) {
      const vals = d.timeline.map(t => t.pnl);
      const min = Math.min(...vals, 0), max = Math.max(...vals, 0);
      const range = max - min || 1;
      pnlCtx.clearRect(0, 0, 280, 170);
      pnlCtx.strokeStyle = d.total_pnl >= 0 ? '#00e68a' : '#ff4d6a';
      pnlCtx.lineWidth = 2;
      pnlCtx.beginPath();
      d.timeline.forEach((t, i) => {
        const x = 8 + (i / (d.timeline.length - 1)) * 264;
        const y = 150 - ((t.pnl - min) / range) * 130;
        i === 0 ? pnlCtx.moveTo(x, y) : pnlCtx.lineTo(x, y);
      });
      pnlCtx.stroke();
      const zeroY = 150 - ((0 - min) / range) * 130;
      pnlCtx.strokeStyle = 'rgba(255,255,255,0.1)';
      pnlCtx.lineWidth = 1;
      pnlCtx.setLineDash([4, 4]);
      pnlCtx.beginPath();
      pnlCtx.moveTo(8, zeroY); pnlCtx.lineTo(272, zeroY);
      pnlCtx.stroke();
      pnlCtx.setLineDash([]);
    }
  } catch(e) { console.warn('analytics', e); }
}

let _isFollowing = false;

async function loadFollowStatus() {
  try {
    const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
    const headers = token ? { Authorization: 'Bearer ' + token } : {};
    const r = await fetch(`${API}/api/predictors/${userId}/follow-status`, { headers });
    if (!r.ok) return;
    const d = await r.json();
    _isFollowing = d.is_following;
    const btn = document.getElementById('followBtn');
    if (btn) {
      btn.textContent = _isFollowing ? 'Following' : 'Follow';
      btn.classList.toggle('active', _isFollowing);
    }
    const cr = await fetch(`${API}/api/predictors/${userId}/copy-status`, { headers });
    if (cr.ok) {
      const cd = await cr.json();
      const copyBtn = document.getElementById('copyTradeBtn');
      if (copyBtn && cd.is_subscribed) {
        copyBtn.textContent = '🔔 Copying';
        copyBtn.classList.add('active');
        copyBtn.dataset.subscribed = '1';
      }
    }
  } catch(e) { console.warn('[follow-status]', e); }
}

async function toggleFollow() {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to follow predictors'); return; }
  const btn = document.getElementById('followBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/predictors/${userId}/follow`, {
      method: 'POST', headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('Failed');
    const d = await r.json();
    _isFollowing = d.following;
    if (btn) {
      btn.textContent = _isFollowing ? 'Following' : 'Follow';
      btn.classList.toggle('active', _isFollowing);
    }
    await loadFollowStatus();
  } catch(e) { console.warn('[toggle-follow]', e); }
  finally { if (btn) btn.disabled = false; }
}

// ── Wallet verify ────────────────────────────────────────────────────────────
async function startWalletVerify() {
  const btn = document.getElementById('verifyWalletBtn');
  if (!btn) return;
  if (!window.ethereum) { alert('MetaMask or a Web3 wallet is required'); return; }
  btn.disabled = true; btn.textContent = 'Connecting…';
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const address = accounts[0];
    btn.textContent = 'Getting challenge…';
    const token = localStorage.getItem('hf_token');
    const cr = await fetch('/api/wallet/challenge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ address })
    });
    if (!cr.ok) { const e = await cr.json(); throw new Error(e.error || 'Challenge failed'); }
    const { message } = await cr.json();
    btn.textContent = 'Sign in wallet…';
    const signature = await window.ethereum.request({ method: 'personal_sign', params: [message, address] });
    btn.textContent = 'Verifying…';
    const vr = await fetch('/api/wallet/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ signature })
    });
    if (!vr.ok) { const e = await vr.json(); throw new Error(e.error || 'Verification failed'); }
    btn.textContent = '✓ Verified!';
    setTimeout(() => location.reload(), 1500);
  } catch(e) {
    btn.textContent = '🔗 Verify Wallet';
    btn.disabled = false;
    if (e.code !== 4001) alert(e.message || 'Verification failed');
  }
}

function toggleBioEdit() {
  _bioEditOpen = !_bioEditOpen;
  const area = document.getElementById('bioEditArea');
  if (area) area.style.display = _bioEditOpen ? 'block' : 'none';
  if (_bioEditOpen) {
    const bioEl = document.querySelector('.hero-bio');
    const input = document.getElementById('bioInput');
    if (input && bioEl) input.value = bioEl.textContent.trim();
    if (input) {
      input.focus();
      const count = document.getElementById('bioCharCount');
      if (count) count.textContent = `${input.value.length}/280`;
      input.addEventListener('input', () => { if (count) count.textContent = `${input.value.length}/280`; });
    }
  }
}

async function saveBio() {
  const input = document.getElementById('bioInput');
  if (!input) return;
  const bio = input.value.trim();
  const token = localStorage.getItem('hf_token');
  try {
    const r = await fetch('/api/user/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ bio })
    });
    if (r.ok) { toggleBioEdit(); location.reload(); }
    else { const e = await r.json(); alert(e.error || 'Failed to save'); }
  } catch { alert('Network error'); }
}

// ── Owner tools ───────────────────────────────────────────────────────────────
function showOwnerTools(profileUserId, walletVerified) {
  const token = localStorage.getItem('hf_token');
  if (!token) return;
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const currentUserId = payload.userId || payload.sub || payload.id;
    if (currentUserId !== profileUserId) return;
    const tools = document.getElementById('ownerTools');
    if (tools) tools.style.display = 'block';
    if (!walletVerified) {
      const vBtn = document.getElementById('verifyWalletBtn');
      if (vBtn) vBtn.style.display = 'inline-flex';
    }
  } catch {}
}

// ── Nav pill ──────────────────────────────────────────────────────────────────
function showCreatorDashPill() {
  const creatorToken = localStorage.getItem('hf_token');
  if (!creatorToken) return;
  try {
    const payload = JSON.parse(atob(creatorToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const currentUserId = payload.userId || payload.sub || payload.id;
    if (currentUserId === window._profileUserId) {
      const pill = document.getElementById('creatorDashPill');
      if (pill) pill.style.display = 'inline-flex';
    }
  } catch {}
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function main() {
  await load();
  loadFollowStatus();
  showCreatorDashPill();
  // Also load owner tools after main load
  try {
    const r = await fetch(`${API}/api/member/${userId}`);
    if (r.ok) {
      const d = await r.json();
      showOwnerTools(userId, d.user?.wallet_verified);
    }
  } catch {}
}

main();
</script>
