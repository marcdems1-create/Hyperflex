<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Profile — HYPERFLEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#0b0b12;--paper-2:#0e0e17;--surface:rgba(255,255,255,0.03);--surface-2:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.14);
  --text:#f0f0f5;--text-soft:#b4b4c4;--muted:#6b6b80;--faint:#3a3a4a;
  --gold:#f5a623;--gold-soft:#c9920d;--green:#00e68a;--red:#ff4d6a;--blue:#4d9fff;--purple:#a855f7;--amber:#f59e0b;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --shadow-lg:0 24px 60px -20px rgba(0,0,0,0.6),0 12px 32px -8px rgba(0,0,0,0.4);
  --shadow-glow:0 0 48px -12px rgba(245,166,35,0.35);
}
html,body{background:var(--paper);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{min-height:100vh;background:radial-gradient(ellipse 1200px 800px at 50% -200px,rgba(245,166,35,0.08),transparent 60%),radial-gradient(ellipse 800px 600px at 90% 20%,rgba(168,85,247,0.05),transparent 60%),var(--paper)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
/* ── Nav ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;position:sticky;top:0;z-index:50;background:rgba(11,11,18,0.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Inter',sans-serif;font-size:17px;font-weight:800;color:var(--text);display:inline-flex;align-items:center;gap:8px;letter-spacing:-0.02em}
.nav-logo:hover{color:var(--gold)}
.nav-back{color:var(--muted);font-size:13px;display:inline-flex;align-items:center;min-height:44px;padding:0 6px;transition:color .15s}
.nav-back:hover{color:var(--text)}
/* ── Page shell ── */
.page{max-width:720px;margin:0 auto;padding:28px 18px 80px}
/* ── Glass cards ── */
.glass{background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.015));border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:var(--shadow-lg)}
.glass-inset{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:14px}
/* ── Hero ── */
.hero{display:flex;align-items:flex-start;gap:18px;margin-bottom:20px}
.avatar{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:28px;font-weight:800;flex-shrink:0;border:2px solid var(--border-strong);background:linear-gradient(135deg,rgba(245,166,35,0.18),rgba(168,85,247,0.12));box-shadow:0 8px 28px -8px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);position:relative;overflow:hidden}
.avatar::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,0.08) 100%);pointer-events:none}
.avatar-whale{background:linear-gradient(135deg,#a855f7,#6d28d9);color:#fff;border-color:rgba(168,85,247,0.5);box-shadow:0 8px 28px -8px rgba(168,85,247,0.5),inset 0 1px 0 rgba(255,255,255,0.2)}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1.15;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hero-verify{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;background:var(--blue);border-radius:50%;color:#000;font-size:11px;font-weight:900}
.hero-username{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:6px}
.hero-bio{font-size:13.5px;color:var(--text-soft);line-height:1.5;margin:6px 0 10px;max-width:460px}
.hero-whale-meta{display:flex;align-items:center;gap:8px;margin:6px 0 4px;flex-wrap:wrap;font-family:var(--mono);font-size:11px}
.whale-pill{font-size:10px;font-weight:700;color:var(--purple);background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);padding:3px 10px;border-radius:100px;letter-spacing:0.5px;text-transform:uppercase}
.whale-rank{color:var(--gold);font-weight:700}
.whale-pnl{font-weight:700}
.whale-pnl.pos{color:var(--green)}
.whale-pnl.neg{color:var(--red)}
.wallet-row{font-family:var(--mono);font-size:11px;color:var(--muted);margin:2px 0 6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wallet-row button,.wallet-row a{font-family:var(--mono);font-size:10px;color:var(--text-soft);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px;transition:all .15s}
.wallet-row button:hover,.wallet-row a:hover{border-color:var(--border-strong);color:var(--text)}
/* ── Follow strip ── */
.social-row{display:flex;align-items:center;gap:18px;margin:8px 0 12px;font-family:var(--mono);font-size:12px}
.social-row strong{color:var(--text);font-size:15px;font-family:'Inter',sans-serif;font-weight:800}
.social-row .lbl{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;margin-left:4px}
.action-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:100px;transition:all .15s;min-height:38px;white-space:nowrap;border:1px solid transparent}
.btn-primary{background:var(--text);color:#000}
.btn-primary:hover{background:#fff}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--text-soft)}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--text);background:var(--surface-2)}
.btn-gold{background:linear-gradient(180deg,rgba(245,166,35,0.16),rgba(245,166,35,0.08));border-color:rgba(245,166,35,0.4);color:var(--gold)}
.btn-gold:hover{background:linear-gradient(180deg,rgba(245,166,35,0.28),rgba(245,166,35,0.14));border-color:rgba(245,166,35,0.6)}
.btn-purple{background:linear-gradient(180deg,rgba(168,85,247,0.16),rgba(168,85,247,0.08));border-color:rgba(168,85,247,0.35);color:#c4a3ff}
.btn-purple:hover{background:linear-gradient(180deg,rgba(168,85,247,0.28),rgba(168,85,247,0.14));border-color:rgba(168,85,247,0.55)}
.btn-challenge{background:linear-gradient(135deg,rgba(255,77,106,0.15),rgba(245,166,35,0.12));border-color:rgba(255,77,106,0.35);color:#ff8a9e}
.btn-challenge:hover{background:linear-gradient(135deg,rgba(255,77,106,0.28),rgba(245,166,35,0.22));border-color:rgba(255,77,106,0.55);color:#fff}
.btn.following{background:var(--surface-2);border-color:var(--border-strong);color:var(--text)}
/* ── Tier hero card ── */
.tier-card{position:relative;border-radius:20px;padding:28px 24px 26px;margin:24px 0 18px;overflow:hidden;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01))}
.tier-card::before{content:'';position:absolute;inset:-1px;border-radius:20px;padding:1px;background:linear-gradient(135deg,var(--tier-color,var(--gold)) 0%,transparent 50%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.5}
.tier-glow{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:420px;height:320px;background:radial-gradient(ellipse at center,var(--tier-color,var(--gold)) 0%,transparent 60%);opacity:.18;pointer-events:none;animation:tierPulse 4s ease-in-out infinite}
@keyframes tierPulse{0%,100%{opacity:.14;transform:translateX(-50%) scale(1)}50%{opacity:.24;transform:translateX(-50%) scale(1.08)}}
.tier-inner{position:relative;text-align:center}
.tier-emoji{font-size:40px;margin-bottom:6px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
.tier-label{font-family:var(--mono);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;margin-bottom:10px}
.tier-pct{font-family:'Inter',sans-serif;font-size:72px;font-weight:900;line-height:1;letter-spacing:-0.04em;background:linear-gradient(180deg,currentColor,color-mix(in srgb,currentColor 70%,transparent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tier-desc{font-size:13px;color:var(--text-soft);margin-top:10px;line-height:1.45}
.tier-record{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
.tier-bar{margin:16px auto 0;max-width:260px;height:4px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden}
.tier-bar-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.2,.9,.3,1)}
.tier-actions{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
/* ── Stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{padding:14px 14px 12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;text-align:left;cursor:default;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.stat.interactive{cursor:pointer}
.stat.interactive:hover{border-color:var(--border-strong);background:var(--surface-2)}
.stat-lbl{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.stat-val{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;line-height:1.05;letter-spacing:-0.02em}
.stat-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin:8px 0 18px;position:sticky;top:64px;background:rgba(11,11,18,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:20;padding:0 2px}
.tab-btn{flex:1;background:none;border:none;padding:14px 12px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;min-height:48px;letter-spacing:-0.01em}
.tab-btn:hover{color:var(--text-soft)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--gold)}
.tab-btn .tab-count{color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:500;margin-left:4px}
.tab-pane{display:none;animation:fadeIn .25s ease}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* ── Take / Trade cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s,background .15s}
.card:hover{border-color:var(--border-strong);background:var(--surface-2)}
.card a{color:inherit}
.card-q{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px}
.card-thesis{font-size:13px;color:var(--text-soft);line-height:1.55;margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
.card-actions{display:flex;gap:14px;margin-top:10px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.side{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:100px;letter-spacing:0.04em;display:inline-block}
.side-yes{background:rgba(0,230,138,0.12);color:var(--green);border:1px solid rgba(0,230,138,0.25)}
.side-no{background:rgba(255,77,106,0.12);color:var(--red);border:1px solid rgba(255,77,106,0.25)}
.badge-correct{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(0,230,138,0.12);color:var(--green)}
.badge-wrong{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(255,77,106,0.12);color:var(--red)}
/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;border:1px dashed var(--border);border-radius:16px;background:rgba(255,255,255,0.01)}
.empty-emoji{font-size:32px;margin-bottom:8px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:13px;color:var(--muted);margin-bottom:18px;max-width:320px;margin-left:auto;margin-right:auto;line-height:1.5}
/* ── Loading/error states ── */
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:13px}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{text-align:center;padding:80px 20px}
.error-icon{font-size:40px;margin-bottom:12px}
.error-msg{font-size:15px;font-weight:700;margin-bottom:6px}
.error-sub{font-size:13px;color:var(--muted)}
/* ── Badges on hero ── */
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;letter-spacing:0.04em;text-transform:uppercase;border:1px solid transparent}
.badge-streak{background:rgba(255,140,0,0.12);color:#ff9a3c;border-color:rgba(255,140,0,0.3)}
.badge-oracle{background:rgba(245,166,35,0.14);color:var(--gold);border-color:rgba(245,166,35,0.35)}
.badge-sharp{background:rgba(0,230,138,0.12);color:var(--green);border-color:rgba(0,230,138,0.3)}
.badge-verified{background:rgba(77,159,255,0.12);color:var(--blue);border-color:rgba(77,159,255,0.3)}
/* ── Mobile ── */
@media(max-width:600px){
  .page{padding:20px 14px 60px}
  .hero{gap:14px}
  .avatar{width:62px;height:62px;font-size:22px}
  .hero-name{font-size:20px}
  .tier-pct{font-size:56px}
  .tier-card{padding:24px 18px 22px}
  .btn{font-size:12px;padding:9px 14px}
  input,textarea,select{font-size:16px!important}
}

/* ── Unified Flex Score card (Charter §8) ── */
.flex-card{position:relative;border-radius:20px;padding:24px 24px 20px;margin:18px 0 22px;background:linear-gradient(180deg,rgba(245,166,35,0.04),rgba(245,166,35,0.008));border:1px solid rgba(245,166,35,0.16);overflow:hidden}
.flex-card::before{content:'';position:absolute;inset:0;background:radial-gradient(60% 80% at 0% 0%,rgba(245,166,35,0.08),transparent 55%);pointer-events:none}
.flex-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px;position:relative}
.flex-head-l{min-width:0;flex:1}
.flex-eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:4px}
.flex-score-n{font-family:'Inter',sans-serif;font-weight:900;font-size:68px;line-height:1;color:var(--text);letter-spacing:-0.035em;display:flex;align-items:baseline;gap:10px}
.flex-score-n .out{font-size:22px;font-weight:700;color:var(--muted);letter-spacing:0}
.flex-score-n.mute{color:var(--muted)}
.flex-head-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right}
.flex-tier{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;padding:6px 14px;border:1px solid rgba(245,166,35,0.3);border-radius:100px;background:rgba(245,166,35,0.08)}
.flex-tier.tier-oracle{color:var(--gold)}
.flex-tier.tier-sharp{color:var(--green);border-color:rgba(0,230,138,0.3);background:rgba(0,230,138,0.08)}
.flex-tier.tier-solid{color:var(--blue);border-color:rgba(77,159,255,0.3);background:rgba(77,159,255,0.08)}
.flex-tier.tier-speculator,.flex-tier.tier-building{color:var(--muted);border-color:var(--border);background:var(--surface)}
.flex-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.04em}
.flex-components{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);position:relative}
.flex-comp{text-align:center}
.flex-comp-label{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.flex-comp-bar{height:5px;background:var(--surface-2,rgba(255,255,255,0.05));border-radius:100px;overflow:hidden;margin-bottom:5px}
.flex-comp-bar .fill{height:100%;background:var(--gold);border-radius:100px;transition:width 0.8s ease-out}
.flex-comp-val{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text)}
.flex-comp-val.mute{color:var(--faint,#3a3a4a)}
.flex-building-note{margin-top:14px;padding:12px 14px;border-radius:10px;background:var(--surface);border:1px dashed var(--border);font-size:12.5px;color:var(--text-soft);line-height:1.5;position:relative}
.flex-building-note strong{color:var(--text)}

@media(max-width:560px){
  .flex-score-n{font-size:56px}
  .flex-components{grid-template-columns:repeat(5,1fr);gap:6px}
  .flex-comp-label{font-size:8.5px;letter-spacing:0.05em}
  .flex-comp-val{font-size:11px}
}

/* ── T7 · Sports tab ── */
.sfs-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 20px 18px;background:linear-gradient(180deg,rgba(245,166,35,0.08),rgba(245,166,35,0.015));border:1px solid rgba(245,166,35,0.25);border-radius:18px;margin-bottom:14px;flex-wrap:wrap}
.sfs-eyebrow{font-family:var(--mono);font-size:10px;color:var(--gold);font-weight:700;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px}
.sfs-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.01em}
.sfs-title b{color:var(--gold)}
.sfs-gauge{display:flex;align-items:baseline;gap:6px}
.sfs-score{font-family:'Inter',sans-serif;font-size:56px;font-weight:900;letter-spacing:-0.04em;line-height:1}
.sfs-score-denom{font-family:var(--mono);font-size:14px;color:var(--muted);font-weight:600}
.sfs-tier{display:inline-block;margin-left:10px;font-family:var(--mono);font-size:10px;font-weight:800;padding:4px 10px;border-radius:100px;border:1px solid;letter-spacing:0.1em;vertical-align:middle}

.sfs-comps{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media (max-width:520px){.sfs-comps{grid-template-columns:1fr}}
.sfs-comp{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.sfs-comp-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.sfs-comp-label{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-soft);letter-spacing:0.1em;text-transform:uppercase}
.sfs-comp-val{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:700}
.sfs-comp-val b{color:var(--text);font-size:15px}
.sfs-comp-max{color:var(--muted);font-weight:500;margin-left:2px}
.sfs-comp-bar{height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.sfs-comp-fill{height:100%;border-radius:3px;transition:width 0.7s ease-out;box-shadow:0 0 12px currentColor}

.sfs-coach{padding:14px 16px;margin-bottom:14px}
.sfs-coach-head{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.sfs-coach-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text-soft)}
.sfs-coach-row:last-child{border-bottom:none}
.sfs-coach-have{font-family:var(--mono);color:var(--gold);font-weight:700}

<div class="page" id="page">
  <div class="loading">Loading profile...</div>
</div>

<script>
// userId is resolved asynchronously for /@handle URLs (canonical). Legacy
// /m/:userId URLs skip the lookup and use the path segment directly.
// Set to null until resolution completes; downstream functions run inside
// load() which is kicked by the resolver at the bottom of this script.
let userId = null;
const API = location.origin;

async function _resolveProfileUserId() {
  const path = location.pathname;
  if (path.startsWith('/@')) {
    const handle = path.slice(2).split('/')[0]; // handle or handle in "handle/passport"
    if (!handle) return null;
    try {
      const r = await fetch(API + '/api/user-by-handle/' + encodeURIComponent(handle));
      if (r.ok) {
        const d = await r.json();
        // Cache the full payload so the Flex Score card can render without
        // re-fetching. Flex fields (score / tier / components) come back on
        // this same endpoint per Charter §8 single-surface rule.
        if (d && d.id) { window._profilePayload = d; return d.id; }
      }
    } catch {}
    return null;
  }
  return path.split('/').pop() || null;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const ts   = dateStr.endsWith('Z') || dateStr.includes('+') ? dateStr : dateStr + 'Z';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 0)    return 'just now';
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 86400*30) return `${Math.floor(diff/86400)}d ago`;
  return new Date(ts).toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function tierBadge(winRate, streak) {
  let badges = '';
  if (streak >= 7)       badges += `<span class="badge badge-oracle">⚡ ${streak} STREAK</span>`;
  else if (streak >= 3)  badges += `<span class="badge badge-streak">🔥 ${streak} WIN STREAK</span>`;
  if (winRate >= 70)     badges += `<span class="badge badge-oracle">🎯 ORACLE</span>`;
  else if (winRate >= 60) badges += `<span class="badge badge-sharp">🎯 SHARP</span>`;
  return badges;
}

function shareProfile() {
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareBtn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.innerHTML = '📋 Copy profile link', 2000); }
  });
}

// Minimal info modal — no deps, no CSS class pollution. Used by the ⓘ
// buttons next to Flex Score and FLEX Points in the stats grid so visitors
// actually understand what the gold and purple numbers mean.
// Unified Flex Score hero card. Reads window._profilePayload (populated by
// _resolveProfileUserId → /api/user-by-handle). Inserts the card at the
// top of #profileContent so it's the first thing visible below the hero.
// Charter §8 compliance: bounded score out of 100, single-surface, tier
// read directly from the server-computed value.
function renderFlexScoreCard() {
  const p = window._profilePayload;
  if (!p) return;  // legacy /m/:userId path — no Flex card (yet)
  const host = document.getElementById('profileContent');
  if (!host) return;
  // Defensive: don't double-render if load() was called twice.
  if (document.getElementById('flexScoreCard')) return;

  const qualifies = p.flex_qualifies === true;
  const score     = qualifies && p.flex_score != null ? p.flex_score : null;
  const tier      = p.flex_tier || 'Building';
  const settled   = p.flex_settled_events || 0;
  const comps     = p.flex_components || {};

  const wrCopy = (settled > 0 && p.flex_raw_win_rate != null)
    ? `${(p.flex_raw_win_rate * 100).toFixed(1)}% win rate · ${settled} settled`
    : `${settled} settled`;

  // Building state — score null, target is 25 settled events
  const buildingNote = !qualifies ? `
    <div class="flex-building-note">
      <strong>Building.</strong> Score unlocks at 25 settled events — ${Math.max(0, 25 - settled)} to go. Sample size below that makes the number a lie.
    </div>` : '';

  // Five components. Each bar shows filled / max ratio.
  const maxes = { accuracy: 35, calibration: 25, pnl: 20, consistency: 10, breadth: 10 };
  const labels = { accuracy: 'Accuracy', calibration: 'Calibration', pnl: 'PnL', consistency: 'Consistency', breadth: 'Breadth' };
  const compHtml = Object.keys(maxes).map(k => {
    const v = comps[k];
    const hasVal = v != null && Number.isFinite(Number(v));
    const pct = hasVal ? Math.max(0, Math.min(100, (Number(v) / maxes[k]) * 100)) : 0;
    const valCls = hasVal ? '' : 'mute';
    const valStr = hasVal ? Number(v).toFixed(1) : '—';
    return `
      <div class="flex-comp">
        <div class="flex-comp-label">${labels[k]}</div>
        <div class="flex-comp-bar"><div class="fill" style="width:${pct}%"></div></div>
        <div class="flex-comp-val ${valCls}">${valStr}<span style="opacity:0.45;font-weight:400"> / ${maxes[k]}</span></div>
      </div>`;
  }).join('');

  const tierClass = 'tier-' + tier.toLowerCase();
  const scoreDisplay = score != null
    ? `<div class="flex-score-n"><span>${score}</span><span class="out">/ 100</span></div>`
    : `<div class="flex-score-n mute"><span>—</span><span class="out">/ 100</span></div>`;

  const card = document.createElement('div');
  card.id = 'flexScoreCard';
  card.className = 'flex-card';
  card.innerHTML = `
    <div class="flex-head">
      <div class="flex-head-l">
        <div class="flex-eyebrow">Flex Score</div>
        ${scoreDisplay}
      </div>
      <div class="flex-head-r">
        <div class="flex-tier ${tierClass}">${tier}</div>
        <div class="flex-sub">${wrCopy}</div>
      </div>
    </div>
    <div class="flex-components">${compHtml}</div>
    ${buildingNote}
  `;
  host.insertBefore(card, host.firstElementChild);
}

function _showInfoModal(title, bodyHtml) {
  // Dismiss any prior instance so repeated clicks don't stack.
  const prior = document.getElementById('hfxInfoModal');
  if (prior) prior.remove();
  const wrap = document.createElement('div');
  wrap.id = 'hfxInfoModal';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(5,5,10,0.72);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)';
  wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
  wrap.innerHTML = `
    <div style="background:#15151d;border:1px solid #2a2a36;border-radius:14px;max-width:420px;width:100%;padding:22px 22px 18px;box-shadow:0 24px 60px rgba(0,0,0,0.6)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:15px;font-weight:700;color:var(--text)">${title}</div>
        <button onclick="document.getElementById('hfxInfoModal').remove()" aria-label="Close" style="background:none;border:0;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:4px 8px">×</button>
      </div>
      <div style="font-size:13px;line-height:1.55;color:var(--text-soft)">${bodyHtml}</div>
    </div>`;
  document.body.appendChild(wrap);
}

function switchProfileTab(tabId, btn) {
  document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  var el = document.getElementById('tab-' + tabId);
  if (el) el.classList.add('active');
  if (btn) btn.classList.add('active');
  if (tabId === 'record') { setTimeout(() => loadAnalytics(window._profileUserId), 60); }
  if (tabId === 'sports') { setTimeout(() => loadSportsFlexScore(window._profileUserId), 60); }
}

// Lazy-load the Sports tab content. Reads /api/sports-predictors/:userId
// (T5) and renders the Flex Score for Sports + five-component breakdown.
// Re-entrant: if already loaded, no-op on subsequent tab switches.
var _sportsFlexLoaded = false;
async function loadSportsFlexScore(userId) {
  if (_sportsFlexLoaded || !userId) return;
  _sportsFlexLoaded = true;
  const host = document.getElementById('tab-sports');
  if (!host) return;
  try {
    const res = await fetch(`/api/sports-predictors/${encodeURIComponent(userId)}`);
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    host.innerHTML = renderSportsTab(data);
  } catch (e) {
    host.innerHTML = '<div class="empty"><div class="empty-emoji">⚡</div><div class="empty-title">Could not load sports record</div><div class="empty-sub">Try again in a minute.</div></div>';
  }
}

function _fmtSigned(n, suffix) {
  if (n == null || !isFinite(n)) return '—';
  const v = parseFloat(n);
  return (v >= 0 ? '+' : '') + v.toFixed(2) + (suffix || '');
}
function _fmtPct(n) {
  if (n == null || !isFinite(n)) return '—';
  return parseFloat(n).toFixed(1) + '%';
}
function _fmtCLV(n) {
  if (n == null || !isFinite(n)) return '—';
  const v = parseFloat(n);
  return (v >= 0 ? '+' : '') + v.toFixed(1) + '¢';
}
function _sportsTier(score) {
  if (score == null) return { label: 'UNRANKED', color: 'var(--muted)' };
  if (score >= 90) return { label: 'ORACLE',  color: 'var(--gold)' };
  if (score >= 70) return { label: 'SHARP',   color: 'var(--green)' };
  if (score >= 50) return { label: 'SOLID',   color: 'var(--blue)' };
  return { label: 'SPECULATOR', color: 'var(--text-soft)' };
}

function _componentBar(label, value, max, color) {
  const pct = max > 0 ? Math.max(0, Math.min(100, (value / max) * 100)) : 0;
  return `
    <div class="sfs-comp">
      <div class="sfs-comp-head">
        <span class="sfs-comp-label">${label}</span>
        <span class="sfs-comp-val"><b>${(+value).toFixed(1)}</b><span class="sfs-comp-max">/${max}</span></span>
      </div>
      <div class="sfs-comp-bar"><div class="sfs-comp-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
}

function renderSportsTab(d) {
  if (!d.has_score) {
    return `
      <div class="empty" style="padding:40px 20px;text-align:center">
        <div class="empty-emoji" style="font-size:32px;margin-bottom:12px">🏆</div>
        <div class="empty-title" style="font-size:16px;font-weight:800;margin-bottom:6px">No sports record yet</div>
        <div class="empty-sub" style="font-size:13px;color:var(--text-soft);max-width:360px;margin:0 auto 18px;line-height:1.55">Post a settled sports pick to start your Flex Score for Sports.</div>
        <a href="/picks/new" class="btn btn-gold">Lock your first pick →</a>
      </div>`;
  }

  const score = d.score;
  const qualifies = d.qualifies;
  const tier = _sportsTier(score);
  const t = d.thresholds || { MIN_SETTLED_BETS: 25, MIN_STAKED_UNITS: 500, MIN_ACTIVE_DAYS: 14 };

  // Gauge at the top — big score + tier
  const scoreHtml = qualifies
    ? `<div class="sfs-gauge">
         <div class="sfs-score" style="color:${tier.color}">${score}</div>
         <div class="sfs-score-denom">/100</div>
       </div>
       <div class="sfs-tier" style="color:${tier.color};border-color:${tier.color}40;background:${tier.color}12">${tier.label}</div>`
    : `<div class="sfs-gauge">
         <div class="sfs-score" style="color:var(--muted);font-size:42px">—</div>
       </div>
       <div class="sfs-tier" style="color:var(--muted);border-color:var(--border)">BELOW THRESHOLD</div>`;

  const components = qualifies ? `
    <div class="sfs-comps">
      ${_componentBar('P&L',         d.pnl_component         || 0, 40, 'var(--gold)')}
      ${_componentBar('Volume',      d.volume_component      || 0, 20, 'var(--blue)')}
      ${_componentBar('Consistency', d.consistency_component || 0, 15, 'var(--green)')}
      ${_componentBar('CLV',         d.clv_component         || 0, 15, 'var(--gold)')}
      ${_componentBar('Diversity',   d.diversity_component   || 0, 10, 'var(--purple)')}
    </div>` : '';

  // Threshold coaching when below the gate
  const coachHtml = !qualifies ? `
    <div class="sfs-coach glass-inset">
      <div class="sfs-coach-head">Unlocks at</div>
      <div class="sfs-coach-row">
        <span>${t.MIN_SETTLED_BETS} settled picks</span>
        <span class="sfs-coach-have">${parseInt(d.settled_bets || 0, 10)} / ${t.MIN_SETTLED_BETS}</span>
      </div>
      <div class="sfs-coach-row">
        <span>${t.MIN_STAKED_UNITS}u staked</span>
        <span class="sfs-coach-have">${(parseFloat(d.total_staked_units) || 0).toFixed(0)} / ${t.MIN_STAKED_UNITS}</span>
      </div>
      <div class="sfs-coach-row">
        <span>${t.MIN_ACTIVE_DAYS} active days</span>
        <span class="sfs-coach-have">${parseInt(d.active_days || 0, 10)} / ${t.MIN_ACTIVE_DAYS}</span>
      </div>
    </div>` : '';

  const stats = `
    <div class="sfs-stats">
      <div class="sfs-stat"><div class="sfs-stat-l">NET P&amp;L</div><div class="sfs-stat-v" style="color:${parseFloat(d.net_units||0) >= 0 ? 'var(--green)' : 'var(--red)'}">${_fmtSigned(d.net_units, 'u')}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">SETTLED</div><div class="sfs-stat-v">${parseInt(d.settled_bets || 0, 10)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">CLV (AVG)</div><div class="sfs-stat-v" style="color:${parseFloat(d.avg_clv_cents||0) > 0 ? 'var(--green)' : parseFloat(d.avg_clv_cents||0) < 0 ? 'var(--red)' : 'var(--muted)'}">${_fmtCLV(d.avg_clv_cents)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">SPORTS</div><div class="sfs-stat-v">${parseInt(d.distinct_sports || 0, 10)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">BET TYPES</div><div class="sfs-stat-v">${parseInt(d.distinct_bet_types || 0, 10)}</div></div>
      <div class="sfs-stat"><div class="sfs-stat-l">ACTIVE</div><div class="sfs-stat-v">${parseInt(d.active_days || 0, 10)}d</div></div>
    </div>`;

  const clvEducation = `
    <div class="glass-inset sfs-edu">
      <div class="sfs-edu-head">
        <span class="sfs-edu-title">📈 CLV · Closing Line Value</span>
        <span class="sfs-edu-val" style="color:${parseFloat(d.avg_clv_cents||0) > 0 ? 'var(--green)' : 'var(--muted)'}">${_fmtCLV(d.avg_clv_cents)}</span>
      </div>
      <div class="sfs-edu-body">Beating the close by <b>${_fmtCLV(d.avg_clv_cents)}</b> means you're getting better prices than the market thinks fair. Over time, positive CLV is the single best signal of sharp picks — more predictive than win rate.</div>
      <div class="sfs-edu-foot">Time-decayed: 90d = 100%, 90-180d = 50%, older = 25%</div>
    </div>`;

  const ctas = `
    <div class="sfs-ctas">
      <a href="/picks/new" class="btn btn-gold">Lock another pick →</a>
      <a href="/sports-predictors" class="btn btn-ghost">See leaderboard</a>
    </div>`;

  return `
    <div class="sfs-head">
      <div>
        <div class="sfs-eyebrow">FLEX SCORE FOR SPORTS · v1</div>
        <div class="sfs-title">${qualifies ? 'Ranked' : 'Tracking'} across <b>${parseInt(d.distinct_sports || 0, 10)}</b> sport${(d.distinct_sports || 0) === 1 ? '' : 's'}</div>
      </div>
      ${scoreHtml}
    </div>
    ${components}
    ${coachHtml}
    ${stats}
    ${clvEducation}
    ${ctas}
  `;
}

// ── Challenge flow — opens modal for counter-prediction, posts to X ──
function openChallenge() {
  const m = document.getElementById('challengeModal');
  if (!m) return;
  m.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  m.onclick = e => { if (e.target === m) closeChallenge(); };
  setTimeout(() => { const t = document.getElementById('challengeThesis'); if (t) t.focus(); }, 50);
}
function closeChallenge() {
  const m = document.getElementById('challengeModal');
  if (!m) return;
  m.style.display = 'none';
  document.body.style.overflow = '';
}
function submitChallenge() {
  const input = document.getElementById('challengeThesis');
  const thesis = (input?.value || '').trim();
  if (!thesis) { input?.focus(); return; }
  const u = document.querySelector('.hero-name')?.childNodes[0]?.textContent?.trim() || 'this predictor';
  const handle = (document.querySelector('.hero-username')?.textContent || '').trim();
  const tag = handle.startsWith('@') ? handle : '';
  const text = `⚔️ Challenging ${tag || u} on @hyperflex:\n\n"${thesis}"\n\nWinner takes the track record.\nhyperflex.network/m/${window._profileUserId}`;
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
  closeChallenge();
  if (input) input.value = '';
}

function showFlexScoreInfo() {
  _showInfoModal('Flex Score', `
    <p style="margin:0 0 10px">A single 0–100 number measuring how sharp a trader is.</p>
    <p style="margin:0 0 10px">It's calculated from <strong style="color:var(--gold)">Brier scores</strong> on every resolved take — how close the entry price was to the real outcome, weighted by how confident the call was.</p>
    <div style="background:rgba(201,146,13,0.06);border:1px solid rgba(201,146,13,0.25);border-radius:8px;padding:10px 12px;margin:10px 0;font-family:var(--mono);font-size:11px;color:var(--text-soft)">
      70+ → 🎯 Oracle tier<br>
      60+ → 🎯 Sharp<br>
      50+ → 📊 Solid<br>
      &lt;50 → 🎲 Speculator
    </div>
    <p style="margin:0;color:var(--muted);font-size:12px">Needs at least 3 resolved takes to lock in.</p>
  `);
}

function showFlexPointsInfo() {
  _showInfoModal('⚡ FLEX Points', `
    <p style="margin:0 0 10px">Reputation currency earned by posting takes, winning predictions, and getting agrees from other traders.</p>
    <p style="margin:0 0 10px;color:var(--text-soft)">Every correct call pays out in FLEX. Every take that racks up agrees earns FLEX. It's a running score of how much signal you've contributed to the network.</p>
    <p style="margin:0;color:var(--muted);font-size:12px">Can't be bought — only earned.</p>
  `);
}

async function load() {
  const page = document.getElementById('page');
  try {
    const res = await fetch(`${API}/api/member/${userId}`);
    if (res.status === 404) {
      // Step 2 failed: handle resolved to a user_id but /api/member returned 404.
      // This usually means a stale/orphaned user row — the handle exists but
      // the full profile record doesn't. Log the specific user_id for debug.
      console.warn('[member] /api/member 404 for user_id=', userId);
      page.innerHTML = `<div class="error-state"><div class="error-icon">🔍</div><div class="error-msg">Profile data missing</div><div class="error-sub">User <code style="font-family:'Space Mono',monospace;font-size:12px;color:var(--gold)">${userId}</code> resolved from the handle but the profile record is empty. <br>This is usually a stale-row issue — contact support.</div></div>`;
      return;
    }
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const { user, stats, communities, recent_wins, take_stats, recent_takes, polymarket_stats, recent_trades } = data;
    const pStats = polymarket_stats || { total_trades:0, open_positions:0, closed_wins:0, closed_losses:0, volume_usd:0, pnl_usd:0, win_rate:0 };
    const pTrades = recent_trades || [];

    // Synchronous owner check — decoded JWT's userId must match the profile
    // we're rendering. Used to show the "post your first take" empty-state
    // for the profile owner only (visitors see nothing if there are no takes).
    let isOwner = false;
    try {
      const ownTok = localStorage.getItem('hf_token');
      if (ownTok) {
        const payload = JSON.parse(atob(ownTok.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        const selfId = payload.userId || payload.sub || payload.id;
        if (selfId && String(selfId) === String(userId)) isOwner = true;
      }
    } catch {}

    const winPct = stats.settled_predictions > 0 ? Math.round((stats.wins / stats.settled_predictions) * 100) : 0;
    const avgColor = winPct >= 70 ? '#c9920d' : winPct >= 55 ? '#22c55e' : winPct >= 40 ? '#60a5fa' : '#ef4444';

    // Build wins list as premium cards

    // Whale-specific data (needed for tier calculation)
    const isWhale = user.is_whale || false;
    const whaleRank = user.whale_rank;
    const whalePnl = user.whale_pnl;
    const walletAddr = user.polymarket_address || '';
    const shortWallet = walletAddr ? (walletAddr.slice(0, 6) + '...' + walletAddr.slice(-4)) : '';
    const pnlDisplay = whalePnl != null ? (whalePnl >= 0 ? '+$' + (whalePnl >= 1000000 ? (whalePnl/1000000).toFixed(1) + 'M' : whalePnl >= 1000 ? Math.round(whalePnl/1000) + 'K' : Math.round(whalePnl)) : '-$' + Math.abs(whalePnl >= 1000 ? Math.round(whalePnl/1000) + 'K' : Math.round(whalePnl))) : null;

    const whaleAvatarColor = isWhale ? '#fff' : avgColor;

    // Polymarket-native tier system — optimised for how real traders behave.
    // Measures: realized P&L × close-at-profit rate × sample size. Does NOT
    // penalise traders for exiting before resolution (that's capital efficiency,
    // not weakness). FLEXIN is the top tier for six-figure P&L or top-50 whales.
    const polyPnl       = pStats.pnl_usd || 0;
    const closedCount   = (pStats.closed_wins || 0) + (pStats.closed_losses || 0);
    const closeRate     = closedCount > 0 ? Math.round((pStats.closed_wins / closedCount) * 100) : 0;
    const positionCount = pStats.total_trades || 0;
    const isTopWhale    = isWhale && whaleRank && whaleRank <= 50;

    // Hero P&L resolution — if a verified top-50 whale is momentarily red
    // on one open position but has a substantial lifetime track record,
    // showing the small loss as the hero undersells them badly (saw a
    // rank-#2 / +$736k whale display "-$25K" as the hero because one
    // open bet was underwater). Prefer lifetime whale_pnl when it's
    // materially larger than current open P&L AND positive. Keeps honest
    // losers displaying losses, but stops the hero from hiding a $700k
    // lifetime track record behind a $25k floating drawdown.
    const lifetimePnl = window._profilePayload && window._profilePayload.whale_pnl != null
      ? Number(window._profilePayload.whale_pnl)
      : (pStats.whale_pnl != null ? Number(pStats.whale_pnl) : null);
    const displayPnl = (lifetimePnl != null && lifetimePnl > 0 && lifetimePnl > Math.abs(polyPnl) * 3)
      ? lifetimePnl
      : polyPnl;
    const displayPnlIsLifetime = displayPnl !== polyPnl;

    let tierEmoji, tierLabel, tierColorCss, rankDesc, rankClass;
    let tierProgress = null; // { current, target } only set for 'building' state

    if (polyPnl >= 200000) {

      rankDesc = 'Six-figure P&L or top-50 Polymarket all-time.';

      tierEmoji = '🦈'; tierLabel = 'SHARK'; tierColorCss = 'var(--blue)'; rankClass = 'shark';

    } else if (polyPnl >= 500 && closeRate >= 55 && positionCount >= 10) {

    const pnlFmt = (pStats.pnl_usd >= 0 ? '+$' : '-$') + (Math.abs(pStats.pnl_usd) >= 1000 ? Math.round(Math.abs(pStats.pnl_usd)/1000) + 'K' : Math.round(Math.abs(pStats.pnl_usd)));
    const flexPointsFmt = (stats.flex_points || 0) >= 1000 ? ((stats.flex_points/1000).toFixed(1) + 'K') : (stats.flex_points || 0);

        </div>

      <!-- Tier Hero Card -->

            <div class="tier-desc">${rankDesc}</div>

          <div class="tier-actions">
            <a href="/passport/${userId}" class="btn btn-gold">🛂 Passport</a>
            <button class="btn btn-ghost" onclick="window.open('https://x.com/intent/tweet?text='+encodeURIComponent('${isBuilding ? 'Building my Polymarket track record on HYPERFLEX' : 'I&apos;m ' + tierLabel + ' on HYPERFLEX' + (pStats.pnl_usd > 0 ? ' · +$' + Math.round(pStats.pnl_usd).toLocaleString() + ' realized P&L' : '')}\\n\\nhyperflex.network/m/${userId}'),'_blank')">🐦 Flex on X</button>

            <span class="badge" style="background:${take_stats.accuracy >= 60 ? 'rgba(0,230,138,0.12)' : take_stats.accuracy >= 50 ? 'rgba(77,159,255,0.12)' : 'rgba(255,77,106,0.12)'};color:${take_stats.accuracy >= 60 ? 'var(--green)' : take_stats.accuracy >= 50 ? 'var(--blue)' : 'var(--red)'};border-color:transparent">${take_stats.accuracy}% take accuracy</span>
            <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${take_stats.correct || 0}W / ${take_stats.incorrect || 0}L</span>
          </div>` : ''}
          ${(recent_takes || []).map(t => {

                  <span class="side ${sideUp === 'YES' ? 'side-yes' : 'side-no'}">${sideUp}</span>

// Resolve handle-or-userId first, then hydrate everything that depends on it.
(async function boot() {
  userId = await _resolveProfileUserId();
  window._profileUserId = userId;
  if (!userId) {
    // Step 1 failed: the @handle in the URL doesn't map to any user row.
    // Log the raw handle + API response shape so the failure is debuggable.
    const handleFromPath = location.pathname.startsWith('/@')
      ? location.pathname.slice(2).split('/')[0] : null;
    console.warn('[member] handle resolution failed for:', handleFromPath);
    const msg = handleFromPath
      ? `@${handleFromPath} isn't claimed by anyone. Sign in + claim it in your Settings.`
      : `This profile URL doesn't exist.`;
    document.getElementById('page').innerHTML =
      `<div class="error-state"><div class="error-icon">🔍</div><div class="error-msg">Handle not found</div><div class="error-sub">${msg}</div></div>`;
    return;
  }
  load().then(loadFollowStatus).then(showCreatorDashPill).then(() => { stripEditName(); enrichFromLivePolymarket(); renderFlexScoreCard(); });
})();

// Defensive: a stray "Edit Name" button has been showing up on some
// deploys (likely from a cached or injected override). Strip it if present.
function stripEditName() {
  document.querySelectorAll('button, a').forEach(el => {
    const t = (el.textContent || '').trim().toLowerCase();
    if (t === '✏️ edit name' || t === 'edit name' || t.endsWith('edit name')) el.remove();
  });
}

// If the DB has zero Polymarket trades but the user has a connected wallet,
// fetch live positions from Polymarket's data API and update the stat grid
// + Trades tab. Keeps the profile truthful when sync hasn't caught up yet.
async function enrichFromLivePolymarket() {
  try {
    const res = await fetch(`${API}/api/member/${userId}`);
    if (!res.ok) { console.log('[enrich] member fetch failed', res.status); return; }
    const data = await res.json();
    const addr = data?.user?.polymarket_address;
    console.log('[enrich] userId=', userId, 'addr=', addr, 'db_trades=', data?.polymarket_stats?.total_trades);
    if (!addr) { console.log('[enrich] no polymarket_address — skipping'); return; }

    // Always attempt a live fetch. The DB reflects only what our internal
    // sync has logged (polymarket_trades table), which is often incomplete
    // for newly-connected wallets. Live data from the Polymarket data-api
    // is the source of truth.
    let positions = [];
    let serverTotals = null;
    try {
      const posRes = await fetch(`${API}/api/polymarket/positions/${addr}`);
      if (posRes.ok) {
        const body = await posRes.json();
        if (Array.isArray(body.positions)) positions = body.positions;
        if (body.totals) serverTotals = body.totals;
      } else {
        console.log('[enrich] polymarket positions fetch', posRes.status);
      }
    } catch (e) { console.warn('[enrich] polymarket fetch error', e); }

    // Fallback: cached_positions from our hourly sync (same source the dashboard reads)
    if (!positions.length) {
      try {
        const pRes = await fetch(`${API}/api/predictors/${userId}/portfolio`);
        if (pRes.ok) {
          const pBody = await pRes.json();
          const cached = (pBody.cached_positions || []).filter(p => (p.platform || '').toLowerCase() === 'polymarket');
          positions = cached.map(p => ({
            question: p.market_title || p.question,
            side: p.side,
            shares: parseFloat(p.shares) || 0,
            current_price: parseFloat(p.current_price) || 0,
            cash_value: parseFloat(p.cash_value || p.current_value) || 0,
            cost_basis: parseFloat(p.cost_basis || p.initial_value) || 0,
            pnl: parseFloat(p.pnl) || 0,
            market_url: p.market_url || null,
            slug: p.slug || p.event_slug || p.market_slug || p.external_id || null,
          }));
          console.log('[enrich] fallback to cached_positions, count=', positions.length);
        }
      } catch (e) { console.warn('[enrich] cached portfolio error', e); }
    }

    console.log('[enrich] final position count=', positions.length);
    if (!positions.length) {
      // Truthful empty state: the user has a connected wallet but no positions.
      const vSub = document.getElementById('statVolumeSub');
      const pSub = document.getElementById('statPnlSub');
      if (vSub) vSub.textContent = 'No positions yet';
      if (pSub) pSub.textContent = '';
      return;
    }

    // Start from the DB-derived polymarket_stats that came with the
    // /api/member response — those reflect the polymarket_trades table
    // (the same source the admin dashboard reads). Then OVERLAY the
    // live Polymarket totals ONLY where they beat the DB: live has
    // fresher open-position state, DB has deeper trade history.
    // Previously the live fetch clobbered everything, so a wallet with
    // 100 trades in our DB but 1 open position on Polymarket rendered
    // as "1 position · $25 volume." Now the max of the two wins.
    const dbStats = (typeof data !== 'undefined' && data && data.polymarket_stats) ? data.polymarket_stats : null;
    let vol = 0, pnl = 0, open = 0, wins = 0, losses = 0;
    if (serverTotals) {
      vol    = Number(serverTotals.total_volume_usd) || 0;
      pnl    = (Number(serverTotals.realized_pnl) || 0) + (Number(serverTotals.unrealized_pnl) || 0);
      open   = Number(serverTotals.open_positions) || 0;
      wins   = Number(serverTotals.wins) || 0;
      losses = Number(serverTotals.losses) || 0;
    } else {
      for (const p of positions) {
        const size = Math.max(
          Math.abs(p.cost_basis || 0),
          Math.abs(p.cash_value || 0),
          Math.abs(p.pnl || 0),
          (p.shares || 0) * (p.current_price || 0)
        );
        vol += size;
        pnl += p.pnl || 0;
        if ((p.cash_value || 0) > 0.01) open++;
        if (p.pnl > 0) wins++; else if (p.pnl < 0) losses++;
      }
    }
    // Overlay DB stats where they exceed the live fetch. polymarket_trades
    // (our append-only log — what the admin dashboard surfaces) is the
    // ground truth for trade count + volume. Live positions is the
    // ground truth for open/unrealised. Take the max of each so neither
    // source silently loses to the other.
    let totalPositions = positions.length;
    if (dbStats) {
      const dbTotal   = Number(dbStats.total_trades  || 0);
      const dbVol     = Number(dbStats.volume_usd    || 0);
      const dbWins    = Number(dbStats.closed_wins   || 0);
      const dbLosses  = Number(dbStats.closed_losses || 0);
      const dbPnl     = Number(dbStats.pnl_usd       || 0);
      if (dbTotal   > totalPositions) totalPositions = dbTotal;
      if (dbVol     > vol)            vol    = dbVol;
      if (dbWins    > wins)           wins   = dbWins;
      if (dbLosses  > losses)         losses = dbLosses;
      // PnL: prefer whichever source has larger magnitude — reflects the
      // real realised+unrealised total over the full history.
      if (Math.abs(dbPnl) > Math.abs(pnl)) pnl = dbPnl;
    }

    const volFmt = vol >= 1e6 ? '$' + (vol/1e6).toFixed(1) + 'M' : vol >= 1e3 ? '$' + Math.round(vol/1e3) + 'K' : '$' + Math.round(vol);
    const pnlFmt = (pnl >= 0 ? '+$' : '-$') + (Math.abs(pnl) >= 1e3 ? Math.round(Math.abs(pnl)/1e3) + 'K' : Math.round(Math.abs(pnl)));

    const vEl = document.getElementById('statVolume');
    const vSub = document.getElementById('statVolumeSub');
    const pEl = document.getElementById('statPnl');
    const pSub = document.getElementById('statPnlSub');
    if (vEl) vEl.textContent = volFmt;
    if (vSub) vSub.textContent = totalPositions + ' positions';
    if (pEl) { pEl.textContent = pnlFmt; pEl.style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)'; }
    if (pSub) pSub.textContent = wins + 'W / ' + losses + 'L';

    // Recompute tier from live data and re-render the tier card. The initial
    // template uses DB stats (often empty for newly-connected wallets) —
    // without this, users stuck on 'Building track record · 0/5' forever.
    recomputeTierFromLive({ pnl, wins, losses, positionCount: positions.length, isTopWhale: data.user.is_whale && data.user.whale_rank && data.user.whale_rank <= 50 });

    // Also render the Trades tab with live positions
    const list = document.getElementById('tradesList');
    if (list) {
      const settledSample = wins + losses;
      const wr = settledSample > 0 ? Math.round(wins / settledSample * 100) : 0;
      const wrBadge = settledSample >= 5
        ? `<span class="badge" style="background:rgba(0,230,138,0.12);color:var(--green);border-color:rgba(0,230,138,0.3)">${wr}% win rate</span>`
        : `<span class="badge" style="background:var(--surface);color:var(--text-soft);border-color:var(--border)">— win rate <span style="opacity:0.6">· ${Math.max(0,5-settledSample)} more settled</span></span>`;
      list.innerHTML = `
        <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          ${wrBadge}
          <span class="badge" style="background:rgba(77,159,255,0.12);color:var(--blue);border-color:rgba(77,159,255,0.3)">${open} open</span>
          <span class="badge" style="background:var(--surface);color:var(--text-soft);border-color:var(--border)">${positions.length} positions</span>
          <span class="badge" style="background:rgba(168,85,247,0.12);color:var(--purple);border-color:rgba(168,85,247,0.3)">🔴 LIVE</span>
        </div>
        ${positions.slice(0, 40).map(p => {
          const sideUp = (p.side || '').toUpperCase();
          const pct = Math.round((p.current_price || 0) * 100);
          // Build a Polymarket URL even when the position didn't carry
          // one. Priority: explicit market_url → event/slug page →
          // search fallback using the question text. Whole card is
          // clickable so users don't have to aim at the title only.
          const qText = p.question || '';
          const slug = p.slug || p.event_slug || p.market_slug || null;
          const url = p.market_url
            || (slug ? `https://polymarket.com/event/${slug}` : null)
            || (qText ? `https://polymarket.com/markets?q=${encodeURIComponent(qText)}` : 'https://polymarket.com');
          return `<a class="card" href="${url}" target="_blank" rel="noopener" style="display:block;text-decoration:none;color:inherit;transition:border-color .15s" onmouseover="this.style.borderColor='rgba(201,146,13,0.35)'" onmouseout="this.style.borderColor=''">
            <div style="display:flex;align-items:flex-start;gap:8px">
              <span class="side ${sideUp === 'YES' ? 'side-yes' : 'side-no'}">${sideUp}</span>
              <span class="card-q">${qText.replace(/</g,'&lt;')}</span>
            </div>
            <div class="card-meta">
              <span>$${Math.round(p.cash_value || 0).toLocaleString()}</span>
              <span>@${pct}¢</span>
              <span class="badge" style="background:${p.pnl >= 0 ? 'rgba(0,230,138,0.12)' : 'rgba(255,77,106,0.12)'};color:${p.pnl >= 0 ? 'var(--green)' : 'var(--red)'};border-color:transparent;padding:1px 6px">${p.pnl >= 0 ? '+' : ''}$${Math.round(p.pnl || 0).toLocaleString()}</span>
              <span style="margin-left:auto;font-family:var(--mono,monospace);font-size:10px;color:var(--text-faint);letter-spacing:0.06em">↗ POLYMARKET</span>
            </div>
          </a>`;
        }).join('')}`;
    }

    // Update the tab count badge
    const tradesTabBtn = document.querySelector('.tab-btn[onclick*="trades"]');
    if (tradesTabBtn && !tradesTabBtn.querySelector('.tab-count')) {
      tradesTabBtn.insertAdjacentHTML('beforeend', ` <span class="tab-count">${positions.length}</span>`);
    }
  } catch (e) { console.warn('[live-polymarket]', e); }
}

// Recompute + re-render tier using live Polymarket numbers. Mirrors the
// logic in load()'s template but runs after enrichFromLivePolymarket so
// the card reflects actual positions, not an empty polymarket_trades table.
function recomputeTierFromLive({ pnl, wins, losses, positionCount, isTopWhale }) {
  const closedCount = wins + losses;
  const closeRate = closedCount > 0 ? Math.round((wins / closedCount) * 100) : 0;
  let tierEmoji, tierLabel, tierColorCss, rankDesc, tierProgress = null;
  if (pnl >= 200000) {
    tierEmoji = '💎'; tierLabel = 'FLEXIN'; tierColorCss = 'var(--gold)';
    rankDesc = 'Quarter-million+ realized P&L. Top 0.05% of Polymarket.';
  } else if (pnl >= 100000 || isTopWhale) {
    tierEmoji = '🐋'; tierLabel = 'WHALE'; tierColorCss = 'var(--purple)';
    rankDesc = 'Six-figure P&L or top-50 Polymarket all-time.';
  } else if (pnl >= 25000 && closeRate >= 60 && positionCount >= 50) {
    tierEmoji = '🦈'; tierLabel = 'SHARK'; tierColorCss = 'var(--blue)';
    rankDesc = 'Institutional-sized moves with sharp exit discipline.';
  } else if (pnl >= 5000 && closeRate >= 60 && positionCount >= 25) {
    tierEmoji = '🎯'; tierLabel = 'SHARP'; tierColorCss = 'var(--green)';
    rankDesc = 'Consistent profits, strong market reads.';
  } else if (pnl >= 500 && closeRate >= 55 && positionCount >= 10) {
    tierEmoji = '✅'; tierLabel = 'PROFITABLE'; tierColorCss = 'var(--green)';
    rankDesc = 'Trading at a real profit — the track record is working.';
  } else if (closedCount >= 5) {
    tierEmoji = '📊'; tierLabel = 'TRADER'; tierColorCss = 'var(--text-soft)';
    rankDesc = 'Actively trading Polymarket — building toward profit.';
  } else {
    tierEmoji = '🌱'; tierLabel = 'Building track record'; tierColorCss = 'var(--text-soft)';
    tierProgress = { current: closedCount, target: 5 };
    rankDesc = `${closedCount}/5 closed positions before your first tier unlocks`;
  }

  // Re-render the tier card's inner body
  const card = document.querySelector('.tier-card');
  const inner = document.querySelector('.tier-card .tier-inner');
  if (card) card.style.setProperty('--tier-color', tierColorCss);
  if (!inner) return;

  const pnlBody = pnl >= 0 ? '+' : '-';
  const pnlAbs = Math.abs(pnl);
  const pnlFmt = pnlBody + '$' + (pnlAbs >= 1000000 ? (pnlAbs/1000000).toFixed(1)+'M' : pnlAbs >= 1000 ? Math.round(pnlAbs/1000)+'K' : Math.round(pnlAbs));
  const barPct = isBuilding ? Math.round((tierProgress.current / tierProgress.target) * 100) : Math.min(100, closeRate);

  inner.innerHTML = `
    <div class="tier-emoji">${tierEmoji}</div>
    <div class="tier-label" style="color:${tierColorCss}">${tierLabel}</div>
    ${isBuilding
      ? `<div class="tier-pct" style="color:${tierColorCss};font-size:44px">${tierProgress.current}<span style="opacity:0.45">/${tierProgress.target}</span></div>
         <div class="tier-desc">Close ${tierProgress.target - tierProgress.current} more position${(tierProgress.target - tierProgress.current) === 1 ? '' : 's'} to unlock your first tier.</div>
         <div class="tier-record">Tiers measure realized P&amp;L, close-at-profit rate, and trading volume.</div>`
      : `<div class="tier-pct" style="color:${tierColorCss}">${pnlFmt}</div>
         <div class="tier-desc">${rankDesc}</div>
         <div class="tier-record">${closeRate}% close-at-profit · ${closedCount} closed · ${positionCount} total positions</div>`}
    <div class="tier-bar"><div class="tier-bar-fill" style="width:${barPct}%;background:${tierColorCss}"></div></div>
    <div class="tier-actions">
      <a href="/passport/${window._profileUserId || userId}" class="btn btn-gold">🛂 Passport</a>
      <button class="btn btn-ghost" onclick="window.open('https://x.com/intent/tweet?text='+encodeURIComponent('${isBuilding ? 'Building my Polymarket track record on HYPERFLEX' : 'I&apos;m ' + tierLabel + ' on HYPERFLEX' + (pnl > 0 ? ' · +$' + Math.round(pnl).toLocaleString() + ' realized P&L' : '')}\\n\\nhyperflex.network/m/${window._profileUserId || userId}'),'_blank')">🐦 Flex on X</button>
    </div>
  `;

  // Also inject/refresh the inline tier pill next to the display_name
  if (!isBuilding) {
    const name = document.querySelector('.hero-name');
    const existing = name && name.querySelector('.tier-pill');
    if (existing) existing.remove();
    if (name) {
      const tint = tierColorCss === 'var(--gold)' ? ['rgba(245,166,35,0.15)','rgba(245,166,35,0.4)']
                 : tierColorCss === 'var(--purple)' ? ['rgba(168,85,247,0.15)','rgba(168,85,247,0.4)']
                 : tierColorCss === 'var(--blue)' ? ['rgba(77,159,255,0.15)','rgba(77,159,255,0.4)']
                 : tierColorCss === 'var(--green)' ? ['rgba(0,230,138,0.15)','rgba(0,230,138,0.4)']
                 : ['rgba(255,255,255,0.06)','var(--border)'];
      name.insertAdjacentHTML('beforeend', `<span class="tier-pill" style="background:${tint[0]};color:${tierColorCss};border:1px solid ${tint[1]};font-family:var(--mono);font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:0.06em;white-space:nowrap;vertical-align:middle;display:inline-flex;align-items:center;gap:4px" title="${rankDesc.replace(/"/g,'&quot;')}">${tierEmoji} ${tierLabel}</span>`);
    }
  }
}

// ── P&L ANALYTICS ─────────────────────────────────────────────────────────────
async function loadAnalytics(userId) {
  try {
    const res = await fetch(`/api/predictors/${userId}/analytics`);
    const data = await res.json();
    if (!data.platforms) return;
    document.getElementById('analyticsSection').style.display = 'block';

    // Platform stat cards — gate win rate on sample size. A "100% win
    // rate" on 1 closed position is technically true but statistically
    // meaningless; show "—" until the user has at least 5 settled
    // events on that platform. Keeps the stat honest and stops naive
    // readers from treating single-pick wallets as flawless.
    const MIN_SAMPLES = 5;
    const platformColors = { hyperflex: '#c9920d', polymarket: '#6366f1', kalshi: '#8b5cf6', manifold: '#10b981' };
    const platformLabels = { hyperflex: 'HYPERFLEX', polymarket: 'Polymarket', kalshi: 'Kalshi', manifold: 'Manifold' };
    document.getElementById('platformCards').innerHTML = Object.entries(data.platforms)
      .filter(([, p]) => p.total > 0)
      .map(([name, p]) => {
        const settledCount = p.wins + p.losses;
        const hasSample = settledCount >= MIN_SAMPLES;
        const wr = hasSample ? Math.round(p.wins / settledCount * 100) : null;
        const wrDisplay = hasSample
          ? `<div style="font-size:22px;font-weight:700;color:#fff">${wr}%</div>
             <div style="font-size:11px;color:#888">win rate</div>`
          : `<div style="font-size:22px;font-weight:700;color:#888">—</div>
             <div style="font-size:10px;color:#666" title="Need ${MIN_SAMPLES - settledCount} more settled positions for a statistically meaningful win rate">${Math.max(0, MIN_SAMPLES - settledCount)} more settled</div>`;
        const pnlColor = p.pnl >= 0 ? '#10b981' : '#ef4444';
        return `<div style="background:#1a1916;border:1px solid ${platformColors[name]}44;border-radius:10px;padding:14px 18px;min-width:130px">
          <div style="font-size:11px;color:${platformColors[name]};font-weight:700;margin-bottom:6px">${platformLabels[name] || name}</div>
          ${wrDisplay}
          <div style="font-size:13px;font-weight:700;color:${pnlColor};margin-top:4px">${p.pnl >= 0 ? '+' : ''}${Math.round(p.pnl)} pts</div>
          <div style="font-size:11px;color:#555">${p.total} positions</div>
        </div>`;
      }).join('');

    // Sharp score badge
    const sharpEl = document.getElementById('sharpBadge');
    if (sharpEl) {
      sharpEl.textContent = `⚡ ${data.sharp_score} Sharp Score`;
      sharpEl.style.display = 'inline-block';
    }

    // Calibration chart — bar chart per 10%-probability bucket.
    // Empty state when there's no actual data (bucket total=0 across
    // the board) or the user has too few settled picks to be
    // meaningful. Previously we were rendering empty bars + an
    // "actual vs expected" legend on canvases with zero data, which
    // looked broken. Now we print a clear copy line instead.
    const calCtx = document.getElementById('calibrationChart')?.getContext('2d');
    if (calCtx) {
      calCtx.clearRect(0, 0, 300, 180);
      const calData = (data.calibration || []).filter(c => c.predicted > 0);
      const anyActual = calData.some(c => c.actual !== null && c.total > 0);
      if (!anyActual) {
        calCtx.fillStyle = '#666';
        calCtx.font = '11px monospace';
        calCtx.textAlign = 'center';
        calCtx.fillText('Not enough settled picks', 150, 80);
        calCtx.fillStyle = '#444';
        calCtx.font = '9px monospace';
        calCtx.fillText('Calibration needs a meaningful sample', 150, 98);
        calCtx.textAlign = 'start';
      } else {
        const barW = calData.length > 0 ? 240 / calData.length : 30;
        calData.forEach((c, i) => {
          const x = 30 + i * (barW + 4);
          const expectedH = (c.predicted / 100) * 140;
          const actualH = c.actual !== null ? (c.actual / 100) * 140 : 0;
          calCtx.fillStyle = '#c9920d44';
          calCtx.fillRect(x, 150 - actualH, barW - 2, actualH);
          calCtx.fillStyle = '#888';
          calCtx.fillRect(x, 150 - expectedH, barW - 2, 2);
          calCtx.fillStyle = '#666';
          calCtx.font = '9px monospace';
          calCtx.fillText(c.predicted + '%', x, 165);
        });
        calCtx.fillStyle = '#888';
        calCtx.font = '10px monospace';
        calCtx.fillText('gold=actual  gray=expected', 10, 178);
      }
    }

    // P&L line chart — empty state when the timeline is flat zero
    // (no HFX settlements). Before we were drawing a perfectly flat
    // line at y=0 which looks like nothing rendered.
    const pnlCtx = document.getElementById('pnlChart')?.getContext('2d');
    const hasMovement = (data.timeline || []).some(t => Math.abs(t.pnl) > 0.001);
    if (pnlCtx && (!data.timeline || data.timeline.length < 2 || !hasMovement)) {
      pnlCtx.clearRect(0, 0, 300, 180);
      pnlCtx.fillStyle = '#666';
      pnlCtx.font = '11px monospace';
      pnlCtx.textAlign = 'center';
      pnlCtx.fillText('No realised P&L yet', 150, 80);
      pnlCtx.fillStyle = '#444';
      pnlCtx.font = '9px monospace';
      pnlCtx.fillText('Chart shows last 30d of HFX settlements', 150, 98);
      pnlCtx.textAlign = 'start';
    } else if (pnlCtx && data.timeline.length > 1) {
      const vals = data.timeline.map(t => t.pnl);
      const min = Math.min(...vals, 0);
      const max = Math.max(...vals, 0);
      const range = max - min || 1;
      pnlCtx.clearRect(0, 0, 300, 180);
      pnlCtx.strokeStyle = data.total_pnl >= 0 ? '#10b981' : '#ef4444';
      pnlCtx.lineWidth = 2;
      pnlCtx.beginPath();
      data.timeline.forEach((t, i) => {
        const x = 10 + (i / (data.timeline.length - 1)) * 280;
        const y = 160 - ((t.pnl - min) / range) * 140;
        i === 0 ? pnlCtx.moveTo(x, y) : pnlCtx.lineTo(x, y);
      });
      pnlCtx.stroke();
      // Zero line
      const zeroY = 160 - ((0 - min) / range) * 140;
      pnlCtx.strokeStyle = '#333';
      pnlCtx.lineWidth = 1;
      pnlCtx.setLineDash([4, 4]);
      pnlCtx.beginPath();
      pnlCtx.moveTo(10, zeroY);
      pnlCtx.lineTo(290, zeroY);
      pnlCtx.stroke();
    }
  } catch(e) { console.warn('analytics', e); }
}

let _isFollowing = false;

async function loadFollowStatus() {
  try {
    const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');

    const r = await fetch(`${API}/api/predictors/${userId}/follow-status`, { headers });

      btn.classList.toggle('btn-ghost', _isFollowing);

// Followers modal — opens from the profile header follower-count chip.
// Renders avatar + name + handle/wallet + FLEX score + "followed Nh
// ago" for each follower. Most recent first. Public — anyone can view,
// but most useful for the profile owner to see who's followed them.
async function openFollowersModal() {
  var modal = document.getElementById('followersModal');
  var list  = document.getElementById('followersModalList');
  var count = document.getElementById('followersModalCount');
  if (!modal) return;
  modal.style.display = 'flex';
  if (list) list.innerHTML = '<div style="padding:24px 8px;text-align:center;color:var(--text-faint);font-family:var(--mono,monospace);font-size:11px;letter-spacing:0.08em">LOADING…</div>';
  if (count) count.textContent = '—';
  try {
    var res = await fetch(`${API}/api/users/${encodeURIComponent(userId)}/followers?limit=100`);
    if (!res.ok) throw new Error('fetch ' + res.status);
    var d = await res.json();
    var rows = d.followers || [];
    if (count) count.textContent = rows.length.toLocaleString() + (rows.length === 1 ? ' follower' : ' followers');
    if (!rows.length) {
      list.innerHTML = '<div style="padding:40px 8px;text-align:center;color:var(--text-faint);font-family:var(--mono,monospace);font-size:11px;letter-spacing:0.08em">NO FOLLOWERS YET</div>';
      return;
    }
    var escape = function(s) { return String(s == null ? '' : s).replace(/[&<>"\']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); };
    list.innerHTML = rows.map(function(u) {
      var name = escape(u.display_name || u.username || 'Trader');
      var handle = u.username ? '@' + escape(u.username) : (u.polymarket_address ? escape(u.polymarket_address.slice(0, 6) + '…' + u.polymarket_address.slice(-4)) : '');
      var flex = u.flex_score_90d != null ? u.flex_score_90d : null;
      var initial = (u.display_name || u.username || '?')[0].toUpperCase();
      var when = '';
      try {
        if (u.followed_at) {
          var diff = Date.now() - new Date(u.followed_at).getTime();
          var mins = Math.floor(diff / 60000);
          if (mins < 1) when = 'just now';
          else if (mins < 60) when = mins + 'm ago';
          else if (mins < 1440) when = Math.floor(mins / 60) + 'h ago';
          else when = Math.floor(mins / 1440) + 'd ago';
        }
      } catch (e) {}
      var flexHtml = flex != null
        ? '<span style="font-family:var(--mono,monospace);font-size:12px;font-weight:900;color:var(--gold,#c9920d);letter-spacing:-0.01em;margin-left:auto">' + flex + '</span>'
        : '';
      var verifyHtml = u.wallet_verified ? ' <span style="display:inline-block;margin-left:4px;font-size:10px;color:#4d9fff">✓</span>' : '';
      return '<a href="/m/' + encodeURIComponent(u.id) + '" style="display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:10px;text-decoration:none;color:inherit;transition:background .15s" onmouseover="this.style.background=\'rgba(255,255,255,0.04)\'" onmouseout="this.style.background=\'transparent\'">' +
        '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#4d9fff);padding:1.5px;flex-shrink:0"><div style="width:100%;height:100%;border-radius:50%;background:#16161f;display:flex;align-items:center;justify-content:center;font-family:\'Inter\',sans-serif;font-size:14px;font-weight:800;color:var(--text)">' + escape(initial) + '</div></div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-size:14px;font-weight:700;color:var(--text);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + name + verifyHtml + '</div>' +
          '<div style="font-family:var(--mono,monospace);font-size:11px;color:var(--muted);margin-top:2px">' + handle + (when ? (handle ? ' · ' : '') + '<span style="color:var(--text-faint)">' + when + '</span>' : '') + '</div>' +
        '</div>' +
        flexHtml +
      '</a>';
    }).join('');
  } catch (err) {
    console.warn('[followers-modal]', err);
    list.innerHTML = '<div style="padding:24px 8px;text-align:center;color:var(--red)">Failed to load followers.</div>';
  }
}

async function toggleFollow() {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) {
    alert('Sign in to follow predictors.');
    return;
  }
  if (!userId) {
    alert('Profile not loaded yet — wait a moment and try again.');
    return;
  }
  const btn = document.getElementById('followBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/predictors/${userId}/follow`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (r.status === 401 || r.status === 403) {
      // Stale token — clear it so the next click prompts re-auth.
      localStorage.removeItem('hf_token');
      localStorage.removeItem('hf_member_token');
      alert('Your session expired. Sign in again to follow.');
      return;
    }
    if (!r.ok) {
      let msg = 'Follow failed (HTTP ' + r.status + ')';
      try {
        const err = await r.json();
        if (err && err.error) msg = err.error;
      } catch (_) {}
      alert(msg);
      return;
    }
    const d = await r.json();
    _isFollowing = d.following;
    if (btn) {
      btn.textContent = _isFollowing ? 'Following' : 'Follow';
      btn.classList.toggle('following', _isFollowing);
      btn.classList.toggle('btn-primary', !_isFollowing);
      btn.classList.toggle('btn-ghost', _isFollowing);
    }
    // Refresh count
    await loadFollowStatus();
  } catch (e) {
    console.warn('[toggle-follow]', e);
    alert('Network error — check your connection and try again.');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function toggleCopyTrade() {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to copy trades'); return; }
  const btn = document.getElementById('copyTradeBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/predictors/${userId}/copy-trade`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }

  }
}

          <span style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:${sideColor};background:${sideBg};padding:2px 7px;border-radius:4px">${p.side}</span>
          ${p.entry_price ? `<span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${Math.round(p.entry_price * 100)}¢</span>` : ''}
          ${p.pnl != null ? `<span style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:${p.pnl >= 0 ? '#22c55e' : '#ef4444'}">${p.pnl >= 0 ? '+' : ''}$${p.pnl.toFixed(0)}</span>` : ''}
          <span style="font-size:10px;color:var(--muted);margin-left:auto">${timeAgo(p.created_at)}</span>
        </div>
        <a href="/discuss/${p.market_slug || ''}" style="font-size:13px;font-weight:600;color:var(--text);text-decoration:none;line-height:1.3;display:block">${p.market_title || ''}</a>
        ${p.thesis ? `<div class="social-pred-thesis">${p.thesis.replace(/</g,'&lt;')}</div>` : ''}
        <div style="display:flex;gap:10px;margin-top:6px;font-size:11px;color:var(--muted)">
          <span>👍 ${p.reaction_count || 0}</span>
          <span>💬 ${p.comment_count || 0}</span>
        </div>
      </div>`;
    }).join('');
  } catch (e) { console.warn('[social-predictions]', e); }
}

// ── WALLET VERIFICATION ─────────────────────────────────────────────────────
async function startWalletVerify() {
  const btn = document.getElementById('verifyWalletBtn');
  if (!btn) return;
  if (!window.ethereum) { alert('MetaMask or a Web3 wallet is required'); return; }

  btn.disabled = true;
  btn.textContent = 'Connecting...';
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const address = accounts[0];

    btn.textContent = 'Getting challenge...';
    const token = localStorage.getItem('hf_token');
    const cr = await fetch('/api/wallet/challenge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ address })
    });
    if (!cr.ok) { const e = await cr.json(); throw new Error(e.error || 'Challenge failed'); }
    const { message } = await cr.json();

    btn.textContent = 'Sign in wallet...';
    const signature = await window.ethereum.request({
      method: 'personal_sign',
      params: [message, address]
    });

    btn.textContent = 'Verifying...';
    const vr = await fetch('/api/wallet/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ signature })
    });
    if (!vr.ok) { const e = await vr.json(); throw new Error(e.error || 'Verification failed'); }

    btn.textContent = '✓ Verified!';
    btn.style.borderColor = '#22c55e';
    btn.style.color = '#22c55e';
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    btn.textContent = '🔗 Verify Wallet';
    btn.disabled = false;
    if (e.code !== 4001) alert(e.message || 'Verification failed');
  }
}

// ── BIO EDIT ────────────────────────────────────────────────────────────────
let _bioEditOpen = false;
function toggleBioEdit() {
  _bioEditOpen = !_bioEditOpen;
  const area = document.getElementById('bioEditArea');
  if (area) area.style.display = _bioEditOpen ? 'block' : 'none';
  if (_bioEditOpen) {
    const bioEl = document.querySelector('.hero-bio');
    const input = document.getElementById('bioInput');
    if (input && bioEl) input.value = bioEl.textContent.trim();
    if (input) {
      input.focus();
      updateBioCount();
      input.addEventListener('input', updateBioCount);
    }
  }
}

function updateBioCount() {
  const input = document.getElementById('bioInput');
  const count = document.getElementById('bioCharCount');
  if (input && count) count.textContent = `${input.value.length}/280`;
}

async function saveBio() {
  const input = document.getElementById('bioInput');
  if (!input) return;
  const bio = input.value.trim();
  const token = localStorage.getItem('hf_token');
  try {
    const r = await fetch('/api/user/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ bio })
    });
    if (r.ok) {
      toggleBioEdit();
      location.reload();
    } else {
      const e = await r.json();
      alert(e.error || 'Failed to save');
    }
  } catch (e) { alert('Network error'); }
}

// ── SHOW OWNER TOOLS ────────────────────────────────────────────────────────
function showOwnerTools(profileUserId, walletVerified) {
  const token = localStorage.getItem('hf_token');
  if (!token) return;
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    const currentUserId = payload.userId || payload.sub || payload.id;
    if (currentUserId !== profileUserId) return;

    const tools = document.getElementById('ownerTools');
    if (tools) tools.style.display = 'block';

    if (!walletVerified) {
      const vBtn = document.getElementById('verifyWalletBtn');
      if (vBtn) vBtn.style.display = 'inline-flex';
    }
  } catch {}
}

// Wire up social predictions + owner tools after main load
const _origLoad = load;
load = async function() {
  await _origLoad();
  loadSocialPredictions(userId);
  // Check if owner should see tools
  try {
    const r = await fetch(`${API}/api/member/${userId}`);
    if (r.ok) {
      const d = await r.json();
      showOwnerTools(userId, d.user?.wallet_verified);
    }
  } catch {}
};
