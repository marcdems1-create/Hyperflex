<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Profile — HYPERFLEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#0b0b12;--paper-2:#0e0e17;--surface:rgba(255,255,255,0.03);--surface-2:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.14);
  --text:#f0f0f5;--text-soft:#b4b4c4;--muted:#6b6b80;--faint:#3a3a4a;
  --gold:#f5a623;--gold-soft:#c9920d;--green:#00e68a;--red:#ff4d6a;--blue:#4d9fff;--purple:#a855f7;--amber:#f59e0b;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --shadow-lg:0 24px 60px -20px rgba(0,0,0,0.6),0 12px 32px -8px rgba(0,0,0,0.4);
  --shadow-glow:0 0 48px -12px rgba(245,166,35,0.35);
}
html,body{background:var(--paper);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{min-height:100vh;background:radial-gradient(ellipse 1200px 800px at 50% -200px,rgba(245,166,35,0.08),transparent 60%),radial-gradient(ellipse 800px 600px at 90% 20%,rgba(168,85,247,0.05),transparent 60%),var(--paper)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
/* ── Nav ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;position:sticky;top:0;z-index:50;background:rgba(11,11,18,0.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Inter',sans-serif;font-size:17px;font-weight:800;color:var(--text);display:inline-flex;align-items:center;gap:8px;letter-spacing:-0.02em}
.nav-logo:hover{color:var(--gold)}
.nav-back{color:var(--muted);font-size:13px;display:inline-flex;align-items:center;min-height:44px;padding:0 6px;transition:color .15s}
.nav-back:hover{color:var(--text)}
/* ── Page shell ── */
.page{max-width:720px;margin:0 auto;padding:28px 18px 80px}
/* ── Glass cards ── */
.glass{background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.015));border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:var(--shadow-lg)}
.glass-inset{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:14px}
/* ── Hero ── */
.hero{display:flex;align-items:flex-start;gap:18px;margin-bottom:20px}
.avatar{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:28px;font-weight:800;flex-shrink:0;border:2px solid var(--border-strong);background:linear-gradient(135deg,rgba(245,166,35,0.18),rgba(168,85,247,0.12));box-shadow:0 8px 28px -8px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);position:relative;overflow:hidden}
.avatar::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,0.08) 100%);pointer-events:none}
.avatar-whale{background:linear-gradient(135deg,#a855f7,#6d28d9);color:#fff;border-color:rgba(168,85,247,0.5);box-shadow:0 8px 28px -8px rgba(168,85,247,0.5),inset 0 1px 0 rgba(255,255,255,0.2)}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1.15;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hero-verify{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;background:var(--blue);border-radius:50%;color:#000;font-size:11px;font-weight:900}
.hero-username{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:6px}
.hero-bio{font-size:13.5px;color:var(--text-soft);line-height:1.5;margin:6px 0 10px;max-width:460px}
.hero-whale-meta{display:flex;align-items:center;gap:8px;margin:6px 0 4px;flex-wrap:wrap;font-family:var(--mono);font-size:11px}
.whale-pill{font-size:10px;font-weight:700;color:var(--purple);background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);padding:3px 10px;border-radius:100px;letter-spacing:0.5px;text-transform:uppercase}
.whale-rank{color:var(--gold);font-weight:700}
.whale-pnl{font-weight:700}
.whale-pnl.pos{color:var(--green)}
.whale-pnl.neg{color:var(--red)}
.wallet-row{font-family:var(--mono);font-size:11px;color:var(--muted);margin:2px 0 6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wallet-row button,.wallet-row a{font-family:var(--mono);font-size:10px;color:var(--text-soft);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px;transition:all .15s}
.wallet-row button:hover,.wallet-row a:hover{border-color:var(--border-strong);color:var(--text)}
/* ── Follow strip ── */
.social-row{display:flex;align-items:center;gap:18px;margin:8px 0 12px;font-family:var(--mono);font-size:12px}
.social-row strong{color:var(--text);font-size:15px;font-family:'Inter',sans-serif;font-weight:800}
.social-row .lbl{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;margin-left:4px}
.action-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:100px;transition:all .15s;min-height:38px;white-space:nowrap;border:1px solid transparent}
.btn-primary{background:var(--text);color:#000}
.btn-primary:hover{background:#fff}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--text-soft)}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--text);background:var(--surface-2)}
.btn-gold{background:linear-gradient(180deg,rgba(245,166,35,0.16),rgba(245,166,35,0.08));border-color:rgba(245,166,35,0.4);color:var(--gold)}
.btn-gold:hover{background:linear-gradient(180deg,rgba(245,166,35,0.28),rgba(245,166,35,0.14));border-color:rgba(245,166,35,0.6)}
.btn-purple{background:linear-gradient(180deg,rgba(168,85,247,0.16),rgba(168,85,247,0.08));border-color:rgba(168,85,247,0.35);color:#c4a3ff}
.btn-purple:hover{background:linear-gradient(180deg,rgba(168,85,247,0.28),rgba(168,85,247,0.14));border-color:rgba(168,85,247,0.55)}
.btn-challenge{background:linear-gradient(135deg,rgba(255,77,106,0.15),rgba(245,166,35,0.12));border-color:rgba(255,77,106,0.35);color:#ff8a9e}
.btn-challenge:hover{background:linear-gradient(135deg,rgba(255,77,106,0.28),rgba(245,166,35,0.22));border-color:rgba(255,77,106,0.55);color:#fff}
.btn.following{background:var(--surface-2);border-color:var(--border-strong);color:var(--text)}
/* ── Tier hero card ── */
.tier-card{position:relative;border-radius:20px;padding:28px 24px 26px;margin:24px 0 18px;overflow:hidden;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01))}
.tier-card::before{content:'';position:absolute;inset:-1px;border-radius:20px;padding:1px;background:linear-gradient(135deg,var(--tier-color,var(--gold)) 0%,transparent 50%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.5}
.tier-glow{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:420px;height:320px;background:radial-gradient(ellipse at center,var(--tier-color,var(--gold)) 0%,transparent 60%);opacity:.18;pointer-events:none;animation:tierPulse 4s ease-in-out infinite}
@keyframes tierPulse{0%,100%{opacity:.14;transform:translateX(-50%) scale(1)}50%{opacity:.24;transform:translateX(-50%) scale(1.08)}}
.tier-inner{position:relative;text-align:center}
.tier-emoji{font-size:40px;margin-bottom:6px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
.tier-label{font-family:var(--mono);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;margin-bottom:10px}
.tier-pct{font-family:'Inter',sans-serif;font-size:72px;font-weight:900;line-height:1;letter-spacing:-0.04em;background:linear-gradient(180deg,currentColor,color-mix(in srgb,currentColor 70%,transparent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tier-desc{font-size:13px;color:var(--text-soft);margin-top:10px;line-height:1.45}
.tier-record{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
.tier-bar{margin:16px auto 0;max-width:260px;height:4px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden}
.tier-bar-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.2,.9,.3,1)}
.tier-actions{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
/* ── Stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{padding:14px 14px 12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;text-align:left;cursor:default;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.stat.interactive{cursor:pointer}
.stat.interactive:hover{border-color:var(--border-strong);background:var(--surface-2)}
.stat-lbl{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.stat-val{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;line-height:1.05;letter-spacing:-0.02em}
.stat-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin:8px 0 18px;position:sticky;top:64px;background:rgba(11,11,18,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:20;padding:0 2px}
.tab-btn{flex:1;background:none;border:none;padding:14px 12px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;min-height:48px;letter-spacing:-0.01em}
.tab-btn:hover{color:var(--text-soft)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--gold)}
.tab-btn .tab-count{color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:500;margin-left:4px}
.tab-pane{display:none;animation:fadeIn .25s ease}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* ── Take / Trade cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s,background .15s}
.card:hover{border-color:var(--border-strong);background:var(--surface-2)}
.card a{color:inherit}
.card-q{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px}
.card-thesis{font-size:13px;color:var(--text-soft);line-height:1.55;margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
.card-actions{display:flex;gap:14px;margin-top:10px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.side{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:100px;letter-spacing:0.04em;display:inline-block}
.side-yes{background:rgba(0,230,138,0.12);color:var(--green);border:1px solid rgba(0,230,138,0.25)}
.side-no{background:rgba(255,77,106,0.12);color:var(--red);border:1px solid rgba(255,77,106,0.25)}
.badge-correct{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(0,230,138,0.12);color:var(--green)}
.badge-wrong{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(255,77,106,0.12);color:var(--red)}
/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;border:1px dashed var(--border);border-radius:16px;background:rgba(255,255,255,0.01)}
.empty-emoji{font-size:32px;margin-bottom:8px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:13px;color:var(--muted);margin-bottom:18px;max-width:320px;margin-left:auto;margin-right:auto;line-height:1.5}
/* ── Loading/error states ── */
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:13px}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{text-align:center;padding:80px 20px}
.error-icon{font-size:40px;margin-bottom:12px}
.error-msg{font-size:15px;font-weight:700;margin-bottom:6px}
.error-sub{font-size:13px;color:var(--muted)}
/* ── Badges on hero ── */
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;letter-spacing:0.04em;text-transform:uppercase;border:1px solid transparent}
.badge-streak{background:rgba(255,140,0,0.12);color:#ff9a3c;border-color:rgba(255,140,0,0.3)}
.badge-oracle{background:rgba(245,166,35,0.14);color:var(--gold);border-color:rgba(245,166,35,0.35)}
.badge-sharp{background:rgba(0,230,138,0.12);color:var(--green);border-color:rgba(0,230,138,0.3)}
.badge-verified{background:rgba(77,159,255,0.12);color:var(--blue);border-color:rgba(77,159,255,0.3)}
/* ── Mobile ── */
@media(max-width:600px){
  .page{padding:20px 14px 60px}
  .hero{gap:14px}
  .avatar{width:62px;height:62px;font-size:22px}
  .hero-name{font-size:20px}
  .tier-pct{font-size:56px}
  .tier-card{padding:24px 18px 22px}
  .btn{font-size:12px;padding:9px 14px}
  input,textarea,select{font-size:16px!important}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none" style="width:24px;height:24px;margin-right:8px;vertical-align:middle">
      <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="#c9920d" stroke-width="1.5" fill="rgba(201,146,13,0.1)"/>
      <path d="M16 8L22 11.5V18.5L16 22L10 18.5V11.5L16 8Z" fill="#c9920d" opacity="0.6"/>
    </svg>HYPERFLEX
  </a>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/predictors" class="nav-back" style="border:none">Predictors</a>
    <a href="/" class="nav-back" style="border:none">Explore</a>
    <a id="creatorDashPill" href="/creator/dashboard" style="display:none;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#c9920d;background:rgba(201,146,13,0.1);border:1px solid rgba(201,146,13,0.3);padding:6px 14px;border-radius:20px;text-decoration:none;transition:background 0.15s;min-height:44px;align-items:center" onmouseover="this.style.background='rgba(201,146,13,0.2)'" onmouseout="this.style.background='rgba(201,146,13,0.1)'">Dashboard</a>
    <a href="javascript:history.back()" class="nav-back">← Back</a>
  </div>
</nav>
<div class="page" id="page">
  <div class="loading">Loading profile...</div>
</div>

<script>
const userId = location.pathname.split('/').pop();
window._profileUserId = userId;
const API = location.origin;

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const ts   = dateStr.endsWith('Z') || dateStr.includes('+') ? dateStr : dateStr + 'Z';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 0)    return 'just now';
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 86400*30) return `${Math.floor(diff/86400)}d ago`;
  return new Date(ts).toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function tierBadge(winRate, streak) {
  let badges = '';
  if (streak >= 7)       badges += `<span class="badge badge-oracle">⚡ ${streak} STREAK</span>`;
  else if (streak >= 3)  badges += `<span class="badge badge-streak">🔥 ${streak} WIN STREAK</span>`;
  if (winRate >= 70)     badges += `<span class="badge badge-oracle">🎯 ORACLE</span>`;
  else if (winRate >= 60) badges += `<span class="badge badge-sharp">🎯 SHARP</span>`;
  return badges;
}

function shareProfile() {
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareBtn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.innerHTML = '📋 Copy profile link', 2000); }
  });
}

// Minimal info modal — no deps, no CSS class pollution. Used by the ⓘ
// buttons next to Flex Score and FLEX Points in the stats grid so visitors
// actually understand what the gold and purple numbers mean.
function _showInfoModal(title, bodyHtml) {
  // Dismiss any prior instance so repeated clicks don't stack.
  const prior = document.getElementById('hfxInfoModal');
  if (prior) prior.remove();
  const wrap = document.createElement('div');
  wrap.id = 'hfxInfoModal';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(5,5,10,0.72);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)';
  wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
  wrap.innerHTML = `
    <div style="background:#15151d;border:1px solid #2a2a36;border-radius:14px;max-width:420px;width:100%;padding:22px 22px 18px;box-shadow:0 24px 60px rgba(0,0,0,0.6)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:15px;font-weight:700;color:var(--text)">${title}</div>
        <button onclick="document.getElementById('hfxInfoModal').remove()" aria-label="Close" style="background:none;border:0;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:4px 8px">×</button>
      </div>
      <div style="font-size:13px;line-height:1.55;color:var(--text-soft)">${bodyHtml}</div>
    </div>`;
  document.body.appendChild(wrap);
}

function switchProfileTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
  var el = document.getElementById('tab-' + tabId);
  if (el) el.classList.add('active');
  if (btn) btn.classList.add('active');
}

function showFlexScoreInfo() {
  _showInfoModal('Flex Score', `
    <p style="margin:0 0 10px">A single 0–100 number measuring how sharp a trader is.</p>
    <p style="margin:0 0 10px">It's calculated from <strong style="color:var(--gold)">Brier scores</strong> on every resolved take — how close the entry price was to the real outcome, weighted by how confident the call was.</p>
    <div style="background:rgba(201,146,13,0.06);border:1px solid rgba(201,146,13,0.25);border-radius:8px;padding:10px 12px;margin:10px 0;font-family:var(--mono);font-size:11px;color:var(--text-soft)">
      70+ → 🎯 Oracle tier<br>
      60+ → 🎯 Sharp<br>
      50+ → 📊 Solid<br>
      &lt;50 → 🎲 Speculator
    </div>
    <p style="margin:0;color:var(--muted);font-size:12px">Needs at least 3 resolved takes to lock in.</p>
  `);
}

function showFlexPointsInfo() {
  _showInfoModal('⚡ FLEX Points', `
    <p style="margin:0 0 10px">Reputation currency earned by posting takes, winning predictions, and getting agrees from other traders.</p>
    <p style="margin:0 0 10px;color:var(--text-soft)">Every correct call pays out in FLEX. Every take that racks up agrees earns FLEX. It's a running score of how much signal you've contributed to the network.</p>
    <p style="margin:0;color:var(--muted);font-size:12px">Can't be bought — only earned.</p>
  `);
}

async function load() {
  const page = document.getElementById('page');
  try {
    const res = await fetch(`${API}/api/member/${userId}`);
    if (res.status === 404) {
      page.innerHTML = `<div class="error-state"><div class="error-icon">🔍</div><div class="error-msg">Member not found</div><div class="error-sub">This profile doesn't exist or has been removed.</div></div>`;
      return;
    }
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const { user, stats, communities, recent_wins, take_stats, recent_takes } = data;

    // Synchronous owner check — decoded JWT's userId must match the profile
    // we're rendering. Used to show the "post your first take" empty-state
    // for the profile owner only (visitors see nothing if there are no takes).
    let isOwner = false;
    try {
      const ownTok = localStorage.getItem('hf_token');
      if (ownTok) {
        const payload = JSON.parse(atob(ownTok.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        const selfId = payload.userId || payload.sub || payload.id;
        if (selfId && String(selfId) === String(userId)) isOwner = true;
      }
    } catch {}

    const winPct = stats.settled_predictions > 0 ? Math.round((stats.wins / stats.settled_predictions) * 100) : 0;
    const avgColor = winPct >= 70 ? '#c9920d' : winPct >= 55 ? '#22c55e' : winPct >= 40 ? '#60a5fa' : '#ef4444';
    const initials = getInitials(user.display_name);
    const avatarBg = '#1e1e1b';

    document.title = `${user.display_name} — HYPERFLEX`;

    // Build community chips
    const commHtml = communities.length
      ? `<div class="community-chips">${communities.map(c =>
          `<a href="/${c.slug}" class="community-chip">
            <span class="chip-dot" style="background:${c.primary_color || '#c9920d'}"></span>
            ${c.display_name || c.slug}
          </a>`
        ).join('')}</div>`
      : `<div style="color:var(--muted);font-size:13px">No communities yet.</div>`;

    // Build wins list
    const winsHtml = recent_wins.length
      ? `<div class="win-list">${recent_wins.map(w =>
          `<a href="/${w.community_slug}" class="win-item">
            <div class="win-check">✓</div>
            <div class="win-body">
              <div class="win-question">${w.question}</div>
              <div class="win-meta">
                <span style="color:${w.community_color || '#c9920d'}">${w.community_name}</span>
                <span>·</span>
                <span>${timeAgo(w.resolved_at)}</span>
                ${w.payout > 0 ? `<span>· <strong style="color:var(--green)">+${w.payout.toLocaleString()} pts</strong></span>` : ''}
              </div>
            </div>
            <span class="win-side ${(w.side || '').toUpperCase() === 'YES' ? 'yes' : 'no'}">${(w.side || '').toUpperCase()}</span>
          </a>`
        ).join('')}</div>`
      : `<div style="color:var(--muted);font-size:13px;padding:16px 0">No wins yet — get predicting!</div>`;

    // Prediction rank tier
    const wr = stats.win_rate || 0;
    const settled = stats.settled_predictions || 0;
    let rankTier, rankClass, rankColor, rankDesc;
    if (wr >= 70 && settled >= 10)      { rankTier = '🎯 ORACLE';      rankClass = 'oracle';  rankColor = '#c9920d'; rankDesc = 'Top 5% of predictors — consistently ahead of the crowd'; }
    else if (wr >= 60 && settled >= 5)  { rankTier = '🎯 SHARP';       rankClass = 'sharp';   rankColor = '#22c55e'; rankDesc = 'Above average predictor — reads markets better than most'; }
    else if (wr >= 50 && settled >= 5)  { rankTier = '📊 SOLID';       rankClass = 'solid';   rankColor = '#60a5fa'; rankDesc = 'Reliable predictor — more right than wrong'; }
    else if (settled >= 3)              { rankTier = '🎲 SPECULATOR';  rankClass = 'default'; rankColor = 'var(--muted)'; rankDesc = 'Still building their track record'; }
    else                                { rankTier = '🆕 NEWCOMER';    rankClass = 'default'; rankColor = 'var(--muted)'; rankDesc = 'Just getting started — more predictions needed'; }

    const scoreCardHTML = settled >= 3 ? `
      <div class="pred-score-card ${rankClass}">
        <div class="pred-score-pct" style="color:${rankColor}">${wr}%</div>
        <div class="pred-score-body">
          <div class="pred-score-rank" style="color:${rankColor}">${rankTier}</div>
          <div class="pred-score-sub">${rankDesc}<br>${stats.wins || 0} correct out of ${settled} settled predictions</div>
          <div class="pred-score-bar"><div class="pred-score-bar-fill" style="width:${wr}%;background:${rankColor}"></div></div>
        </div>
      </div>` : '';

    // Whale-specific data
    const isWhale = user.is_whale || false;
    const whaleRank = user.whale_rank;
    const whalePnl = user.whale_pnl;
    const walletAddr = user.polymarket_address || '';
    const shortWallet = walletAddr ? (walletAddr.slice(0, 6) + '...' + walletAddr.slice(-4)) : '';
    const pnlDisplay = whalePnl != null ? (whalePnl >= 0 ? '+$' + (whalePnl >= 1000000 ? (whalePnl/1000000).toFixed(1) + 'M' : whalePnl >= 1000 ? Math.round(whalePnl/1000) + 'K' : Math.round(whalePnl)) : '-$' + Math.abs(whalePnl >= 1000 ? Math.round(whalePnl/1000) + 'K' : Math.round(whalePnl))) : null;
    const whaleAvatarBg = isWhale ? 'linear-gradient(135deg,#a855f7,#6d28d9)' : avatarBg;
    const whaleAvatarColor = isWhale ? '#fff' : avgColor;

    page.innerHTML = `
      <div class="hero">
        <div class="avatar" style="background:${whaleAvatarBg};color:${whaleAvatarColor};border-color:${isWhale ? '#a855f744' : avgColor + '44'}">${isWhale ? '🐋' : initials}</div>
        <div class="hero-info">
          <div class="hero-name">${user.display_name}</div>
          ${isWhale ? `
            <div style="display:flex;align-items:center;gap:8px;margin:4px 0 2px;flex-wrap:wrap">
              <span style="font-family:var(--mono);font-size:10px;font-weight:700;color:#a855f7;background:rgba(168,85,247,0.12);padding:3px 10px;border-radius:100px;letter-spacing:0.5px">POLYMARKET WHALE</span>
              ${whaleRank ? `<span style="font-family:var(--mono);font-size:10px;color:var(--gold);font-weight:700">Rank #${whaleRank}</span>` : ''}
              ${pnlDisplay ? `<span style="font-family:var(--mono);font-size:10px;font-weight:700;color:${whalePnl >= 0 ? '#00e68a' : '#ff4d6a'}">${pnlDisplay} PnL</span>` : ''}
            </div>
            ${walletAddr ? `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin:2px 0 4px;display:flex;align-items:center;gap:6px">
              <span>${shortWallet}</span>
              <button onclick="navigator.clipboard.writeText('${walletAddr}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)" style="font-family:var(--mono);font-size:9px;color:var(--dim);background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer">Copy</button>
              <a href="https://polygonscan.com/address/${walletAddr}" target="_blank" style="font-family:var(--mono);font-size:9px;color:var(--accent-blue);text-decoration:none">Polygonscan ↗</a>
            </div>` : ''}
          ` : `
            ${user.member_since && new Date(user.member_since).getFullYear() >= 2020 ? `<div class="hero-since">Member since ${new Date(user.member_since).toLocaleDateString(undefined, { month: 'long', year: 'numeric' })}</div>` : ''}
          `}
          ${user.username ? `<div class="hero-username">@${user.username}</div>` : ''}
          ${user.bio ? `<div class="hero-bio">${user.bio.replace(/</g,'&lt;')}</div>` : ''}

            ${user.wallet_verified ? '<span class="badge badge-verified">✓ Verified Wallet</span>' : ''}

          </div>
          <!-- Followers / following — the clout currency. Shown right under
               the name so it's the first thing visitors read. Values come from
               /api/member/:userId stats.{followers,following}. -->
          <div style="display:flex;align-items:center;gap:18px;margin:6px 0 10px;font-family:var(--mono);font-size:13px">
            <span><strong style="color:var(--text);font-size:15px">${(stats.followers || 0).toLocaleString()}</strong> <span style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em">Followers</span></span>
            <span><strong style="color:var(--text);font-size:15px">${(stats.following || 0).toLocaleString()}</strong> <span style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em">Following</span></span>
            ${(take_stats && take_stats.total_agrees) ? `<span><strong style="color:var(--gold);font-size:15px">${take_stats.total_agrees.toLocaleString()}</strong> <span style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em">Agrees</span></span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <button id="shareBtn" class="share-btn" onclick="shareProfile()">📋 Copy link</button>
            <button class="share-btn" onclick="window.open('https://x.com/intent/tweet?text='+encodeURIComponent('Check out my prediction track record on HYPERFLEX\\n\\nhyperflex.network/m/${userId}'),'_blank')">🐦 Share on X</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
            <button id="followBtn" onclick="toggleFollow()" style="background:none;border:1px solid var(--gold);border-radius:20px;padding:6px 18px;font-size:12px;font-family:var(--mono);font-weight:700;color:var(--gold);cursor:pointer;transition:all 0.15s" onmouseover="this.style.background='rgba(201,146,13,0.12)'" onmouseout="this.style.background='none'">Follow</button>
            <button id="copyTradeBtn" onclick="toggleCopyTrade()" style="background:none;border:1px solid rgba(124,58,237,0.4);border-radius:20px;padding:6px 18px;font-size:12px;font-family:var(--mono);font-weight:700;color:#a78bfa;cursor:pointer;transition:all 0.15s" onmouseover="this.style.background='rgba(124,58,237,0.12)'" onmouseout="if(!this.dataset.subscribed)this.style.background='none'">🔔 Copy Trades</button>
          </div>
          <span id="followerCount" style="display:none"></span>
        </div>
      </div>

      <!-- Tier Card — the headline flex -->
      <div style="background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden;border:1px solid ${rankColor}33">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at top, ${rankColor}08, transparent 70%);pointer-events:none"></div>
        <div style="font-size:36px;margin-bottom:4px">${rankClass === 'oracle' ? '🎯' : rankClass === 'sharp' ? '🎯' : rankClass === 'solid' ? '📊' : settled >= 3 ? '🎲' : '🆕'}</div>
        <div style="font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${rankColor};margin-bottom:6px">${rankTier.replace(/🎯|📊|🎲|🆕/g,'').trim()}</div>
        <div style="font-family:var(--mono);font-size:52px;font-weight:700;color:${rankColor};line-height:1">${winPct}%</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">${rankDesc}</div>
        <div style="font-size:11px;color:var(--soft);margin-top:4px">${stats.wins || 0} correct out of ${settled} resolved predictions</div>
        <div style="display:flex;justify-content:center;gap:8px;margin-top:14px">
          <a href="/passport/${userId}" style="display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold);background:rgba(201,146,13,0.08);border:1px solid rgba(201,146,13,0.25);padding:7px 16px;border-radius:20px;text-decoration:none;transition:background 0.15s" onmouseover="this.style.background='rgba(201,146,13,0.15)'" onmouseout="this.style.background='rgba(201,146,13,0.08)'">🛂 View Prediction Passport</a>
          <button onclick="window.open('https://x.com/intent/tweet?text='+encodeURIComponent('I\\'m a ${rankTier.replace(/🎯|📊|🎲|🆕/g,'').trim()} predictor with ${winPct}% accuracy on @hypaboranetwork\\n\\nVerify my track record:\\nhyperflex.network/passport/${userId}'),'_blank')" style="display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text-soft);background:none;border:1px solid var(--border);padding:7px 16px;border-radius:20px;cursor:pointer;transition:border-color 0.15s" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">🐦 Flex on X</button>
        </div>
      </div>

      <!-- Score Strip — compact horizontal metrics bar -->
      <div class="score-strip">
        <div class="score-strip-item" onclick="showFlexScoreInfo()" style="cursor:pointer">
          <div class="score-strip-value" style="color:var(--gold)">${stats.flex_score_alltime != null ? stats.flex_score_alltime : stats.flex_score_90d != null ? stats.flex_score_90d : '—'}</div>
          <div class="score-strip-label">Flex Score <span style="font-size:9px">ⓘ</span></div>
        </div>
        <div class="score-strip-item">
          <div class="score-strip-value" style="color:${avgColor}">${winPct}%</div>
          <div class="score-strip-label">Accuracy</div>
        </div>
        <div class="score-strip-item" onclick="showFlexPointsInfo()" style="cursor:pointer">
          <div class="score-strip-value" style="color:#a855f7">${(stats.flex_points || 0) >= 1000 ? ((stats.flex_points / 1000).toFixed(1) + 'K') : (stats.flex_points || 0)}</div>
          <div class="score-strip-label">⚡ FLEX Pts <span style="font-size:9px">ⓘ</span></div>
        </div>
        <div class="score-strip-item">
          <div class="score-strip-value" style="color:${stats.streak >= 3 ? '#ff8c00' : 'var(--text)'}">${stats.streak > 0 ? stats.streak : '—'}</div>
          <div class="score-strip-label">${stats.streak >= 3 ? '🔥 ' : ''}Streak</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="profile-tabs">
        <button class="profile-tab active" onclick="switchProfileTab('takes',this)">Takes${take_stats && take_stats.total > 0 ? ' <span style=\\"font-family:Space Mono,monospace;font-size:11px;color:var(--muted);font-weight:400\\">(' + take_stats.total + ')</span>' : ''}</button>
        <button class="profile-tab" onclick="switchProfileTab('record',this)">Track Record</button>
      </div>

      <!-- ═══ TAKES TAB (default) ═══ -->
      <div id="tab-takes" class="tab-content active">
        ${(take_stats && take_stats.total > 0) ? `
          ${take_stats.accuracy > 0 ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
            <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${take_stats.accuracy >= 60 ? '#00e68a' : take_stats.accuracy >= 50 ? '#4d9fff' : '#ff4d6a'};background:${take_stats.accuracy >= 60 ? 'rgba(0,230,138,0.1)' : take_stats.accuracy >= 50 ? 'rgba(77,159,255,0.1)' : 'rgba(255,77,106,0.1)'};padding:4px 10px;border-radius:20px">${take_stats.accuracy}% take accuracy</span>
            <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${take_stats.correct || 0}W / ${take_stats.incorrect || 0}L</span>
          </div>` : ''}
          ${(recent_takes || []).map(t => {
            const sideUp = (t.side || '').toUpperCase();
            const href = t.market_slug ? '/market/' + t.market_slug : '#';
            const correctBadge = t.is_correct === true ? '<span class="take-correct win">✓ CORRECT</span>'
              : t.is_correct === false ? '<span class="take-correct loss">✗ WRONG</span>' : '';
            return `<div class="take-card-full">
              <a href="${href}">
                <div style="display:flex;align-items:flex-start;gap:8px">
                  <span class="take-side ${sideUp === 'YES' ? 'yes' : 'no'}">${sideUp}</span>
                  <span class="take-card-q">${t.question || ''}</span>
                </div>
              </a>
              <div class="take-card-meta">
                ${t.entry_price ? `<span style="color:var(--muted)">Entry: ${Math.round(t.entry_price * 100)}¢</span>` : ''}
                <span style="color:var(--muted)">${timeAgo(t.created_at)}</span>
                ${correctBadge}
              </div>
              ${t.thesis ? `<div class="take-card-thesis">${t.thesis.replace(/</g,'&lt;')}</div>` : ''}
              <div class="take-card-actions">
                <span style="color:var(--green)">↑ ${t.agree_count || 0}</span>
                <span style="color:var(--red)">↓ ${t.disagree_count || 0}</span>
              </div>
            </div>`;
          }).join('')}
        ` : (isOwner ? `
          <div style="text-align:center;padding:40px 16px;background:rgba(201,146,13,0.04);border:1px dashed rgba(201,146,13,0.25);border-radius:12px">
            <div style="font-size:28px;margin-bottom:8px">✍️</div>
            <div style="font-size:15px;font-weight:600;margin-bottom:6px">Post your first take</div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:16px;max-width:320px;margin-left:auto;margin-right:auto">Every take is scored when the market resolves. Build a track record that speaks for itself.</div>
            <a href="/explore" style="display:inline-block;background:var(--gold);color:#0e0e15;font-family:var(--mono);font-size:12px;font-weight:700;padding:10px 22px;border-radius:20px;text-decoration:none">Post a take →</a>
          </div>
        ` : `<div style="text-align:center;padding:40px 16px;color:var(--muted);font-size:13px">No takes posted yet.</div>`)}
      </div>

      <!-- ═══ TRACK RECORD TAB ═══ -->
      <div id="tab-record" class="tab-content">
        ${scoreCardHTML}

        <div id="trophyCard" style="display:none;background:linear-gradient(135deg,#1a1916,#2a2218);border:1px solid #c9920d44;border-radius:12px;padding:20px;margin:16px 0">
          <div style="font-size:11px;color:#c9920d;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">🏆 Best Call</div>
          <div id="trophyQuestion" style="font-size:16px;font-weight:600;margin-bottom:10px"></div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <span id="trophySide" style="padding:3px 12px;border-radius:20px;font-weight:700;font-size:14px"></span>
            <span id="trophyMultiplier" style="color:#c9920d;font-weight:700;font-size:18px"></span>
            <button onclick="shareTrophyOnX()" style="margin-left:auto;background:transparent;border:1px solid #333;color:#ccc;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;min-height:32px">🐦 Share</button>
          </div>
        </div>

        ${recent_wins.length ? `
        <div class="section">
          <div class="section-title">Recent Wins</div>
          ${winsHtml}
        </div>` : ''}

        <div id="analyticsSection" style="margin:24px 0;display:none">
          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px" id="platformCards"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
            <div style="background:#1a1916;border:1px solid #333;border-radius:12px;padding:20px">
              <div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Calibration Chart</div>
              <div style="font-size:11px;color:#666;margin-bottom:12px">Predicted % vs actual outcomes</div>
              <canvas id="calibrationChart" width="300" height="180"></canvas>
            </div>
            <div style="background:#1a1916;border:1px solid #333;border-radius:12px;padding:20px">
              <div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Cumulative P&amp;L (30d)</div>
              <canvas id="pnlChart" width="300" height="180"></canvas>

        ${communities.length ? `
        <div class="section">
          <div class="section-title">Active Communities</div>
          ${commHtml}
        </div>` : ''}

        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:16px 0;border-top:1px solid var(--border);margin-top:12px">
          ${stats.settled_predictions || 0} predictions settled · ${stats.wins || 0} correct · ${stats.total_predictions || 0} total
        </div>
      </div>

      <!-- Owner tools -->
      <div id="ownerTools" style="display:none;margin:20px 0">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <button id="verifyWalletBtn" onclick="startWalletVerify()" class="verify-wallet-btn" style="display:none">🔗 Verify Wallet</button>
          <button id="editBioBtn" onclick="toggleBioEdit()" style="background:none;border:1px solid var(--border);color:var(--text-soft);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;transition:background 0.15s">✏️ Edit Bio</button>

        <button onclick="shareProfileOnX()" style="display:flex;align-items:center;gap:8px;background:none;border:1px solid #333;color:#ccc;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;transition:border-color 0.15s" onmouseover="this.style.borderColor='#c9920d';this.style.color='#c9920d'" onmouseout="this.style.borderColor='#333';this.style.color='#ccc'">🐦 Share on X</button>

}

// ── P&L ANALYTICS ─────────────────────────────────────────────────────────────
async function loadAnalytics(userId) {
  try {
    const res = await fetch(`/api/predictors/${userId}/analytics`);
    const data = await res.json();
    if (!data.platforms) return;
    document.getElementById('analyticsSection').style.display = 'block';

    // Platform stat cards
    const platformColors = { hyperflex: '#c9920d', polymarket: '#6366f1', kalshi: '#8b5cf6', manifold: '#10b981' };
    const platformLabels = { hyperflex: 'HYPERFLEX', polymarket: 'Polymarket', kalshi: 'Kalshi', manifold: 'Manifold' };
    document.getElementById('platformCards').innerHTML = Object.entries(data.platforms)
      .filter(([, p]) => p.total > 0)
      .map(([name, p]) => {
        const wr = (p.wins + p.losses) > 0 ? Math.round(p.wins / (p.wins + p.losses) * 100) : 0;
        const pnlColor = p.pnl >= 0 ? '#10b981' : '#ef4444';
        return `<div style="background:#1a1916;border:1px solid ${platformColors[name]}44;border-radius:10px;padding:14px 18px;min-width:130px">
          <div style="font-size:11px;color:${platformColors[name]};font-weight:700;margin-bottom:6px">${platformLabels[name] || name}</div>
          <div style="font-size:22px;font-weight:700;color:#fff">${wr}%</div>
          <div style="font-size:11px;color:#888">win rate</div>
          <div style="font-size:13px;font-weight:700;color:${pnlColor};margin-top:4px">${p.pnl >= 0 ? '+' : ''}${Math.round(p.pnl)} pts</div>
          <div style="font-size:11px;color:#555">${p.total} positions</div>
        </div>`;
      }).join('');

    // Sharp score badge
    const sharpEl = document.getElementById('sharpBadge');
    if (sharpEl) {
      sharpEl.textContent = `⚡ ${data.sharp_score} Sharp Score`;
      sharpEl.style.display = 'inline-block';
    }

    // Calibration chart — simple bar chart using canvas
    const calCtx = document.getElementById('calibrationChart')?.getContext('2d');
    if (calCtx) {
      const calData = data.calibration.filter(c => c.predicted > 0);
      const barW = calData.length > 0 ? 240 / calData.length : 30;
      calCtx.clearRect(0, 0, 300, 180);
      calData.forEach((c, i) => {
        const x = 30 + i * (barW + 4);
        const expectedH = (c.predicted / 100) * 140;
        const actualH = c.actual !== null ? (c.actual / 100) * 140 : 0;
        calCtx.fillStyle = '#c9920d44';
        calCtx.fillRect(x, 150 - actualH, barW - 2, actualH);
        calCtx.fillStyle = '#888';
        calCtx.fillRect(x, 150 - expectedH, barW - 2, 2);
        calCtx.fillStyle = '#666';
        calCtx.font = '9px monospace';
        calCtx.fillText(c.predicted + '%', x, 165);
      });
      calCtx.fillStyle = '#888';
      calCtx.font = '10px monospace';
      calCtx.fillText('gold=actual  gray=expected', 10, 178);
    }

    // P&L line chart
    const pnlCtx = document.getElementById('pnlChart')?.getContext('2d');
    if (pnlCtx && data.timeline.length > 1) {
      const vals = data.timeline.map(t => t.pnl);
      const min = Math.min(...vals, 0);
      const max = Math.max(...vals, 0);
      const range = max - min || 1;
      pnlCtx.clearRect(0, 0, 300, 180);
      pnlCtx.strokeStyle = data.total_pnl >= 0 ? '#10b981' : '#ef4444';
      pnlCtx.lineWidth = 2;
      pnlCtx.beginPath();
      data.timeline.forEach((t, i) => {
        const x = 10 + (i / (data.timeline.length - 1)) * 280;
        const y = 160 - ((t.pnl - min) / range) * 140;
        i === 0 ? pnlCtx.moveTo(x, y) : pnlCtx.lineTo(x, y);
      });
      pnlCtx.stroke();
      // Zero line
      const zeroY = 160 - ((0 - min) / range) * 140;
      pnlCtx.strokeStyle = '#333';
      pnlCtx.lineWidth = 1;
      pnlCtx.setLineDash([4, 4]);
      pnlCtx.beginPath();
      pnlCtx.moveTo(10, zeroY);
      pnlCtx.lineTo(290, zeroY);
      pnlCtx.stroke();
    }
  } catch(e) { console.warn('analytics', e); }
}

// ── FOLLOW SYSTEM ─────────────────────────────────────────────────────────────
let _isFollowing = false;

async function loadFollowStatus() {
  try {
    const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
    const headers = token ? { Authorization: 'Bearer ' + token } : {};
    const r = await fetch(`${API}/api/predictors/${userId}/follow-status`, { headers });
    if (!r.ok) return;
    const d = await r.json();
    _isFollowing = d.is_following;
    const btn = document.getElementById('followBtn');
    const countEl = document.getElementById('followerCount');
    if (btn) {
      btn.textContent = _isFollowing ? 'Following' : 'Follow';
      if (_isFollowing) {
        btn.style.background = 'rgba(201,146,13,0.15)';
        btn.style.color = 'var(--gold)';
      }
    }
    if (countEl && d.follower_count > 0) {
      countEl.textContent = `${d.follower_count} follower${d.follower_count !== 1 ? 's' : ''}`;
    }
    // Also load copy trade status
    const cr = await fetch(`${API}/api/predictors/${userId}/copy-status`, { headers });
    if (cr.ok) {
      const cd = await cr.json();
      const copyBtn = document.getElementById('copyTradeBtn');
      if (copyBtn && cd.is_subscribed) {
        copyBtn.textContent = '🔔 Copying';
        copyBtn.style.background = 'rgba(124,58,237,0.15)';
        copyBtn.dataset.subscribed = '1';
      }
    }
  } catch (e) {
    console.warn('[follow-status]', e);
  }
}

async function toggleFollow() {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to follow predictors'); return; }
  const btn = document.getElementById('followBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/predictors/${userId}/follow`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('Failed');
    const d = await r.json();
    _isFollowing = d.following;
    if (btn) {
      btn.textContent = _isFollowing ? 'Following' : 'Follow';
      btn.style.background = _isFollowing ? 'rgba(201,146,13,0.15)' : 'none';
    }
    // Refresh count
    await loadFollowStatus();
  } catch (e) {
    console.warn('[toggle-follow]', e);
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function toggleCopyTrade() {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to copy trades'); return; }
  const btn = document.getElementById('copyTradeBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/predictors/${userId}/copy-trade`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('Failed');
    const d = await r.json();
    if (btn) {
      btn.textContent = d.subscribed ? '🔔 Copying' : '🔔 Copy Trades';
      btn.style.background = d.subscribed ? 'rgba(124,58,237,0.15)' : 'none';
      btn.dataset.subscribed = d.subscribed ? '1' : '';
    }
  } catch (e) {
    console.warn('[toggle-copy-trade]', e);
  } finally {
    if (btn) btn.disabled = false;
  }
}

function shareTrophyOnX() {
  const b = window._trophyData;
  if (!b) return;
  const text = `My best prediction call:\n\n"${b.question}"\n\nCalled ${b.side} → ${b.multiplier}× payout 🏆\n\nhyperflex.network/m/${window._profileUserId}`;

// ── INVITE / SHARE SECTION (owner only) ──────────────────────────────────────
async function loadInviteSection(profileUserId) {
  // Only show to the profile owner
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) return;
  try {
    // Decode JWT payload to get current user id (no signature verify needed client-side)
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    const currentUserId = payload.userId || payload.sub || payload.id;
    if (currentUserId !== profileUserId) return;

    const section = document.getElementById('inviteSection');
    if (section) section.style.display = 'block';

    // Load stats
    const r = await fetch('/api/user/profile-share-stats', { headers: { Authorization: 'Bearer ' + token } });
    if (r.ok) {
      const d = await r.json();
      const statsEl = document.getElementById('inviteStats');
      if (statsEl && d.followers > 0) {
        statsEl.textContent = `${d.followers} follower${d.followers !== 1 ? 's' : ''} · Share to grow your audience`;
      }
    }
  } catch (e) { /* silent — token parse failed or fetch failed */ }
}

function copyInviteUrl() {
  const input = document.getElementById('inviteUrlInput');
  const btn = document.getElementById('inviteCopyBtn');
  if (!input || !btn) return;
  navigator.clipboard.writeText(input.value).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  });
}

function shareProfileOnX() {
  const text = `I'm tracking predictions across Polymarket & Kalshi on HYPERFLEX — follow my calls: hyperflex.network/m/${window._profileUserId}`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

      const sideColor = p.side === 'YES' ? '#22c55e' : '#ef4444';
      const sideBg = p.side === 'YES' ? 'rgba(34,197,94,0.12)' : 'rgba(239,68,68,0.12)';

          <span style="font-size:10px;color:var(--muted);margin-left:auto">${timeAgo(p.created_at)}</span>
        </div>
        <a href="/discuss/${p.market_slug || ''}" style="font-size:13px;font-weight:600;color:var(--text);text-decoration:none;line-height:1.3;display:block">${p.market_title || ''}</a>
        ${p.thesis ? `<div class="social-pred-thesis">${p.thesis.replace(/</g,'&lt;')}</div>` : ''}
        <div style="display:flex;gap:10px;margin-top:6px;font-size:11px;color:var(--muted)">

        </div>
      </div>`;
    }).join('');
  } catch (e) { console.warn('[social-predictions]', e); }
}

// ── WALLET VERIFICATION ─────────────────────────────────────────────────────
async function startWalletVerify() {
  const btn = document.getElementById('verifyWalletBtn');
  if (!btn) return;
  if (!window.ethereum) { alert('MetaMask or a Web3 wallet is required'); return; }

  btn.disabled = true;
  btn.textContent = 'Connecting...';
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const address = accounts[0];

    btn.textContent = 'Getting challenge...';
    const token = localStorage.getItem('hf_token');
    const cr = await fetch('/api/wallet/challenge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ address })
    });
    if (!cr.ok) { const e = await cr.json(); throw new Error(e.error || 'Challenge failed'); }
    const { message } = await cr.json();

    btn.textContent = 'Sign in wallet...';
    const signature = await window.ethereum.request({
      method: 'personal_sign',
      params: [message, address]
    });

    btn.textContent = 'Verifying...';
    const vr = await fetch('/api/wallet/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ signature })
    });
    if (!vr.ok) { const e = await vr.json(); throw new Error(e.error || 'Verification failed'); }

    btn.textContent = '✓ Verified!';
    btn.style.borderColor = '#22c55e';
    btn.style.color = '#22c55e';
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    btn.textContent = '🔗 Verify Wallet';
    btn.disabled = false;
    if (e.code !== 4001) alert(e.message || 'Verification failed');
  }
}

// ── BIO EDIT ────────────────────────────────────────────────────────────────
let _bioEditOpen = false;
function toggleBioEdit() {
  _bioEditOpen = !_bioEditOpen;
  const area = document.getElementById('bioEditArea');
  if (area) area.style.display = _bioEditOpen ? 'block' : 'none';
  if (_bioEditOpen) {
    const bioEl = document.querySelector('.hero-bio');
    const input = document.getElementById('bioInput');
    if (input && bioEl) input.value = bioEl.textContent.trim();
    if (input) {
      input.focus();
      updateBioCount();
      input.addEventListener('input', updateBioCount);
    }
  }
}

function updateBioCount() {
  const input = document.getElementById('bioInput');
  const count = document.getElementById('bioCharCount');
  if (input && count) count.textContent = `${input.value.length}/280`;
}

async function saveBio() {
  const input = document.getElementById('bioInput');
  if (!input) return;
  const bio = input.value.trim();
  const token = localStorage.getItem('hf_token');
  try {
    const r = await fetch('/api/user/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ bio })
    });
    if (r.ok) {
      toggleBioEdit();
      location.reload();
    } else {
      const e = await r.json();
      alert(e.error || 'Failed to save');
    }
  } catch (e) { alert('Network error'); }
}

// ── SHOW OWNER TOOLS ────────────────────────────────────────────────────────
function showOwnerTools(profileUserId, walletVerified) {
  const token = localStorage.getItem('hf_token');
  if (!token) return;
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    const currentUserId = payload.userId || payload.sub || payload.id;
    if (currentUserId !== profileUserId) return;

    const tools = document.getElementById('ownerTools');
    if (tools) tools.style.display = 'block';

    if (!walletVerified) {
      const vBtn = document.getElementById('verifyWalletBtn');
      if (vBtn) vBtn.style.display = 'inline-flex';
    }
  } catch {}
}

// Wire up social predictions + owner tools after main load
const _origLoad = load;
load = async function() {
  await _origLoad();
  loadSocialPredictions(userId);
  // Check if owner should see tools
  try {
    const r = await fetch(`${API}/api/member/${userId}`);
    if (r.ok) {
      const d = await r.json();
      showOwnerTools(userId, d.user?.wallet_verified);
    }
  } catch {}
};
