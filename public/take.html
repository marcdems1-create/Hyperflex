<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take — HYPERFLEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;--surface:rgba(255,255,255,0.03);--surface-2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.14);
  --text:#f0f0f5;--text-soft:#b4b4c4;--muted:#6b6b80;--faint:#3a3a4a;
  --gold:#f5a623;--green:#00e68a;--red:#ff4d6a;--blue:#4d9fff;--purple:#a855f7;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;position:sticky;top:0;z-index:50;background:rgba(11,11,18,0.72);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.nav-logo{font-size:17px;font-weight:800;letter-spacing:-0.02em;color:var(--text)}
.nav-back{color:var(--muted);font-size:13px;display:inline-flex;align-items:center;min-height:44px;padding:0 6px}
.nav-back:hover{color:var(--text)}
.page{max-width:640px;margin:0 auto;padding:22px 18px 100px}
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:13px}
.error-state{text-align:center;padding:80px 20px}
.error-icon{font-size:40px;margin-bottom:12px}
/* Take card */
.take{background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.015));border:1px solid var(--border);border-radius:18px;padding:22px 22px 20px;margin-bottom:18px}
.take-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;border:1px solid var(--border-strong);background:linear-gradient(135deg,rgba(245,166,35,0.15),rgba(168,85,247,0.1));color:var(--gold)}
.avatar.whale{background:linear-gradient(135deg,#a855f7,#6d28d9);color:#fff}
.author-row{flex:1;min-width:0}
.author{font-size:15px;font-weight:800;letter-spacing:-0.01em;color:var(--text)}
.author:hover{color:var(--gold)}
.author-meta{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.side{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:0.04em;display:inline-block}
.side-yes{background:rgba(0,230,138,0.12);color:var(--green);border:1px solid rgba(0,230,138,0.25)}
.side-no{background:rgba(255,77,106,0.12);color:var(--red);border:1px solid rgba(255,77,106,0.25)}
.take-q{display:block;font-size:17px;font-weight:700;line-height:1.38;color:var(--text);margin:6px 0 10px;letter-spacing:-0.01em}
.take-q:hover{color:var(--gold)}
.take-thesis{font-size:14.5px;color:var(--text-soft);line-height:1.6;margin-bottom:12px;white-space:pre-wrap;word-break:break-word}
.take-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.badge{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:100px;letter-spacing:0.04em;background:var(--surface);border:1px solid var(--border);color:var(--text-soft)}
.badge-correct{background:rgba(0,230,138,0.12);color:var(--green);border-color:rgba(0,230,138,0.3)}
.badge-wrong{background:rgba(255,77,106,0.12);color:var(--red);border-color:rgba(255,77,106,0.3)}
.take-actions{display:flex;gap:6px;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.take-actions button{font-family:var(--mono);font-size:12px;font-weight:700;padding:7px 14px;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--text-soft);transition:all 0.12s;display:inline-flex;align-items:center;gap:5px}
.take-actions button:hover{border-color:var(--border-strong);color:var(--text)}
.take-actions .agree.active{background:rgba(0,230,138,0.12);color:var(--green);border-color:rgba(0,230,138,0.35)}
.take-actions .disagree.active{background:rgba(255,77,106,0.12);color:var(--red);border-color:rgba(255,77,106,0.35)}
/* Reply composer */
.reply-wrap{background:linear-gradient(180deg,rgba(255,255,255,0.025),rgba(255,255,255,0.01));border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px}
.reply-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;margin-bottom:10px}
.gate-row{display:flex;gap:8px;margin-bottom:12px}
.gate-btn{flex:1;padding:10px 14px;border-radius:100px;font-size:13px;font-weight:700;transition:all 0.12s;border:1px solid;cursor:pointer}
.gate-btn[data-reaction=agree]{background:rgba(0,230,138,0.08);color:var(--green);border-color:rgba(0,230,138,0.3)}
.gate-btn[data-reaction=disagree]{background:rgba(255,77,106,0.08);color:var(--red);border-color:rgba(255,77,106,0.3)}
.gate-btn.active[data-reaction=agree]{background:rgba(0,230,138,0.3);border-width:2px;padding:9px 13px}
.gate-btn.active[data-reaction=disagree]{background:rgba(255,77,106,0.3);border-width:2px;padding:9px 13px}
.reply-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;resize:none;min-height:80px;outline:none;opacity:0.5;transition:opacity 0.15s,border-color 0.15s}
.reply-textarea:focus{border-color:var(--border-strong)}
.reply-textarea:not(:disabled){opacity:1}
.reply-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px}
.reply-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.reply-submit{padding:9px 22px;border-radius:100px;background:var(--text);color:#000;font-size:13px;font-weight:700;opacity:0.4;transition:opacity 0.12s;cursor:not-allowed}
.reply-submit:not(:disabled){opacity:1;cursor:pointer}
/* Comments */
.comments-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:8px 2px;margin-top:8px;font-family:var(--mono)}
.comment{padding:14px 16px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px}
.comment-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.comment-author{font-weight:700;font-size:13.5px;color:var(--text)}
.comment-author:hover{color:var(--gold)}
.comment-time{font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)}
.comment-body{font-size:14px;color:var(--text-soft);line-height:1.55;white-space:pre-wrap;word-break:break-word}
.empty-replies{text-align:center;padding:28px 16px;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px}
@media(max-width:600px){.page{padding:16px 14px 80px}.take{padding:18px 16px}.take-q{font-size:16px}input,textarea{font-size:16px!important}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">HYPERFLEX</a>
  <a href="javascript:history.back()" class="nav-back">← Back</a>
</nav>
<div class="page" id="page"><div class="loading">Loading take…</div></div>
<script>
var takeId = location.pathname.split('/').pop();
var API = location.origin;

function escHtml(s){if(s==null)return '';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function getToken(){return localStorage.getItem('hf_token')||localStorage.getItem('hf_creator_token')||localStorage.getItem('hf_member_token')||''}
function getInitials(n){return (n||'?').split(/\s+/).map(function(w){return w[0]||''}).join('').toUpperCase().slice(0,2)}
function timeAgo(d){
  if(!d)return '';
  var ts=String(d).endsWith('Z')||String(d).includes('+')?d:d+'Z';
  var s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60)return 'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  if(s<2592000)return Math.floor(s/86400)+'d ago';
  return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'})
}

var _myReaction = null;
var _replyReaction = null;
var _take = null;

async function load() {
  var page = document.getElementById('page');
  try {
    var r = await fetch(API + '/api/takes/' + takeId);
    if (r.status === 404) {
      page.innerHTML = '<div class="error-state"><div class="error-icon">🔍</div><div style="font-size:16px;font-weight:700">Take not found</div><div style="font-size:13px;color:var(--muted);margin-top:6px">This take may have been deleted.</div></div>';
      return;
    }
    if (!r.ok) throw new Error('fetch failed');
    var d = await r.json();
    _take = d.take;
    document.title = 'Take — HYPERFLEX';
    render();
    loadComments();
  } catch (e) {
    console.warn('[take-load]', e);
    page.innerHTML = '<div class="error-state"><div class="error-icon">⚡</div><div style="font-size:16px;font-weight:700">Couldn\'t load</div><div style="font-size:13px;color:var(--muted);margin-top:6px">Please try again.</div></div>';
  }
}

function render() {
  var t = _take;
  var side = (t.side || '').toUpperCase();
  var isWhale = t.user_is_whale || t.source === 'whale';
  var displayName = t.user_display_name || t.display_name || 'Anonymous';
  var profileHref = t.user_id ? '/m/' + t.user_id : '#';
  var initials = isWhale ? '🐋' : getInitials(displayName);
  var whaleClass = isWhale ? ' whale' : '';
  var correctBadge = t.is_correct === true
    ? '<span class="badge badge-correct">✓ CORRECT</span>'
    : t.is_correct === false ? '<span class="badge badge-wrong">✗ WRONG</span>' : '';
  var marketHref = t.market_slug ? '/market/' + t.market_slug : '#';
  var entryTxt = t.entry_price ? '<span class="badge">Entry ' + Math.round(t.entry_price * 100) + '¢</span>' : '';

  document.getElementById('page').innerHTML =
    '<article class="take">' +
      '<div class="take-head">' +
        '<a href="' + profileHref + '" class="avatar' + whaleClass + '">' + initials + '</a>' +
        '<div class="author-row">' +
          '<a href="' + profileHref + '" class="author">' + escHtml(displayName) + '</a>' +
          '<div class="author-meta">' +
            '<span class="side ' + (side === 'YES' ? 'side-yes' : 'side-no') + '">' + side + '</span>' +
            '<span>·</span><span>' + timeAgo(t.created_at) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<a href="' + marketHref + '" class="take-q">' + escHtml(t.question || '') + '</a>' +
      (t.thesis ? '<div class="take-thesis">' + escHtml(t.thesis) + '</div>' : '') +
      '<div class="take-badges">' + entryTxt + correctBadge + '</div>' +
      '<div class="take-actions">' +
        '<button class="agree" onclick="reactTo(\'agree\',this)">👍 <span id="agreeCount">' + (t.agree_count || 0) + '</span></button>' +
        '<button class="disagree" onclick="reactTo(\'disagree\',this)">👎 <span id="disagreeCount">' + (t.disagree_count || 0) + '</span></button>' +
        '<button onclick="shareTake()">🔗 Share</button>' +
      '</div>' +
    '</article>' +
    '<section class="reply-wrap">' +
      '<div class="reply-lbl">Reply — pick a side first</div>' +
      '<div class="gate-row">' +
        '<button class="gate-btn" data-reaction="agree" onclick="setReplyReaction(\'agree\')">👍 Agree</button>' +
        '<button class="gate-btn" data-reaction="disagree" onclick="setReplyReaction(\'disagree\')">👎 Disagree</button>' +
      '</div>' +
      '<textarea id="replyBody" class="reply-textarea" disabled placeholder="Pick a side to reply…" maxlength="500" oninput="updateReplyUi()"></textarea>' +
      '<div class="reply-foot">' +
        '<span id="replyCount" class="reply-count">0/500</span>' +
        '<button id="replySubmit" class="reply-submit" disabled onclick="submitReply()">Post reply</button>' +
      '</div>' +
    '</section>' +
    '<div class="comments-title">💬 <span id="commentsHeading">Replies</span></div>' +
    '<div id="commentsList"><div class="loading" style="padding:20px">Loading replies…</div></div>';
}

function shareTake() {
  var url = location.href;
  var text = _take && _take.question ? 'Take: "' + _take.question + '"' : 'Check out this take on HYPERFLEX';
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text + '\n\n' + url), '_blank');
}
async function reactTo(reaction, btn) {
  var token = getToken();
  if (!token) { alert('Sign in to react'); return; }
  try {
    var r = await fetch(API + '/api/takes/' + takeId + '/react', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ reaction: reaction })
    });
    var d = await r.json();
    if (!d.ok && !d.agree_count && !d.disagree_count) return;
    // Toggle active state
    var agreeBtn = document.querySelector('.take-actions .agree');
    var disagreeBtn = document.querySelector('.take-actions .disagree');
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      _myReaction = null;
    } else {
      if (agreeBtn) agreeBtn.classList.remove('active');
      if (disagreeBtn) disagreeBtn.classList.remove('active');
      btn.classList.add('active');
      _myReaction = reaction;
    }
    var ac = document.getElementById('agreeCount');
    var dc = document.getElementById('disagreeCount');
    if (ac && d.agree_count != null) ac.textContent = d.agree_count;
    if (dc && d.disagree_count != null) dc.textContent = d.disagree_count;
  } catch (e) { console.warn('[react]', e); }
}

function setReplyReaction(reaction) {
  _replyReaction = reaction;
  document.querySelectorAll('.gate-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.reaction === reaction);
  });
  var ta = document.getElementById('replyBody');
  if (ta) {
    ta.disabled = false;
    ta.placeholder = reaction === 'agree' ? 'Why do you agree?' : 'Why do you disagree?';
    ta.focus();
  }
  updateReplyUi();
}

function updateReplyUi() {
  var ta = document.getElementById('replyBody');
  var submit = document.getElementById('replySubmit');
  var count = document.getElementById('replyCount');
  if (ta && count) count.textContent = ta.value.length + '/500';
  if (ta && submit) {
    var ok = ta.value.trim().length > 0 && _replyReaction;
    submit.disabled = !ok;
  }
}

async function submitReply() {
  var token = getToken();
  if (!token) { alert('Sign in to reply'); return; }
  var ta = document.getElementById('replyBody');
  if (!ta || !_replyReaction) return;
  var body = ta.value.trim();
  if (!body) return;
  var submit = document.getElementById('replySubmit');
  if (submit) { submit.disabled = true; submit.textContent = 'Posting…'; }
  try {
    var r = await fetch(API + '/api/takes/' + takeId + '/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ body: body, reaction: _replyReaction })
    });
    var d = await r.json();
    if (!r.ok) { alert(d.error || 'Failed to post'); return; }
    ta.value = '';
    updateReplyUi();
    await loadComments();
    // Reflect reaction on the take's main reaction buttons
    var mainBtn = document.querySelector('.take-actions .' + _replyReaction);
    if (mainBtn && !mainBtn.classList.contains('active')) {
      document.querySelectorAll('.take-actions .agree, .take-actions .disagree').forEach(function(b){b.classList.remove('active')});
      mainBtn.classList.add('active');
      _myReaction = _replyReaction;
    }
  } catch (e) { console.warn('[submit-reply]', e); }
  if (submit) { submit.disabled = false; submit.textContent = 'Post reply'; updateReplyUi(); }
}

async function loadComments() {
  try {
    var r = await fetch(API + '/api/takes/' + takeId + '/comments');
    if (!r.ok) return;
    var d = await r.json();
    var list = document.getElementById('commentsList');
    var heading = document.getElementById('commentsHeading');
    if (!list) return;
    var comments = d.comments || [];
    if (heading) heading.textContent = comments.length ? comments.length + ' ' + (comments.length === 1 ? 'Reply' : 'Replies') : 'Replies';
    if (!comments.length) {
      list.innerHTML = '<div class="empty-replies">No replies yet — be the first to stake a side.</div>';
      return;
    }
    list.innerHTML = comments.map(function(c) {
      var rxn = c.reaction === 'agree'
        ? '<span class="side side-yes">👍 AGREE</span>'
        : c.reaction === 'disagree' ? '<span class="side side-no">👎 DISAGREE</span>' : '';
      var name = escHtml(c.display_name || 'Anonymous');
      var nameHtml = c.user_id
        ? '<a href="/m/' + c.user_id + '" class="comment-author">' + name + '</a>'
        : '<span class="comment-author">' + name + '</span>';
      return '<div class="comment">' +
        '<div class="comment-head">' + nameHtml + rxn +
          '<span class="comment-time">' + timeAgo(c.created_at) + '</span>' +
        '</div>' +
        '<div class="comment-body">' + escHtml(c.body || '') + '</div>' +
      '</div>';
    }).join('');
  } catch (e) { console.warn('[load-comments]', e); }
}

load();
</script>
</body>
</html>
