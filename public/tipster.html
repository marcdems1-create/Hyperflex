<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipster — HYPERFLEX</title>
<meta name="description" content="Verified pick history. Locked before tip-off, graded from official results.">
<meta property="og:type" content="profile">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;--surface:rgba(255,255,255,0.03);--surface-2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.14);
  --text:#f0f0f5;--text-soft:#b4b4c4;--muted:#6b6b80;--faint:#3a3a4a;
  --gold:#f5a623;--green:#00e68a;--red:#ff4d6a;--blue:#4d9fff;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.55;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;position:sticky;top:0;z-index:10;background:rgba(11,11,18,0.78);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.nav-logo{font-size:17px;font-weight:900;letter-spacing:-0.02em}
.nav-logo .accent{color:var(--gold)}
.nav-back{color:var(--muted);font-size:13px;padding:10px 14px;min-height:44px;display:inline-flex;align-items:center}
.nav-back:hover{color:var(--text)}

main{max-width:720px;margin:0 auto;padding:32px 24px 100px}

/* Header */
.hero{margin-bottom:28px}
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.avatar{width:56px;height:56px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,rgba(245,166,35,0.25),rgba(168,85,247,0.15));border:1px solid rgba(245,166,35,0.35);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--gold);letter-spacing:-0.01em}
.ident{flex:1;min-width:0}
.handle{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.handle .verified{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--gold);padding:3px 8px;border:1px solid rgba(245,166,35,0.35);border-radius:100px;background:rgba(245,166,35,0.08);letter-spacing:0.08em}
.submeta{display:flex;align-items:center;gap:10px;margin-top:6px;font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:0.04em;flex-wrap:wrap}
.submeta .dot{color:var(--faint)}

/* Stats strip */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.stat{padding:16px 14px;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-0.01em;color:var(--text);line-height:1.1}
.stat-val.pos{color:var(--green)}
.stat-val.neg{color:var(--red)}
.stat-val.mute{color:var(--muted)}
.stat-lbl{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:6px}
.stat-sub{font-family:var(--mono);font-size:10.5px;color:var(--text-soft);margin-top:2px}

/* Section head */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:32px 0 14px}
.section-head h2{font-size:16px;font-weight:800;letter-spacing:-0.01em}
.section-head .count{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}

/* Pick rows */
.picks{display:flex;flex-direction:column;gap:10px}
.pick{padding:16px 18px;border:1px solid var(--border);border-radius:12px;background:var(--surface);transition:border-color 0.12s}
.pick:hover{border-color:var(--border-strong)}
.pick-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em;flex-wrap:wrap}
.pick-head .matchup{color:var(--text-soft);font-weight:700;letter-spacing:0}
.pick-head .dot{color:var(--faint)}
.pick-head .chip{padding:2px 8px;border-radius:100px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-size:10px}
.chip-pending{background:var(--surface-2);color:var(--text-soft);border:1px solid var(--border)}
.chip-live{background:rgba(0,230,138,0.08);color:var(--green);border:1px solid rgba(0,230,138,0.25)}
.chip-live .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:livepulse 2s infinite}
@keyframes livepulse{0%{opacity:1}50%{opacity:0.35}100%{opacity:1}}
.chip-win{background:rgba(0,230,138,0.1);color:var(--green);border:1px solid rgba(0,230,138,0.3)}
.chip-loss{background:rgba(255,77,106,0.08);color:var(--red);border:1px solid rgba(255,77,106,0.3)}
.chip-push{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
.chip-void{background:var(--surface-2);color:var(--faint);border:1px solid var(--border)}

.pick-call{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1.3;letter-spacing:-0.01em;color:var(--text);margin-bottom:6px;word-break:break-word}
.pick-call .units{color:var(--gold);margin:0 10px;font-size:15px}
.pick-call .odds{color:var(--text-soft);font-size:14px}
.pick-thesis{font-size:13.5px;color:var(--text-soft);line-height:1.55;margin:8px 0 4px;white-space:pre-wrap;word-break:break-word}

.pick-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.04);font-family:var(--mono);font-size:11px;color:var(--muted);flex-wrap:wrap}
.pick-foot .lock{color:var(--text-soft)}
.pick-foot .result{font-weight:700}
.pick-foot .result.pos{color:var(--green)}
.pick-foot .result.neg{color:var(--red)}
.pick-foot .result.mute{color:var(--muted)}
.pick-foot a.verify{color:var(--muted);border-bottom:1px dotted var(--faint)}
.pick-foot a.verify:hover{color:var(--text-soft);border-bottom-color:var(--muted)}

/* Footer */
footer{padding:48px 24px 80px;border-top:1px solid var(--border);text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-top:40px}

.loading,.empty,.error{padding:60px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px;border:1px dashed var(--border);border-radius:12px}

@media(max-width:560px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .hero-top{gap:14px}
  .avatar{width:48px;height:48px;font-size:16px}
  .handle{font-size:17px}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">HYPER<span class="accent">FLEX</span></a>
  <a href="/picks" class="nav-back">← Picks</a>
</nav>

<main id="mainEl">
  <div class="loading">Loading…</div>
</main>

<footer>HYPERFLEX · RECEIPTS, NOT SCREENSHOTS</footer>

<script>
const handle = location.pathname.replace(/^\/t\//, '').replace(/\/$/, '').toLowerCase();
const API = location.origin;

function esc(s){if(s==null)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function getInitials(h){return String(h||'?').replace(/[^a-z0-9]/gi,'').slice(0,2).toUpperCase()||'?'}

// Charter §7 formatters
function fmtUnits(n){
  if(n==null||!Number.isFinite(Number(n)))return '—';
  const v=Number(n);
  return (v>0?'+':v<0?'−':'') + Math.abs(v).toFixed(2) + 'u';
}
function fmtPct(n, digits=1){
  if(n==null||!Number.isFinite(Number(n)))return '—';
  return Number(n).toFixed(digits) + '%';
}
function fmtRoi(n){
  if(n==null||!Number.isFinite(Number(n)))return '—';
  const v=Number(n);
  return (v>0?'+':v<0?'−':'') + Math.abs(v).toFixed(1) + '%';
}
function fmtJoined(iso){
  if(!iso)return '—';
  const d=new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',year:'numeric'});
}

async function load(){
  const main = document.getElementById('mainEl');
  try{
    const r = await fetch(API + '/api/tipster/' + encodeURIComponent(handle));
    if(r.status === 404){
      main.innerHTML = '<div class="empty">No tipster by that handle.</div>';
      return;
    }
    if(!r.ok) throw new Error('load failed');
    const d = await r.json();
    render(d);
  }catch(e){
    main.innerHTML = '<div class="error">Our end. Try again in a minute.</div>';
  }
}

function renderHero(d){
  const t = d.tipster;
  const s = d.stats;
  const specialty = (t.specialty||'').toUpperCase();

  const netCls = s.net_units > 0 ? 'pos' : s.net_units < 0 ? 'neg' : 'mute';
  const roiCls = s.roi_pct == null ? 'mute' : s.roi_pct > 0 ? 'pos' : s.roi_pct < 0 ? 'neg' : 'mute';

  // Record line: "W-L-P" — pushes included only if > 0 so casuals don't see
  // "0-0-0" on day one. Voids stay hidden; they don't count toward anything.
  const rec = s.pushes > 0 ? (s.wins + '-' + s.losses + '-' + s.pushes) : (s.wins + '-' + s.losses);
  const resolved = s.wins + s.losses + s.pushes;
  const sampleStr = resolved === 0 ? 'No resolved picks yet.' : resolved + ' resolved' + (s.pending ? ' · ' + s.pending + ' pending' : '');

  document.title = '@' + t.handle + ' — HYPERFLEX';

  return (
    '<div class="hero">' +
      '<div class="hero-top">' +
        '<div class="avatar">' + esc(getInitials(t.handle)) + '</div>' +
        '<div class="ident">' +
          '<div class="handle">@' + esc(t.handle) + '<span class="verified">VERIFIED</span></div>' +
          '<div class="submeta">' +
            (specialty ? '<span>' + esc(specialty) + '</span><span class="dot">·</span>' : '') +
            '<span>Founding tipster</span>' +
            '<span class="dot">·</span>' +
            '<span>Since ' + esc(fmtJoined(t.approved_at)) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="stats">' +
        '<div class="stat"><div class="stat-val">' + esc(rec) + '</div><div class="stat-lbl">Record</div>' +
          '<div class="stat-sub">' + esc(sampleStr) + '</div></div>' +
        '<div class="stat"><div class="stat-val ' + netCls + '">' + esc(fmtUnits(s.net_units)) + '</div>' +
          '<div class="stat-lbl">Net units</div>' +
          '<div class="stat-sub">' + esc(s.units_risked > 0 ? 'on ' + s.units_risked.toFixed(2) + 'u risked' : 'no action yet') + '</div></div>' +
        '<div class="stat"><div class="stat-val ' + roiCls + '">' + esc(fmtRoi(s.roi_pct)) + '</div>' +
          '<div class="stat-lbl">ROI</div>' +
          '<div class="stat-sub">' + esc(s.win_rate != null ? fmtPct(s.win_rate) + ' win rate' : '—') + '</div></div>' +
        '<div class="stat"><div class="stat-val">' + esc(s.total_picks) + '</div><div class="stat-lbl">Picks</div>' +
          '<div class="stat-sub">' + esc(s.pending > 0 ? s.pending + ' pending' : 'all resolved') + '</div></div>' +
      '</div>' +
    '</div>'
  );
}

function render(d){
  const main = document.getElementById('mainEl');
  main.innerHTML = renderHero(d) +
    '<div class="loading" id="picksFeed">Loading picks…</div>';
  // Picks feed rendering in the next commit.
  renderPicks(d.picks || []);
}

function fmtRelative(iso){
  if(!iso)return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60) + ' min ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ', ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}

// Format the pick body per bet type. Stays factual — no editorial.
function fmtPickCall(p){
  const line = p.line == null ? '' : (p.line > 0 ? '+' + p.line : String(p.line));
  const oddsStr = Number(p.odds) > 0 ? '+' + p.odds : String(p.odds);
  const sideLabel = (s, g) => {
    if (p.bet_type === 'moneyline' || p.bet_type === 'spread') {
      if (s === 'home') return (g.home_abbr || g.home_name || 'HOME').toUpperCase();
      if (s === 'away') return (g.away_abbr || g.away_name || 'AWAY').toUpperCase();
    }
    if (p.bet_type === 'total') return s.toUpperCase();
    return s; // prop: free text
  };
  const g = { home_abbr: p.home_abbr, home_name: p.home_name, away_abbr: p.away_abbr, away_name: p.away_name };
  let body;
  if (p.bet_type === 'moneyline') {
    body = sideLabel(p.side, g) + ' ML';
  } else if (p.bet_type === 'spread') {
    body = sideLabel(p.side, g) + (line ? ' ' + line : '');
  } else if (p.bet_type === 'total') {
    body = (p.side === 'over' ? 'OVER ' : 'UNDER ') + (p.line != null ? p.line : '');
  } else {
    body = p.side; // prop
  }
  return (
    esc(body) +
    '<span class="units">' + esc(Number(p.units).toFixed(2).replace(/\.00$/, '')) + 'u</span>' +
    '<span class="odds">' + esc(oddsStr) + '</span>'
  );
}

function renderPickRow(p){
  // Matchup line
  const matchup = (p.away_abbr && p.home_abbr)
    ? (p.away_abbr + ' @ ' + p.home_abbr)
    : (p.away_name && p.home_name)
      ? (p.away_name + ' @ ' + p.home_name)
      : '';

  // Resolution chip + result line at foot
  let chip, resultLine;
  const status = p.settlement_status;
  const gameStatus = p.game_status;
  if (status === 'win') {
    chip = '<span class="chip chip-win">✓ Graded · W</span>';
    resultLine = '<span class="result pos">' + esc(fmtUnits(p.settled_units)) + '</span>';
  } else if (status === 'loss') {
    chip = '<span class="chip chip-loss">✗ Graded · L</span>';
    resultLine = '<span class="result neg">' + esc(fmtUnits(p.settled_units)) + '</span>';
  } else if (status === 'push') {
    chip = '<span class="chip chip-push">— Push</span>';
    resultLine = '<span class="result mute">0.00u</span>';
  } else if (status === 'void') {
    chip = '<span class="chip chip-void">Void</span>';
    resultLine = '<span class="result mute">0.00u</span>';
  } else if (gameStatus === 'live') {
    const score = (p.home_score != null && p.away_score != null)
      ? ' · ' + p.away_abbr + ' ' + p.away_score + ' — ' + p.home_abbr + ' ' + p.home_score
      : '';
    chip = '<span class="chip chip-live"><span class="live-dot"></span>Live' + esc(score) + '</span>';
    resultLine = '<span class="result mute">settling</span>';
  } else {
    chip = '<span class="chip chip-pending">🔒 Locked</span>';
    resultLine = '<span class="result mute">pending tip-off</span>';
  }

  const thesis = p.thesis ? '<div class="pick-thesis">' + esc(p.thesis) + '</div>' : '';

  return (
    '<div class="pick">' +
      '<div class="pick-head">' +
        (matchup ? '<span class="matchup">' + esc(matchup) + '</span><span class="dot">·</span>' : '') +
        '<span>' + esc((p.sport || '').toUpperCase()) + '</span>' +
        '<span class="dot">·</span>' +
        '<span>' + esc(p.bet_type.toUpperCase()) + '</span>' +
        chip +
      '</div>' +
      '<div class="pick-call">' + fmtPickCall(p) + '</div>' +
      thesis +
      '<div class="pick-foot">' +
        '<span class="lock">Locked ' + esc(fmtRelative(p.locked_at)) + '</span>' +
        resultLine +
        '<a class="verify" href="/api/picks/' + esc(p.id) + '/verify" target="_blank" rel="noreferrer noopener">receipt</a>' +
      '</div>' +
    '</div>'
  );
}

function renderPicks(picks){
  const box = document.getElementById('picksFeed');
  if(!box) return;
  const head = (
    '<div class="section-head">' +
      '<h2>Picks</h2>' +
      '<span class="count">' + picks.length + (picks.length === 30 ? ' · last 30' : '') + '</span>' +
    '</div>'
  );
  if(!picks.length){
    box.outerHTML = head + '<div class="empty">No picks yet. Come back at tip-off.</div>';
    return;
  }
  box.outerHTML = head + '<div class="picks">' + picks.map(renderPickRow).join('') + '</div>';
}

load();
</script>
</body>
</html>
