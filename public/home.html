<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HYPERFLEX — Prediction Markets</title>
<meta name="description" content="Track whale moves, follow sharp predictors, trade on Polymarket.">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a08;
  --border:rgba(255,255,255,.08);
  --ink:#f0f0f5;
  --ink2:rgba(240,240,245,.6);
  --muted:rgba(240,240,245,.32);
  --cyan:#00d4ff;
  --green:#00c85a;
  --red:#ff2244;
  --mono:'Space Mono',monospace;
  --sans:'Inter',sans-serif;
  --display:'Syne',sans-serif;
}
html,body{background:var(--bg);color:var(--ink);min-height:100vh;font-family:var(--sans);-webkit-font-smoothing:antialiased;}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,8,.94);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;height:52px;padding:0 20px;gap:0;
}
.nav-logo{
  font-family:var(--display);font-size:15px;font-weight:800;
  color:var(--ink);letter-spacing:-.01em;text-decoration:none;
  margin-right:28px;white-space:nowrap;flex-shrink:0;
}
.nav-tabs{display:flex;gap:2px;flex:1;min-width:0;}
.nav-tab{
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);text-decoration:none;
  padding:6px 12px;border-radius:4px;white-space:nowrap;
  transition:color .12s,background .12s;
}
.nav-tab:hover{color:var(--ink);background:rgba(255,255,255,.05);}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0;}
.nav-live{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--green);text-transform:uppercase;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav-connect{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:#0a0a08;background:var(--cyan);border:none;border-radius:4px;padding:7px 14px;cursor:pointer;text-decoration:none;transition:opacity .12s;}
.nav-connect:hover{opacity:.85;}
@media(max-width:700px){.nav-tabs{display:none;}.nav-live span:not(.nav-dot){display:none;}}

/* ── TICKER ── */
#ticker{border-bottom:1px solid var(--border);height:34px;overflow:hidden;background:rgba(10,10,8,.5);}
.t-track{display:flex;align-items:center;height:34px;white-space:nowrap;animation:t-scroll 50s linear infinite;width:max-content;}
.t-track:hover{animation-play-state:paused;}
@keyframes t-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t-item{display:inline-flex;align-items:center;gap:10px;padding:0 22px;height:34px;border-right:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--ink2);text-decoration:none;transition:background .1s;}
.t-item:hover{background:rgba(255,255,255,.04);color:var(--ink);}
.t-name{max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.t-up{color:var(--green);font-weight:700;}
.t-dn{color:var(--red);font-weight:700;}

/* ── MAIN ── */
main{max-width:1300px;margin:0 auto;padding:28px 20px 80px;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.7);flex-shrink:0;animation:blink 1.8s infinite;}
.hdr-title{font-family:var(--display);font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;}
.hdr-count{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto;}

/* ── GRID ── */
/* Left hero spans both rows; right is 2×2 */
.grid{
  display:grid;
  grid-template-columns:3fr 2fr;
  grid-template-rows:repeat(2, 1fr);
  gap:10px;
  min-height:520px;
}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr;grid-template-rows:auto;}}
@media(max-width:560px){.grid{grid-template-columns:1fr;}}

/* ── POSTER CARD ── */
.card{
  position:relative;overflow:hidden;border-radius:10px;
  border:1px solid var(--border);
  transition:border-color .15s,transform .13s;
}
.card:hover{border-color:rgba(255,255,255,.22);transform:translateY(-2px);}
.card-hero{grid-row:span 2;}

/* the image IS the card — fills 100% */
.card-bg{
  position:absolute;inset:0;
  background:#1a1a18 center/cover no-repeat;
  filter:brightness(.4) saturate(1.3);
  transition:filter .2s;
}
.card:hover .card-bg{filter:brightness(.5) saturate(1.4);}

/* gradient from transparent at top → near-opaque at bottom */
.card-grad{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(
    160deg,
    rgba(10,10,8,0) 0%,
    rgba(10,10,8,.1) 40%,
    rgba(10,10,8,.75) 68%,
    rgba(10,10,8,.97) 88%,
    rgba(10,10,8,1) 100%
  );
}

/* badges top-left */
.badges{position:absolute;top:12px;left:12px;display:flex;gap:6px;z-index:3;flex-wrap:wrap;}
.badge{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;padding:3px 7px;border-radius:3px;text-transform:uppercase;}
.b-live{background:rgba(10,10,8,.72);border:1px solid rgba(0,200,90,.3);color:var(--green);display:flex;align-items:center;gap:4px;}
.b-live-dot{width:4px;height:4px;border-radius:50%;background:var(--green);}
.b-vol{background:rgba(10,10,8,.72);border:1px solid rgba(255,255,255,.12);color:var(--ink2);}
.b-edge{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.28);color:var(--cyan);}

/* content pinned to bottom */
.card-body{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px;
}

.card-q{
  font-family:var(--display);font-weight:800;color:#fff;
  line-height:1.18;letter-spacing:-.015em;margin-bottom:10px;
  text-shadow:0 1px 16px rgba(0,0,0,.9);
}
.card-hero .card-q{font-size:clamp(18px,2.2vw,26px);}
.card .card-q{font-size:clamp(13px,1.4vw,16px);}

/* price row */
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
.price-num{font-family:var(--mono);font-weight:700;line-height:1;}
.card-hero .price-num{font-size:clamp(28px,3.2vw,44px);}
.card    .price-num{font-size:clamp(20px,2vw,28px);}
.price-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.06em;}

/* progress bar */
.bar-wrap{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.bar-fill{height:100%;border-radius:2px;}

.card-close{font-family:var(--mono);font-size:9px;color:rgba(240,240,245,.38);letter-spacing:.05em;margin-bottom:10px;}

/* YES / NO */
.btns{display:flex;gap:6px;}
.btn{
  flex:1;border:none;border-radius:4px;cursor:pointer;
  font-family:var(--mono);font-weight:700;letter-spacing:.08em;
  text-decoration:none;display:flex;align-items:center;justify-content:center;
  transition:opacity .12s,transform .1s;
}
.card-hero .btn{height:40px;font-size:11px;}
.card      .btn{height:32px;font-size:10px;}
.btn-y{background:rgba(0,200,90,.14);color:var(--green);border:1px solid rgba(0,200,90,.28);}
.btn-n{background:rgba(255,34,68,.1); color:var(--red);  border:1px solid rgba(255,34,68,.22);}
.btn:hover{opacity:.75;transform:translateY(-1px);}

/* ── SKELETON ── */
@keyframes sk{0%,100%{opacity:.3}50%{opacity:.55}}
.sk{background:rgba(255,255,255,.07);animation:sk 1.5s infinite;}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">HYPERFLEX</a>
  <div class="nav-tabs">
    <a class="nav-tab" href="/alpha-live">Alpha</a>
    <a class="nav-tab" href="/whales">Whales</a>
    <a class="nav-tab" href="/feed">Feed</a>
    <a class="nav-tab" href="/predictors">Leaderboard</a>
    <a class="nav-tab" href="/mentions">Mentions</a>
  </div>
  <div class="nav-right">
    <div class="nav-live"><span class="nav-dot"></span><span>LIVE</span></div>
    <a class="nav-connect" href="/creator/login">Connect Wallet</a>
  </div>
</nav>

<div id="ticker">
  <div class="t-track" id="tTrack"><!-- filled by JS --></div>
</div>

<main>
  <div class="hdr">
    <span class="hdr-dot"></span>
    <span class="hdr-title">HOT MARKETS RIGHT NOW</span>
    <span class="hdr-count" id="mktCount"></span>
  </div>
  <div class="grid" id="grid">
    <!-- skeletons -->
    <div class="card card-hero sk" style="border-color:transparent;min-height:440px;"></div>
    <div class="card sk" style="border-color:transparent;min-height:210px;"></div>
    <div class="card sk" style="border-color:transparent;min-height:210px;"></div>
    <div class="card sk" style="border-color:transparent;min-height:210px;"></div>
    <div class="card sk" style="border-color:transparent;min-height:210px;"></div>
  </div>
</main>

<script>
(function(){
  function fmtVol(v){
    v=Number(v||0);
    if(v>=1e9)return'$'+(v/1e9).toFixed(1)+'B';
    if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';
    if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';
    return v>0?'$'+Math.round(v):'';
  }
  function fmtClose(s){
    if(!s)return null;
    var ms=new Date(s).getTime()-Date.now();
    if(ms<=0)return'Resolving soon';
    var d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000);
    if(d>30){var dt=new Date(s);return'Closes '+dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
    return d>0?'Closes in '+d+'d '+h+'h':'Closes in '+h+'h';
  }
  function edgeScore(pct){
    // placeholder — distance from 50¢ signals informativeness
    return Math.min(97,Math.round(Math.abs(pct-50)*0.4+50+Math.random()*2));
  }
  function pCol(pct){
    return pct>=65?'var(--green)':pct<=35?'var(--red)':'#e8e8e0';
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function buildCard(m, hero){
    var href  = '/market/'+esc(m.slug);
    var pct   = m.max_price_pct;
    var col   = pct!=null?pCol(pct):'#e8e8e0';
    var vol   = fmtVol(m.volume_24h||m.volume||0);
    var close = fmtClose(m.end_date);
    var edge  = pct!=null?edgeScore(pct):null;
    var bgStyle = m.image
      ? 'background-image:url('+JSON.stringify(m.image)+');'
      : '';

    return '<div class="card'+(hero?' card-hero':'')+'">'
      // background image layer
      +'<div class="card-bg" style="'+bgStyle+'"></div>'
      // gradient overlay
      +'<div class="card-grad"></div>'
      // top badges
      +'<div class="badges">'
      +'<span class="badge b-live"><span class="b-live-dot"></span>LIVE</span>'
      +(vol?'<span class="badge b-vol">'+esc(vol)+'</span>':'')
      +(edge!=null?'<span class="badge b-edge">EDGE '+edge+'</span>':'')
      +'</div>'
      // content
      +'<div class="card-body">'
      +'<div class="card-q">'+esc(m.title||'—')+'</div>'
      +(pct!=null
        ?'<div class="price-row">'
          +'<span class="price-num" style="color:'+col+';">'+pct+'¢</span>'
          +'<span class="price-label">LEADING OUTCOME</span>'
          +'</div>'
          +'<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+col+';"></div></div>'
        :'')
      +(close?'<div class="card-close">'+esc(close)+'</div>':'')
      +'<div class="btns">'
      +'<a class="btn btn-y" href="'+href+'?side=YES">YES</a>'
      +'<a class="btn btn-n" href="'+href+'?side=NO">NO</a>'
      +'</div>'
      +'</div>'
      +'</div>';
  }

  function renderGrid(markets){
    if(!markets||!markets.length)return;
    var grid=document.getElementById('grid');
    var count=document.getElementById('mktCount');
    if(count)count.textContent=markets.length+' MARKETS';
    grid.innerHTML=markets.map(function(m,i){return buildCard(m,i===0);}).join('');
  }

  function buildTicker(markets){
    var track=document.getElementById('tTrack');
    function item(m){
      var pct=m.max_price_pct;
      var up=pct!=null&&pct>=50;
      return '<a class="t-item" href="/market/'+esc(m.slug)+'">'
        +'<span class="t-name">'+esc((m.title||'').slice(0,55))+'</span>'
        +(pct!=null?'<span class="'+(up?'t-up':'t-dn')+'">'+pct+'¢ '+(up?'↑':'↓')+'</span>':'')
        +'</a>';
    }
    var inner=markets.map(item).join('');
    track.innerHTML=inner+inner;
    track.style.animationDuration=(markets.length*9)+'s';
  }

  // single server-side endpoint — images guaranteed, CORS-free
  fetch('/api/home-markets')
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      var markets=d&&Array.isArray(d.markets)?d.markets:[];
      if(markets.length){renderGrid(markets);buildTicker(markets);}
    })
    .catch(function(e){console.error('[home]',e);});
})();
</script>
</body>
</html>
