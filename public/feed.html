<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flex Feed — HYPERFLEX</title>
<meta name="description" content="The social feed of prediction markets. Post takes, prove your track record, build your Flex Score."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9920d;--gold-dim:rgba(201,146,13,0.15);--paper:#0a0a0f;--surface:#111118;--card:#16161f;--border:#1e1e2a;--border-hover:#2a2a38;--text:#e8e6f0;--text-soft:#a0a0b4;--muted:#6b6880;--dim:#4a4760;--green:#00e68a;--green-dim:rgba(0,230,138,0.15);--red:#ff4d6a;--red-dim:rgba(255,77,106,0.15);--blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);--purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);--amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--paper);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.feed-wrap{max-width:660px;margin:0 auto;padding:60px 16px 40px}
nav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.nb{font-family:var(--mono);font-size:14px;font-weight:900;color:var(--gold);letter-spacing:-0.5px}
.nl{display:flex;gap:14px;align-items:center}
.nl a{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);transition:color .15s}
.nl a:hover{color:var(--text)}
.nl a.on{color:var(--gold)}
.fh{padding:18px 0 0}
.ft{font-family:var(--mono);font-size:22px;font-weight:900;color:var(--gold);letter-spacing:-0.5px;display:flex;align-items:center;gap:10px}
.fs{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:3px}
.ld{width:8px;height:8px;border-radius:50%;background:var(--green);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-top:14px}
.tab{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;user-select:none}
.tab:hover{color:var(--text-soft)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.cmp{display:flex;gap:10px;padding:14px 0;border-bottom:1px solid var(--border)}
.cav{width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;color:#000;flex-shrink:0;overflow:hidden}
.cbtn{font-family:var(--mono);font-size:11px;font-weight:700;color:#000;background:var(--gold);border:none;border-radius:20px;padding:8px 20px;cursor:pointer;align-self:center}
.cbtn:hover{background:#daa520}
.tk{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.tk:hover{background:rgba(255,255,255,.01)}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden}
.av.w{background:linear-gradient(135deg,#a855f7,#6d28d9);color:#fff}
.av.c{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
.av.i{background:linear-gradient(135deg,#1d9bf0,#0a66c2);color:#fff}
.av.u{background:var(--gold);color:#000}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.tb{flex:1;min-width:0}
.th{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tn{font-size:13px;font-weight:700;color:var(--text)}
.tn:hover{text-decoration:underline}
.bg{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px}
.bg-w{background:var(--purple-dim);color:var(--purple)}
.bg-i{background:rgba(29,155,240,.12);color:#1d9bf0}
.bg-c{background:var(--amber-dim);color:var(--amber)}
.bg-ok{background:var(--green-dim);color:var(--green)}
.bg-no{background:var(--red-dim);color:var(--red)}
.tt{font-size:11px;color:var(--dim);margin-left:auto}
.ml{display:flex;align-items:center;gap:8px;margin-top:7px;padding:9px 12px;background:rgba(22,22,31,.8);border:1px solid var(--border);border-radius:10px;transition:border-color .15s}
.ml:hover{border-color:var(--border-hover)}
.mq{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;flex:1;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sd{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;flex-shrink:0}
.sy{background:var(--green-dim);color:var(--green)}
.sn{background:var(--red-dim);color:var(--red)}
.tx{font-size:13px;color:var(--text-soft);line-height:1.5;margin-top:6px;word-break:break-word}
.ta{display:flex;gap:0;margin-top:10px}
.ab{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:none;padding:5px 14px 5px 0;cursor:pointer;transition:color .15s}
.ab:hover{color:var(--text-soft)}
.ab.ag.on{color:var(--green)}
.ab.dg.on{color:var(--red)}
.ab .ic{font-size:15px}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ei{font-size:36px;margin-bottom:10px}
.ld-txt{text-align:center;padding:20px;font-size:12px;color:var(--muted)}
/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:center;padding-top:12vh}
.mo.open{display:flex}
.mx{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:540px;padding:20px}
.mx h3{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);margin-bottom:14px}
.mx input[type=search]{width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none}
.mx input:focus{border-color:rgba(201,146,13,.4)}
.mx textarea{width:100%;min-height:70px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;resize:vertical;outline:none}
.mx textarea:focus{border-color:rgba(201,146,13,.4)}
.mr{padding:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px}
.mr:hover{background:rgba(255,255,255,.03)}
.mr .rq{font-size:12px;font-weight:600;color:var(--text);flex:1;line-height:1.3}
.mr .ro{font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0}
.sm{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border:1px solid rgba(201,146,13,.3);border-radius:10px;margin-bottom:12px}
.sm .sq{font-size:13px;font-weight:600;color:var(--text);flex:1}
.sb{display:flex;gap:8px;margin-bottom:12px}
.si{font-family:var(--mono);font-size:13px;font-weight:700;padding:10px 28px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;flex:1;text-align:center}
.si.yes{color:var(--green)}
.si.yes.pk{background:var(--green-dim);border-color:var(--green)}
.si.no{color:var(--red)}
.si.no.pk{background:var(--red-dim);border-color:var(--red)}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.mf .cc{font-family:var(--mono);font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer}
.mf .cs{font-family:var(--mono);font-size:11px;font-weight:700;color:#000;background:var(--gold);border:none;border-radius:8px;padding:8px 22px;cursor:pointer}
.mf .cs:disabled{opacity:.4}
</style>
</head>
<body>
<nav>
  <a href="/" class="nb">HYPERFLEX</a>
  <div class="nl">
    <a href="/feed" class="on">Feed</a>
    <a href="/explore">Explore</a>
    <a href="/alpha">Alpha</a>
    <a href="/whales">Whales</a>
    <a href="/predictors">Leaderboard</a>
  </div>
</nav>
<div class="feed-wrap">
  <div class="fh">
    <div class="ft"><span class="ld"></span> FLEX FEED</div>
    <div class="fs">Predict. Prove. Flex.</div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="sw('foryou')" id="t-foryou">For You</div>
    <div class="tab" onclick="sw('following')" id="t-following">Following</div>
    <div class="tab" onclick="sw('trending')" id="t-trending">Trending</div>
  </div>
  <div class="cmp" id="cbar">
    <div class="cav" id="myav">?</div>
    <div style="flex:1;cursor:text;display:flex;align-items:center" onclick="openC()">
      <span style="color:var(--dim);font-size:14px">What's your take on the market?</span>
    </div>
    <button class="cbtn" onclick="openC()">Post Take</button>
  </div>
  <div id="feed"><div class="ld-txt">Loading Flex Feed...</div></div>
  <div id="more" style="display:none;text-align:center;padding:16px">
    <button onclick="loadMore()" style="font-family:var(--mono);font-size:11px;color:var(--gold);background:transparent;border:1px solid rgba(201,146,13,.3);border-radius:8px;padding:8px 24px;cursor:pointer">Load more</button>
  </div>
</div>

<!-- Compose Modal -->
<div class="mo" id="modal" onclick="if(event.target===this)closeC()">
  <div class="mx">
    <h3>Post Your Take</h3>
    <div id="s1">
      <input type="search" id="ms" placeholder="Search a Polymarket market..." oninput="searchM(this.value)" autocomplete="off">
      <div id="mres" style="max-height:220px;overflow-y:auto;margin-top:4px"></div>
    </div>
    <div id="s2" style="display:none">
      <div class="sm"><div class="sq" id="sq"></div><button onclick="clrM()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">&times;</button></div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Pick your side</div>
      <div class="sb">
        <button class="si yes" id="by" onclick="pick('YES')">YES</button>
        <button class="si no" id="bn" onclick="pick('NO')">NO</button>
      </div>
    </div>
    <div id="s3" style="display:none">
      <textarea id="thesis" placeholder="Why? What's your thesis? (optional)" maxlength="500"></textarea>
      <div style="text-align:right;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:4px"><span id="ch">0</span>/500</div>
    </div>
    <div class="mf">
      <button class="cc" onclick="closeC()">Cancel</button>
      <button class="cs" id="sub" onclick="post()" disabled>Post Take</button>
    </div>
  </div>
</div>

<script>
var _m='foryou',_cur=null,_ld=false,_sel=null,_sd=null;
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function tk(){return localStorage.getItem('hf_token')||localStorage.getItem('hf_member_token')||''}
function ta(d){if(!d)return'';var s=d.endsWith('Z')||d.includes('+')?d:d+'Z';var x=Math.floor((Date.now()-new Date(s))/1e3);if(x<0)return'now';if(x<60)return x+'s';if(x<3600)return Math.floor(x/60)+'m';if(x<86400)return Math.floor(x/3600)+'h';return Math.floor(x/86400)+'d'}
function ini(n){return(n||'?').split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2)}

function sw(m){_m=m;_cur=null;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});var el=document.getElementById('t-'+m);if(el)el.classList.add('on');document.getElementById('cbar').style.display=m==='following'?'none':'flex';lf(false)}

function lf(ap){
  if(_ld)return;_ld=true;var el=document.getElementById('feed');
  if(!ap)el.innerHTML='<div class="ld-txt">Loading...</div>';
  var url=_m==='trending'?'/api/takes/trending?limit=30'+(_cur?'&offset='+_cur:''):'/api/takes/feed?mode='+_m+'&limit=30'+(_cur?'&cursor='+encodeURIComponent(_cur):'');
  var h={Accept:'application/json'};var t=tk();if(t)h['Authorization']='Bearer '+t;
  fetch(url,{headers:h}).then(function(r){return r.ok?r.json():{takes:[]}}).then(function(d){
    var ts=d.takes||[];if(!ap)el.innerHTML='';
    if(!ts.length&&!ap){el.innerHTML='<div class="empty"><div class="ei">'+(_m==='following'?'\uD83D\uDC65':'\uD83D\uDD25')+'</div><div>'+(_m==='following'?'Follow predictors to see their takes':'No takes yet \u2014 post the first one')+'</div></div>';document.getElementById('more').style.display='none';_ld=false;return}
    for(var i=0;i<ts.length;i++)el.insertAdjacentHTML('beforeend',rt(ts[i]));
    _cur=_m==='trending'?ts.length:(d.cursor||null);
    document.getElementById('more').style.display=ts.length>=20?'block':'none';_ld=false;
  }).catch(function(){if(!ap)el.innerHTML='<div class="empty">Failed to load</div>';_ld=false});
}
function loadMore(){lf(true)}

function rt(t){
  var iW=t.source==='whale',iC=t.source==='consensus',iI=t.source==='influencer';
  var ac=iI?'i':iW?'w':iC?'c':'u';
  var ai=iW?'\uD83D\uDC33':iC?'\uD83E\uDD1D':iI?'\uD835\uDD4F':ini(t.display_name);
  var an=t.avatar_url?'<img src="'+e(t.avatar_url)+'" onerror="this.style.display=\'none\';this.parentNode.textContent=\''+ai+'\'">':ai;
  var hr=t.user_id?'/m/'+t.user_id:null;
  var av=hr?'<a href="'+hr+'" class="av '+ac+'">'+an+'</a>':'<div class="av '+ac+'">'+an+'</div>';
  var nm=hr?'<a href="'+hr+'" class="tn">'+e(t.display_name||'Anonymous')+'</a>':'<span class="tn">'+e(t.display_name||'Anonymous')+'</span>';
  var bg='';
  if(iI)bg+='<span class="bg bg-i">\uD835\uDD4F INFLUENCER</span>';
  else if(iW)bg+='<span class="bg bg-w">WHALE</span>';
  else if(iC)bg+='<span class="bg bg-c">CONSENSUS</span>';
  if(t.flex_score!=null&&t.flex_score>0){var fc=t.flex_score>=70?'var(--gold)':t.flex_score>=55?'var(--green)':t.flex_score>=40?'var(--blue)':'var(--red)';var fb=t.flex_score>=70?'var(--gold-dim)':t.flex_score>=55?'var(--green-dim)':t.flex_score>=40?'var(--blue-dim)':'var(--red-dim)';bg+='<span class="bg" style="color:'+fc+';background:'+fb+'">'+t.flex_score+'% FLEX</span>'}
  if(t.is_correct===true)bg+='<span class="bg bg-ok">\u2713 CORRECT</span>';
  else if(t.is_correct===false)bg+='<span class="bg bg-no">\u2717 WRONG</span>';
  var sc=(t.side||'').toUpperCase()==='YES'?'sy':'sn';
  var ml='';if(t.question){var mh=t.market_slug?'/market/'+t.market_slug:'https://polymarket.com/search?query='+encodeURIComponent(t.question.substring(0,60));ml='<a class="ml" href="'+mh+'" target="_blank"><div class="mq">'+e(t.question)+'</div><span class="sd '+sc+'">'+(t.side||'').toUpperCase()+'</span>'+(t.entry_price?'<span style="font-family:var(--mono);font-size:11px;color:var(--text-soft)">'+Math.round(t.entry_price*100)+'\u00a2</span>':'')+'</a>'}
  var tx=t.thesis?'<div class="tx">'+e(t.thesis)+'</div>':'';
  var ao=t.my_reaction==='agree'?' on':'',do2=t.my_reaction==='disagree'?' on':'';
  return'<div class="tk" id="k-'+t.id+'">'+av+'<div class="tb"><div class="th">'+nm+bg+'<span class="tt">'+ta(t.created_at)+'</span></div>'+ml+tx+
    '<div class="ta"><button class="ab ag'+ao+'" onclick="rx(\''+t.id+'\',\'agree\',this)"><span class="ic">\u2191</span><span class="ct">'+(t.agree_count||0)+'</span></button>'+
    '<button class="ab dg'+do2+'" onclick="rx(\''+t.id+'\',\'disagree\',this)"><span class="ic">\u2193</span><span class="ct">'+(t.disagree_count||0)+'</span></button>'+
    '<button class="ab" onclick="sh(\''+t.id+'\')"><span class="ic">\u2197</span></button></div></div></div>';
}

function rx(id,type,btn){var t=tk();if(!t){alert('Sign in to react');return}
  fetch('/api/takes/'+id+'/react',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+t},body:JSON.stringify({reaction:type})})
  .then(function(r){return r.json()}).then(function(d){if(!d.ok)return;var c=document.getElementById('k-'+id);if(!c)return;
    var ag=c.querySelector('.ab.ag'),dg=c.querySelector('.ab.dg');
    if(btn.classList.contains('on'))btn.classList.remove('on');else{if(ag)ag.classList.remove('on');if(dg)dg.classList.remove('on');btn.classList.add('on')}
    if(ag)ag.querySelector('.ct').textContent=d.agree_count||0;if(dg)dg.querySelector('.ct').textContent=d.disagree_count||0;
  }).catch(function(){});}

function sh(id){var c=document.getElementById('k-'+id);if(!c)return;var q=c.querySelector('.mq');
  window.open('https://x.com/intent/tweet?text='+encodeURIComponent((q?q.textContent:'Check out this take')+'\n\nhyperflex.network/feed'),'_blank');}

function openC(){var t=tk();if(!t){alert('Sign in to post a take');return}_sel=null;_sd=null;
  document.getElementById('ms').value='';document.getElementById('mres').innerHTML='';
  document.getElementById('s1').style.display='block';document.getElementById('s2').style.display='none';document.getElementById('s3').style.display='none';
  document.getElementById('sub').disabled=true;document.getElementById('by').classList.remove('pk');document.getElementById('bn').classList.remove('pk');
  document.getElementById('thesis').value='';document.getElementById('ch').textContent='0';
  document.getElementById('modal').classList.add('open');setTimeout(function(){document.getElementById('ms').focus()},100);}
function closeC(){document.getElementById('modal').classList.remove('open')}

var _st;
function searchM(q){clearTimeout(_st);var r=document.getElementById('mres');if(!q||q.length<2){r.innerHTML='';return}
  _st=setTimeout(function(){fetch('/api/takes/search-markets?q='+encodeURIComponent(q)).then(function(r){return r.ok?r.json():{markets:[]}}).then(function(d){
    var ms=d.markets||[];if(!ms.length){r.innerHTML='<div style="padding:12px;font-size:12px;color:var(--muted)">No markets found</div>';return}
    r.innerHTML=ms.map(function(m){var yp=m.yes_price!=null?Math.round(m.yes_price*100)+'%':'\u2014';var np=m.yes_price!=null?(100-Math.round(m.yes_price*100))+'%':'\u2014';
      return'<div class="mr" onclick=\'selM('+JSON.stringify(JSON.stringify(m))+')\'>'+
        '<div class="rq">'+e(m.question||'')+'</div>'+
        '<span class="ro" style="color:var(--green)">'+yp+'</span>'+
        '<span style="color:var(--muted);font-family:var(--mono);font-size:10px">/</span>'+
        '<span class="ro" style="color:var(--red)">'+np+'</span></div>';}).join('');
  }).catch(function(){r.innerHTML='<div style="padding:12px;color:var(--red);font-size:12px">Search failed</div>'})},250);}

function selM(j){var m=JSON.parse(j);_sel=m;_sd=null;
  document.getElementById('s1').style.display='none';document.getElementById('s2').style.display='block';document.getElementById('s3').style.display='block';
  document.getElementById('sq').textContent=m.question;document.getElementById('by').classList.remove('pk');document.getElementById('bn').classList.remove('pk');
  var yp=m.yes_price!=null?Math.round(m.yes_price*100)+'%':'';var np=m.yes_price!=null?(100-Math.round(m.yes_price*100))+'%':'';
  document.getElementById('by').textContent='YES'+(yp?' '+yp:'');document.getElementById('bn').textContent='NO'+(np?' '+np:'');
  document.getElementById('sub').disabled=true;}

function clrM(){_sel=null;_sd=null;document.getElementById('s1').style.display='block';document.getElementById('s2').style.display='none';document.getElementById('s3').style.display='none';
  document.getElementById('sub').disabled=true;document.getElementById('ms').value='';document.getElementById('ms').focus();}

function pick(s){_sd=s;document.getElementById('by').classList.toggle('pk',s==='YES');document.getElementById('bn').classList.toggle('pk',s==='NO');document.getElementById('sub').disabled=false}

document.getElementById('thesis').addEventListener('input',function(){document.getElementById('ch').textContent=this.value.length});

function post(){var t=tk();if(!t||!_sel||!_sd)return;var b=document.getElementById('sub');b.disabled=true;b.textContent='Posting...';
  var th=document.getElementById('thesis').value.trim();
  fetch('/api/takes',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+t},
    body:JSON.stringify({market_slug:_sel.slug||null,condition_id:_sel.condition_id||null,question:_sel.question,side:_sd,entry_price:_sel.yes_price||null,thesis:th||null})
