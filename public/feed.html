<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flex Feed — HYPERFLEX</title>
<meta name="description" content="The social feed of prediction markets. See what the sharpest traders are calling, follow their track record, and act on edge."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;
  --surface:#13131a;
  --surface-2:#1a1a24;
  --gold:#f5a623;
  --gold-dim:rgba(245,166,35,0.10);
  --gold-border:rgba(245,166,35,0.30);
  --purple:#7c5cfc;
  --purple-dim:rgba(124,92,252,0.10);
  --purple-border:rgba(124,92,252,0.28);
  --green:#22c55e;
  --green-dim:rgba(34,197,94,0.10);
  --red:#ff4d6a;
  --red-dim:rgba(255,77,106,0.10);
  --text:#f1f0f5;
  --text-dim:#8b8a9a;
  --border:rgba(255,255,255,0.07);
  --mono:'Space Mono',monospace;
  --sans:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(13,13,16,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px}
.nb{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:-.5px;flex-shrink:0}
.nl{display:flex;gap:12px;align-items:center}
.nl a{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;transition:color .15s;white-space:nowrap}
.nl a:hover{color:var(--text)}
.nl a.on{color:var(--gold)}
.nr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:6px 14px;border-radius:7px;cursor:pointer;letter-spacing:.04em;transition:all .15s;white-space:nowrap}
.nav-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.nav-btn-ghost:hover{border-color:var(--gold-border);color:var(--gold)}
.nav-btn-gold{background:var(--gold);border:none;color:#0d0d10}
.nav-btn-gold:hover{opacity:.88}

/* Layout */
.wrap{max-width:680px;margin:0 auto;padding:72px 16px 48px}

/* Page header */
.page-hd{padding:20px 0 16px}
.page-title{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.page-sub{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:4px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2px}
.tab{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-dim);padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.06em;user-select:none}
.tab:hover{color:var(--text)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* CTA banner for non-authenticated users */
.post-cta{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:12px;margin:14px 0}
.post-cta-text{font-family:var(--mono);font-size:11px;color:var(--text-dim);flex:1}
.post-cta-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:6px 16px;background:var(--gold);border:none;border-radius:7px;color:#0d0d10;cursor:pointer;white-space:nowrap}

/* Feed cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;border-top:2px solid var(--purple);padding:16px;margin-bottom:12px;transition:border-color .15s}
.card:hover{border-color:var(--purple-border)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;min-width:0}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#5b21b6);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.author-block{min-width:0}
.author-name{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.author-name:hover{text-decoration:underline;cursor:pointer}
.author-meta{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:1px}
.follow-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 12px;border:1px solid var(--purple-border);border-radius:6px;background:var(--purple-dim);color:var(--purple);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.follow-btn:hover{background:rgba(124,92,252,0.2)}
.follow-btn.following{border-color:rgba(255,255,255,0.12);background:transparent;color:var(--text-dim)}
.timestamp{font-family:var(--mono);font-size:10px;color:var(--text-dim);flex-shrink:0}

.badge-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.03em}
.badge-platform{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple-border)}
.badge-yes{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.badge-no{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,106,0.25)}
.badge-size{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.badge-correct{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.badge-wrong{background:rgba(255,77,106,0.10);color:var(--red);border:1px solid rgba(255,77,106,0.2)}
.badge-conv-low{background:rgba(139,138,154,0.10);color:var(--text-dim);border:1px solid rgba(139,138,154,0.15)}
.badge-conv-medium{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.badge-conv-high{background:rgba(251,146,60,0.12);color:#fb923c;border:1px solid rgba(251,146,60,0.25)}

.market-title{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:8px}
.thesis{font-family:var(--sans);font-size:13px;color:var(--gold);line-height:1.55;border-left:2px solid var(--gold-border);padding-left:12px;margin-bottom:10px;word-break:break-word}
.domain-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.domain-tag{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.2)}

/* Empty / loading states */
.empty{text-align:center;padding:56px 20px;color:var(--text-dim)}
.empty-icon{font-size:38px;margin-bottom:12px}
.empty-title{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-sub{font-family:var(--sans);font-size:13px;line-height:1.5;max-width:320px;margin:0 auto 20px}
.empty-action{font-family:var(--mono);font-size:11px;font-weight:700;padding:8px 22px;background:var(--gold);border:none;border-radius:8px;color:#0d0d10;cursor:pointer}
.ld-txt{text-align:center;padding:28px;font-family:var(--mono);font-size:11px;color:var(--text-dim)}
.load-more{display:none;text-align:center;padding:16px}
.load-more-btn{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--gold);background:transparent;border:1px solid var(--gold-border);border-radius:8px;padding:8px 26px;cursor:pointer;transition:background .15s}
.load-more-btn:hover{background:var(--gold-dim)}
</style>
</head>
<body>

<nav>
  <a href="/" class="nb">HYPERFLEX</a>
  <div class="nl">
    <a href="/feed" class="on">Feed</a>
    <a href="/explore">Explore</a>
    <a href="/alpha-live">Alpha</a>
    <a href="/whales">Whales</a>
    <a href="/predictors">Predictors</a>
  </div>
  <div class="nr" id="nav-right">
    <button class="nav-btn nav-btn-ghost" onclick="window.location.href='/creator/login'">Sign in</button>
    <button class="nav-btn nav-btn-gold" onclick="window.location.href='/creator/dashboard'">Dashboard</button>
  </div>
</nav>

<div class="wrap">
  <div class="page-hd">
    <div class="page-title"><span class="live-dot"></span>FLEX FEED</div>
    <div class="page-sub">Predictions from the sharpest traders — sourced from real positions</div>
  </div>

  <div class="tabs">
    <div class="tab on" id="t-foryou" onclick="switchTab('foryou')">For You</div>
    <div class="tab" id="t-following" onclick="switchTab('following')">Following</div>
    <div class="tab" id="t-trending" onclick="switchTab('trending')">Trending</div>
  </div>

  <!-- CTA for guests -->
  <div class="post-cta" id="post-cta" style="display:none">
    <span class="post-cta-text">Post predictions from your open positions and build your track record.</span>
    <button class="post-cta-btn" onclick="window.location.href='/creator/dashboard#portfolio'">Go to Dashboard →</button>
  </div>

  <div id="feed"><div class="ld-txt">Loading...</div></div>
  <div class="load-more" id="load-more">
    <button class="load-more-btn" onclick="loadMore()">Load more</button>
  </div>
</div>

<script>
var _tab = 'foryou', _cursor = null, _loading = false;
var _following = new Set();

function e(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function tk() { return localStorage.getItem('hf_token') || localStorage.getItem('creator_token') || ''; }
function timeAgo(d) {
  if (!d) return '';
  var s = d.endsWith('Z') || d.includes('+') ? d : d + 'Z';
  var x = Math.floor((Date.now() - new Date(s)) / 1000);
  if (x < 0) return 'now'; if (x < 60) return x + 's'; if (x < 3600) return Math.floor(x/60) + 'm';
  if (x < 86400) return Math.floor(x/3600) + 'h'; return Math.floor(x/86400) + 'd';
}
function initials(n) { return (n||'?').split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2); }
function sizeLabel(usd) {
  if (!usd) return null;
  if (usd < 250) return '<$250'; if (usd < 1000) return '$250–$1K';
  if (usd < 5000) return '$1K–$5K'; return '$5K+';
}
function platformLabel(p) { return p === 'kalshi' ? 'Kalshi' : p === 'manifold' ? 'Manifold' : 'Polymarket'; }

function switchTab(tab) {
  _tab = tab; _cursor = null;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  document.getElementById('t-' + tab).classList.add('on');
  load(false);
}

function load(append) {
  if (_loading) return;
  _loading = true;
  var feed = document.getElementById('feed');
  if (!append) feed.innerHTML = '<div class="ld-txt">Loading...</div>';

  var url = '/api/predictions/feed?mode=' + _tab + '&limit=20' + (_cursor ? '&cursor=' + encodeURIComponent(_cursor) : '');
  var headers = { Accept: 'application/json' };
  var t = tk(); if (t) headers['Authorization'] = 'Bearer ' + t;

  fetch(url, { headers: headers })
    .then(function(r) { return r.ok ? r.json() : { predictions: [] }; })
    .then(function(d) {
      var preds = d.predictions || [];
      if (!append) feed.innerHTML = '';
      if (!preds.length && !append) {
        if (_tab === 'following') {
          feed.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No predictions yet</div><div class="empty-sub">Follow predictors on the leaderboard to see their takes here.</div><button class="empty-action" onclick="window.location.href=\'/predictors\'">Browse Predictors</button></div>';
        } else {
          feed.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No predictions yet</div><div class="empty-sub">Predictions posted from the dashboard will appear here.</div><button class="empty-action" onclick="window.location.href=\'/creator/dashboard\'">Go to Dashboard</button></div>';
        }
        document.getElementById('load-more').style.display = 'none';
        _loading = false; return;
      }
      preds.forEach(function(p) { feed.insertAdjacentHTML('beforeend', renderCard(p)); });
      _cursor = preds.length ? preds[preds.length - 1].posted_at : null;
      document.getElementById('load-more').style.display = preds.length >= 20 ? 'block' : 'none';
      _loading = false;
    })
    .catch(function() {
      if (!append) feed.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div></div>';
      _loading = false;
    });
}

function loadMore() { load(true); }

function renderCard(p) {
  var dir = (p.direction || 'YES').toUpperCase();
  var isYes = dir === 'YES';
  var platform = platformLabel(p.platform);
  var sizeUsd = p.position_size_usd;
  var sizeStr = sizeUsd ? (p.size_display === 'exact' ? '$' + Math.round(sizeUsd) : sizeLabel(sizeUsd)) : null;
  var entryStr = p.entry_price != null ? Math.round(p.entry_price * 100) + '¢' : null;
  var flexScore = p.flex_score_90d != null ? p.flex_score_90d : p.flex_score_alltime;
  var flexColor = flexScore >= 70 ? 'var(--gold)' : flexScore >= 55 ? 'var(--green)' : flexScore >= 40 ? '#60a5fa' : 'var(--red)';
  var resolved = p.predictions_resolved || 0;
  var authorMeta = (flexScore != null ? Math.round(flexScore) + '% Flex' : '') + (resolved > 0 ? (flexScore != null ? ' · ' : '') + resolved + ' resolved' : '');
  var convClass = p.conviction === 'high' ? 'badge-conv-high' : p.conviction === 'low' ? 'badge-conv-low' : 'badge-conv-medium';
  var convLabel = p.conviction === 'high' ? '🔥 High' : p.conviction === 'low' ? 'Low' : 'Medium';
  var userId = p.user_id || '';
  var name = p.display_name || 'Trader';
  var ini = initials(name);
  var avatar = p.avatar_url
    ? '<img src="' + e(p.avatar_url) + '" onerror="this.style.display=\'none\';this.parentNode.textContent=\'' + ini + '\'">'
    : ini;
  var isFollowing = _following.has(userId);
  var tagsHtml = '';
  if (Array.isArray(p.category_tags) && p.category_tags.length) {
    tagsHtml = '<div class="domain-tags">' + p.category_tags.map(function(t){ return '<span class="domain-tag">' + e(t) + '</span>'; }).join('') + '</div>';
  }
  var outcomeHtml = '';
  if (p.outcome === 'correct') outcomeHtml = '<span class="badge badge-correct">✓ CORRECT</span>';
  else if (p.outcome === 'incorrect') outcomeHtml = '<span class="badge badge-wrong">✗ WRONG</span>';

  var followHtml = userId && tk() ? '<button class="follow-btn' + (isFollowing ? ' following' : '') + '" id="fol-' + e(userId) + '" onclick="toggleFollow(\'' + e(userId) + '\',this)">' + (isFollowing ? 'Following' : '+ Follow') + '</button>' : '';

  return '<div class="card" id="card-' + e(p.id) + '">' +
    '<div class="card-top">' +
      '<div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">' +
        '<a href="/m/' + e(userId) + '" class="avatar">' + avatar + '</a>' +
        '<div class="author-block" style="flex:1;min-width:0">' +
          '<div class="author-name" onclick="window.location.href=\'/m/' + e(userId) + '\'">' + e(name) + '</div>' +
          (authorMeta ? '<div class="author-meta" style="color:' + (flexScore != null ? flexColor : 'var(--text-dim)') + '">' + e(authorMeta) + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">' +
        followHtml +
        '<span class="timestamp">' + timeAgo(p.posted_at) + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="badge-row">' +
      '<span class="badge badge-platform">' + e(platform) + '</span>' +
      '<span class="badge ' + (isYes ? 'badge-yes' : 'badge-no') + '">' + dir + '</span>' +
      (entryStr ? '<span class="badge" style="background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid var(--border)">' + e(entryStr) + '</span>' : '') +
      (sizeStr ? '<span class="badge badge-size">' + e(sizeStr) + '</span>' : '') +
      '<span class="badge ' + convClass + '">' + convLabel + '</span>' +
      outcomeHtml +
    '</div>' +
    '<div class="market-title">' + e(p.market_title || '') + '</div>' +
    (p.thesis_text ? '<div class="thesis">' + e(p.thesis_text) + '</div>' : '') +
    tagsHtml +
  '</div>';
}

function toggleFollow(userId, btn) {
  var t = tk();
  if (!t) { window.location.href = '/creator/login'; return; }
  var following = _following.has(userId);
  fetch('/api/predictors/' + encodeURIComponent(userId) + '/follow', {
    method: 'POST', headers: { Authorization: 'Bearer ' + t }
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.following) { _following.add(userId); btn.textContent = 'Following'; btn.classList.add('following'); }
    else { _following.delete(userId); btn.textContent = '+ Follow'; btn.classList.remove('following'); }
  }).catch(function() {});
}

// Init
(function() {
  var t = tk();
  if (!t) {
    document.getElementById('post-cta').style.display = 'flex';
  } else {
    // Load who the user follows
    fetch('/api/follows/following', { headers: { Authorization: 'Bearer ' + t } })
      .then(function(r) { return r.ok ? r.json() : {}; })
      .then(function(d) { (d.following || []).forEach(function(id) { _following.add(id); }); })
      .catch(function() {});
  }
  load(false);
  setInterval(function() { if (_tab === 'foryou' && !_loading) { _cursor = null; load(false); } }, 60000);
})();
</script>
</body>
</html>
