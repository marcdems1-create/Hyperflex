<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLEX Feed — HYPERFLEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0e0e10;
  color: #e0e0e6;
  min-height: 100vh;
}

#nav-root { position: sticky; top: 0; z-index: 100; }

.page-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── HEADER ── */
.feed-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(-8px);
  animation: fadeUp 0.4s ease forwards;
}
.feed-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #f0f0f5;
}
.feed-header h1 span { color: #5555ee; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #555;
  font-family: 'JetBrains Mono', monospace;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00e68a;
  animation: pulse 2s ease-in-out infinite;
}

/* ── TABS ── */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid #1e1e22;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.05s forwards;
}
.tab-btn {
  padding: 10px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: #555;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  margin-bottom: -1px;
  font-family: inherit;
}
.tab-btn:hover { color: #aaa; }
.tab-btn.active { color: #e0e0e6; border-bottom-color: #5555ee; }

/* ── NEWS FEED FILTER RAIL ── */
.filter-rail {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.1s forwards;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #1e1e22;
  background: transparent;
  color: #666;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
  font-family: inherit;
}
.filter-btn:hover { color: #aaa; border-color: #2a2a35; }
.filter-btn.active {
  background: #13132a;
  border-color: #3333cc;
  color: #7777ff;
}
.filter-sep {
  width: 1px; height: 28px;
  background: #1e1e22;
  align-self: center;
  margin: 0 2px;
}

/* ── NEWS ITEM ── */
.news-list { display: flex; flex-direction: column; gap: 0; }

.news-item {
  border-bottom: 1px solid #141416;
  padding: 20px 0;
  opacity: 0;
  transform: translateY(6px);
}
.news-item:nth-child(1)  { animation: fadeUp 0.3s ease 0.10s forwards; }
.news-item:nth-child(2)  { animation: fadeUp 0.3s ease 0.14s forwards; }
.news-item:nth-child(3)  { animation: fadeUp 0.3s ease 0.18s forwards; }
.news-item:nth-child(4)  { animation: fadeUp 0.3s ease 0.22s forwards; }
.news-item:nth-child(5)  { animation: fadeUp 0.3s ease 0.26s forwards; }
.news-item:nth-child(n+6){ animation: fadeUp 0.3s ease 0.30s forwards; }
.news-item:last-child { border-bottom: none; }

/* headline block */
.news-headline-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
}
.news-source-chip {
  flex-shrink: 0;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: #555;
  background: #161618;
  border: 1px solid #1e1e22;
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
}
.news-headline {
  font-size: 15px;
  font-weight: 600;
  color: #e8e8f0;
  line-height: 1.45;
  flex: 1;
}
.news-headline a {
  color: inherit;
  text-decoration: none;
}
.news-headline a:hover { color: #a0a0f0; }

/* market card attached to headline */
.attached-market {
  background: #111114;
  border: 1px solid #1e1e22;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  display: flex;
  align-items: stretch;
  gap: 0;
}
.attached-market:hover {
  border-color: #2a2a40;
  transform: translateY(-1px);
}

.mkt-image-wrap {
  width: 80px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: #1a1a28;
}
.mkt-image-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.65);
}
.mkt-image-wrap.cat-politics { background: linear-gradient(160deg, #1a1a4e, #2d1b69); }
.mkt-image-wrap.cat-crypto   { background: linear-gradient(160deg, #0f2027, #203a43); }
.mkt-image-wrap.cat-sports   { background: linear-gradient(160deg, #1a2a1a, #2d4a1e); }
.mkt-image-wrap.cat-other    { background: linear-gradient(160deg, #1a1a2e, #161620); }

.mkt-body {
  flex: 1;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.mkt-question {
  font-size: 13px;
  font-weight: 500;
  color: #d0d0dc;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.mkt-meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.mkt-prob {
  font-size: 13px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.mkt-prob.yes  { color: #4ade80; }
.mkt-prob.no   { color: #f87171; }
.mkt-prob.even { color: #facc15; }
.mkt-vol {
  font-size: 11px;
  color: #444;
  font-family: 'JetBrains Mono', monospace;
}
.mkt-expiry {
  font-size: 11px;
  color: #444;
  font-family: 'JetBrains Mono', monospace;
}
.mkt-edge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: #c9920d;
  background: rgba(201,146,13,0.1);
  border: 1px solid rgba(201,146,13,0.2);
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}

/* no-market fallback */
.no-market-row {
  font-size: 11px;
  color: #2a2a35;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}

/* ── TAKES TAB (legacy social feed) ── */
.takes-filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}
.takes-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* thesis card */
.thesis-card {
  background: #161618;
  border: 1px solid #1e1e22;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  opacity: 0;
  transform: translateY(8px);
}
.thesis-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
.thesis-card:nth-child(1)  { animation: fadeUp 0.35s ease 0.10s forwards; }
.thesis-card:nth-child(2)  { animation: fadeUp 0.35s ease 0.14s forwards; }
.thesis-card:nth-child(3)  { animation: fadeUp 0.35s ease 0.18s forwards; }
.thesis-card:nth-child(4)  { animation: fadeUp 0.35s ease 0.22s forwards; }
.thesis-card:nth-child(5)  { animation: fadeUp 0.35s ease 0.26s forwards; }
.thesis-card:nth-child(n+6){ animation: fadeUp 0.35s ease 0.30s forwards; }
.card-clickable { cursor: pointer; }

.card-img {
  height: 130px; position: relative;
  overflow: hidden; background: #1a1a1e;
}
.card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.5);
  transform: scale(1.02);
  transition: transform 0.4s ease;
}
.thesis-card:hover .card-img img { transform: scale(1.06); }
.card-img-gradient {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(to bottom, transparent, #161618);
  pointer-events: none;
}
.card-img-badges {
  position: absolute; top: 10px; left: 10px;
  display: flex; gap: 6px; align-items: center;
}
.card-flex-score {
  position: absolute; top: 10px; right: 10px;
  font-size: 11px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: #f0f0f5;
  background: rgba(0,0,0,0.55);
  padding: 2px 7px; border-radius: 6px;
}
.card-img-fallback {
  height: 130px; position: relative;
  overflow: hidden; display: flex; align-items: flex-end;
}
.card-img-fallback.cat-politics { background: linear-gradient(135deg, #1a1a4e, #2d1b69); }
.card-img-fallback.cat-crypto   { background: linear-gradient(135deg, #0f2027, #203a43); }
.card-img-fallback.cat-sports   { background: linear-gradient(135deg, #1a2a1a, #2d4a1e); }
.card-img-fallback.cat-other    { background: linear-gradient(135deg, #1a1a2e, #0e0e15); }

.badge-sharp {
  font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  color: #00e68a; background: rgba(0,230,138,0.12);
  border: 1px solid rgba(0,230,138,0.25);
  padding: 2px 7px; border-radius: 4px;
}
.clv-pill {
  font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
}
.clv-pill.sharp  { color: #00e68a; background: rgba(0,230,138,0.1);   border: 1px solid rgba(0,230,138,0.2); }
.clv-pill.good   { color: #4d9fff; background: rgba(77,159,255,0.1);  border: 1px solid rgba(77,159,255,0.2); }
.clv-pill.fade   { color: #ff4d6a; background: rgba(255,77,106,0.1);  border: 1px solid rgba(255,77,106,0.2); }
.clv-pill.square { color: #888;   background: rgba(136,136,136,0.1); border: 1px solid rgba(136,136,136,0.2); }
.clv-pill.pending{ color: #555;   background: rgba(85,85,85,0.1);    border: 1px solid rgba(85,85,85,0.2); }

.card-body { padding: 14px 16px 10px; }
.card-creator { font-size: 11px; font-weight: 600; color: #5555ee; letter-spacing: 0.5px; margin-bottom: 6px; }
.card-title { font-size: 14px; font-weight: 500; color: #ddd; line-height: 1.65; margin-bottom: 10px; }
.card-markets { display: flex; flex-direction: column; gap: 3px; }
.card-market-line {
  font-size: 11px; color: #555;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-market-line.muted { color: #333; }
.card-market-more { font-size: 10px; color: #444; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-top: 1px solid #1a1a1e;
}
.open-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: #00e68a;
}
.open-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00e68a; animation: pulse 2s ease-in-out infinite;
}
.status-correct { color: #00e68a; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
.status-wrong   { color: #ff4d6a; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
.card-footer-right {
  display: flex; align-items: center; gap: 12px;
  font-size: 10px; color: #444; font-family: 'JetBrains Mono', monospace;
}

.reactions-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-top: 1px solid #1a1a1e;
}
.reactions-left { display: flex; gap: 14px; }
.react-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; color: #555;
  font-size: 12px; cursor: pointer; padding: 3px 0;
  transition: color 0.15s ease;
}
.react-btn:hover { color: #aaa; }
.react-btn.liked { color: #ff4d6a; }
.share-btn {
  background: none; border: none; color: #444; font-size: 11px;
  cursor: pointer; padding: 3px 6px; border-radius: 4px;
  transition: color 0.15s ease, background 0.15s ease;
  font-family: 'JetBrains Mono', monospace;
}
.share-btn:hover { color: #aaa; background: #1a1a1e; }
.share-btn.copied { color: #00e68a; }

.comment-panel {
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
}
.comment-panel.open {
  max-height: 320px; overflow-y: auto;
  border-top: 1px solid #1a1a1e; background: #111113;
}
.comment-list { padding: 10px 14px 0; }
.comment-item { padding: 6px 0; border-bottom: 1px solid #1a1a1e; }
.comment-item:last-child { border-bottom: none; }
.comment-author { font-size: 10px; color: #444; margin-bottom: 2px; }
.comment-body { font-size: 12px; color: #aaa; line-height: 1.5; }
.comment-time { font-size: 10px; color: #333; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.comment-empty { font-size: 12px; color: #333; padding: 10px 0; }
.comment-input-row {
  display: flex; gap: 8px; padding: 10px 14px;
  border-top: 1px solid #1a1a1e; background: #111113;
}
.comment-input {
  flex: 1; background: #1a1a1e; border: 1px solid #252530;
  border-radius: 8px; color: #ddd; font-size: 13px;
  padding: 7px 10px; outline: none; font-family: inherit;
  transition: border-color 0.15s ease;
}
.comment-input:focus { border-color: #3333cc; }
.comment-submit {
  background: #13132a; border: 1px solid #3333cc; border-radius: 8px;
  color: #7777ff; font-size: 12px; font-weight: 600;
  padding: 7px 12px; cursor: pointer; transition: background 0.15s ease;
  white-space: nowrap;
}
.comment-submit:hover { background: #1a1a40; }

/* ── EMPTY / LOADING ── */
.feed-empty {
  text-align: center; padding: 60px 20px; color: #2a2a35;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px; text-transform: uppercase;
}
.feed-retry button {
  display: block; margin: 12px auto 0;
  padding: 6px 18px;
  background: #13132a; border: 1px solid #3333cc; color: #7777ff;
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.8px; text-transform: uppercase;
  border-radius: 4px; cursor: pointer;
}
.feed-retry button:hover { background: #1a1a3a; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@media (max-width: 390px) {
  .page-wrap { padding: 16px 12px 60px; }
  .feed-header h1 { font-size: 18px; }
  .mkt-image-wrap { width: 60px; }
}
</style>
</head>
<body>

<div id="nav-root"></div>
<script src="/nav.js?v=22"></script>

<div class="page-wrap">

  <div class="feed-header">
    <h1>FLEX <span>Feed</span></h1>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="live-count">live</span>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="news" onclick="switchTab('news')">NEWS + MARKETS</button>
    <button class="tab-btn" data-tab="takes" onclick="switchTab('takes')">TAKES</button>
  </div>

  <!-- ── NEWS TAB ── -->
  <div id="tab-news">
    <div class="filter-rail" id="news-filter-rail">
      <button class="filter-btn active" data-cat="">ALL</button>
      <button class="filter-btn" data-cat="politics">POLITICS</button>
      <button class="filter-btn" data-cat="crypto">CRYPTO</button>
      <button class="filter-btn" data-cat="sports">SPORTS</button>
      <button class="filter-btn" data-cat="business">BUSINESS</button>
    </div>
    <div class="news-list" id="news-list">
      <div class="feed-empty">Loading…</div>
    </div>
  </div>

  <!-- ── TAKES TAB ── -->
  <div id="tab-takes" style="display:none">
    <div class="takes-filter-row" id="takes-filter-rail">
      <button class="filter-btn active" data-group="tier" data-val="">ALL</button>
      <button class="filter-btn" data-group="tier" data-val="sharp">SHARP</button>
      <button class="filter-btn" data-group="tier" data-val="good">GOOD</button>
      <div class="filter-sep"></div>
      <button class="filter-btn active" data-group="sort" data-val="trending">TRENDING</button>
      <button class="filter-btn" data-group="sort" data-val="recent">RECENT</button>
    </div>
    <div class="takes-grid" id="takes-grid">
      <div class="feed-empty">Loading…</div>
    </div>
  </div>

</div>

<script>
'use strict';

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function relTime(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function formatVol(v) {
  if (!v) return '';
  const n = parseFloat(v);
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function formatExpiry(dateStr) {
  if (!dateStr) return '';
  const days = Math.round((new Date(dateStr) - Date.now()) / 86400000);
  if (days < 0) return 'closed';
  if (days === 0) return 'ends today';
  return days + 'd left';
}

function mktCatClass(m) {
  const q = (m.question || m.category || '').toLowerCase();
  if (/polit|elect|president|congress|senate|trump|republican|democrat/.test(q)) return 'cat-politics';
  if (/bitcoin|btc|eth|crypto|solana|coin|token|defi/.test(q)) return 'cat-crypto';
  if (/nba|nfl|mlb|nhl|soccer|champion|world cup|playoff|ufc/.test(q)) return 'cat-sports';
  return 'cat-other';
}

function probDisplay(m) {
  const p = m.yes_price;
  if (p == null) return { text: '—', cls: 'even' };
  const pct = Math.round(parseFloat(p) * 100);
  const cls = pct >= 55 ? 'yes' : pct <= 45 ? 'no' : 'even';
  return { text: pct + '% YES', cls };
}

function headlineCatMatch(headline, cat) {
  if (!cat) return true;
  const h = headline.toLowerCase();
  if (cat === 'politics') return /elect|president|congress|senate|trump|biden|republican|democrat|vote|govern/.test(h);
  if (cat === 'crypto')   return /bitcoin|crypto|ethereum|btc|eth|blockchain|defi|coin|token|solana/.test(h);
  if (cat === 'sports')   return /nba|nfl|mlb|nhl|soccer|football|basketball|baseball|champion|playoff|ufc|tennis/.test(h);
  if (cat === 'business') return /market|stock|trade|tariff|fed|rate|gdp|economy|oil|bank|finance|inflation/.test(h);
  return true;
}

function currentUser() {
  const u = window.__USER__;
  return {
    user_id: (u && (u.id || u.userId)) || 'anonymous',
    display_name: (u && (u.displayName || u.display_name || u.name)) || 'Anonymous'
  };
}

// ── TAB STATE ─────────────────────────────────────────────────────────────────
let _activeTab = 'news';
let _newsCat = '';
let _newsItems = [];
let _takesFilters = { tier: '', sort: 'trending' };
let _cardState = {};

function switchTab(tab) {
  _activeTab = tab;
  document.getElementById('tab-news').style.display  = tab === 'news'  ? '' : 'none';
  document.getElementById('tab-takes').style.display = tab === 'takes' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (tab === 'news'  && !_newsItems.length)  loadNews();
  if (tab === 'takes' && !_takesLoaded)        loadTakes();
}

// ── NEWS FEED ─────────────────────────────────────────────────────────────────
async function loadNews() {
  const list = document.getElementById('news-list');
  list.innerHTML = '<div class="feed-empty">Loading…</div>';
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    const res = await fetch('/api/news-feed', { signal: ctrl.signal });
    clearTimeout(timer);
    const data = await res.json();
    _newsItems = data.items || [];
    document.getElementById('live-count').textContent =
      _newsItems.filter(i => i.market).length + ' matched';
    renderNews();
  } catch (e) {
    clearTimeout(timer);
    console.error('[news-feed]', e);
    list.innerHTML = '<div class="feed-empty feed-retry">Failed to load — <button onclick="loadNews()">Retry</button></div>';
  }
}

function renderNews() {
  const list = document.getElementById('news-list');
  const filtered = _newsCat
    ? _newsItems.filter(i => headlineCatMatch(i.headline, _newsCat))
    : _newsItems;

  if (!filtered.length) {
    list.innerHTML = '<div class="feed-empty">No headlines match</div>';
    return;
  }

  list.innerHTML = filtered.map(item => buildNewsItem(item)).join('');
}

function buildNewsItem(item) {
  const sourceLabel = esc(item.source || 'News');
  const headlineHtml = item.url
    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.headline)}</a>`
    : esc(item.headline);

  let marketHtml = '';
  if (item.market) {
    const m = item.market;
    const { text: probText, cls: probCls } = probDisplay(m);
    const catCls = mktCatClass(m);
    const volStr = formatVol(m.volume);
    const expStr = formatExpiry(m.end_date);
    const edgeScore = m.edge_score ? Math.round(m.edge_score) : 0;
    const edgeHtml = edgeScore >= 50
      ? `<span class="mkt-edge">EDGE ${edgeScore}</span>` : '';

    const imgSrc = m.image || m.event_image_url || '';
    const imgHtml = imgSrc
      ? `<img src="/api/img-proxy?url=${encodeURIComponent(imgSrc)}" alt=""
              onerror="this.style.display='none'">`
      : '';

    const marketSlug = m.slug || '';
    marketHtml = `
      <div class="attached-market" onclick="location.href='/market/${esc(marketSlug)}'">
        <div class="mkt-image-wrap ${catCls}">${imgHtml}</div>
        <div class="mkt-body">
          <div class="mkt-question">${esc(m.question)}</div>
          <div class="mkt-meta-row">
            <span class="mkt-prob ${probCls}">${esc(probText)}</span>
            ${volStr ? `<span class="mkt-vol">${esc(volStr)}</span>` : ''}
            ${expStr ? `<span class="mkt-expiry">${esc(expStr)}</span>` : ''}
            ${edgeHtml}
          </div>
        </div>
      </div>`;
  }

  return `
<div class="news-item">
  <div class="news-headline-row">
    <span class="news-source-chip">${sourceLabel}</span>
    <div class="news-headline">${headlineHtml}</div>
  </div>
  ${marketHtml || '<div class="no-market-row">NO MARKET FOUND</div>'}
</div>`;
}

// News category filter
document.getElementById('news-filter-rail').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  _newsCat = btn.dataset.cat || '';
  document.querySelectorAll('#news-filter-rail .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
});

// ── TAKES FEED ────────────────────────────────────────────────────────────────
let _takesLoaded = false;

async function loadTakes() {
  const grid = document.getElementById('takes-grid');
  const params = new URLSearchParams();
  if (_takesFilters.tier) params.set('tier', _takesFilters.tier);
  if (_takesFilters.sort) params.set('sort', _takesFilters.sort);
  try {
    const res  = await fetch(`/api/feed/theses?${params}`);
    const data = await res.json();
    const theses = data.theses || [];
    _takesLoaded = true;

    if (!theses.length) {
      grid.innerHTML = '<div class="feed-empty">No takes match</div>';
      return;
    }
    for (const t of theses) {
      if (!_cardState[t.thesis_id]) {
        _cardState[t.thesis_id] = { liked: false, likeCount: t.agree_count || 0 };
      }
    }
    grid.innerHTML = theses.map(buildTakeCard).join('');
  } catch (e) {
    console.error('[takes]', e);
    grid.innerHTML = '<div class="feed-empty">Failed to load</div>';
  }
}

document.getElementById('takes-filter-rail').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn[data-group]');
  if (!btn) return;
  const { group, val } = btn.dataset;
  document.querySelectorAll(`#takes-filter-rail .filter-btn[data-group="${group}"]`)
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _takesFilters[group] = val;
  _takesLoaded = false;
  loadTakes();
});

// ── TAKE CARD ─────────────────────────────────────────────────────────────────
function getCategoryClass(t) {
  const q = ((t.markets_preview && t.markets_preview[0]) || t.title || '').toLowerCase();
  if (/polit|elect|president|congress|senate|trump|republican|democrat/.test(q)) return 'cat-politics';
  if (/bitcoin|btc|eth|crypto|solana|coin|token|defi/.test(q)) return 'cat-crypto';
  if (/nba|nfl|mlb|nhl|soccer|champion|playoff|ufc/.test(q)) return 'cat-sports';
  return 'cat-other';
}

function buildTakeCard(t) {
  const id  = t.thesis_id;
  const s   = _cardState[id] || {};
  const liked      = !!s.liked;
  const likeCount  = s.likeCount !== undefined ? s.likeCount : (t.agree_count || 0);
  const commentCount = s.commentCount !== undefined ? s.commentCount : 0;
  const commentOpen  = !!s.commentOpen;
  const clvClass = (t.clv_classification || 'PENDING').toLowerCase();
  const flexFmt  = t.flex_score > 0 ? t.flex_score.toFixed(2) : '';
  const href     = t.creator_wallet ? `/trader/${esc(t.creator_wallet)}` : '/feed';
  const catCls   = getCategoryClass(t);

  let topHtml;
  if (t.image_url) {
    topHtml = `
      <div class="card-img">
        <img src="/api/img-proxy?url=${encodeURIComponent(t.image_url)}" alt="" loading="lazy"
             onerror="this.style.display='none'; this.parentElement.className='card-img card-img-fallback ${catCls}'">
        <div class="card-img-gradient"></div>
        <div class="card-img-badges">
          ${t.verified_sharp ? '<span class="badge-sharp">VERIFIED SHARP</span>' : ''}
          <span class="clv-pill ${clvClass}">${esc(t.clv_classification || 'PENDING')}</span>
        </div>
        ${flexFmt ? `<div class="card-flex-score">${flexFmt}</div>` : ''}
      </div>`;
  } else {
    topHtml = `
      <div class="card-img-fallback ${catCls}">
        <div class="card-img-gradient"></div>
        <div class="card-img-badges">
          ${t.verified_sharp ? '<span class="badge-sharp">VERIFIED SHARP</span>' : ''}
          <span class="clv-pill ${clvClass}">${esc(t.clv_classification || 'PENDING')}</span>
        </div>
        ${flexFmt ? `<div class="card-flex-score">${flexFmt}</div>` : ''}
      </div>`;
  }

  const mLines = (t.markets_preview || []).map(q =>
    `<div class="card-market-line${t.status !== 'OPEN' ? ' muted' : ''}">${esc(q)}</div>`
  ).join('');
  const mMore = (t.markets_count || 0) > 2
    ? `<div class="card-market-more">+${t.markets_count - 2} more</div>` : '';

  let statusHtml;
  if (t.status === 'CORRECT')    statusHtml = '<span class="status-correct">✓ CORRECT</span>';
  else if (t.status === 'WRONG') statusHtml = '<span class="status-wrong">✗ WRONG</span>';
  else statusHtml = '<div class="open-badge"><div class="open-dot"></div>OPEN</div>';

  const entryStr = t.entry_price ? (parseFloat(t.entry_price) * 100).toFixed(0) + '¢' : '';
  const resStr   = t.resolution_window_days ? t.resolution_window_days + 'd' : '';

  const comments = s.comments || [];
  const commentsHtml = comments.length
    ? comments.map(commentRow).join('')
    : '<div class="comment-empty">No comments yet.</div>';

  return `
<div class="thesis-card" id="card-${esc(id)}">
  <div class="card-clickable" onclick="location.href='${href}'">
    ${topHtml}
    <div class="card-body">
      <div class="card-creator">${esc(t.display_name || 'Anonymous')}</div>
      <div class="card-title">${esc(t.title || '')}</div>
      <div class="card-markets">${mLines}${mMore}</div>
    </div>
    <div class="card-footer">
      ${statusHtml}
      <div class="card-footer-right">
        ${entryStr ? `<span>${entryStr}</span>` : ''}
        ${resStr   ? `<span>${resStr}</span>`   : ''}
        <span>${relTime(t.created_at)}</span>
      </div>
    </div>
  </div>
  <div class="reactions-bar">
    <div class="reactions-left">
      <button class="react-btn${liked ? ' liked' : ''}" onclick="toggleLike('${esc(id)}')" title="Like">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span id="like-count-${esc(id)}">${likeCount}</span>
      </button>
      <button class="react-btn" onclick="toggleComments('${esc(id)}')" title="Comments">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span id="comment-count-${esc(id)}">${commentCount}</span>
      </button>
    </div>
    <button class="share-btn" id="share-${esc(id)}" onclick="shareCard(event,'${esc(id)}','${esc(t.creator_wallet || '')}')">share</button>
  </div>
  <div class="comment-panel${commentOpen ? ' open' : ''}" id="comments-${esc(id)}">
    <div class="comment-list" id="comment-list-${esc(id)}">${commentsHtml}</div>
    <div class="comment-input-row">
      <input class="comment-input" id="comment-input-${esc(id)}" placeholder="Add a take…" maxlength="500"
             onkeydown="if(event.key==='Enter')submitComment('${esc(id)}')">
      <button class="comment-submit" onclick="submitComment('${esc(id)}')">Post</button>
    </div>
  </div>
</div>`;
}

function commentRow(c) {
  return `
    <div class="comment-item">
      <div class="comment-author">${esc(c.display_name || 'Anonymous')}</div>
      <div class="comment-body">${esc(c.body)}</div>
      <div class="comment-time">${relTime(c.created_at)}</div>
    </div>`;
}

// ── LIKE ─────────────────────────────────────────────────────────────────────
async function toggleLike(id) {
  const s = _cardState[id] || {};
  s.liked     = !s.liked;
  s.likeCount = Math.max(0, (s.likeCount || 0) + (s.liked ? 1 : -1));
  _cardState[id] = s;
  _applyLikeUI(id, s);
  try {
    const { user_id, display_name } = currentUser();
    const r    = await fetch(`/api/takes/${id}/like`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id, display_name })
    });
    const data = await r.json();
    s.liked = data.liked; s.likeCount = data.count;
    _cardState[id] = s; _applyLikeUI(id, s);
  } catch (_) {}
}

function _applyLikeUI(id, s) {
  const btn     = document.querySelector(`#card-${id} .react-btn[title="Like"]`);
  const countEl = document.getElementById(`like-count-${id}`);
  if (btn) {
    btn.classList.toggle('liked', s.liked);
    const path = btn.querySelector('path');
    if (path) path.setAttribute('fill', s.liked ? 'currentColor' : 'none');
  }
  if (countEl) countEl.textContent = Math.max(0, s.likeCount);
}

// ── COMMENTS ─────────────────────────────────────────────────────────────────
async function toggleComments(id) {
  const panel = document.getElementById(`comments-${id}`);
  const s = _cardState[id] || {};
  s.commentOpen = !s.commentOpen;
  _cardState[id] = s;
  if (panel) panel.classList.toggle('open', s.commentOpen);
  if (s.commentOpen && !s.commentsLoaded) {
    s.commentsLoaded = true;
    try {
      const r    = await fetch(`/api/takes/${id}/comments`);
      const data = await r.json();
      s.comments = data.comments || []; s.commentCount = s.comments.length;
      _cardState[id] = s;
      const listEl  = document.getElementById(`comment-list-${id}`);
      const countEl = document.getElementById(`comment-count-${id}`);
      if (listEl) listEl.innerHTML = s.comments.length
        ? s.comments.map(commentRow).join('')
        : '<div class="comment-empty">No comments yet.</div>';
      if (countEl) countEl.textContent = s.commentCount;
    } catch (_) {}
  }
}

async function submitComment(id) {
  const input = document.getElementById(`comment-input-${id}`);
  if (!input) return;
  const body = input.value.trim();
  if (!body) return;
  const { user_id, display_name } = currentUser();
  input.value = '';
  const s = _cardState[id] || {};
  if (!s.comments) s.comments = [];
  const opt = { id: 'opt_' + Date.now(), display_name, body, created_at: new Date().toISOString() };
  s.comments.push(opt); s.commentCount = (s.commentCount || 0) + 1;
  _cardState[id] = s;
  const listEl  = document.getElementById(`comment-list-${id}`);
  const countEl = document.getElementById(`comment-count-${id}`);
  if (listEl) {
    const empty = listEl.querySelector('.comment-empty');
    if (empty) empty.remove();
    listEl.insertAdjacentHTML('beforeend', commentRow(opt));
  }
  if (countEl) countEl.textContent = s.commentCount;
  try {
    await fetch(`/api/takes/${id}/comment`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id, display_name, body })
    });
  } catch (_) {}
}

// ── SHARE ─────────────────────────────────────────────────────────────────────
function shareCard(e, id, wallet) {
  e.stopPropagation();
  const url = wallet ? `https://hyperflex.network/trader/${wallet}` : 'https://hyperflex.network/feed';
  navigator.clipboard.writeText(url).catch(() => {});
  const btn = document.getElementById(`share-${id}`);
  if (btn) {
    btn.textContent = 'copied'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'share'; btn.classList.remove('copied'); }, 1500);
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
if (document.readyState !== 'loading') { loadNews(); }
else { document.addEventListener('DOMContentLoaded', loadNews); }
</script>
