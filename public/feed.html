<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLEX Feed — HYPERFLEX</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: #0a0a0a;
  color: #e0e0e6;
  min-height: 100vh;
}

#nav-root { position: sticky; top: 0; z-index: 100; }

.page-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* ── HEADER ── */
.feed-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.feed-header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #f0f0f5;
}
.feed-header h1 span { color: #a78bfa; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #555;
  font-family: 'JetBrains Mono', monospace;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00e68a;
  animation: pulse 2s ease-in-out infinite;
}

/* ── EDGE TICKER ── */
.edge-ticker {
  display: none;
  gap: 8px;
  overflow-x: auto;
  margin: 12px 0 0;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.edge-ticker::-webkit-scrollbar { display: none; }
.edge-ticker.show { display: flex; }
.ticker-chip {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #111;
  border: 1px solid #222;
  border-radius: 8px;
  padding: 7px 11px;
  font-size: 12px;
  color: #ccc;
  text-decoration: none;
  white-space: nowrap;
  transition: border-color .15s, box-shadow .4s;
}
.ticker-chip:hover { border-color: #444; }
.ticker-chip .score {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 13px;
}
.ticker-chip .score.high { color: #00e68a; }
.ticker-chip .score.mid  { color: #4d9fff; }
.ticker-chip .score.low  { color: #666; }
.ticker-chip .px {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #666;
}
.ticker-chip.terminal-link { color: #a78bfa; border-color: rgba(167,139,250,.3); font-weight: 600; }
.ticker-chip.terminal-link:hover { border-color: rgba(167,139,250,.6); }
.ticker-chip.flash { box-shadow: 0 0 14px rgba(0,230,138,.35); border-color: rgba(0,230,138,.5); }

/* ── TABS ── */
.feed-tabs {
  display: flex;
  gap: 8px;
  margin: 16px 0;
  position: sticky;
  top: 0;
  background: #0a0a0a;
  padding: 12px 0;
  z-index: 10;
}
.feed-tab {
  font-size: 13px;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: 99px;
  cursor: pointer;
  border: 1px solid #222;
  background: #111;
  color: #888;
  transition: all .15s;
}
.feed-tab.active { background: #fff; color: #000; border-color: transparent; }
.feed-tab:not(.active):hover { color: #bbb; border-color: #333; }

/* ── PANES ── */
.feed-pane {}

/* ── NEWS PANE ── */
.feed-item { border-bottom: 1px solid #1e1e1e; padding: 20px 0; }
.feed-item:last-child { border-bottom: none; }
.headline-block { display: block; text-decoration: none; color: inherit; }
.headline-block:hover .headline-text { color: #a78bfa; }
.headline-source { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.headline-text { font-size: 17px; font-weight: 600; line-height: 1.35; margin: 0 0 10px; color: #e5e5e5; }
.edge-sentence { font-size: 13px; color: #a78bfa; font-style: italic; margin: 0 0 12px; padding-left: 12px; border-left: 2px solid #a78bfa; line-height: 1.5; }

/* ── MARKET CARD (shared) ── */
.market-card, .edge-card {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.market-card:hover, .edge-card:hover { border-color: #444; transform: translateY(-1px); }
.edge-card { margin-bottom: 16px; }
.card-image-wrap {
  position: relative;
  height: 120px;
  background: #1a1a2e;
  overflow: hidden;
}
.card-image-wrap.img-fallback { background: linear-gradient(135deg, #1a1a2e, #16213e); }
.card-image { width: 100%; height: 120px; object-fit: cover; display: block; }
.card-probability {
  position: absolute;
  top: 8px; right: 10px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  background: rgba(0,0,0,.55);
  padding: 2px 8px;
  border-radius: 6px;
}
.prob-yes  { color: #4ade80; }
.prob-no   { color: #f87171; }
.prob-even { color: #facc15; }
.card-body { padding: 12px 14px; }
.card-question { font-size: 14px; font-weight: 500; line-height: 1.4; margin: 0 0 8px; color: #e5e5e5; }
.card-meta { display: flex; gap: 10px; font-size: 11px; color: #666; margin-top: 8px; }
.card-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #1e1e1e; }
.btn-yes {
  flex: 1;
  background: rgba(74,222,128,.1);
  border: 1px solid rgba(74,222,128,.3);
  color: #4ade80;
  border-radius: 6px;
  padding: 7px 0;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.btn-yes:hover { background: rgba(74,222,128,.2); }
.btn-no {
  flex: 1;
  background: rgba(248,113,113,.1);
  border: 1px solid rgba(248,113,113,.3);
  color: #f87171;
  border-radius: 6px;
  padding: 7px 0;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.btn-no:hover { background: rgba(248,113,113,.2); }

/* ── EDGE PANE ── */
.thesis { margin: 10px 0; }
.thesis-label { display: block; font-size: 10px; font-weight: 700; color: #a78bfa; letter-spacing: .08em; margin-bottom: 6px; }
.thesis-body { font-size: 13px; color: #ccc; line-height: 1.55; }
.thesis-body p { margin: 0 0 8px; }
.thesis-body p:last-child { margin-bottom: 0; }
.thesis-body strong { color: #fff; font-weight: 700; }
.edge-stale-banner {
  padding: 8px 0;
  font-size: 11px;
  color: #f59e0b;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 12px;
}

/* ── SKELETON ── */
.skeleton-item { padding: 20px 0; border-bottom: 1px solid #1e1e1e; }
.skel-line { background: #1a1a1e; border-radius: 4px; margin-bottom: 8px; }
.skel-line.w60 { width: 60%; height: 10px; }
.skel-line.w90 { width: 90%; height: 18px; }
.skel-line.w75 { width: 75%; height: 18px; }
.skel-card { background: #1a1a1e; border-radius: 12px; height: 80px; margin-top: 12px; }
@keyframes shimmer { 0%,100% { opacity: .4; } 50% { opacity: .8; } }
.skeleton-item .skel-line, .skeleton-item .skel-card { animation: shimmer 1.4s ease-in-out infinite; }

/* ── EMPTY / ERROR ── */
.empty-state { padding: 40px 20px; text-align: center; color: #666; font-size: 13px; }

@media (max-width: 390px) {
  .page-wrap { padding: 14px 12px 60px; }
  .feed-header h1 { font-size: 17px; }
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
</style>
</head>
<body>

<div id="nav-root"></div>
<script src="/nav.js?v=22"></script>

<div class="page-wrap">

  <div class="feed-header">
    <h1>FLEX <span>Feed</span></h1>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="live-count">live</span>
    </div>
  </div>

  <div class="edge-ticker" id="edge-ticker"></div>

  <div class="feed-tabs">
    <button class="feed-tab active" data-tab="news" onclick="switchTab('news')">News</button>
    <button class="feed-tab" data-tab="edge" onclick="switchTab('edge')">Edge</button>
  </div>

  <div id="news-feed" class="feed-pane"></div>
  <div id="edge-feed" class="feed-pane" style="display:none"></div>

</div>

<script>
'use strict';

// ── Helpers ─────────────────────────────────────────────────────────────────

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function formatVolume(v) {
  if (!v || v < 1000) return '';
  if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
  return '$' + Math.round(v / 1000) + 'k';
}

function formatExpiry(endDate) {
  if (!endDate) return '';
  const d = new Date(endDate);
  const days = Math.ceil((d - Date.now()) / 86400000);
  if (days < 0) return 'expired';
  if (days === 0) return 'today';
  if (days === 1) return '1d left';
  if (days < 30) return days + 'd left';
  return Math.round(days / 30) + 'mo left';
}

function getProbClass(market) {
  const p = market && market.yes_price;
  if (p == null) return 'prob-even';
  if (p >= 0.65) return 'prob-yes';
  if (p <= 0.35) return 'prob-no';
  return 'prob-even';
}

function getProbDisplay(market) {
  const p = market && market.yes_price;
  if (p == null) return '—';
  return Math.round(p * 100) + '%';
}

function getYesPrice(market) {
  const p = market && market.yes_price;
  return p != null ? Math.round(p * 100) + '¢' : '—';
}

function getNoPrice(market) {
  const p = market && market.yes_price;
  return p != null ? Math.round((1 - p) * 100) + '¢' : '—';
}

// Tiny markdown renderer — bold + paragraph breaks only (no library)
function renderThesis(text) {
  if (!text) return '';
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function skeletonNews(n) {
  return Array.from({length: n}, () => `
<div class="skeleton-item">
  <div class="skel-line w60"></div>
  <div class="skel-line w90"></div>
  <div class="skel-line w75"></div>
  <div class="skel-card"></div>
</div>`).join('');
}

function skeletonEdge(n) {
  return Array.from({length: n}, () => `
<div class="skeleton-item">
  <div class="skel-card" style="height:200px;margin-top:0"></div>
</div>`).join('');
}

// ── Tab switching ────────────────────────────────────────────────────────────

let edgeLoaded = false;
let edgeCache  = null;

function switchTab(tab) {
  document.querySelectorAll('.feed-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('news-feed').style.display = tab === 'news' ? 'block' : 'none';
  document.getElementById('edge-feed').style.display = tab === 'edge' ? 'block' : 'none';
  if (tab === 'edge' && !edgeLoaded) { edgeLoaded = true; loadEdge(); }
}

// ── News tab ─────────────────────────────────────────────────────────────────

function buildNewsItem(item) {
  const m = item.market;
  const slug = m && m.slug ? escapeHtml(m.slug) : '';

  const imageHtml = m && (m.image || m.event_image_url)
    ? `<img src="${escapeHtml(m.image || m.event_image_url)}" class="card-image" loading="lazy"
         onerror="this.style.display='none';this.parentElement.classList.add('img-fallback')" alt="">`
    : '';

  const marketHtml = m ? `
    ${item.edge ? `<div class="edge-sentence">${escapeHtml(item.edge)}</div>` : ''}
    <div class="market-card" onclick="location.href='/market/${slug}'">
      <div class="card-image-wrap">
        ${imageHtml}
        <div class="card-probability ${getProbClass(m)}">${getProbDisplay(m)}</div>
      </div>
      <div class="card-body">
        <p class="card-question">${escapeHtml(m.question || '')}</p>
        <div class="card-meta">
          ${formatVolume(m.volume) ? `<span>${formatVolume(m.volume)}</span>` : ''}
          ${formatExpiry(m.end_date || m.endDate) ? `<span>${formatExpiry(m.end_date || m.endDate)}</span>` : ''}
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-yes" onclick="event.stopPropagation();location.href='/market/${slug}'">YES ${getYesPrice(m)}</button>
        <button class="btn-no"  onclick="event.stopPropagation();location.href='/market/${slug}'">NO ${getNoPrice(m)}</button>
      </div>
    </div>` : '';

  const src = item.source ? escapeHtml(item.source) : 'Google News';
  const ago = item.publishedAt ? timeAgo(item.publishedAt) : '';
  const sourceStr = ago ? `${src} · ${ago}` : src;

  return `
<div class="feed-item">
  <a class="headline-block" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener">
    <div class="headline-source">${sourceStr}</div>
    <h3 class="headline-text">${escapeHtml(item.headline || '')}</h3>
  </a>
  ${marketHtml}
</div>`;
}

async function loadNews() {
  const pane = document.getElementById('news-feed');
  pane.innerHTML = skeletonNews(6);

  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 8000);
  try {
    const resp = await fetch('/api/news-feed', { signal: ctrl.signal });
    clearTimeout(tid);
    const data = await resp.json();
    const items = data.items || [];
    const matched = items.filter(x => x.market).length;
    document.getElementById('live-count').textContent = matched + ' matched';
    if (!items.length) {
      pane.innerHTML = '<div class="empty-state">No news available right now.</div>';
      return;
    }
    pane.innerHTML = items.map(buildNewsItem).join('');
  } catch (e) {
    clearTimeout(tid);
    console.error('[news-feed]', e);
    pane.innerHTML = '<div class="empty-state">Failed to load — <a href="javascript:location.reload()" style="color:#a78bfa">retry</a></div>';
  }
}

// ── Edge tab ─────────────────────────────────────────────────────────────────

function buildEdgeCard(e) {
  const m = e.market || {};
  const slug = m.slug ? escapeHtml(m.slug) : '';
  const imageHtml = (m.image || m.event_image_url)
    ? `<img src="${escapeHtml(m.image || m.event_image_url)}" class="card-image" loading="lazy"
         onerror="this.style.display='none';this.parentElement.classList.add('img-fallback')" alt="">`
    : '';

  return `
<div class="edge-card" onclick="location.href='/market/${slug}'">
  <div class="card-image-wrap">
    ${imageHtml}
    <div class="card-probability ${getProbClass(m)}">${getProbDisplay(m)}</div>
  </div>
  <div class="card-body">
    <p class="card-question">${escapeHtml(m.question || 'Market')}</p>
    <div class="thesis">
      <span class="thesis-label">THE EDGE</span>
      <div class="thesis-body"><p>${renderThesis(e.thesis)}</p></div>
    </div>
    <div class="card-meta">
      ${formatVolume(m.volume) ? `<span>${formatVolume(m.volume)}</span>` : ''}
      ${formatExpiry(m.end_date || m.endDate) ? `<span>${formatExpiry(m.end_date || m.endDate)}</span>` : ''}
    </div>
  </div>
</div>`;
}

async function loadEdge() {
  if (edgeCache) {
    renderEdge(edgeCache);
    return;
  }

  const pane = document.getElementById('edge-feed');
  pane.innerHTML = skeletonEdge(5);

  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 8000);
  try {
    const resp = await fetch('/api/edge-feed', { signal: ctrl.signal });
    clearTimeout(tid);
    const data = await resp.json();
    edgeCache = data;
    renderEdge(data);
  } catch (e) {
    clearTimeout(tid);
    console.error('[edge-feed]', e);
    document.getElementById('edge-feed').innerHTML =
      '<div class="empty-state">Failed to load — <a href="javascript:switchTab(\'edge\')" onclick="edgeLoaded=false" style="color:#a78bfa">retry</a></div>';
  }
}

function renderEdge(data) {
  const pane = document.getElementById('edge-feed');
  const edges = data.edges || [];

  let html = '';
  if (data.stale) {
    html += '<div class="edge-stale-banner">Showing cached results — analysis updating</div>';
  }
  if (!edges.length) {
    html += data.reason === 'cap_reached'
      ? '<div class="empty-state">Daily edge analysis limit reached. Check back tomorrow.</div>'
      : '<div class="empty-state">Edge analysis refreshing — check back shortly.</div>';
    pane.innerHTML = html;
    return;
  }
  html += edges.map(buildEdgeCard).join('');
  pane.innerHTML = html;
}

// ── Edge ticker — top live edges, auto-refreshed every 2 min ────────────────

let _tickerTopSlug = null;

function truncateQ(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

async function loadEdgeTicker(isRefresh) {
  const strip = document.getElementById('edge-ticker');
  if (!strip) return;
  try {
    const resp = await fetch('/api/alpha/top?n=8');
    if (!resp.ok) return;
    const data = await resp.json();
    const markets = (data.markets || []).filter(m => m.slug);
    if (markets.length < 3) return; // no thin-supply ticker

    const newLeader = isRefresh && markets[0] && markets[0].slug !== _tickerTopSlug;
    _tickerTopSlug = markets[0] ? markets[0].slug : null;

    strip.innerHTML = markets.map((m, i) => {
      const score = m.edge_score || 0;
      const cls = score >= 60 ? 'high' : score >= 35 ? 'mid' : 'low';
      const px = m.yes_price != null ? Math.round(m.yes_price * 100) + '¢' : '';
      return `<a class="ticker-chip${i === 0 && newLeader ? ' flash' : ''}" href="/market/${escapeHtml(m.slug)}">` +
        `<span class="score ${cls}">${score}</span>` +
        `<span>${escapeHtml(truncateQ(m.question, 48))}</span>` +
        (px ? `<span class="px">${px}</span>` : '') +
      `</a>`;
    }).join('') +
    `<a class="ticker-chip terminal-link" href="/alpha-live">Terminal →</a>`;

    strip.classList.add('show');
    if (newLeader) {
      setTimeout(() => {
        const first = strip.querySelector('.ticker-chip.flash');
        if (first) first.classList.remove('flash');
      }, 3000);
    }
  } catch (e) { /* ticker is optional — never block the feed */ }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadNews();
  loadEdgeTicker(false);
  setInterval(() => loadEdgeTicker(true), 2 * 60 * 1000);
});
</script>
</body>
</html>
