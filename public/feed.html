<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLEX Feed — HYPERFLEX</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: #0e0e10;
  color: #e0e0e6;
  min-height: 100vh;
}

/* ── NAV ── */
#nav-root { position: sticky; top: 0; z-index: 100; }

/* ── LAYOUT ── */
.page-wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── HEADER ── */
.feed-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(-8px);
  animation: fadeUp 0.4s ease forwards;
}
.feed-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #f0f0f5;
}
.feed-header h1 span { color: #5555ee; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #666;
  font-family: 'JetBrains Mono', monospace;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #00e68a;
  animation: pulse 2s ease-in-out infinite;
}

/* ── FILTER RAIL ── */
.filter-rail {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(-8px);
  animation: fadeUp 0.4s ease 0.1s forwards;
}
.filter-sep {
  width: 1px;
  height: 28px;
  background: #1e1e22;
  align-self: center;
  margin: 0 2px;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #1e1e22;
  background: transparent;
  color: #666;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.filter-btn:hover { color: #aaa; border-color: #2a2a35; }
.filter-btn.active {
  background: #13132a;
  border-color: #3333cc;
  color: #7777ff;
}

/* ── TRENDING STRIP ── */
.trending-section { margin-bottom: 28px; }
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #333;
  margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.trending-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
@media (max-width: 520px) {
  .trending-grid { grid-template-columns: 1fr; }
}

.trending-card {
  background: #161618;
  border: 1px solid #1e1e22;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  opacity: 0;
  transform: translateY(6px);
}
.trending-card:nth-child(1) { animation: fadeUp 0.35s ease 0.2s forwards; }
.trending-card:nth-child(2) { animation: fadeUp 0.35s ease 0.25s forwards; }
.trending-card:nth-child(3) { animation: fadeUp 0.35s ease 0.3s forwards; }
.trending-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }

.tc-img {
  height: 70px;
  overflow: hidden;
  background: #1a1a1e;
}
.tc-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
}
.tc-body { padding: 8px 10px; }
.tc-creator {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: #5555ee;
  margin-bottom: 4px;
}
.tc-title {
  font-size: 12px;
  color: #bbb;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tc-meta {
  font-size: 10px;
  color: #333;
  margin-top: 6px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── FEED ── */
.feed-grid { display: flex; flex-direction: column; gap: 14px; }

/* ── THESIS CARD ── */
.thesis-card {
  background: #161618;
  border: 1px solid #1e1e22;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  opacity: 0;
  transform: translateY(8px);
}
.thesis-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
.thesis-card:nth-child(1)  { animation: fadeUp 0.35s ease 0.40s forwards; }
.thesis-card:nth-child(2)  { animation: fadeUp 0.35s ease 0.45s forwards; }
.thesis-card:nth-child(3)  { animation: fadeUp 0.35s ease 0.50s forwards; }
.thesis-card:nth-child(4)  { animation: fadeUp 0.35s ease 0.55s forwards; }
.thesis-card:nth-child(5)  { animation: fadeUp 0.35s ease 0.60s forwards; }
.thesis-card:nth-child(6)  { animation: fadeUp 0.35s ease 0.65s forwards; }
.thesis-card:nth-child(7)  { animation: fadeUp 0.35s ease 0.70s forwards; }
.thesis-card:nth-child(8)  { animation: fadeUp 0.35s ease 0.75s forwards; }
.thesis-card:nth-child(9)  { animation: fadeUp 0.35s ease 0.80s forwards; }
.thesis-card:nth-child(10) { animation: fadeUp 0.35s ease 0.85s forwards; }
.thesis-card:nth-child(n+11) { animation: fadeUp 0.35s ease 0.90s forwards; }

/* clickable portion */
.card-clickable { cursor: pointer; }

/* image */
.card-img {
  height: 130px;
  position: relative;
  overflow: hidden;
  background: #1a1a1e;
}
.card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.5);
  transform: scale(1.02);
  transition: transform 0.4s ease;
}
.thesis-card:hover .card-img img { transform: scale(1.06); }
.card-img-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(to bottom, transparent, #161618);
  pointer-events: none;
}
.card-img-badges {
  position: absolute;
  top: 10px; left: 10px;
  display: flex;
  gap: 6px;
  align-items: center;
}
.card-flex-score {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: #f0f0f5;
  background: rgba(0,0,0,0.55);
  padding: 2px 7px;
  border-radius: 6px;
}

/* badges */
.badge-sharp {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: #00e68a;
  background: rgba(0,230,138,0.12);
  border: 1px solid rgba(0,230,138,0.25);
  padding: 2px 7px;
  border-radius: 4px;
}
.clv-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
}
.clv-pill.sharp  { color: #00e68a; background: rgba(0,230,138,0.1);    border: 1px solid rgba(0,230,138,0.2); }
.clv-pill.good   { color: #4d9fff; background: rgba(77,159,255,0.1);   border: 1px solid rgba(77,159,255,0.2); }
.clv-pill.fade   { color: #ff4d6a; background: rgba(255,77,106,0.1);   border: 1px solid rgba(255,77,106,0.2); }
.clv-pill.square { color: #888;    background: rgba(136,136,136,0.1);  border: 1px solid rgba(136,136,136,0.2); }
.clv-pill.pending{ color: #555;    background: rgba(85,85,85,0.1);     border: 1px solid rgba(85,85,85,0.2); }

/* card body */
.card-body { padding: 14px 16px 10px; }
.card-creator { font-size: 11px; font-weight: 600; color: #5555ee; letter-spacing: 0.5px; margin-bottom: 6px; }
.card-title {
  font-size: 14px;
  font-weight: 500;
  color: #ddd;
  line-height: 1.65;
  margin-bottom: 10px;
}
.card-markets { display: flex; flex-direction: column; gap: 3px; }
.card-market-line {
  font-size: 11px;
  color: #555;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-market-line.muted { color: #333; }
.card-market-more { font-size: 10px; color: #444; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

/* card footer */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-top: 1px solid #1a1a1e;
}
.open-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: #00e68a;
}
.open-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00e68a;
  animation: pulse 2s ease-in-out infinite;
}
.status-correct { color: #00e68a; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
.status-wrong   { color: #ff4d6a; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
.card-footer-right {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 10px;
  color: #444;
  font-family: 'JetBrains Mono', monospace;
}

/* reactions bar */
.reactions-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-top: 1px solid #1a1a1e;
}
.reactions-left { display: flex; gap: 14px; }
.react-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  color: #555;
  font-size: 12px;
  cursor: pointer;
  padding: 3px 0;
  transition: color 0.15s ease;
}
.react-btn:hover { color: #aaa; }
.react-btn.liked { color: #ff4d6a; }
.share-btn {
  background: none;
  border: none;
  color: #444;
  font-size: 11px;
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 4px;
  transition: color 0.15s ease, background 0.15s ease;
  font-family: 'JetBrains Mono', monospace;
}
.share-btn:hover { color: #aaa; background: #1a1a1e; }
.share-btn.copied { color: #00e68a; }

/* comment panel */
.comment-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.comment-panel.open {
  max-height: 320px;
  overflow-y: auto;
  border-top: 1px solid #1a1a1e;
  background: #111113;
}
.comment-list { padding: 10px 14px 0; }
.comment-item { padding: 6px 0; border-bottom: 1px solid #1a1a1e; }
.comment-item:last-child { border-bottom: none; }
.comment-author { font-size: 10px; color: #444; margin-bottom: 2px; }
.comment-body { font-size: 12px; color: #aaa; line-height: 1.5; }
.comment-time { font-size: 10px; color: #333; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.comment-empty { font-size: 12px; color: #333; padding: 10px 0; }
.comment-input-row {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid #1a1a1e;
  background: #111113;
}
.comment-input {
  flex: 1;
  background: #1a1a1e;
  border: 1px solid #252530;
  border-radius: 8px;
  color: #ddd;
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s ease;
}
.comment-input:focus { border-color: #3333cc; }
.comment-submit {
  background: #13132a;
  border: 1px solid #3333cc;
  border-radius: 8px;
  color: #7777ff;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 12px;
  cursor: pointer;
  transition: background 0.15s ease;
  white-space: nowrap;
}
.comment-submit:hover { background: #1a1a40; }

/* empty + loading */
.feed-empty {
  text-align: center;
  padding: 60px 20px;
  color: #333;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* no-image header row */
.card-header-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px 0;
  flex-wrap: wrap;
}
.card-header-row .card-flex-inline {
  margin-left: auto;
  font-size: 11px;
  color: #555;
  font-family: 'JetBrains Mono', monospace;
}

/* mobile */
@media (max-width: 390px) {
  .page-wrap { padding: 16px 12px 60px; }
  .feed-header h1 { font-size: 18px; }
  .card-title { font-size: 13px; }
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
</style>
</head>
<body>

<div id="nav-root"></div>
<script src="/nav.js?v=22"></script>

<div class="page-wrap">

  <div class="feed-header">
    <h1>FLEX <span>Feed</span></h1>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="live-count">— live</span>
    </div>
  </div>

  <div class="filter-rail" id="filter-rail">
    <button class="filter-btn active" data-group="tier" data-val="">ALL</button>
    <button class="filter-btn" data-group="tier" data-val="sharp">SHARP</button>
    <button class="filter-btn" data-group="tier" data-val="good">GOOD</button>
    <div class="filter-sep"></div>
    <button class="filter-btn active" data-group="window" data-val="">ALL TIME</button>
    <button class="filter-btn" data-group="window" data-val="7">7D</button>
    <button class="filter-btn" data-group="window" data-val="30">30D</button>
    <button class="filter-btn" data-group="window" data-val="90">90D</button>
    <div class="filter-sep"></div>
    <button class="filter-btn active" data-group="sort" data-val="trending">TRENDING</button>
    <button class="filter-btn" data-group="sort" data-val="recent">RECENT</button>
  </div>

  <div class="trending-section" id="trending-section" style="display:none">
    <div class="section-label">Trending</div>
    <div class="trending-grid" id="trending-grid"></div>
  </div>

  <div class="feed-grid" id="feed-grid">
    <div class="feed-empty">Loading…</div>
  </div>

</div>

<script>
'use strict';

const _API = '/api/feed/theses';
let _filters = { tier: '', window: '', sort: 'trending' };
let _cardState = {};  // thesis_id → { liked, likeCount, commentOpen, comments, commentsLoaded, commentCount }

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function relTime(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function currentUser() {
  const u = window.__USER__;
  return {
    user_id:      (u && (u.id || u.userId)) || 'anonymous',
    display_name: (u && (u.displayName || u.display_name || u.name)) || 'Anonymous'
  };
}

// ── TRENDING STRIP ────────────────────────────────────────────────────────────
function renderTrending(trending) {
  const sec  = document.getElementById('trending-section');
  const grid = document.getElementById('trending-grid');
  if (!trending || !trending.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  grid.innerHTML = trending.map(t => {
    const imgHtml = t.image_url
      ? `<div class="tc-img"><img src="/api/img-proxy?url=${encodeURIComponent(t.image_url)}" alt="" loading="lazy"></div>`
      : '';
    const href = t.creator_wallet ? `/trader/${esc(t.creator_wallet)}` : '/feed';
    return `
      <div class="trending-card" onclick="location.href='${href}'">
        ${imgHtml}
        <div class="tc-body">
          <div class="tc-creator">${esc(t.display_name || 'Anonymous')}</div>
          <div class="tc-title">${esc(t.title || '')}</div>
          <div class="tc-meta">${t.markets_count || 0} mkt${(t.markets_count || 0) !== 1 ? 's' : ''} · ${relTime(t.created_at)}</div>
        </div>
      </div>`;
  }).join('');
}

// ── CARD HTML ────────────────────────────────────────────────────────────────
function buildCard(t) {
  const id   = t.thesis_id;
  const s    = _cardState[id] || {};
  const liked      = !!s.liked;
  const likeCount  = s.likeCount !== undefined ? s.likeCount : (t.agree_count || 0);
  const commentCount = s.commentCount !== undefined ? s.commentCount : 0;
  const commentOpen  = !!s.commentOpen;

  const clvClass = (t.clv_classification || 'PENDING').toLowerCase();
  const flexFmt  = t.flex_score > 0 ? t.flex_score.toFixed(2) : '';
  const href     = t.creator_wallet ? `/trader/${esc(t.creator_wallet)}` : '/feed';

  // ── image or inline badges ──
  let topHtml;
  if (t.image_url) {
    topHtml = `
      <div class="card-img">
        <img src="/api/img-proxy?url=${encodeURIComponent(t.image_url)}" alt="" loading="lazy">
        <div class="card-img-gradient"></div>
        <div class="card-img-badges">
          ${t.verified_sharp ? '<span class="badge-sharp">VERIFIED SHARP</span>' : ''}
          <span class="clv-pill ${clvClass}">${esc(t.clv_classification || 'PENDING')}</span>
        </div>
        ${flexFmt ? `<div class="card-flex-score">${flexFmt}</div>` : ''}
      </div>`;
  } else {
    topHtml = `
      <div class="card-header-row">
        ${t.verified_sharp ? '<span class="badge-sharp">VERIFIED SHARP</span>' : ''}
        <span class="clv-pill ${clvClass}">${esc(t.clv_classification || 'PENDING')}</span>
        ${flexFmt ? `<span class="card-flex-inline">${flexFmt}</span>` : ''}
      </div>`;
  }

  // ── markets preview ──
  const mLines = (t.markets_preview || []).map(q =>
    `<div class="card-market-line${t.status !== 'OPEN' ? ' muted' : ''}">${esc(q)}</div>`
  ).join('');
  const mMore  = (t.markets_count || 0) > 2
    ? `<div class="card-market-more">+${t.markets_count - 2} more</div>` : '';

  // ── status ──
  let statusHtml;
  if (t.status === 'CORRECT')      statusHtml = '<span class="status-correct">✓ CORRECT</span>';
  else if (t.status === 'WRONG')   statusHtml = '<span class="status-wrong">✗ WRONG</span>';
  else statusHtml = '<div class="open-badge"><div class="open-dot"></div>OPEN</div>';

  // ── footer meta ──
  const entryStr = t.entry_price ? (parseFloat(t.entry_price) * 100).toFixed(0) + '¢' : '';
  const resStr   = t.resolution_window_days ? t.resolution_window_days + 'd' : '';

  // ── comments ──
  const comments = s.comments || [];
  const commentsHtml = comments.length
    ? comments.map(c => commentRow(c)).join('')
    : '<div class="comment-empty">No comments yet.</div>';

  return `
<div class="thesis-card" id="card-${esc(id)}">
  <div class="card-clickable" onclick="location.href='${href}'">
    ${topHtml}
    <div class="card-body">
      <div class="card-creator">${esc(t.display_name || 'Anonymous')}</div>
      <div class="card-title">${esc(t.title || '')}</div>
      <div class="card-markets">${mLines}${mMore}</div>
    </div>
    <div class="card-footer">
      ${statusHtml}
      <div class="card-footer-right">
        ${entryStr ? `<span>${entryStr}</span>` : ''}
        ${resStr   ? `<span>${resStr}</span>`   : ''}
        <span>${relTime(t.created_at)}</span>
      </div>
    </div>
  </div>
  <div class="reactions-bar">
    <div class="reactions-left">
      <button class="react-btn${liked ? ' liked' : ''}" onclick="toggleLike('${esc(id)}')" title="Like">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span id="like-count-${esc(id)}">${likeCount}</span>
      </button>
      <button class="react-btn" onclick="toggleComments('${esc(id)}')" title="Comments">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span id="comment-count-${esc(id)}">${commentCount}</span>
      </button>
    </div>
    <button class="share-btn" id="share-${esc(id)}" onclick="shareCard(event,'${esc(id)}','${esc(t.creator_wallet || '')}')">share</button>
  </div>
  <div class="comment-panel${commentOpen ? ' open' : ''}" id="comments-${esc(id)}">
    <div class="comment-list" id="comment-list-${esc(id)}">${commentsHtml}</div>
    <div class="comment-input-row">
      <input class="comment-input" id="comment-input-${esc(id)}" placeholder="Add a take…" maxlength="500"
             onkeydown="if(event.key==='Enter')submitComment('${esc(id)}')">
      <button class="comment-submit" onclick="submitComment('${esc(id)}')">Post</button>
    </div>
  </div>
</div>`;
}

function commentRow(c) {
  return `
    <div class="comment-item">
      <div class="comment-author">${esc(c.display_name || 'Anonymous')}</div>
      <div class="comment-body">${esc(c.body)}</div>
      <div class="comment-time">${relTime(c.created_at)}</div>
    </div>`;
}

// ── FETCH + RENDER ────────────────────────────────────────────────────────────
async function loadFeed() {
  const grid   = document.getElementById('feed-grid');
  const params = new URLSearchParams();
  if (_filters.tier)   params.set('tier',   _filters.tier);
  if (_filters.window) params.set('window', _filters.window);
  if (_filters.sort)   params.set('sort',   _filters.sort);

  try {
    const res  = await fetch(`${_API}?${params}`);
    const data = await res.json();
    const theses  = data.theses  || [];
    const trending = data.trending || [];

    renderTrending(trending);

    const liveCount = theses.filter(t => t.status === 'OPEN').length;
    document.getElementById('live-count').textContent = `${liveCount} live`;

    if (!theses.length) {
      grid.innerHTML = '<div class="feed-empty">NO THESES MATCH</div>';
      return;
    }

    for (const t of theses) {
      if (!_cardState[t.thesis_id]) {
        _cardState[t.thesis_id] = { liked: false, likeCount: t.agree_count || 0 };
      }
    }

    grid.innerHTML = theses.map(buildCard).join('');
  } catch (e) {
    console.error('[feed]', e);
    grid.innerHTML = '<div class="feed-empty">FAILED TO LOAD</div>';
  }
}

// ── LIKE ─────────────────────────────────────────────────────────────────────
async function toggleLike(id) {
  const s = _cardState[id] || {};
  const wasLiked  = !!s.liked;
  s.liked         = !wasLiked;
  s.likeCount     = Math.max(0, (s.likeCount || 0) + (s.liked ? 1 : -1));
  _cardState[id]  = s;
  _applyLikeUI(id, s);

  try {
    const { user_id, display_name } = currentUser();
    const r    = await fetch(`/api/takes/${id}/like`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id, display_name })
    });
    const data = await r.json();
    s.liked     = data.liked;
    s.likeCount = data.count;
    _cardState[id] = s;
    _applyLikeUI(id, s);
  } catch (_) { /* keep optimistic */ }
}

function _applyLikeUI(id, s) {
  const btn     = document.querySelector(`#card-${id} .react-btn[title="Like"]`);
  const countEl = document.getElementById(`like-count-${id}`);
  if (btn) {
    btn.classList.toggle('liked', s.liked);
    const path = btn.querySelector('path');
    if (path) path.setAttribute('fill', s.liked ? 'currentColor' : 'none');
  }
  if (countEl) countEl.textContent = Math.max(0, s.likeCount);
}

// ── COMMENTS ─────────────────────────────────────────────────────────────────
async function toggleComments(id) {
  const panel = document.getElementById(`comments-${id}`);
  const s     = _cardState[id] || {};
  s.commentOpen  = !s.commentOpen;
  _cardState[id] = s;
  if (panel) panel.classList.toggle('open', s.commentOpen);

  if (s.commentOpen && !s.commentsLoaded) {
    s.commentsLoaded = true;
    try {
      const r    = await fetch(`/api/takes/${id}/comments`);
      const data = await r.json();
      s.comments     = data.comments || [];
      s.commentCount = s.comments.length;
      _cardState[id] = s;
      _renderCommentList(id, s.comments);
      const countEl = document.getElementById(`comment-count-${id}`);
      if (countEl) countEl.textContent = s.commentCount;
    } catch (_) {}
  }
}

function _renderCommentList(id, comments) {
  const listEl = document.getElementById(`comment-list-${id}`);
  if (!listEl) return;
  listEl.innerHTML = comments.length
    ? comments.map(commentRow).join('')
    : '<div class="comment-empty">No comments yet.</div>';
}

async function submitComment(id) {
  const input = document.getElementById(`comment-input-${id}`);
  if (!input) return;
  const body  = input.value.trim();
  if (!body)  return;

  const { user_id, display_name } = currentUser();
  input.value = '';

  // Optimistic
  const s = _cardState[id] || {};
  if (!s.comments) s.comments = [];
  const optimistic = { id: 'opt_' + Date.now(), display_name, body, created_at: new Date().toISOString() };
  s.comments.push(optimistic);
  s.commentCount = (s.commentCount || 0) + 1;
  _cardState[id] = s;

  const listEl  = document.getElementById(`comment-list-${id}`);
  const countEl = document.getElementById(`comment-count-${id}`);
  if (listEl) {
    const empty = listEl.querySelector('.comment-empty');
    if (empty) empty.remove();
    listEl.insertAdjacentHTML('beforeend', commentRow(optimistic));
  }
  if (countEl) countEl.textContent = s.commentCount;

  try {
    await fetch(`/api/takes/${id}/comment`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id, display_name, body })
    });
  } catch (_) {}
}

// ── SHARE ─────────────────────────────────────────────────────────────────────
function shareCard(e, id, wallet) {
  e.stopPropagation();
  const url = wallet ? `https://hyperflex.network/trader/${wallet}` : 'https://hyperflex.network/feed';
  navigator.clipboard.writeText(url).catch(() => {});
  const btn = document.getElementById(`share-${id}`);
  if (btn) {
    btn.textContent = 'copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'share'; btn.classList.remove('copied'); }, 1500);
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
document.getElementById('filter-rail').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn || !btn.dataset.group) return;
  const { group, val } = btn.dataset;
  document.querySelectorAll(`.filter-btn[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _filters[group] = val;
  const grid = document.getElementById('feed-grid');
  grid.style.opacity = '0.5';
  loadFeed().then(() => { grid.style.opacity = '1'; });
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadFeed();
</script>
