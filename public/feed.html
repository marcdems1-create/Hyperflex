<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HYPERFLEX — THESIS FEED</title>
<meta name="description" content="Sharp money thesis cards. Verified track records. Prediction market intelligence from the top traders.">
<meta property="og:title" content="HYPERFLEX THESIS FEED">
<meta property="og:description" content="Sharp money. Verified track records.">
<meta property="og:url" content="https://hyperflex.network/feed">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/hyperflex-mobile.css">
<style>
:root {
  --paper:    #0e0e15;
  --paper-2:  #16161f;
  --paper-3:  #1e1e2a;
  --ink:      #f0f0f5;
  --ink2:     #c8c8d8;
  --dim:      #8888a0;
  --faint:    #44445a;
  --border:   #1e1e2a;
  --green:    #00e68a;
  --red:      #ff4d6a;
  --blue:     #4d9fff;
  --amber:    #f59e0b;
  --purple:   #a855f7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── PAGE WRAPPER ─────────────────────────────── */
.page-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 80px 16px 80px;
}

/* ── PAGE HEADER ──────────────────────────────── */
.page-header {
  margin-bottom: 28px;
}
.page-header h1 {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
}
.page-header .subtitle {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 5px;
}

/* ── FILTER RAIL ─────────────────────────────── */
.filter-rail {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 4px;
}
.filter-sep {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 4px;
}
/* .filter-btn matches the exact class pattern used on signals.html */
.filter-btn {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  background: transparent;
  border: 1px solid var(--border);
  padding: 5px 12px;
  cursor: pointer;
  border-radius: 2px;
  transition: color .15s, border-color .15s, background .15s;
  white-space: nowrap;
}
.filter-btn:hover {
  color: var(--ink2);
  border-color: var(--faint);
}
/* Active state: cyan highlight — exact pattern from signals.html .filter-btn.active */
.filter-btn.active {
  color: var(--blue);
  border-color: rgba(77,159,255,.45);
  background: rgba(77,159,255,.08);
}
.filter-spacer { flex: 1; }

/* ── TRENDING STRIP ──────────────────────────── */
.trending-section {
  margin-bottom: 28px;
}
.trending-label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.trending-label::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px rgba(0,230,138,.7);
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .4; }
}
.trending-cards {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.trending-cards::-webkit-scrollbar { display: none; }
.trending-card {
  flex-shrink: 0;
  width: 240px;
  padding: 12px 14px;
  background: var(--paper-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
  transition: border-color .15s;
}
.trending-card:hover { border-color: rgba(77,159,255,.35); text-decoration: none; }
.trending-card-name {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.trending-card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}
.trending-card-meta {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  color: var(--faint);
  letter-spacing: 0.1em;
}

/* ── CLV PILLS — exact color assignments from /signals and /trader ─── */
.clv-pill {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 3px 9px;
  border: 1px solid;
  border-radius: 2px;
  display: inline-block;
  white-space: nowrap;
}
.clv-pill.sharp  { color: var(--green);  border-color: rgba(0,230,138,.3);  background: rgba(0,230,138,.06); }
.clv-pill.good   { color: var(--amber);  border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.06); }
.clv-pill.square { color: var(--dim);    border-color: var(--border);       background: transparent; }
.clv-pill.fade   { color: var(--red);    border-color: rgba(255,77,106,.3); background: rgba(255,77,106,.06); }
.clv-pill.pending{ color: var(--faint);  border-color: var(--border);       background: transparent; }

/* ── THESIS CARDS ────────────────────────────── */
.feed-list { display: flex; flex-direction: column; gap: 1px; }

.thesis-card {
  display: block;
  background: var(--paper-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 18px 20px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: border-color .15s, background .15s;
  margin-bottom: 8px;
}
.thesis-card:hover {
  border-color: rgba(255,255,255,.12);
  background: #18181f;
  text-decoration: none;
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.creator-id {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--dim);
  text-transform: uppercase;
}
.verified-badge {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--green);
  border: 1px solid rgba(0,230,138,.35);
  background: rgba(0,230,138,.07);
  padding: 2px 8px;
  border-radius: 2px;
}
.flex-score-label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--dim);
  margin-left: auto;
}
.flex-score-label span {
  color: var(--amber);
  font-size: 12px;
}

.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.45;
  margin-bottom: 12px;
}

.card-markets {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}
.market-line {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: var(--dim);
  line-height: 1.4;
}
.market-line-dot {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--faint);
  flex-shrink: 0;
  margin-top: 1px;
}
.more-markets {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--faint);
  text-transform: uppercase;
  margin-top: 2px;
}

.card-footer {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.status-badge {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
  border: 1px solid;
}
.status-badge.open     { color: var(--green); border-color: rgba(0,230,138,.3);  background: rgba(0,230,138,.06); }
.status-badge.correct  { color: var(--green); border-color: rgba(0,230,138,.4);  background: rgba(0,230,138,.1); }
.status-badge.wrong    { color: var(--red);   border-color: rgba(255,77,106,.3); background: rgba(255,77,106,.06); }

.resolve-window {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
}
.card-ts {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--faint);
  margin-left: auto;
}

/* ── EMPTY STATE ─────────────────────────────── */
.empty-state {
  padding: 60px 0;
  text-align: center;
}
.empty-state p {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--faint);
}

/* ── LOADING ─────────────────────────────────── */
.loading-state {
  padding: 60px 0;
  text-align: center;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--faint);
}

/* ── MOBILE ──────────────────────────────────── */
@media (max-width: 600px) {
  .page-wrap { padding: 72px 12px 60px; }
  .filter-sep { display: none; }
  .flex-score-label { margin-left: 0; }
  .card-top { gap: 7px; }
}
</style>
</head>
<body>

<div id="nav-root"></div>
<script src="/nav.js?v=22"></script>

<div class="page-wrap">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>THESIS FEED</h1>
    <div class="subtitle">SHARP MONEY. VERIFIED TRACK RECORDS.</div>
  </div>

  <!-- FILTER RAIL -->
  <div class="filter-rail" id="filterRail">
    <div class="filter-group" id="tierFilters">
      <button class="filter-btn active" data-tier="">ALL</button>
      <button class="filter-btn" data-tier="sharp">SHARP</button>
      <button class="filter-btn" data-tier="good">GOOD</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" id="windowFilters">
      <button class="filter-btn active" data-window="">ALL</button>
      <button class="filter-btn" data-window="7">7D</button>
      <button class="filter-btn" data-window="30">30D</button>
      <button class="filter-btn" data-window="90">90D</button>
    </div>
    <div class="filter-spacer"></div>
    <div class="filter-group" id="sortFilters">
      <button class="filter-btn active" data-sort="trending">TRENDING</button>
      <button class="filter-btn" data-sort="recent">RECENT</button>
    </div>
  </div>

  <!-- TRENDING STRIP -->
  <div class="trending-section" id="trendingSection" style="display:none">
    <div class="trending-label">TRENDING</div>
    <div class="trending-cards" id="trendingCards"></div>
  </div>

  <!-- MAIN FEED -->
  <div id="feedList" class="feed-list">
    <div class="loading-state">LOADING...</div>
  </div>

</div>

<script>
(function () {
  'use strict';

  var state = { tier: '', window: '', sort: 'trending' };

  // ── Filter rail wiring ──────────────────────────────────────────────
  document.getElementById('tierFilters').addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#tierFilters .filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    state.tier = btn.dataset.tier || '';
    loadTheses();
  });

  document.getElementById('windowFilters').addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#windowFilters .filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    state.window = btn.dataset.window || '';
    loadTheses();
  });

  document.getElementById('sortFilters').addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#sortFilters .filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    state.sort = btn.dataset.sort || 'trending';
    loadTheses();
  });

  // ── Helpers ────────────────────────────────────────────────────────
  function truncateWallet(w) {
    if (!w || w.length < 10) return w || '—';
    return w.slice(0, 6) + '…' + w.slice(-4);
  }

  function relativeTime(iso) {
    var diff = Date.now() - new Date(iso).getTime();
    var m = Math.floor(diff / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24);
    if (d < 30) return d + 'd ago';
    return Math.floor(d / 30) + 'mo ago';
  }

  function resolveWindow(days) {
    if (!days) return '';
    if (days < 1) return 'RESOLVES IN <1D';
    return 'RESOLVES IN ' + days + 'D';
  }

  function clvClass(clv) {
    return (clv || 'pending').toLowerCase();
  }

  function traderHref(wallet) {
    if (!wallet) return '#';
    return '/trader/' + wallet.toLowerCase();
  }

  // ── Render trending strip ──────────────────────────────────────────
  function renderTrending(trending) {
    var section = document.getElementById('trendingSection');
    var container = document.getElementById('trendingCards');
    if (!trending || trending.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = '';
    container.innerHTML = trending.map(function (t) {
      var clv = clvClass(t.clv_classification);
      return '<a class="trending-card" href="' + traderHref(t.creator_wallet) + '">' +
        '<div class="trending-card-name">' +
          escHtml(t.display_name || truncateWallet(t.creator_wallet)) +
          ' <span class="clv-pill ' + clv + '">' + escHtml(t.clv_classification || 'PENDING') + '</span>' +
        '</div>' +
        '<div class="trending-card-title">' + escHtml(t.title) + '</div>' +
        '<div class="trending-card-meta">' +
          (t.markets_count > 1 ? t.markets_count + ' MARKETS · ' : '') +
          relativeTime(t.created_at) +
        '</div>' +
      '</a>';
    }).join('');
  }

  // ── Render thesis cards ────────────────────────────────────────────
  function renderTheses(theses) {
    var list = document.getElementById('feedList');
    if (!theses || theses.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>NO THESES MATCH</p></div>';
      return;
    }
    list.innerHTML = theses.map(function (t) {
      var clv = clvClass(t.clv_classification);
      var name = t.display_name || truncateWallet(t.creator_wallet) || '—';
      var href = traderHref(t.creator_wallet);

      var verifiedBadge = t.verified_sharp
        ? '<span class="verified-badge">VERIFIED SHARP</span>'
        : '';

      var marketsHtml = '';
      if (t.markets_preview && t.markets_preview.length > 0) {
        marketsHtml = t.markets_preview.map(function (q) {
          return '<div class="market-line">' +
            '<span class="market-line-dot">·</span>' +
            '<span>' + escHtml(q.length > 90 ? q.slice(0, 90) + '…' : q) + '</span>' +
          '</div>';
        }).join('');
        if (t.markets_count > t.markets_preview.length) {
          marketsHtml += '<div class="more-markets">+' + (t.markets_count - t.markets_preview.length) + ' MORE</div>';
        }
      }

      var statusClass = (t.status || '').toLowerCase();
      var statusLabel = t.status || 'OPEN';

      var resolveStr = resolveWindow(t.resolution_window_days);

      return '<a class="thesis-card" href="' + href + '">' +
        '<div class="card-top">' +
          '<span class="creator-id">' + escHtml(name) + '</span>' +
          verifiedBadge +
          '<span class="clv-pill ' + clv + '">' + escHtml(t.clv_classification || 'PENDING') + '</span>' +
          '<span class="flex-score-label">FLEX&nbsp;<span>' + parseFloat(t.flex_score || 0).toFixed(2) + '</span></span>' +
        '</div>' +
        '<div class="card-title">' + escHtml(t.title) + '</div>' +
        (marketsHtml ? '<div class="card-markets">' + marketsHtml + '</div>' : '') +
        '<div class="card-footer">' +
          '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>' +
          (resolveStr ? '<span class="resolve-window">' + resolveStr + '</span>' : '') +
          '<span class="card-ts">' + relativeTime(t.created_at) + '</span>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  // ── HTML escape ────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Fetch + render ─────────────────────────────────────────────────
  function loadTheses() {
    var params = new URLSearchParams();
    if (state.tier)   params.set('tier', state.tier);
    if (state.window) params.set('window', state.window);
    if (state.sort)   params.set('sort', state.sort);

    var list = document.getElementById('feedList');
    list.innerHTML = '<div class="loading-state">LOADING...</div>';

    fetch('/api/feed/theses?' + params.toString())
      .then(function (r) { return r.json(); })
      .then(function (data) {
        renderTrending(data.trending || []);
        renderTheses(data.theses || []);
      })
      .catch(function () {
        list.innerHTML = '<div class="empty-state"><p>NO THESES MATCH</p></div>';
        document.getElementById('trendingSection').style.display = 'none';
      });
  }

  loadTheses();
})();
</script>
</body>
</html>
