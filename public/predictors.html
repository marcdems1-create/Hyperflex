<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prediction Market Leaderboard — Top Traders Ranked by Sharp Score | HYPERFLEX</title>
<meta name="description" content="Global prediction market leaderboard. Top traders ranked by verified track record across Polymarket, Kalshi & Manifold. Win rate, P&L, sharp scores."/>
<meta name="keywords" content="polymarket leaderboard, prediction market rankings, kalshi traders, manifold leaderboard, sharp score, prediction market portfolio"/>
<meta property="og:title" content="Prediction Market Leaderboard — Top Traders Ranked | HYPERFLEX"/>
<meta property="og:description" content="Global prediction market leaderboard. Top traders ranked by verified track record across Polymarket, Kalshi & Manifold."/>
<meta property="og:url" content="https://hyperflex.network/predictors"/>
<meta property="og:image" content="https://hyperflex.network/og-predictors.png"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Prediction Market Leaderboard — Top Traders Ranked | HYPERFLEX"/>
<meta name="twitter:description" content="Global prediction market leaderboard. Top traders ranked by verified track record across Polymarket, Kalshi & Manifold."/>
<meta name="twitter:image" content="https://hyperflex.network/og-predictors.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0e0e0c;
  --paper: #141412;
  --cream: #1c1c19;
  --card: #191917;
  --text: #ddd8cc;
  --gold: #c9920d;
  --gold-lt: #e0a820;
  --gold-bright: #f5c842;
  --border: #2a2a26;
  --dim: #7a7870;
  --muted: #5a5854;
  --green: #2d9b5f;
  --red: #c0392b;
  --sans: 'Syne', sans-serif;
  --mono: 'Space Mono', monospace;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,146,13,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,146,13,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* NAV */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(20,20,18,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.nav-logo-mark {
  width: 32px; height: 32px;
  background: var(--gold);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 13px; font-weight: 700;
  color: var(--ink);
}
.nav-name {
  font-family: var(--mono);
  font-size: 13px; font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
}
.nav-link {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 0.5px;
  transition: color 0.15s;
}
.nav-link:hover, .nav-link.active { color: var(--text); }
.nav-actions { display: flex; align-items: center; gap: 12px; }
.btn-nav {
  font-family: var(--mono);
  font-size: 11px; font-weight: 700;
  padding: 8px 16px;
  border-radius: 6px;
  text-decoration: none;
  letter-spacing: 0.5px;
  transition: opacity 0.15s;
}
.btn-nav-ghost { color: var(--dim); border: 1px solid var(--border); background: transparent; }
.btn-nav-ghost:hover { color: var(--text); }
.btn-nav-primary { background: var(--gold); color: var(--ink); border: none; }
.btn-nav-primary:hover { opacity: 0.88; }

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  padding: 120px 40px 40px;
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
}
.hero h1 {
  font-size: clamp(30px, 4vw, 48px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 12px;
}
.hero h1 .accent { color: var(--gold); }
.hero-sub {
  font-size: clamp(13px, 1.6vw, 15px);
  color: var(--dim);
  line-height: 1.6;
  max-width: 540px;
  margin: 0 auto;
  font-family: var(--mono);
}

/* TIME FILTER TABS */
.time-tabs {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 32px auto 0;
  padding: 0 40px;
  display: flex;
  gap: 8px;
  justify-content: center;
}
.time-tab {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.time-tab:hover { color: var(--text); border-color: var(--dim); }
.time-tab.active {
  background: rgba(201,146,13,0.12);
  border-color: rgba(201,146,13,0.5);
  color: var(--gold);
}

/* LEADERBOARD TABLE */
.lb-wrap {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 24px auto 0;
  padding: 0 40px 80px;
}
.lb-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}
.lb-table thead th {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  text-align: left;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.lb-table thead th:first-child { width: 50px; text-align: center; }
.lb-table tbody tr {
  transition: background 0.12s;
  cursor: pointer;
}
.lb-table tbody tr:hover { background: rgba(201,146,13,0.04); }
.lb-table tbody td {
  padding: 14px 14px;
  border-bottom: 1px solid rgba(42,42,38,0.5);
  vertical-align: middle;
  font-size: 13px;
}
.lb-table tbody td:first-child { text-align: center; }

/* Rank badges */
.rank-num {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--dim);
}
.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  font-size: 14px;
}
.rank-gold { background: linear-gradient(135deg, #f5c842, #c9920d); color: #1a1400; font-weight: 800; }
.rank-silver { background: linear-gradient(135deg, #c0c0c0, #8a8a8a); color: #1a1a1a; font-weight: 800; }
.rank-bronze { background: linear-gradient(135deg, #cd7f32, #a0622e); color: #1a1400; font-weight: 800; }

/* Trader cell */
.trader-cell {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: inherit;
}
.trader-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(201,146,13,0.3), rgba(201,146,13,0.1));
  border: 1px solid rgba(201,146,13,0.3);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 14px; font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
}
.trader-name {
  font-weight: 700;
  color: var(--text);
  font-size: 14px;
}
.trader-cell:hover .trader-name { color: var(--gold); }

/* Win rate donut */
.wr-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
.donut-mini {
  width: 28px; height: 28px;
  flex-shrink: 0;
}
.donut-mini circle { fill: none; stroke-width: 3.5; }
.donut-bg { stroke: var(--border); }
.donut-fill { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.wr-val {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
}

/* P&L */
.pnl-pos { color: var(--green); font-family: var(--mono); font-weight: 700; font-size: 13px; }
.pnl-neg { color: var(--red); font-family: var(--mono); font-weight: 700; font-size: 13px; }

/* Sharp score badge */
.sharp-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 12px;
  letter-spacing: 0.5px;
}
.sharp-elite { background: rgba(201,146,13,0.15); color: var(--gold-bright); border: 1px solid rgba(201,146,13,0.4); }
.sharp-high { background: rgba(45,155,95,0.12); color: var(--green); border: 1px solid rgba(45,155,95,0.3); }
.sharp-mid { background: rgba(100,160,255,0.1); color: #6aa0ff; border: 1px solid rgba(100,160,255,0.25); }
.sharp-low { background: rgba(90,88,84,0.15); color: var(--dim); border: 1px solid var(--border); }

/* Trades */
.trades-val { font-family: var(--mono); font-size: 13px; color: var(--text); }

/* Platform icons */
.platform-icons {
  display: flex;
  gap: 4px;
}
.platform-icon {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.3px;
}
.pi-hfx { background: rgba(201,146,13,0.15); color: var(--gold); }
.pi-poly { background: rgba(100,160,255,0.12); color: #6aa0ff; }
.pi-kalshi { background: rgba(255,140,0,0.12); color: #ff8c00; }
.pi-manifold { background: rgba(130,80,230,0.12); color: #a78bfa; }

/* Follow button */
.follow-btn {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.follow-btn:hover { background: rgba(201,146,13,0.12); }
.follow-btn.following {
  background: rgba(201,146,13,0.15);
  color: var(--gold-bright);
}

/* Loading / empty */
.state-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 13px;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  body { overflow-x: hidden; }
  input, textarea, select { font-size: 16px !important; }
  .nav { padding: 0 16px; }
  .nav-links { display: none; }
  .hero { padding: 100px 20px 32px; }
  .time-tabs { padding: 0 20px; }
  .lb-wrap { padding: 0 12px 60px; }
  .lb-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .lb-table thead { display: none; }
  .lb-table tbody { display: block; }
  .lb-table tbody tr {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    padding: 16px 12px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .lb-table tbody td {
    border-bottom: none;
    padding: 0;
    font-size: 12px;
  }
  .lb-table tbody td:first-child { width: 30px; }
  .lb-table tbody td.td-trader { flex: 1; min-width: 120px; }
  .lb-table tbody td.td-follow { margin-left: auto; }
  .lb-table tbody td.td-wr,
  .lb-table tbody td.td-pnl,
  .lb-table tbody td.td-sharp,
  .lb-table tbody td.td-trades,
  .lb-table tbody td.td-platforms { display: none; }
  /* Show key stats inline on mobile */
  .mobile-stats {
    display: flex;
    gap: 12px;
    width: 100%;
    padding-top: 6px;
  }
  .mobile-stat {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
  }
  .mobile-stat strong { color: var(--text); }
  .btn-nav { min-height: 44px; display: inline-flex; align-items: center; padding: 10px 16px; }
  .nav-logo { min-height: 44px; }
  .time-tab { min-height: 44px; display: inline-flex; align-items: center; }
  .follow-btn { min-height: 44px; display: inline-flex; align-items: center; }
}
@media (min-width: 769px) {
  .mobile-stats { display: none; }
}
@media (max-width: 480px) {
  .hero { padding: 80px 16px 24px; }
  .hero h1 { font-size: 26px; }
  .time-tabs { padding: 0 12px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
  .time-tabs::-webkit-scrollbar { display: none; }
  .time-tab { flex-shrink: 0; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none" style="width:28px;height:28px">
      <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="#c9920d" stroke-width="1.5" fill="rgba(201,146,13,0.1)"/>
      <path d="M16 8L22 11.5V18.5L16 22L10 18.5V11.5L16 8Z" fill="#c9920d" opacity="0.6"/>
    </svg>
    <span class="nav-name">HYPERFLEX</span>
  </a>
  <div class="nav-links">
    <a href="/predictors" class="nav-link active">Leaderboard</a>
    <a href="/explore" class="nav-link">Explore</a>
    <a href="/odds" class="nav-link">Odds</a>
    <a href="/whales" class="nav-link">Whales</a>
    <a href="/templates" class="nav-link">Templates</a>
  </div>
  <div class="nav-actions">
    <a id="navDashLink" href="/dashboard" class="btn-nav btn-nav-ghost" style="display:none;color:#c9920d;border-color:rgba(201,146,13,0.3)">Dashboard</a>
    <a href="/creator/login" class="btn-nav btn-nav-ghost" id="navLoginLink">Sign in</a>
    <a href="/creator/signup" class="btn-nav btn-nav-primary" id="navSignupLink">Get started free</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>&#127942; Prediction Market <span class="accent">Leaderboard</span></h1>
  <p class="hero-sub">Ranked by verified track record across Polymarket &amp; Kalshi</p>
</section>

<!-- TIME FILTER TABS -->
<div class="time-tabs" id="timeTabs">
  <button class="time-tab" data-period="7d" onclick="setPeriod('7d')">7D</button>
  <button class="time-tab active" data-period="30d" onclick="setPeriod('30d')">30D</button>
  <button class="time-tab" data-period="all" onclick="setPeriod('all')">All Time</button>
</div>

<!-- LEADERBOARD -->
<div class="lb-wrap">
  <table class="lb-table" id="lbTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Trader</th>
        <th>Win Rate</th>
        <th>P&amp;L</th>
        <th>Sharp Score</th>
        <th>Trades</th>
        <th>Platforms</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="lbBody">
      <tr><td colspan="8"><div class="state-msg">Loading leaderboard...</div></td></tr>
    </tbody>
  </table>
</div>

<script>
// Show Dashboard link if logged in
if (localStorage.getItem('hf_token') || localStorage.getItem('hf_creator_token')) {
  const dl = document.getElementById('navDashLink'); if (dl) dl.style.display = '';
  const ll = document.getElementById('navLoginLink'); if (ll) ll.style.display = 'none';
  const sl = document.getElementById('navSignupLink'); if (sl) sl.style.display = 'none';
}

let currentPeriod = '30d';
let lbData = [];

function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('#timeTabs .time-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.period === period)
  );
  loadLeaderboard();
}

async function loadLeaderboard() {
  const body = document.getElementById('lbBody');
  body.innerHTML = '<tr><td colspan="8"><div class="state-msg">Loading leaderboard...</div></td></tr>';
  try {
    const res = await fetch(`/api/leaderboard?period=${currentPeriod}`);
    if (!res.ok) throw new Error('Failed');
    lbData = await res.json();
    renderLeaderboard();
  } catch (e) {
    body.innerHTML = '<tr><td colspan="8"><div class="state-msg">Could not load leaderboard. Try again later.</div></td></tr>';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rankBadge(rank) {
  if (rank === 1) return '<span class="rank-badge rank-gold">1</span>';
  if (rank === 2) return '<span class="rank-badge rank-silver">2</span>';
  if (rank === 3) return '<span class="rank-badge rank-bronze">3</span>';
  return `<span class="rank-num">${rank}</span>`;
}

function donutSvg(pct) {
  const r = 10;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return `<svg class="donut-mini" viewBox="0 0 28 28">
    <circle class="donut-bg" cx="14" cy="14" r="${r}"/>
    <circle class="donut-fill" cx="14" cy="14" r="${r}"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}"
      transform="rotate(-90 14 14)"/>
  </svg>`;
}

function sharpBadgeHtml(score) {
  let cls = 'sharp-low';
  if (score >= 85) cls = 'sharp-elite';
  else if (score >= 70) cls = 'sharp-high';
  else if (score >= 50) cls = 'sharp-mid';
  return `<span class="sharp-badge ${cls}">${score}</span>`;
}

function platformIcons(platforms) {
  const map = {
    HFX: 'pi-hfx',
    POLY: 'pi-poly',
    KALSHI: 'pi-kalshi',
    MANIFOLD: 'pi-manifold'
  };
  return platforms.map(p => {
    const cls = map[p] || 'pi-hfx';
    return `<span class="platform-icon ${cls}">${p}</span>`;
  }).join('');
}

function renderLeaderboard() {
  const body = document.getElementById('lbBody');
  if (!lbData.length) {
    // Demo data
    const demo = [
      { rank:1, user_id:'demo1', display_name:'CryptoOracle', win_rate:78, total_pnl:2420, sharp_score:92, trade_count:156, platforms:['HFX','POLY'] },
      { rank:2, user_id:'demo2', display_name:'MacroMaven', win_rate:72, total_pnl:1680, sharp_score:87, trade_count:89, platforms:['HFX','POLY','KALSHI'] },
      { rank:3, user_id:'demo3', display_name:'PoliticsGuru', win_rate:69, total_pnl:920, sharp_score:81, trade_count:67, platforms:['HFX'] },
      { rank:4, user_id:'demo4', display_name:'SportsEdge', win_rate:65, total_pnl:510, sharp_score:74, trade_count:53, platforms:['HFX','MANIFOLD'] },
      { rank:5, user_id:'demo5', display_name:'DataDriven', win_rate:63, total_pnl:280, sharp_score:68, trade_count:48, platforms:['HFX'] },
      { rank:6, user_id:'demo6', display_name:'TechSignals', win_rate:60, total_pnl:140, sharp_score:61, trade_count:35, platforms:['HFX'] },
    ];
    body.innerHTML = `<tr><td colspan="8">
      <div style="text-align:center;margin:0 0 24px;padding:16px 20px;background:rgba(201,146,13,0.08);border:1px solid rgba(201,146,13,0.2);border-radius:10px">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">Connect your wallet to appear on the leaderboard</div>
        <div style="font-size:13px;color:var(--dim);margin-bottom:12px">These are example rankings. Your real stats show up once you connect Polymarket, Kalshi, or Manifold.</div>
        <a href="/creator/signup" style="display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:var(--ink);padding:10px 20px;border-radius:8px;font-family:var(--sans);font-weight:700;font-size:13px;text-decoration:none">Get started free &#8594;</a>
      </div>
    </td></tr>` + demo.map(r => renderRow(r, true)).join('');
    body.querySelectorAll('tr.demo-row').forEach(r => { r.style.opacity = '0.6'; r.style.pointerEvents = 'none'; });
    return;
  }
  body.innerHTML = lbData.map(r => renderRow(r, false)).join('');
}

function renderRow(r, isDemo) {
  const initial = (r.display_name || '?').charAt(0).toUpperCase();
  const pnlClass = r.total_pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
  const pnlSign = r.total_pnl >= 0 ? '+' : '';
  const profileUrl = `/p/${escHtml(r.display_name || r.user_id)}`;
  const uid = escHtml(r.user_id);

  return `<tr class="${isDemo ? 'demo-row' : ''}" onclick="${isDemo ? '' : `window.location='/p/${escHtml(r.display_name || r.user_id)}'`}">
    <td>${rankBadge(r.rank)}</td>
    <td class="td-trader">
      <a href="${profileUrl}" class="trader-cell" onclick="event.stopPropagation()">
        <div class="trader-avatar">${initial}</div>
        <span class="trader-name">${escHtml(r.display_name)}</span>
      </a>
      <div class="mobile-stats">
        <span class="mobile-stat"><strong>${r.win_rate}%</strong> WR</span>
        <span class="mobile-stat ${pnlClass}">${pnlSign}${r.total_pnl.toLocaleString()} pts</span>
        <span class="mobile-stat">Sharp <strong>${r.sharp_score}</strong></span>
      </div>
    </td>
    <td class="td-wr">
      <div class="wr-cell">
        ${donutSvg(r.win_rate)}
        <span class="wr-val" style="color:${r.win_rate >= 65 ? 'var(--green)' : 'var(--text)'}">${r.win_rate}%</span>
      </div>
    </td>
    <td class="td-pnl"><span class="${pnlClass}">${pnlSign}${r.total_pnl.toLocaleString()} pts</span></td>
    <td class="td-sharp">${sharpBadgeHtml(r.sharp_score)}</td>
    <td class="td-trades"><span class="trades-val">${r.trade_count}</span></td>
    <td class="td-platforms"><div class="platform-icons">${platformIcons(r.platforms)}</div></td>
    <td class="td-follow">
      <button class="follow-btn" id="follow-${uid}" onclick="event.stopPropagation();toggleFollow('${uid}',this)"
        ${isDemo ? 'disabled' : ''}>Follow</button>
    </td>
  </tr>`;
}

async function toggleFollow(userId, btn) {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to follow predictors'); return; }
  btn.disabled = true;
  try {
    const r = await fetch(`/api/predictors/${userId}/follow`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('Failed');
    const d = await r.json();
    btn.textContent = d.following ? 'Following' : 'Follow';
    btn.classList.toggle('following', d.following);
  } catch (e) {
    console.warn('[follow]', e);
  } finally {
    btn.disabled = false;
  }
}

loadLeaderboard();
</script>
</body>
</html>
