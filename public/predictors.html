<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polymarket Portfolio Tracker — Track All Your Prediction Market Positions | HYPERFLEX</title>
<meta name="description" content="Track your Polymarket, Kalshi, and Manifold positions in one dashboard. See your win rate, P&L, and calibration score. Free during beta."/>
<meta name="keywords" content="polymarket portfolio, kalshi tracker, manifold markets, prediction market dashboard, prediction market portfolio"/>
<meta property="og:title" content="Polymarket Portfolio Tracker — Track All Your Prediction Market Positions | HYPERFLEX"/>
<meta property="og:description" content="Track your Polymarket, Kalshi, and Manifold positions in one dashboard. See your win rate, P&L, and calibration score. Free during beta."/>
<meta property="og:url" content="https://hyperflex.network/predictors"/>
<meta property="og:image" content="https://hyperflex.network/og-predictors.png"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Polymarket Portfolio Tracker — Track All Your Prediction Market Positions | HYPERFLEX"/>
<meta name="twitter:description" content="Track your Polymarket, Kalshi, and Manifold positions in one dashboard. See your win rate, P&L, and calibration score. Free during beta."/>
<meta name="twitter:image" content="https://hyperflex.network/og-predictors.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0e0e0c;
  --paper: #141412;
  --cream: #1c1c19;
  --card: #191917;
  --text: #ddd8cc;
  --gold: #c9920d;
  --gold-lt: #e0a820;
  --gold-bright: #f5c842;
  --border: #2a2a26;
  --dim: #7a7870;
  --muted: #5a5854;
  --green: #2d9b5f;
  --red: #c0392b;
  --sans: 'Syne', sans-serif;
  --mono: 'Space Mono', monospace;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,146,13,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,146,13,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* NAV */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(20,20,18,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.nav-logo-mark {
  width: 32px; height: 32px;
  background: var(--gold);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 13px; font-weight: 700;
  color: var(--ink);
}
.nav-name {
  font-family: var(--mono);
  font-size: 13px; font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
}
.nav-link {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 0.5px;
  transition: color 0.15s;
}
.nav-link:hover, .nav-link.active { color: var(--text); }
.nav-actions { display: flex; align-items: center; gap: 12px; }
.btn-nav {
  font-family: var(--mono);
  font-size: 11px; font-weight: 700;
  padding: 8px 16px;
  border-radius: 6px;
  text-decoration: none;
  letter-spacing: 0.5px;
  transition: opacity 0.15s;
}
.btn-nav-ghost { color: var(--dim); border: 1px solid var(--border); background: transparent; }
.btn-nav-ghost:hover { color: var(--text); }
.btn-nav-primary { background: var(--gold); color: var(--ink); border: none; }
.btn-nav-primary:hover { opacity: 0.88; }

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  padding: 120px 40px 60px;
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
}
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
}
.eyebrow-dot {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.hero h1 {
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 16px;
}
.hero h1 .accent { color: var(--gold); }
.hero-sub {
  font-size: clamp(14px, 1.8vw, 17px);
  color: var(--dim);
  line-height: 1.6;
  max-width: 580px;
  margin: 0 auto 36px;
}

/* CONTROLS */
.controls {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px 24px;
}
.search-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.search-input {
  flex: 1;
  min-width: 200px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--gold); }

.pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.pill {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--dim); color: var(--text); }
.pill.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--ink);
}

.filter-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.filter-tab {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-tab:hover { color: var(--text); border-color: var(--dim); }
.filter-tab.active {
  border-color: rgba(201,146,13,0.5);
  color: var(--gold);
  background: rgba(201,146,13,0.08);
}

/* GRID */
.grid-wrap {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px 80px;
}
.predictor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.predictor-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-decoration: none;
  display: block;
  transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
  box-shadow: 0 2px 14px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.025);
}
.predictor-card:hover {
  border-color: rgba(201,146,13,0.5);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,146,13,0.08);
}
.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(201,146,13,0.3), rgba(201,146,13,0.1));
  border: 1px solid rgba(201,146,13,0.3);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 16px; font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
}
.card-info { flex: 1; min-width: 0; }
.card-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 5px;
}
.badges {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}
.badge-hfx { background: rgba(201,146,13,0.15); color: var(--gold); border: 1px solid rgba(201,146,13,0.3); }
.badge-poly { background: rgba(100,160,255,0.12); color: #6aa0ff; border: 1px solid rgba(100,160,255,0.25); }
.badge-streak { background: rgba(255,140,0,0.12); color: #ff8c00; border: 1px solid rgba(255,140,0,0.25); }
.badge-sharp { background: rgba(45,155,95,0.12); color: #2d9b5f; border: 1px solid rgba(45,155,95,0.25); }

.win-bar-wrap {
  margin-bottom: 14px;
}
.win-bar-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
}
.win-bar-label span:last-child { color: var(--gold); font-weight: 700; }
.win-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.win-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright));
  border-radius: 2px;
  transition: width 0.5s ease;
}

.card-stats {
  display: flex;
  gap: 0;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.stat {
  flex: 1;
  text-align: center;
}
.stat + .stat {
  border-left: 1px solid var(--border);
}
.stat-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.stat-val.pos { color: var(--green); }
.stat-val.neg { color: var(--red); }
.stat-lbl {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* EMPTY / LOADING */
.state-msg {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 13px;
}

/* ── READABILITY & MOBILE POLISH ── */
@media (max-width: 768px) {
  body { overflow-x: hidden; }
  input, textarea, select { font-size: 16px !important; }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .nav { padding: 0 16px; }
  .nav-links { display: none; }
  .hero { padding: 100px 20px 48px; }
  .controls, .grid-wrap { padding-left: 20px; padding-right: 20px; }
  .search-row { flex-direction: column; align-items: stretch; }
  /* Single column grid on tablets and phones */
  .predictor-grid { grid-template-columns: 1fr; }
  /* Touch targets */
  .btn-nav { min-height: 44px; display: inline-flex; align-items: center; padding: 10px 16px; }
  .nav-logo { min-height: 44px; }
  .search-input { min-height: 44px; }
  .pill { min-height: 44px; display: inline-flex; align-items: center; }
  .filter-tab { min-height: 44px; display: inline-flex; align-items: center; }
}
@media (max-width: 480px) {
  .hero { padding: 80px 16px 36px; }
  .controls, .grid-wrap { padding-left: 12px; padding-right: 12px; }

  /* Cards: tighten spacing */
  .predictor-grid { gap: 10px; }
  .predictor-card { padding: 16px; }

  /* Sort pills: horizontal scroll, no wrap */
  .pills {
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .pills::-webkit-scrollbar { display: none; }
  .pill { flex-shrink: 0; }

  /* Filter tabs: horizontal scroll, no wrap */
  .filter-tabs {
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab { flex-shrink: 0; }

  /* Search input: full width */
  .search-input { width: 100%; min-width: 0; font-size: 16px; } /* 16px prevents iOS zoom */

  /* Card stat buttons: min 44px touch targets */
  .card-stats { gap: 0; }
  .card-stat { padding: 10px 8px; min-height: 44px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none" style="width:28px;height:28px">
      <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="#c9920d" stroke-width="1.5" fill="rgba(201,146,13,0.1)"/>
      <path d="M16 8L22 11.5V18.5L16 22L10 18.5V11.5L16 8Z" fill="#c9920d" opacity="0.6"/>
    </svg>
    <span class="nav-name">HYPERFLEX</span>
  </a>
  <div class="nav-links">
    <a href="/predictors" class="nav-link active">Predictors</a>
    <a href="/explore" class="nav-link">Explore</a>
    <a href="/odds" class="nav-link">Odds</a>
    <a href="/templates" class="nav-link">Templates</a>
  </div>
  <div class="nav-actions">
    <a id="navDashLink" href="/dashboard" class="btn-nav btn-nav-ghost" style="display:none;color:#c9920d;border-color:rgba(201,146,13,0.3)">Dashboard</a>
    <a href="/creator/login" class="btn-nav btn-nav-ghost" id="navLoginLink">Sign in</a>
    <a href="/creator/signup" class="btn-nav btn-nav-primary" id="navSignupLink">Get started free</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">
    <span class="eyebrow-dot"></span>
    Community leaderboard
  </div>
  <h1>Discover <span class="accent">Sharp Predictors</span></h1>
  <p class="hero-sub">The top minds on HYPERFLEX, ranked by win rate, streak, and P&amp;L across prediction markets.</p>
</section>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="Search predictors..." oninput="onSearch()"/>
    <div class="pills" id="sortPills">
      <button class="pill active" data-sort="win_rate" onclick="setSort('win_rate')">Win Rate</button>
      <button class="pill" data-sort="predictions" onclick="setSort('predictions')">Most Active</button>
      <button class="pill" data-sort="streak" onclick="setSort('streak')">Hot Streak</button>
      <button class="pill" data-sort="pnl" onclick="setSort('pnl')">Top P&amp;L</button>
    </div>
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-tab" data-filter="poly" onclick="setFilter('poly')">Polymarket Connected</button>
    <button class="filter-tab" data-filter="streak" onclick="setFilter('streak')">On a Streak</button>
    <button class="filter-tab" data-filter="sharp" onclick="setFilter('sharp')">Sharp ≥70%</button>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="predictor-grid" id="predictorGrid">
    <div class="state-msg">Loading predictors...</div>
  </div>
</div>

<script>
// Show Dashboard link if logged in
if (localStorage.getItem('hf_token') || localStorage.getItem('hf_creator_token')) {
  const dl = document.getElementById('navDashLink'); if (dl) dl.style.display = '';
  const ll = document.getElementById('navLoginLink'); if (ll) ll.style.display = 'none';
  const sl = document.getElementById('navSignupLink'); if (sl) sl.style.display = 'none';
}
let allPredictors = [];
let currentSort = 'win_rate';
let currentFilter = 'all';
let searchQuery = '';

async function loadPredictors() {
  try {
    const res = await fetch(`/api/predictors?sort=${currentSort}&limit=100`);
    if (!res.ok) throw new Error('Failed');
    allPredictors = await res.json();
    render();
  } catch (e) {
    document.getElementById('predictorGrid').innerHTML =
      '<div class="state-msg">Could not load predictors. Try again later.</div>';
  }
}

function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('#sortPills .pill').forEach(p => p.classList.toggle('active', p.dataset.sort === sort));
  // Re-sort client-side
  const sorted = [...allPredictors].sort((a, b) => {
    if (sort === 'win_rate') return b.win_rate - a.win_rate;
    if (sort === 'predictions') return b.total_predictions - a.total_predictions;
    if (sort === 'streak') return b.streak - a.streak;
    if (sort === 'pnl') return b.pnl_pts - a.pnl_pts;
    return 0;
  });
  allPredictors = sorted;
  render();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('#filterTabs .filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === filter));
  render();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  render();
}

function filtered() {
  return allPredictors.filter(p => {
    if (searchQuery && !p.display_name.toLowerCase().includes(searchQuery)) return false;
    if (currentFilter === 'poly' && !p.polymarket_address) return false;
    if (currentFilter === 'streak' && p.streak < 3) return false;
    if (currentFilter === 'sharp' && p.win_rate < 70) return false;
    return true;
  });
}

function avatarInitial(name) {
  return (name || '?').charAt(0).toUpperCase();
}

function pnlDisplay(pts) {
  const abs = Math.abs(pts);
  const sign = pts >= 0 ? '+' : '-';
  return `${sign}${abs.toLocaleString()} pts`;
}

function renderCard(p) {
  const badges = [];
  badges.push('<span class="badge badge-hfx">HFX</span>');
  if (p.polymarket_address) badges.push('<span class="badge badge-poly">POLY</span>');
  if (p.streak >= 3) badges.push('<span class="badge badge-streak">🔥 STREAK</span>');
  if (p.win_rate >= 70) badges.push('<span class="badge badge-sharp">SHARP</span>');

  const pnlClass = p.pnl_pts >= 0 ? 'pos' : 'neg';
  const winPct = Math.round(p.win_rate || 0);
  const barWidth = Math.min(winPct, 100);
  const uid = escHtml(p.user_id);

  return `
    <div class="predictor-card" style="position:relative">
      <div style="position:absolute;top:14px;right:14px;display:flex;gap:6px;z-index:1">
        <button id="copy-btn-${uid}" onclick="toggleCopyTradeCard('${uid}',this)" style="background:none;border:1px solid rgba(124,58,237,0.4);border-radius:20px;padding:4px 12px;font-size:10px;font-family:var(--mono);font-weight:700;color:#a78bfa;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(124,58,237,0.12)'" onmouseout="if(!this.dataset.subscribed)this.style.background='none'">🔔 Copy</button>
        <button id="follow-btn-${uid}" onclick="toggleFollowCard('${uid}',this)" style="background:none;border:1px solid var(--gold);border-radius:20px;padding:4px 12px;font-size:10px;font-family:var(--mono);font-weight:700;color:var(--gold);cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(201,146,13,0.12)'" onmouseout="if(!this.dataset.following)this.style.background='none'">Follow</button>
      </div>
      <a href="/m/${uid}" style="text-decoration:none;display:block">
        <div class="card-top">
          <div class="avatar">${avatarInitial(p.display_name)}</div>
          <div class="card-info">
            <div class="card-name">${escHtml(p.display_name || 'Anonymous')}</div>
            <div class="badges">${badges.join('')}</div>
          </div>
        </div>
        <div class="win-bar-wrap">
          <div class="win-bar-label">
            <span>Win Rate</span>
            <span>${winPct}%</span>
          </div>
          <div class="win-bar">
            <div class="win-bar-fill" style="width:${barWidth}%"></div>
          </div>
        </div>
        <div class="card-stats">
          <div class="stat">
            <div class="stat-val">${p.streak || 0}</div>
            <div class="stat-lbl">Streak</div>
          </div>
          <div class="stat">
            <div class="stat-val">${p.total_predictions || 0}</div>
            <div class="stat-lbl">Predictions</div>
          </div>
          <div class="stat">
            <div class="stat-val ${pnlClass}">${pnlDisplay(p.pnl_pts || 0)}</div>
            <div class="stat-lbl">P&amp;L</div>
          </div>
        </div>
      </a>
    </div>`;
}

async function toggleFollowCard(userId, btn) {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to follow predictors'); return; }
  btn.disabled = true;
  try {
    const r = await fetch(`/api/predictors/${userId}/follow`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('Failed');
    const d = await r.json();
    btn.textContent = d.following ? 'Following' : 'Follow';
    btn.style.background = d.following ? 'rgba(201,146,13,0.15)' : 'none';
    btn.dataset.following = d.following ? '1' : '';
  } catch (e) {
    console.warn('[follow-card]', e);
  } finally {
    btn.disabled = false;
  }
}

async function toggleCopyTradeCard(userId, btn) {
  const token = localStorage.getItem('hf_token') || localStorage.getItem('hf_member_token');
  if (!token) { alert('Sign in to copy trades'); return; }
  btn.disabled = true;
  try {
    const r = await fetch(`/api/predictors/${userId}/copy-trade`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('Failed');
    const d = await r.json();
    btn.textContent = d.subscribed ? '🔔 Copying' : '🔔 Copy';
    btn.style.background = d.subscribed ? 'rgba(124,58,237,0.15)' : 'none';
    btn.dataset.subscribed = d.subscribed ? '1' : '';
  } catch (e) {
    console.warn('[copy-trade-card]', e);
  } finally {
    btn.disabled = false;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
