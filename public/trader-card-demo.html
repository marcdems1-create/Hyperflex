<!doctype html>
<html lang="en">
<head>

<meta name="robots" content="noindex, nofollow">

<style>
  body{margin:0;background:#0e0e15;color:#f0f0f5;font-family:'Inter',-apple-system,sans-serif;padding:32px;}

  .row-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,240,245,.4);margin:36px 0 14px;}

<body>

<div class="row-label">Hero variant</div>
<div class="grid" id="heroRow"></div>

<div class="row-label">Feed variant</div>
<div class="grid" id="feedRow"></div>

<div class="row-label">Compact variant</div>

<div class="row-label loser">The honesty test — losing trader, all three variants</div>
<div class="grid" id="loserRow"></div>
