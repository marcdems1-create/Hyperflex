<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentions — HYPERFLEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f1a;color:#e8eaf6;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
#nav-root{position:relative;z-index:200}

/* PAGE HEADER */
.mn-header{padding:28px 36px 24px;border-bottom:1px solid #1a1d2e}
.mn-header-inner{max-width:1000px;margin:0 auto}
.mn-label{font-size:10px;color:#3a4060;letter-spacing:3px;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.mn-title{font-size:26px;font-weight:700;color:#e8eaf6;margin-bottom:4px;letter-spacing:-0.01em}
.mn-subtitle{font-size:13px;color:#3a4060;line-height:1.5}
@media(max-width:768px){.mn-header{padding:20px 16px 18px}.mn-title{font-size:22px}}

/* CONTENT */
.mn-content{max-width:1000px;margin:0 auto;padding:24px 36px 80px}
@media(max-width:768px){.mn-content{padding:16px 16px 72px}}

/* WARSH HERO */
.warsh-hero{position:relative;width:100%;height:260px;border-radius:14px;overflow:hidden;cursor:pointer;margin-bottom:24px;animation:fadeUp 0.5s ease 0.1s both}
.warsh-hero-img{position:absolute;inset:0;background-image:url('/images/speakers/warsh.jpg');background-size:cover;background-position:center 25%;filter:brightness(0.55);transition:transform 0.4s ease}
.warsh-hero:hover .warsh-hero-img{transform:scale(1.02)}
.warsh-hero-grad1{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,#0d0f1a 100%)}
.warsh-hero-grad2{position:absolute;inset:0;background:linear-gradient(135deg,rgba(68,102,255,0.3),transparent 60%)}
.warsh-hero-body{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:20px 24px}
.warsh-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(68,102,255,0.18);border:1px solid rgba(68,102,255,0.5);color:#7b9aff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;width:fit-content}
.warsh-hero-title{font-size:18px;font-weight:700;color:#e8eaf6;margin-bottom:10px;letter-spacing:-0.01em;line-height:1.3;max-width:620px}
.warsh-hero-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.warsh-meta-item{font-size:11px;color:#4a5280}
.warsh-meta-item strong{color:#7b9aff;font-weight:600}
@media(max-width:480px){.warsh-hero{height:200px}.warsh-hero-title{font-size:15px}}

/* FILTER RAIL */
.mn-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.mn-filter-divider{width:1px;height:24px;background:#1a1d2e;flex-shrink:0}
.mn-pill{appearance:none;background:transparent;border:1px solid #1a1d2e;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#4a5280;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:inherit}
.mn-pill:hover{color:#7788cc;border-color:#252840}
.mn-pill.active{background:rgba(58,64,128,0.12);border-color:#3a4080;color:#7788cc}
@media(max-width:480px){.mn-filters{gap:6px}.mn-pill{padding:4px 10px;font-size:10px}}

/* GRID */
.mn-grid{display:flex;flex-direction:column}

/* CARD */
.mn-card{background:#0f1120;border:1px solid #1a1d2e;border-radius:14px;overflow:hidden;transition:transform 0.2s ease,border-color 0.2s ease;opacity:0;animation:fadeUp 0.5s ease both;display:flex;flex-direction:column;max-width:100%;margin-bottom:12px}
.mn-card:hover{transform:translateY(-2px);border-color:#252840}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Card image */
.mn-card-img-wrap{position:relative;height:200px;overflow:hidden;flex-shrink:0;background:#1a1a2e}
.mn-card-img{width:100%;height:100%;object-fit:cover;object-position:center 35%;filter:brightness(0.6);transition:transform 0.4s ease;display:block}
.mn-card:hover .mn-card-img{transform:scale(1.03)}
.mn-card-img-grad{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,#0f1120);pointer-events:none}
.mn-card-badges-tl{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;max-width:calc(100% - 90px)}
.mn-speaker-badge{padding:3px 8px;border-radius:4px;font-size:16px;font-weight:700;letter-spacing:0.5px;color:#ffffff;background:rgba(10,12,30,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);white-space:nowrap}
.mn-type-badge{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:#6870a0;background:rgba(10,12,30,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.05);white-space:nowrap}
.mn-card-date{position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;color:#6870a0;background:rgba(10,12,30,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.05);white-space:nowrap}
.mn-stance-badge{position:absolute;bottom:10px;left:10px;padding:5px 14px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid}
.mn-stance-badge.dovish{color:#8899ff;border-color:rgba(68,102,255,0.4);background:rgba(20,30,80,0.7)}
.mn-stance-badge.hawkish{color:#ff8899;border-color:rgba(239,68,68,0.4);background:rgba(80,20,20,0.7)}
.mn-stance-badge.neutral{color:#8890c0;border-color:rgba(58,64,96,0.5);background:rgba(20,22,40,0.7)}
.mn-stance-badge.deescalatory{color:#66ddaa;border-color:rgba(34,197,94,0.4);background:rgba(10,50,30,0.7)}
.mn-stance-badge.hawkish_pivot{color:#ff8899;border-color:rgba(239,68,68,0.4);background:rgba(80,20,20,0.7)}

/* Card body */
.mn-card-body{padding:20px;display:flex;flex-direction:column;gap:10px;flex:1}
.mn-card-blurb{font-size:15px;color:#c8ccd8;line-height:1.75;font-style:normal;font-weight:400;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.mn-card-blurb .stance-word{color:#aab;font-style:normal;font-weight:600}
.mn-signal-row{display:flex;gap:20px;padding:10px 0;border-top:1px solid #1a1d2e;margin-top:4px;flex-wrap:wrap}
.mn-signal-item{display:flex;flex-direction:column;gap:3px}
.mn-signal-label{font-size:9px;font-weight:700;color:#3a4060;text-transform:uppercase;letter-spacing:1.5px;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
.mn-signal-val{font-size:13px;font-weight:700;color:#8890c0;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
.mn-signal-val.dovish{color:#6688ff}
.mn-signal-val.hawkish{color:#ff6688}
.mn-signal-val.neutral{color:#8890c0}
.mn-signal-val.deescalatory{color:#44dd88}
.mn-signal-val.hawkish_pivot{color:#ff6688}
.mn-signal-val.highlight{color:#ffffff}
.mn-card-markets{display:flex;flex-wrap:wrap;gap:6px}
.mn-markets-section{margin-top:10px;padding-top:10px;border-top:1px solid #1a1d2e}
.mn-markets-label{font-size:9px;font-weight:700;color:#3a4060;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
.mn-market-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #131520;text-decoration:none}
.mn-market-row:last-child{border-bottom:none}
.mn-market-q{font-size:12px;color:#6870a0;flex:1;margin-right:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
.mn-market-row:hover .mn-market-q{color:#8890c0}
.mn-market-price{font-size:12px;font-weight:700;color:#22c55e;flex-shrink:0;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
.mn-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid #1a1d2e;margin-top:auto}
.mn-card-domain{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6870a0;font-weight:600}
.mn-card-view{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#4a5280;font-weight:600;transition:color 0.15s}
.mn-card-view:hover{color:#7b9aff}

/* States */
.mn-loading{text-align:center;padding:80px 36px;font-size:12px;color:#3a4060;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.mn-empty{text-align:center;padding:80px 36px;font-size:12px;color:#2a3050;letter-spacing:2px;text-transform:uppercase;font-weight:700}
</style>
</head>
<body>
<div id="nav-root"></div>
<script src="/nav.js?v=23"></script>

<!--HERO_HTML-->

<div class="mn-header">
  <div class="mn-header-inner">
    <div class="mn-label">Intelligence</div>
    <h1 class="mn-title">What are they saying?</h1>
    <p class="mn-subtitle">Fed officials and political figures tracked against open Polymarket markets.</p>
  </div>
</div>

<div class="mn-content">

  <div class="warsh-hero" id="warsh-hero" role="link" tabindex="0">
    <div class="warsh-hero-img"></div>
    <div class="warsh-hero-grad1"></div>
    <div class="warsh-hero-grad2"></div>
    <div class="warsh-hero-body">
      <div class="warsh-badge">&#9889; UPCOMING &#8212; JUN 18</div>
      <div class="warsh-hero-title">Warsh's first FOMC press conference as Fed Chair</div>
      <div class="warsh-hero-meta">
        <div class="warsh-meta-item">Speaker <strong>Kevin Warsh</strong></div>
        <div class="warsh-meta-item">Type <strong>FOMC Presser</strong></div>
        <div class="warsh-meta-item" id="warsh-days-away"></div>
      </div>
    </div>
  </div>

  <div class="mn-filters" id="mn-filters">
    <button class="mn-pill active" data-domain="all">All</button>
    <button class="mn-pill" data-domain="fed">Fed</button>
    <button class="mn-pill" data-domain="politics">Politics</button>
    <button class="mn-pill" data-domain="crypto">Crypto</button>
    <div class="mn-filter-divider"></div>
    <button class="mn-pill active" data-stance="all">All Stances</button>
    <button class="mn-pill" data-stance="dovish">Dovish</button>
    <button class="mn-pill" data-stance="hawkish">Hawkish</button>
    <button class="mn-pill" data-stance="neutral">Neutral</button>
  </div>

  <div class="mn-loading" id="mn-loading">Loading&#8230;</div>
  <div class="mn-grid" id="mn-grid" style="display:none"></div>
  <div class="mn-empty" id="mn-empty" style="display:none">No Events Match</div>

</div>

<script>
var SPEAKER_IMAGES = {
  'powell':   '/images/speakers/powell.jpg',
  'warsh':    '/images/speakers/warsh.jpg',
  'jefferson':'/images/speakers/jefferson.jpg',
  'waller':   '/images/speakers/waller.jpg',
  'trump':    '/images/speakers/trump.jpg',
  'brainard': '/images/speakers/brainard.jpg',
  'cook':     null,
  'default':  null
};

var DOMAIN_LABELS = {
  'fed_monetary_policy': 'Fed Monetary Policy',
  'us_politics':         'US Politics',
  'crypto':              'Crypto',
  'sports':              'Sports',
  'global_politics':     'Global Politics',
  'macro':               'Macro'
};

var STATE = { events: [], domainFilter: 'all', stanceFilter: 'all' };

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function speakerImg(speaker) {
  if (!speaker) return null;
  return SPEAKER_IMAGES[speaker.toLowerCase().trim()] || null;
}

function domainLabel(domain) {
  if (!domain) return '';
  return DOMAIN_LABELS[domain] || domain.replace(/_/g, ' ');
}

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric', timeZone:'UTC' });
}

function fmtEventType(t) {
  if (!t) return '';
  var m = {
    'fomc_presser':'FOMC Presser','speech':'Speech','testimony':'Testimony',
    'op_ed':'Op-Ed','interview':'Interview','statement':'Statement',
    'press_conference':'Press Conference'
  };
  return m[t] || t.replace(/_/g,' ');
}

var STANCE_WORDS = {
  'dovish':        ['dovish','cautious','patient','accommodative','easing'],
  'deescalatory':  ['de-escalatory','deescalatory','easing','reducing','lowering'],
  'hawkish':       ['hawkish','restrictive','tightening','inflationary','elevated'],
  'hawkish_pivot': ['hawkish','pivot','shift','tightening'],
  'neutral':       ['neutral','balanced','data-dependent','flexible']
};

function blurbWithStanceWord(blurb, stance) {
  if (!blurb) return '';
  var escaped = esc(blurb);
  var words = STANCE_WORDS[stance] || [];
  for (var i = 0; i < words.length; i++) {
    var re = new RegExp('\\b(' + words[i].replace(/-/g,'\\-') + ')\\b', 'gi');
    if (re.test(escaped)) {
      return escaped.replace(re, '<span class="stance-word">$1</span>');
    }
  }
  return escaped;
}

function domainMatchesFilter(domain, filter) {
  if (filter === 'all') return true;
  if (filter === 'fed') return domain === 'fed_monetary_policy';
  if (filter === 'politics') return domain === 'us_politics' || domain === 'global_politics';
  if (filter === 'crypto') return domain === 'crypto';
  return false;
}

function renderCard(ev, idx) {
  var speaker  = ev.speaker || 'Unknown';
  var imgSrc   = speakerImg(speaker);
  var stance   = (ev.dominant_stance || 'neutral').toLowerCase().replace(/\s+/g, '_');
  var domain   = ev.domain || '';
  var domLbl   = domainLabel(domain);
  var evType   = fmtEventType(ev.event_type);
  var dateStr  = fmtDate(ev.event_date || ev.event_at);
  var blurb    = ev.blurb || '';
  var slug     = ev.slug || '';
  var tm       = ev.top_market;
  var delay    = (0.1 + idx * 0.07).toFixed(2);

  var markets = [];
  if (tm && tm.question) markets.push({ question: tm.question, slug: tm.slug || '' });

  var html = '<div class="mn-card" style="animation-delay:' + delay + 's">';

  html += '<div class="mn-card-img-wrap">';
  if (imgSrc) {
    html += '<img class="mn-card-img" src="' + esc(imgSrc) + '" alt="' + esc(speaker) + '" loading="lazy" onerror="this.onerror=null;this.style.display=\'none\';this.parentElement.style.background=\'linear-gradient(135deg,#1a1d2e,#0d0f1a)\';">';
  }
  html += '<div class="mn-card-img-grad"></div>';
  html += '<div class="mn-card-badges-tl">';
  html += '<span class="mn-speaker-badge">' + esc(speaker) + '</span>';
  if (evType) html += '<span class="mn-type-badge">' + esc(evType) + '</span>';
  html += '</div>';
  if (dateStr) html += '<div class="mn-card-date">' + esc(dateStr) + '</div>';
  if (stance && stance !== 'insufficient_signal' && stance !== 'ambiguous') {
    html += '<div class="mn-stance-badge ' + esc(stance) + '">' + esc(stance.replace(/_/g, ' ')) + '</div>';
  }
  html += '</div>';

  html += '<div class="mn-card-body">';
  if (blurb) {
    html += '<div class="mn-card-blurb">' + blurbWithStanceWord(blurb, stance) + '</div>';
  }
  // Signal row
  var conf = (ev.dominant_confidence || '').toUpperCase();
  var mktCount = ev.market_count || (ev.top_market ? 1 : 0);
  if (stance && stance !== 'insufficient_signal' && stance !== 'ambiguous') {
    html += '<div class="mn-signal-row">';
    html += '<div class="mn-signal-item"><span class="mn-signal-label">STANCE</span><span class="mn-signal-val ' + esc(stance) + '">' + esc(stance.replace(/_/g,' ').toUpperCase()) + '</span></div>';
    if (conf) html += '<div class="mn-signal-item"><span class="mn-signal-label">CONFIDENCE</span><span class="mn-signal-val">' + esc(conf) + '</span></div>';
    if (mktCount) html += '<div class="mn-signal-item"><span class="mn-signal-label">OPEN MARKETS</span><span class="mn-signal-val highlight">' + esc(String(mktCount)) + '</span></div>';
    html += '</div>';
  }
  var linkedMarkets = Array.isArray(ev.linked_markets) ? ev.linked_markets : [];
  if (linkedMarkets.length) {
    html += '<div class="mn-markets-section">';
    html += '<div class="mn-markets-label">LIVE MARKETS</div>';
    linkedMarkets.forEach(function(m) {
      var yesPct = m.yes_price != null ? Math.round(m.yes_price * 100) : null;
      html += '<a class="mn-market-row" href="/market/' + esc(m.slug) + '">';
      html += '<span class="mn-market-q">' + esc(m.question) + '</span>';
      if (yesPct != null) html += '<span class="mn-market-price">' + yesPct + '&#162; YES</span>';
      html += '</a>';
    });
    html += '</div>';
  }
  html += '<div class="mn-card-footer">';
  html += '<span class="mn-card-domain">' + esc(domLbl) + '</span>';
  var viewHref = slug ? '/mentions/' + esc(slug) : '/mentions';
  html += '<a class="mn-card-view" href="' + viewHref + '">View event &#8594;</a>';
  html += '</div>';
  html += '</div>';

  html += '</div>';
  return html;
}

function applyFilters() {
  var filtered = STATE.events.filter(function(ev) {
    var domainOk = domainMatchesFilter(ev.domain || '', STATE.domainFilter);
    var stanceNorm = (ev.dominant_stance || '').toLowerCase().replace(/\s+/g, '_');
    var stanceOk = STATE.stanceFilter === 'all' || stanceNorm === STATE.stanceFilter;
    return domainOk && stanceOk;
  });

  var grid  = document.getElementById('mn-grid');
  var empty = document.getElementById('mn-empty');

  if (!filtered.length) {
    grid.style.display = 'none';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  grid.style.display  = '';
  grid.innerHTML = filtered.map(renderCard).join('');
}

document.getElementById('mn-filters').addEventListener('click', function(e) {
  var pill = e.target.closest('.mn-pill');
  if (!pill) return;
  if ('domain' in pill.dataset) {
    document.querySelectorAll('.mn-pill[data-domain]').forEach(function(p) { p.classList.remove('active'); });
    pill.classList.add('active');
    STATE.domainFilter = pill.dataset.domain;
  }
  if ('stance' in pill.dataset) {
    document.querySelectorAll('.mn-pill[data-stance]').forEach(function(p) { p.classList.remove('active'); });
    pill.classList.add('active');
    STATE.stanceFilter = pill.dataset.stance;
  }
  applyFilters();
});

// Warsh hero
(function() {
  var hero = document.getElementById('warsh-hero');
  if (!hero) return;
  hero.addEventListener('click', function() { window.location = '/mentions/warsh-fomc-jun-2026'; });
  hero.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') window.location = '/mentions/warsh-fomc-jun-2026'; });

  var el = document.getElementById('warsh-days-away');
  if (el) {
    var target = new Date('2026-06-18T17:00:00Z');
    var diff = target - Date.now();
    if (diff <= 0) {
      el.innerHTML = 'Status <strong>Now</strong>';
    } else {
      var days = Math.ceil(diff / (24 * 60 * 60 * 1000));
      el.innerHTML = 'Days away <strong>' + days + 'd</strong>';
    }
  }
})();

async function load() {
  try {
    var res = await fetch('/api/mentions');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    var events = Array.isArray(data.events) ? data.events : [];

    document.getElementById('mn-loading').style.display = 'none';

    if (!events.length) {
      document.getElementById('mn-empty').style.display = '';
      return;
    }
    STATE.events = events;
    applyFilters();
  } catch (e) {
    console.error('[mentions]', e);
    document.getElementById('mn-loading').textContent = 'Could not load. Try refreshing.';
  }
}

load();
</script>
<script src="/hfx-engage.js" defer></script>
</body>
</html>
