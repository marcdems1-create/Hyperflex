        if (!d || !Array.isArray(d.topics) || !d.topics.length) return;
        var bar = document.getElementById('trending-bar');
        var pillsEl = document.getElementById('trending-pills');
        if (!bar || !pillsEl) return;

        // Add "All" pill first
        var allBtn = document.createElement('button');
        allBtn.className = 'trend-pill active';
        allBtn.setAttribute('data-label', '__all__');
        allBtn.textContent = 'All';
        pillsEl.appendChild(allBtn);

        d.topics.forEach(function(topic) {
          pillsEl.appendChild(renderPill(topic));
        });

        pillsEl.addEventListener('click', function(e) {
          var btn = e.target.closest('.trend-pill');
          if (!btn) return;
          var label = btn.getAttribute('data-label');
          // Toggle off if already active
          if (_activeEntity === label) {
            _activeEntity = null;
            pillsEl.querySelectorAll('.trend-pill').forEach(function(b) {
              b.classList.toggle('active', b.getAttribute('data-label') === '__all__');
            });
            filterGrid(null);
            return;
          }
          _activeEntity = label;
          pillsEl.querySelectorAll('.trend-pill').forEach(function(b) {
            b.classList.toggle('active', b === btn);
          });
          if (label === '__all__') {
            filterGrid(null);
          } else {
            var patStr = btn.getAttribute('data-pattern');
            try { filterGrid(new RegExp(patStr, 'i')); } catch (_) { filterGrid(null); }
          }
        });

        bar.style.display = '';
      })
      .catch(function() {});
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();

// ── TOWN HALL: rotation + ticker + 90s data refresh ──────────────────────
(function() {
  var _markets = [];
  var _idx = 0;
  var _rotTimer = null;

  // Parse embedded SSR data once
  try {
    var hero = document.getElementById('th-hero');
    if (hero) _markets = JSON.parse(hero.getAttribute('data-markets') || '[]');
  } catch(_) {}

  function esc(s) {
    var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  function renderCard(c, idx) {
    var total = _markets.length;
    var priceRow = c.yesPct != null
      ? '<div class="th-price-row">' +
          '<div class="th-yes ' + (c.yesClass||'mid') + '">' + esc(c.yesCents||'—') + '</div>' +
          '<div class="th-yes-lbl">YES</div>' +
        '</div>'
      : '';
    var imgStyle = c.imgUrl
      ? 'background-image:url(\'' + esc(c.imgUrl) + '\')'
      : 'background:#091224';
    return '<div class="th-card" data-href="' + esc(c.href||'#') + '">' +
      '<div class="th-left-panel">' +
        '<div class="th-left-inner">' +
          '<span class="th-broadcast-badge"><span class="th-blink-dot"></span>● LIVE</span>' +
          '<h1 class="th-headline">' + esc(c.headline||'') + '</h1>' +
          priceRow +
          '<p class="th-subline">' + esc(c.shortQ||'') + '</p>' +
          '<div class="th-meta">' +
            '<span class="th-vol">' + esc(c.volLabel||'') + '</span>' +
            (c.countdown ? '<span class="th-countdown">' + esc(c.countdown) + '</span>' : '') +
          '</div>' +
          '<a class="th-trade-btn" href="' + esc(c.href||'#') + '" target="_blank" rel="noopener">TRADE ↗</a>' +
        '</div>' +
      '</div>' +
      '<div class="th-right-panel" style="' + imgStyle + '">' +
        '<div class="th-right-overlay"></div>' +
      '</div>' +
      '<span class="th-slide-counter" id="th-slide-counter">' + (idx+1) + ' / ' + total + '</span>' +
    '</div>';
  }

  function goTo(idx) {
    if (!_markets.length) return;
    _idx = ((idx % _markets.length) + _markets.length) % _markets.length;
    var stage = document.getElementById('th-stage');
    if (!stage) return;
    var card = _markets[_idx];
    // Fade transition
    stage.style.opacity = '0';
    stage.style.transition = 'opacity .3s';
    setTimeout(function() {
      stage.innerHTML = renderCard(card, _idx);
      animateProgress();
      // Wire card click to market link
      var el = stage.querySelector('.th-card');
      if (el) el.addEventListener('click', function(e) {
        if (e.target.tagName !== 'A') window.open(card.href, '_blank', 'noopener');
      });
      stage.style.opacity = '1';
    }, 180);
    // Update dots
    document.querySelectorAll('.th-dot').forEach(function(d, i) {
      d.classList.toggle('active', i === _idx);
    });
  }

  function animateProgress() {
    var stage = document.getElementById('th-stage');
    if (!stage) return;
    var bar = stage.querySelector('.th-progress');
    if (!bar) {
      bar = document.createElement('div');
      bar.className = 'th-progress';
      stage.appendChild(bar);
    }
    bar.style.transition = 'none';
    bar.style.width = '0%';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        bar.style.transition = 'width 30s linear';
        bar.style.width = '100%';
      });
    });
  }

  function startRotation() {
    clearInterval(_rotTimer);
    animateProgress();
    if (_markets.length < 2) return;
    _rotTimer = setInterval(function() { goTo(_idx + 1); }, 30 * 1000);
  }

  // Wire dot clicks
  document.querySelectorAll('.th-dot').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var i = parseInt(btn.getAttribute('data-idx')) || 0;
      goTo(i);
      // Reset rotation timer so a manual click gets a full 30s before auto-advance
      startRotation();
    });
  });

  // Wire initial card click
  (function() {
    var stage = document.getElementById('th-stage');
    if (!stage || !_markets.length) return;
    var el = stage.querySelector('.th-card');
    if (el) el.addEventListener('click', function(e) {
      if (e.target.tagName !== 'A') window.open(_markets[0].href, '_blank', 'noopener');
    });
  })();

  startRotation();

  // 90s data refresh — reload markets from server, rebuild rotation
  function refreshData() {
    fetch('/api/mentions-hero', { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) {
        if (!d || !Array.isArray(d.markets) || !d.markets.length) return;
        _markets = d.markets;
        // Update dots count if changed
        var dots = document.getElementById('th-dots');
        if (dots) {
          dots.innerHTML = _markets.map(function(_, i) {
            return '<button class="th-dot' + (i === _idx ? ' active' : '') + '" data-idx="' + i + '" aria-label="Slide ' + (i+1) + '"></button>';
          }).join('');
          dots.querySelectorAll('.th-dot').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var i = parseInt(btn.getAttribute('data-idx')) || 0;
              goTo(i); startRotation();
            });
          });
        }
        goTo(_idx); // re-render current slot with fresh data
      })
      .catch(function() {});
  }
  setTimeout(function loop() {
    refreshData();
    setTimeout(loop, 90 * 1000);
  }, 90 * 1000);
})();
</script>
</body>
</html>
