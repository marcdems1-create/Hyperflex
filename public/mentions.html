<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentions — HYPERFLEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Base palette — dark navy Bloomberg terminal */
  --bg:#060d1a;--bg-2:#091224;--paper:#060d1a;--paper-2:#091224;
  --panel:#0d1c30;--panel-2:#112135;
  --line:rgba(0,212,255,0.07);--line-strong:rgba(0,212,255,0.18);
  --ink:#F0EEF8;--ink-2:#B8C8D8;--muted:#4A6278;--muted-2:#2E4256;
  --cyan:#00D4FF;--cyan-glow:rgba(0,212,255,0.35);
  --amber:#f59e0b;--red:#ff4d6a;
  --hawk:#FF6B4D;--dove:#00D4FF;--neut:#9590B0;
  /* Typography */
  --display:'Bebas Neue','Anton',sans-serif;
  --sans:'Inter',system-ui,sans-serif;
  --serif:'Instrument Serif',serif;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
/* Graph paper grid at 3% — trading terminal feel */
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
a{color:inherit;text-decoration:none}

#nav-root{position:relative;z-index:200}

/* ── page intro ── */
.page-intro{background:var(--bg);border-bottom:1px solid var(--line);padding:20px 36px 18px;position:relative;z-index:2}
.page-intro-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:16px}
.page-intro-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.26em;color:rgba(0,212,255,0.6);text-transform:uppercase;flex-shrink:0}
.page-intro-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;margin:0}
@media(max-width:768px){.page-intro{padding:14px 18px 12px}.page-intro-inner{gap:8px}.page-intro-sub{display:none}}

/* ── HERO BANNER (Phase 3.7) ── */
.hero{position:relative;background:var(--bg-2);border-bottom:1px solid var(--line);padding:120px 36px 132px;overflow:hidden}
.hero-grain{position:absolute;inset:0;background-image:radial-gradient(rgba(0,212,255,0.08) 1px,transparent 1px);background-size:14px 14px;mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 35%,transparent 90%);-webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 35%,transparent 90%);pointer-events:none;opacity:0.7}
.hero-inner{position:relative;max-width:1240px;margin:0 auto;display:flex;flex-direction:column;gap:22px}
.hero-top{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:end}
@media(max-width:768px){.hero-top{grid-template-columns:1fr;gap:32px}}
.hero-text-col{display:flex;flex-direction:column;gap:22px;min-width:0}
.hero-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.28em;color:var(--cyan);text-transform:uppercase;padding:5px 12px;border:1px solid rgba(0,212,255,0.45);align-self:flex-start;background:rgba(0,212,255,0.06)}
.hero-headline{font-family:var(--sans);font-weight:800;font-size:68px;line-height:1.0;letter-spacing:-0.015em;color:var(--ink);margin:0}
.hero-sub{font-family:var(--sans);font-size:19px;color:var(--ink-2);line-height:1.55;max-width:600px;margin:0}
.hero-countdown{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.hero-cd-digits{font-family:var(--mono);font-weight:700;font-size:48px;color:var(--cyan);line-height:1;letter-spacing:0.02em;font-variant-numeric:tabular-nums}
.hero-cd-label{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase}
.hero-live-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--cyan);background:rgba(0,212,255,0.10);font-family:var(--mono);font-size:13px;color:var(--cyan);letter-spacing:0.18em;text-transform:uppercase;font-weight:700;align-self:flex-start;margin-top:6px}
.hero-live-badge::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);animation:hero-pulse 1.6s ease-in-out infinite}
@keyframes hero-pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero-strip{margin-top:8px}
.hero-strip-h{font-family:var(--mono);font-size:10px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.hero-strip-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.hero-mini{display:flex;flex-direction:column;gap:6px;padding:16px 18px;background:rgba(255,255,255,0.025);border:1px solid var(--line);transition:border-color .15s,background .15s,transform .15s;text-decoration:none;color:inherit;min-height:140px}
.hero-mini:hover{border-color:var(--cyan);background:rgba(0,212,255,0.05);transform:translateY(-1px)}
.hero-mini-yes-row{display:flex;align-items:baseline;gap:8px;line-height:1}
.hero-mini-yes{font-family:var(--sans);font-weight:800;font-size:38px;line-height:1;letter-spacing:-0.02em}
.hero-mini-yes.high{color:var(--cyan)}
.hero-mini-yes.low{color:#FF6B4D}
.hero-mini-yes.mid{color:var(--ink-2)}
.hero-mini-yes-lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase}
.hero-mini-vol{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:var(--muted-2);margin-top:-2px}
.hero-mini-q{font-family:var(--sans);font-size:12px;font-weight:400;color:var(--ink-2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:auto}
/* Word-betting card variant — same shell as .hero-mini, word label
   replaces the question + .hero-mini-q. Sizing tuned for short word
   labels (typically 1-3 words) rather than full Polymarket questions. */
.hero-mini-word-label{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--ink);line-height:1.25;letter-spacing:-0.005em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:auto}
/* Empty-state shown when Polymarket has no word-markets listed yet
   for this speaker. Plain copy + archive link — no playful empty
   state per voice charter. */
.hero-strip-empty{font-family:var(--mono);font-size:12px;color:var(--muted-2);padding:18px 0;line-height:1.6}
.hero-strip-empty a{color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(0,212,255,0.3);padding-bottom:1px}
.hero-strip-empty a:hover{border-bottom-color:var(--cyan)}
/* ── portrait comparison panel (Powell vs Warsh on the right) ── */
.hero-portraits{display:grid;grid-template-columns:auto auto auto;gap:14px;align-items:center;justify-items:center;padding:8px 4px 0}
.hero-portrait{width:140px;height:140px;border-radius:50%;background:var(--panel);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:60px;color:var(--muted-2);line-height:1;flex-shrink:0}
.hero-portrait::before{content:attr(data-monogram);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;letter-spacing:-0.02em}
.hero-portrait img{width:100%;height:100%;object-fit:cover;border-radius:50%;position:relative;z-index:1;display:block}
.hero-portrait.muted img{filter:grayscale(0.55) brightness(0.78);opacity:0.78}
.hero-portrait.featured{box-shadow:0 0 0 2px var(--cyan),0 0 24px rgba(0,212,255,0.32)}
.hero-portrait.featured::before{color:var(--cyan)}
.hero-vs{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:0.18em;color:var(--cyan);text-transform:uppercase;align-self:center}
.hero-portraits-row{grid-column:1 / -1;display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;font-family:var(--mono);font-size:10px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-top:4px}
.hero-portraits-row .hero-portraits-label:first-child{text-align:center}
.hero-portraits-row .hero-portraits-label.featured{text-align:center;color:var(--ink-2)}
.hero-portraits-row .hero-portraits-label.featured::before{content:""}
.hero-portraits-row::before{content:""}
.hero-portraits-caption{grid-column:1 / -1;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
@media(max-width:768px){
  .hero-portrait{width:96px;height:96px;font-size:42px}
  .hero-portraits{padding:0;justify-content:center;justify-items:center}
  .hero-portraits-row{font-size:9px}
}
@media(max-width:480px){
  .hero-portrait{width:80px;height:80px;font-size:34px}
  .hero-vs{font-size:12px}
}

.hero-cta{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;background:var(--cyan);color:#001a23;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;border:1px solid var(--cyan);text-decoration:none;align-self:flex-start;transition:transform .15s,box-shadow .15s,filter .15s;margin-top:8px}
.hero-cta:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,212,255,0.35);filter:brightness(1.1)}
@media(max-width:960px){.hero-strip-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .hero{padding:64px 18px 72px}
  .hero-headline{font-size:40px}
  .hero-sub{font-size:16px}
  .hero-cd-digits{font-size:34px}
  .hero-strip-row{grid-template-columns:1fr}
  .hero-cta{align-self:stretch;justify-content:center;width:100%}
}

.page{position:relative;z-index:2;max-width:1240px;margin:0 auto;padding:32px 36px 80px}
@media(max-width:768px){.page{padding:20px 16px 56px}}

/* ── header ── */
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.headline{font-family:var(--sans);font-weight:800;font-size:34px;line-height:1.1;letter-spacing:-0.01em;color:var(--ink);margin-bottom:8px}
@media(max-width:640px){.headline{font-size:26px}}
.subhead{font-family:var(--sans);font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:22px;max-width:680px}
.count-line{font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:18px}
.count-line strong{color:var(--cyan);font-weight:700}

/* ── filter bar ── */
.filters{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-label{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;min-width:96px}
.fchip{padding:6px 12px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--ink-2);border:1px solid var(--line);background:rgba(255,255,255,0.02);cursor:pointer;transition:all .15s}
.fchip:hover{color:var(--ink);border-color:var(--line-strong)}
.fchip.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,212,255,0.08)}
@media(max-width:640px){.filter-label{min-width:auto;width:100%;margin-bottom:2px}}

/* ── archive divider ── */
.archive-divider{display:flex;align-items:center;gap:14px;margin:0 0 22px;font-family:var(--mono);font-size:11px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase}
.archive-divider::before,.archive-divider::after{content:"";flex:1;height:1px;background:rgba(0,212,255,0.18)}

/* ── UPCOMING WORD-MARKET EVENTS (PR 2 — calendar-first rebuild) ── */
.upcoming-events-list{display:flex;flex-direction:column;gap:8px}

/* ── HEAT-MAP (PR 2 UI of rescope — claude/mentions-heatmap-ui-v1) ──
   Tier-bucketed grid of live mention markets. Inherits the gradient-bg
   tile vocab from /feed .mobile-alpha-card but renamed .hm-tile so
   future changes to /feed don't ripple. 12-column grid auto-flow dense
   so tier order packs tightly without gap rows. Tier sizing carries the
   "heat" hierarchy: jumbo 2-up, large 3-up, medium 4-up, small 6-up.
   Typography scales per tier; brand cyan for YES-leaning (>=50¢),
   --hawk (red) for NO-leaning. */
/* ── TOWN HALL BROADCAST STRIP — Bloomberg terminal hero ── */
.th-hero{position:relative;z-index:2;background:#000;overflow:hidden;border-bottom:1px solid rgba(0,212,255,0.15)}
.th-stage{position:relative}
/* Full-width card: left panel 60% dark content + right panel 40% image */
.th-card{display:flex;min-height:320px;cursor:pointer;overflow:hidden;position:relative}
.th-left-panel{flex:0 0 60%;background:linear-gradient(to right,#060d1a 0%,rgba(6,13,26,.96) 100%);padding:44px 40px 36px;display:flex;flex-direction:column;justify-content:flex-end;gap:0;position:relative;z-index:2}
.th-right-panel{flex:0 0 40%;background-size:cover;background-position:center;position:relative}
.th-right-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(6,13,26,.85) 0%,rgba(6,13,26,.2) 60%,transparent 100%)}
/* Scanline effect on hero only */
.th-left-panel::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:1}
.th-left-inner{position:relative;z-index:2;display:flex;flex-direction:column;gap:0}
.th-broadcast-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:.32em;color:#ff4d6a;text-transform:uppercase;margin-bottom:16px;align-self:flex-start}
.th-blink-dot{width:6px;height:6px;border-radius:50%;background:#ff4d6a;animation:th-blink .9s step-end infinite;flex-shrink:0}
@keyframes th-blink{0%,100%{opacity:1}50%{opacity:0}}
.th-slide-counter{position:absolute;top:16px;right:20px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.3);z-index:3}
/* Headline: big Bebas Neue */
.th-headline{font-family:var(--display);font-size:clamp(40px,5.5vw,72px);line-height:.96;letter-spacing:.02em;color:#fff;margin:0 0 12px}
/* Price: massive Bebas Neue with glow */
.th-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.th-yes{font-family:var(--display);font-size:clamp(64px,9vw,96px);line-height:1;letter-spacing:-.01em;transition:color .3s}
.th-yes.high{color:var(--cyan);text-shadow:0 0 24px rgba(0,212,255,.45)}
.th-yes.mid{color:#c5bedd}
.th-yes.low{color:#ff6b4d;text-shadow:0 0 20px rgba(255,107,77,.35)}
.th-yes-lbl{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.3em;color:rgba(255,255,255,.5);text-transform:uppercase;padding-bottom:8px}
.th-subline{font-family:var(--sans);font-size:13px;color:rgba(255,255,255,.55);line-height:1.5;margin:0 0 18px;max-width:480px}
.th-meta{display:flex;gap:16px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.th-vol{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase}
.th-countdown{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.2em;color:#f59e0b;text-transform:uppercase}
.th-trade-btn{align-self:flex-start;display:inline-flex;align-items:center;padding:9px 22px;background:var(--cyan);color:#000;font-family:var(--mono);font-size:10px;font-weight:900;letter-spacing:.26em;text-transform:uppercase;text-decoration:none;transition:opacity .12s,transform .12s}
.th-trade-btn:hover{opacity:.88;transform:translateY(-1px)}
/* Progress bar across bottom of hero */
.th-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--cyan);opacity:.7;transition:none}
@keyframes th-progress-tick{from{width:0}to{width:100%}}
/* Navigation dots */
.th-dots{display:flex;gap:6px;justify-content:center;padding:10px 0 8px;background:#000;position:relative}
.th-dot{width:24px;height:2px;border:0;background:rgba(255,255,255,.15);cursor:pointer;padding:0;transition:background .2s,width .2s}
.th-dot.active{background:var(--cyan);width:40px}
@media(max-width:768px){
  .th-card{flex-direction:column;min-height:auto}
  .th-left-panel{flex:none;padding:44px 18px 28px}
  .th-right-panel{flex:none;height:180px}
  .th-right-overlay{background:linear-gradient(to bottom,rgba(6,13,26,.9) 0%,rgba(6,13,26,.1) 100%)}
  .th-yes{font-size:clamp(56px,18vw,72px)}
  .th-headline{font-size:clamp(32px,9vw,52px)}
}
/* ── ON THE WIRE ticker tape ── */
.th-ticker-wrap{display:flex;align-items:center;background:#0a0812;border-bottom:1px solid var(--line);overflow:hidden;height:32px;position:relative;z-index:2}
.th-ticker-label{font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:.28em;color:#ff4d6a;text-transform:uppercase;white-space:nowrap;padding:0 14px 0 18px;border-right:1px solid rgba(255,77,106,.3);flex-shrink:0;line-height:32px}
.th-ticker-track{flex:1;overflow:hidden;height:32px}
.th-ticker-inner{display:flex;align-items:center;gap:0;white-space:nowrap;animation:th-scroll 40s linear infinite}
@keyframes th-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tt-item{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.65);text-decoration:none;text-transform:uppercase;padding:0 2px;transition:color .1s;white-space:nowrap}
.tt-item:hover{color:var(--cyan)}
.tt-sep{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.2);padding:0 14px}
/* ── NEWSROOM TICKER — "read all about it" card strip ── */
.newsroom{padding:24px 36px 20px;border-bottom:1px solid var(--line);position:relative;z-index:2;background:var(--bg)}
.newsroom-inner{max-width:1240px;margin:0 auto}
.newsroom-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.32em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.newsroom-eyebrow::after{content:'';flex:1;height:1px;background:var(--line)}
.newsroom-cards{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.newsroom-cards::-webkit-scrollbar{display:none}
.nr-card{flex:0 0 172px;background:var(--panel);border:1px solid var(--line);border-top:2px solid var(--line);padding:14px 14px 12px;text-decoration:none;color:inherit;transition:border-color .12s,border-top-color .12s,transform .12s;display:flex;flex-direction:column;gap:0;position:relative;overflow:hidden}
.nr-card:hover{border-color:rgba(0,212,255,0.25);border-top-color:var(--cyan);transform:translateY(-3px)}
.nr-ticker{font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nr-keyword{font-family:var(--display);font-size:40px;line-height:.9;letter-spacing:.01em;color:var(--ink);margin-bottom:8px;word-break:break-word}
.nr-threshold{font-family:var(--display);font-size:24px;line-height:1;color:#f59e0b;margin-bottom:8px;letter-spacing:.01em}
.nr-prob{font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:.02em;line-height:1;margin-bottom:4px}
.nr-prob.yes{color:var(--cyan)}
.nr-prob.no{color:#FF6B4D}
.nr-vol{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
/* When a Polymarket image loads, it covers the card as bg — content stays
   readable via gradient overlay set by JS after image probe succeeds. */
.nr-card{background-size:cover;background-position:center top;background-repeat:no-repeat}
.nr-card .nr-ticker,.nr-card .nr-keyword,.nr-card .nr-threshold,
.nr-card .nr-prob,.nr-card .nr-vol{position:relative;z-index:1}
.newsroom-empty{display:none}
@media(max-width:768px){.newsroom{padding:20px 18px 18px}.nr-card{flex:0 0 156px}.nr-keyword{font-size:32px}.nr-threshold{font-size:19px}}

.hm-section{margin:8px 0 36px;position:relative;z-index:2}
.hm-header{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:18px;flex-wrap:wrap}
.hm-title{font-family:var(--sans);font-size:22px;font-weight:800;letter-spacing:-0.015em;color:var(--ink);margin:0}
.hm-sub{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin:4px 0 0}
.hm-toggle{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px;flex-shrink:0}
.hm-tab{appearance:none;background:transparent;border:0;font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;padding:8px 14px;border-radius:6px;cursor:pointer;transition:background 0.15s, color 0.15s}
.hm-tab:hover{color:var(--ink-2)}
.hm-tab.active{background:rgba(0,212,255,0.10);color:var(--cyan)}

.hm-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;grid-auto-flow:dense}
/* Each tile: dark panel base + optional image overlay via --tile-img */
.hm-tile{display:flex;flex-direction:column;gap:8px;padding:16px 16px 0;border:1px solid var(--line);text-decoration:none;color:inherit;transition:border-color 0.15s, transform 0.15s;min-height:160px;background:var(--panel);position:relative;overflow:hidden}
/* Image overlay: when JS sets --tile-img the gradient covers content */
.hm-tile::before{content:"";position:absolute;inset:0;background:var(--tile-img-grad,none),var(--tile-img,none);background-size:cover;background-position:center top;pointer-events:none;z-index:0}
.hm-tile:hover{border-color:rgba(0,212,255,0.35);transform:translateY(-2px)}
.hm-tile.jumbo{grid-column:span 6;min-height:220px;padding:22px 22px 0;border-color:rgba(0,212,255,0.18)}
.hm-tile.large{grid-column:span 4;min-height:180px;padding:18px 18px 0}
.hm-tile.medium{grid-column:span 3;min-height:160px}
.hm-tile.small{grid-column:span 3;min-height:140px;padding:12px 12px 0;gap:6px}

.hm-tile-top{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.hm-portrait{width:28px;height:28px;background:var(--panel-2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.hm-portrait::before{content:attr(data-monogram);position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.hm-portrait img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1;display:block}
.hm-tile.jumbo .hm-portrait{width:36px;height:36px;font-size:14px}
.hm-tile.small .hm-portrait{width:22px;height:22px;font-size:9px}
.hm-speaker{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm-tile.jumbo .hm-speaker{font-size:10px}

.hm-q{font-family:var(--sans);font-weight:500;color:var(--ink-2);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-size:12px;position:relative;z-index:1}
.hm-tile.jumbo .hm-q{font-size:15px;-webkit-line-clamp:2;line-height:1.3;font-weight:600;color:var(--ink)}
.hm-tile.large .hm-q{font-size:13px;-webkit-line-clamp:2}
.hm-tile.medium .hm-q{font-size:12px}
.hm-tile.small .hm-q{font-size:11px;-webkit-line-clamp:2}

/* Price: Bebas Neue for that trading terminal look */
.hm-tile-bottom{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-top:auto;padding-bottom:10px;position:relative;z-index:1}
.hm-price{font-family:var(--display);color:var(--cyan);line-height:1;letter-spacing:.01em}
.hm-price.no-leaning{color:var(--hawk)}
.hm-tile.jumbo .hm-price{font-size:56px}
.hm-tile.large .hm-price{font-size:42px}
.hm-tile.medium .hm-price{font-size:34px}
.hm-tile.small .hm-price{font-size:26px}
/* Volume bar — fills from left, colored by 24h vol intensity */
.hm-vol-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.04)}
.hm-vol-bar{height:100%;background:rgba(0,212,255,0.45);transition:width .3s}
.hm-tile.hot-vol .hm-vol-bar{background:rgba(0,212,255,0.75)}
/* low-conviction markets recede visually */
.hm-tile.low-conviction{opacity:0.45}
/* hot volume: cyan left accent */
.hm-tile.hot-vol{border-left:2px solid rgba(0,212,255,0.6)}
.hm-vol{font-family:var(--mono);font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;text-align:right;flex-shrink:0}
.hm-tile.jumbo .hm-vol{font-size:12px;color:var(--ink-2)}
.hm-tile.small .hm-vol{font-size:9px}

/* PENDING/RESOLVED state chip — rides top-right of .hm-tile-top opposite
   the speaker portrait. Inherits the .hero-eyebrow vocab (mono, uppercase,
   wide letter-spacing, 1px border, 6% rgba fill). PENDING = cyan signal
   (market exists but not yet trading); RESOLVED = muted (event done,
   stale price). Live tiles render no badge. */
.hm-badge{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;padding:3px 7px;border:1px solid;border-radius:3px;margin-left:auto;flex-shrink:0;font-weight:700;line-height:1}
.hm-badge.pending{color:var(--cyan);border-color:rgba(0,212,255,0.45);background:rgba(0,212,255,0.06)}
.hm-badge.resolved{color:var(--muted);border-color:rgba(110,103,144,0.30);background:transparent}
.hm-tile.jumbo .hm-badge{font-size:10px;padding:4px 9px}
.hm-tile.small .hm-badge{font-size:8px;padding:2px 5px;letter-spacing:0.14em}

.hm-empty{font-family:var(--mono);font-size:12px;color:var(--muted-2);padding:24px 0;line-height:1.6;text-align:center}

/* Price tick flash animations */
@keyframes hm-tick-up{0%,100%{color:var(--cyan)}25%{color:#00ff99;text-shadow:0 0 12px rgba(0,255,153,.6)}}
@keyframes hm-tick-dn{0%,100%{color:var(--cyan)}25%{color:#ff4d6a;text-shadow:0 0 12px rgba(255,77,106,.6)}}
.hm-price.tick-up{animation:hm-tick-up .8s ease-out}
.hm-price.tick-dn{animation:hm-tick-dn .8s ease-out}

@media(max-width:768px){
  .hm-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .hm-tile.jumbo,.hm-tile.large,.hm-tile.medium,.hm-tile.small{grid-column:span 2;min-height:auto}
  .hm-tile{min-height:120px;padding:12px 12px 0}
  .hm-tile.jumbo .hm-price{font-size:42px}
  .hm-tile.large .hm-price{font-size:32px}
  .hm-header{align-items:flex-start;flex-direction:column;gap:12px}
}
.event-row{display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;padding:16px 18px;background:rgba(255,255,255,0.025);border:1px solid var(--line);transition:border-color .15s,background .15s;cursor:pointer}
.event-row:hover{border-color:var(--cyan);background:rgba(0,212,255,0.04)}
.event-row.expanded{border-color:var(--cyan)}
.event-row-date{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;padding:6px 10px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25)}
.event-row-date-month{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--cyan);text-transform:uppercase;font-weight:700}
.event-row-date-day{font-family:var(--mono);font-size:22px;color:var(--ink);font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.event-row-date-dow{font-family:var(--mono);font-size:9px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-top:2px}
.event-row-main{display:flex;flex-direction:column;gap:6px;min-width:0}
.event-row-title{font-family:var(--sans);font-size:16px;font-weight:700;color:var(--ink);line-height:1.3;letter-spacing:-0.005em}
.event-row-meta{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.04em;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.event-row-meta strong{color:var(--ink-2);font-weight:700}
.event-row-view{font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:0.06em;text-transform:uppercase;font-weight:700;padding-bottom:1px;border-bottom:1px dotted rgba(0,212,255,0.5);transition:color .15s,border-color .15s}
.event-row-view:hover{color:#9BEBFF;border-bottom-color:var(--cyan)}
.event-row-cd{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--cyan);text-align:right;font-variant-numeric:tabular-nums;letter-spacing:0.02em;min-width:84px}
.event-row-cd-label{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;font-weight:500;margin-top:2px}
.event-row-children{grid-column:1 / -1;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:none}
.event-row.expanded .event-row-children{display:grid}
.event-child{display:flex;flex-direction:column;gap:4px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--line);text-decoration:none;color:inherit;transition:border-color .15s}
.event-child:hover{border-color:var(--cyan)}
.event-child-label{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink);line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.event-child-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.event-child-yes{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--cyan);font-variant-numeric:tabular-nums}
.event-child-yes.low{color:#FF6B4D}
.event-child-yes.mid{color:var(--ink-2)}
.event-child-vol{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.04em}
.event-child-pending{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;color:var(--muted-2);text-transform:uppercase}
@media(max-width:600px){
  .event-row{grid-template-columns:auto 1fr;gap:14px;padding:14px}
  .event-row-cd{grid-column:1 / -1;text-align:left;min-width:0;margin-top:2px}
  .event-row-meta{font-size:10px;gap:10px}
}

/* ── card grid ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1024px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid{grid-template-columns:1fr}}

/* ── speaker collapse expander ── */
.speaker-expand{grid-column:1 / -1;padding:14px 18px;background:rgba(0,212,255,0.04);border:1px dashed rgba(0,212,255,0.32);font-family:var(--mono);font-size:12px;color:var(--cyan);letter-spacing:0.04em;cursor:pointer;text-align:center;transition:background .15s,border-color .15s}
.speaker-expand:hover{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.5);border-style:solid}
.speaker-expand strong{font-weight:700}

.card{background:var(--panel);border:1px solid var(--line);padding:18px 20px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,transform .15s,background .15s;cursor:pointer;position:relative;min-height:180px}
.card:hover{border-color:var(--cyan);background:var(--panel-2);transform:translateY(-1px)}
/* Card-type variants — language gets marquee weight, composed_only is muted. */
.card.t-language{min-height:200px}
.card.t-language .card-headline{font-size:17px}
.card.t-composed{opacity:0.78}
.card.t-composed:hover{opacity:1}
.card-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card-eyebrow .sep{color:var(--muted-2)}
.card-eyebrow .speaker{color:var(--ink-2);font-weight:700}
.card-eyebrow .live-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:hero-pulse 1.6s ease-in-out infinite;flex-shrink:0}
.card-eyebrow .live-label{color:var(--cyan);font-weight:700;letter-spacing:0.22em}
.card-type{display:inline-block;padding:2px 8px;border:1px solid var(--line-strong);background:rgba(255,255,255,0.02);color:var(--ink-2);font-family:var(--mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase}
.card-headline{font-family:var(--sans);font-weight:700;font-size:15px;color:var(--ink);line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-leading{font-family:var(--sans);font-weight:700;font-size:14px;color:var(--cyan);line-height:1.3;letter-spacing:-0.005em}
.card-leading-pct{font-family:var(--mono);font-weight:800;font-size:18px;letter-spacing:-0.01em}
.card-volume{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:0.06em}
.card-receipt-only{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted-2);line-height:1.4}
.card-blurb{font-family:var(--sans);font-size:12.5px;color:var(--muted);line-height:1.5;flex:1}
.card-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:auto;padding-top:10px;border-top:1px solid var(--line)}
.card-arrow{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase;transition:color .15s;font-weight:700}
.card.t-language .card-arrow,.card.t-outcome .card-arrow{color:var(--cyan)}
.card:hover .card-arrow{color:var(--cyan)}
.compared-chip{font-family:var(--mono);font-size:9px;color:var(--muted-2);letter-spacing:0.14em;text-transform:uppercase}
.compared-chip strong{color:var(--cyan);font-weight:700}
/* Stance pill demoted to accent: smaller padding/font when sitting on the card foot. */
.card-foot .pill{padding:3px 8px;font-size:9px;letter-spacing:0.14em}

/* ── stance pills (same scheme as event page, slightly compact) ── */
/* ── TRENDING PILL BAR ── */
.trending-bar{background:var(--bg);border-bottom:1px solid var(--line);padding:10px 36px;position:sticky;top:0;z-index:100}
.trending-bar-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none}
.trending-bar-inner::-webkit-scrollbar{display:none}
.trending-bar-label{font-family:var(--mono);font-size:9px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.trend-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:border-color .12s,color .12s,background .12s;flex-shrink:0}
.trend-pill:hover,.trend-pill.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.07)}
.trend-pill .trend-vol{font-weight:400;opacity:.6}
.trend-pill.hot-topic{border-color:rgba(245,158,11,0.4);color:#f59e0b}
.trend-pill.hot-topic:hover,.trend-pill.hot-topic.active{border-color:#f59e0b;background:rgba(245,158,11,0.07)}
#trending-pills{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
@media(max-width:768px){.trending-bar{padding:8px 16px}}

.pill{display:inline-flex;align-items:center;padding:4px 10px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;border:1px solid;border-radius:0}
.pill.s-hawkish.c-high{background:rgba(255,107,77,0.20);border-color:rgba(255,107,77,0.85);color:#FFB199}
.pill.s-hawkish.c-medium{background:rgba(255,107,77,0.06);border-color:rgba(255,107,77,0.32);color:rgba(232,154,135,0.65)}
.pill.s-hawkish.c-low{background:rgba(255,107,77,0.025);border-color:rgba(255,107,77,0.15);color:rgba(232,154,135,0.45);text-decoration:underline dotted;text-underline-offset:3px}
.pill.s-dovish.c-high{background:rgba(0,212,255,0.20);border-color:rgba(0,212,255,0.85);color:#9BEBFF}
.pill.s-dovish.c-medium{background:rgba(0,212,255,0.06);border-color:rgba(0,212,255,0.32);color:rgba(127,207,232,0.65)}
.pill.s-dovish.c-low{background:rgba(0,212,255,0.025);border-color:rgba(0,212,255,0.15);color:rgba(127,207,232,0.45);text-decoration:underline dotted;text-underline-offset:3px}
.pill.s-neutral.c-high{background:rgba(149,144,176,0.20);border-color:rgba(149,144,176,0.75);color:#C5BEDD}
.pill.s-neutral.c-medium{background:rgba(149,144,176,0.06);border-color:rgba(149,144,176,0.30);color:rgba(197,190,221,0.65)}
.pill.s-neutral.c-low{background:rgba(149,144,176,0.025);border-color:rgba(149,144,176,0.15);color:rgba(197,190,221,0.45);text-decoration:underline dotted;text-underline-offset:3px}
/* Phase 4.1: us_politics axis (escalatory_deescalatory) */
.pill.s-escalatory.c-high{background:rgba(255,107,77,0.20);border-color:rgba(255,107,77,0.85);color:#FFB199}
.pill.s-escalatory.c-medium{background:rgba(255,107,77,0.06);border-color:rgba(255,107,77,0.32);color:rgba(232,154,135,0.65)}
.pill.s-escalatory.c-low{background:rgba(255,107,77,0.025);border-color:rgba(255,107,77,0.15);color:rgba(232,154,135,0.45);text-decoration:underline dotted;text-underline-offset:3px}
.pill.s-deescalatory.c-high{background:rgba(0,200,150,0.20);border-color:rgba(0,200,150,0.85);color:#7AE6BF}
.pill.s-deescalatory.c-medium{background:rgba(0,200,150,0.06);border-color:rgba(0,200,150,0.32);color:rgba(122,230,191,0.65)}
.pill.s-deescalatory.c-low{background:rgba(0,200,150,0.025);border-color:rgba(0,200,150,0.15);color:rgba(122,230,191,0.45);text-decoration:underline dotted;text-underline-offset:3px}
.pill.s-ambiguous.c-high{background:rgba(149,144,176,0.20);border-color:rgba(149,144,176,0.75);color:#C5BEDD}
.pill.s-ambiguous.c-medium{background:rgba(149,144,176,0.06);border-color:rgba(149,144,176,0.30);color:rgba(197,190,221,0.65)}
.pill.s-ambiguous.c-low{background:rgba(149,144,176,0.025);border-color:rgba(149,144,176,0.15);color:rgba(197,190,221,0.45);text-decoration:underline dotted;text-underline-offset:3px}

#loading,#empty{padding:80px 0;text-align:center;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase}
#empty-msg{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--ink-2);margin-top:8px;text-transform:none;letter-spacing:0}

footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
</style>
</head>
<body>
<div id="nav-root"></div>
<script src="/nav.js?v=21"></script>

<section class="page-intro">
  <div class="page-intro-inner">
    <div class="page-intro-eyebrow">MENTIONS</div>
    <span style="color:rgba(0,212,255,0.25);font-family:var(--mono);font-size:10px">·</span>
    <p class="page-intro-sub">Public figures · market-moving statements · live probabilities</p>
  </div>
</section>

<!--HERO_HTML-->

<!-- TRENDING BAR — sticky pill strip of top entities by 24h volume.
     Populated from /api/trending-topics; clicking a pill filters hm-grid
     to markets whose question matches that entity. Hidden until data loads. -->
<div id="trending-bar" class="trending-bar" style="display:none">
  <div class="trending-bar-inner">
    <span class="trending-bar-label">Trending</span>
    <div id="trending-pills"></div>
  </div>
</div>

<main class="page" id="page">
  <!-- NEWSROOM TICKER — "read all about it" strip. Auto-populates from
       /api/mentions-heatmap tiles; each card = one tracked word + live
       market price. Section hidden until at least 2 cards render. -->
  <section id="newsroom" class="newsroom" style="display:none">
    <div class="newsroom-inner">
      <div class="newsroom-eyebrow">In play now</div>
      <div class="newsroom-cards" id="newsroom-cards"></div>
    </div>
  </section>

  <!-- LIVE MENTION MARKETS heat-map — PR 2 UI of mentions rescope.
       Tier-bucketed grid sourced from /api/mentions-heatmap (slug-probe
       primary, 4-tier percentile bucketing). Default surface on /mentions;
       view toggle flips to the calendar view (#upcoming-events) below.
       Empty state graceful: if heat-map returns zero tiles, auto-shows
       calendar instead of skeleton. -->
  <section id="mention-supply" class="hm-section" style="display:none">
    <div class="hm-header">
      <div>
        <h2 class="hm-title">Live mention markets</h2>
        <p class="hm-sub" id="hm-sub">Loading…</p>
      </div>
      <div class="hm-toggle" role="tablist" id="hm-toggle">
        <button class="hm-tab active" data-mode="heatmap" type="button" role="tab">Heat map</button>
        <button class="hm-tab" data-mode="calendar" type="button" role="tab">By event</button>
      </div>
    </div>
    <div id="hm-grid" class="hm-grid"></div>
  </section>

  <!-- Upcoming word-market events — PR 2 of mentions rescope.
       Auto-hides when /api/word-markets/upcoming returns 0 events
       (per voice charter: no playful empty surfaces). When
       Polymarket has supply, this section renders calendar rows
       above the posture archive. -->
  <section id="upcoming-events" style="display:none;margin-bottom:36px">
    <div class="archive-divider">Upcoming word-market events</div>
    <div id="upcoming-events-list"></div>
  </section>

  <div class="archive-divider">Recent posture archive</div>

  <div id="count-line" class="count-line" style="display:none"></div>

  <div id="filters" class="filters" style="display:none">
    <div class="filter-row" id="domain-row" style="display:none">
      <span class="filter-label">Domain</span>
    </div>
    <div class="filter-row" id="subject-row" style="display:none">
      <span class="filter-label">Subject</span>
    </div>
    <div class="filter-row" id="type-row">
      <span class="filter-label">Event type</span>
    </div>
    <div class="filter-row" id="speaker-row">
      <span class="filter-label">Speaker</span>
    </div>
  </div>

  <div id="grid-host">
    <div id="loading">Loading archive…</div>
  </div>

  <footer>HYPERFLEX · receipts on what was said</footer>
</main>

<script>
// ── UPCOMING WORD-MARKET EVENTS (PR 2) ──
// Consumes /api/word-markets/upcoming from lib/word-markets.js. Renders
// calendar rows above the posture archive. Auto-hides section when
// the endpoint returns 0 events (voice charter: no playful empty
// surfaces). Self-contained — runs on its own DOM, doesn't touch the
// existing archive state below.
(function () {
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function fmtVolume(v) {
    v = Number(v || 0);
    if (!isFinite(v) || v <= 0) return '$0';
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    if (v >= 1e3) return '$' + Math.round(v / 1e3) + 'K';
    return '$' + Math.round(v);
  }
  function fmtChance(p) {
    if (p == null) return '—';
    var v = Number(p);
    if (!isFinite(v) || v < 0) return '—';
    if (v > 1) v = v / 100;
    var pct = v * 100;
    if (pct >= 10) return Math.round(pct) + '%';
    if (pct >= 1)  return Math.round(pct) + '¢';
    if (pct > 0)   return pct.toFixed(1) + '¢';
    return '0¢';
  }
  function yesCls(p) {
    if (p == null) return 'mid';
    var v = Number(p);
    if (v > 1) v = v / 100;
    if (v >= 0.6) return '';
    if (v <= 0.4) return 'low';
    return 'mid';
  }
  // Best-effort event date: gamma's `end_date` when present, otherwise
  // parse the month name out of the event title (e.g. "June Press
  // Conference" → mid-June assumed). FOMC pressers traditionally land
  // on the 17th of the meeting month for our planning window; this is
  // a heuristic that gets refined when end_date populates.
  var MONTHS = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  function eventDate(ev) {
    if (ev.end_date) {
      var t = Date.parse(ev.end_date);
      if (isFinite(t)) return new Date(t);
    }
    var title = String(ev.event_title || '').toLowerCase();
    var now = new Date();
    for (var i = 0; i < MONTHS.length; i++) {
      if (title.indexOf(MONTHS[i]) !== -1) {
        var year = now.getFullYear();
        // If month already passed this year, assume next year (Polymarket
        // rarely lists more than 6mo out, but be defensive).
        if (i < now.getMonth() - 1) year += 1;
        return new Date(year, i, 17);  // FOMC heuristic
      }
    }
    return null;
  }
  function fmtCountdown(d) {
    if (!d) return null;
    var ms = d.getTime() - Date.now();
    if (ms <= 0) return { text: 'past', past: true };
    var days = Math.floor(ms / 86400000);
    var hours = Math.floor((ms % 86400000) / 3600000);
    return { text: days + 'd ' + hours + 'h', past: false };
  }
  var DOWS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var MONTHS_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  function renderChildren(ev) {
    var open = (ev.markets || []).filter(m => !m.closed && m.active !== false);
    var pending = (ev.markets || []).filter(m => m.closed && m.active === false);
    var rows = open.slice(0, 12).map(m => {
      var href = m.slug ? '/market/' + encodeURIComponent(m.slug) : '#';
      var label = escHtml(m.label || m.question || '?');
      var yes = fmtChance(m.yes_price);
      var cls = yesCls(m.yes_price);
      var vol = fmtVolume(m.volume);
      return '<a class="event-child" href="' + escHtml(href) + '">'
        +   '<div class="event-child-label">' + label + '</div>'
        +   '<div class="event-child-row">'
        +     '<span class="event-child-yes ' + cls + '">' + escHtml(yes) + ' YES</span>'
        +     '<span class="event-child-vol">' + escHtml(vol) + '</span>'
        +   '</div>'
        + '</a>';
    });
    if (!open.length && pending.length) {
      rows.push('<div class="event-child"><div class="event-child-label">Sub-markets open closer to the event.</div><div class="event-child-pending">' + pending.length + ' pending activation</div></div>');
    }
    return rows.join('');
  }

  function renderRow(ev) {
    var d = eventDate(ev);
    var cd = fmtCountdown(d);
    // Filter out past events from the calendar — that's the archive's job.
    if (cd && cd.past) return '';
    var dateMonth = d ? MONTHS_SHORT[d.getMonth()] : 'TBD';
    var dateDay   = d ? String(d.getDate()) : '—';
    var dateDow   = d ? DOWS[d.getDay()] : '';
    var title     = escHtml(ev.event_title || '(untitled event)');
    var marketCount = (ev.markets || []).length;
    var totalVol  = fmtVolume(ev.total_volume);
    var cdText    = cd ? cd.text : '—';
    return '<div class="event-row" data-event-slug="' + escHtml(ev.event_slug) + '">'
      +   '<div class="event-row-date">'
      +     '<span class="event-row-date-month">' + dateMonth + '</span>'
      +     '<span class="event-row-date-day">' + dateDay + '</span>'
      +     '<span class="event-row-date-dow">' + dateDow + '</span>'
      +   '</div>'
      +   '<div class="event-row-main">'
      +     '<div class="event-row-title">' + title + '</div>'
      +     '<div class="event-row-meta">'
      +       '<span><strong>' + marketCount + '</strong> word-markets</span>'
      +       '<span><strong>' + totalVol + '</strong> volume</span>'
      +       '<a class="event-row-view" data-stop="1" href="/event/' + encodeURIComponent(ev.event_slug) + '">View details →</a>'
      +     '</div>'
      +   '</div>'
      +   '<div>'
      +     '<div class="event-row-cd">' + escHtml(cdText) + '</div>'
      +     '<div class="event-row-cd-label">to event</div>'
      +   '</div>'
      +   '<div class="event-row-children">' + renderChildren(ev) + '</div>'
      + '</div>';
  }

  function init() {
    fetch('/api/word-markets/upcoming?limit=20', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        var events = (d && Array.isArray(d.events)) ? d.events : [];
        var rows = events.map(renderRow).filter(Boolean);  // strips past-only events
        if (!rows.length) return;  // section stays hidden
        var section = document.getElementById('upcoming-events');
        var list    = document.getElementById('upcoming-events-list');
        if (!section || !list) return;
        list.innerHTML = rows.join('');
        section.style.display = 'block';
        // Click-to-expand on each row. Children are anchors with their
        // own navigation, so stop propagation when the click started
        // inside a child link.
        list.querySelectorAll('.event-row').forEach(row => {
          row.addEventListener('click', function (e) {
            var t = e.target;
            while (t && t !== row) {
              if (t.tagName === 'A') return;  // let the anchor handle nav
              t = t.parentNode;
            }
            row.classList.toggle('expanded');
          });
        });
      })
      .catch(() => { /* fail silent, section stays hidden */ });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();

// ────────────────────────────────────────────────────────────────────
// NEWSROOM TICKER — "read all about it" card strip.
// Pulls from /api/mentions-heatmap (same data as the grid below).
// Shows the most liquid tiles as newspaper-headline cards.
// ────────────────────────────────────────────────────────────────────
(function () {
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // Tokens to skip when extracting ticker/keyword from question text.
  // Months, days, and sentence-starter words that aren’t meaningful signals.
  var _SKIP = ‘Will Would Could Should The A An Is Are Was Were To Of By At In On For From With That This These Those Do Does Did Have Has Had Be Been Being Not Or And But If When Where How Why Which Who What Than More Most Less Any All Each Both Very Just Also Then There Their They He She It We You My His Its Our Your New First Last Next May June July August September October November December January February March April Sunday Monday Tuesday Wednesday Thursday Friday Saturday US UK EU UN GOP Agree Say Says Said More Than Over Under After Before During Into Through About’.split(‘ ‘);
  var _SKIP_SET = {};
  for (var _i = 0; _i < _SKIP.length; _i++) _SKIP_SET[_SKIP[_i]] = true;

  // Adjective-to-noun normalization for demonyms in question text.
  var _DEMONYM = {Iranian:’Iran’,Russian:’Russia’,Chinese:’China’,Israeli:’Israel’,
    Ukrainian:’Ukraine’,Korean:’Korea’,European:’Europe’,American:’America’,
    British:’Britain’,French:’France’,German:’Germany’,Japanese:’Japan’,
    Indian:’India’,Brazilian:’Brazil’,Mexican:’Mexico’,Canadian:’Canada’,
    Turkish:’Turkey’,Pakistani:’Pakistan’,Afghan:’Afghanistan’,Syrian:’Syria’};

  function _capTokens(question) {
    return (question || ‘’).split(/[\s,?.!();:]+/).filter(function(t) {
      return t.length >= 2 && /^[A-Z]/.test(t) && !/^\d/.test(t) && !_SKIP_SET[t];
    }).map(function(t) { return _DEMONYM[t] || t; });
  }

  function extractKeyword(question) {
    if (!question) return null;
    // 1. Explicit quotes
    var m = question.match(/[‘’’’””]([a-zA-Z\s\-]{2,24})[‘’”’’””]/);
    if (m) return m[1].trim();
    // 2. “say/says X” pattern
    var say = question.match(/\bsay(?:s|ing)?\s+[“’]?([a-z]{3,24})/i);
    if (say) return say[1];
    // 3. Capitalized proper nouns — skip first token (that’s the ticker subject)
    var tokens = _capTokens(question);
    for (var i = 1; i < tokens.length; i++) {
      if (tokens[i].length >= 4) return tokens[i];
    }
    return tokens.length > 1 ? tokens[1] : (tokens[0] || null);
  }

  function extractTicker(question, speaker) {
    if (speaker) {
      var parts = speaker.trim().split(/\s+/);
      return parts[parts.length - 1].toUpperCase().slice(0, 7);
    }
    // Derive from first proper noun in question (“Will Trump agree…” → TRUMP)
    var tokens = _capTokens(question);
    return tokens.length ? tokens[0].toUpperCase().slice(0, 7) : ‘—‘;
  }

  function extractCount(question) {
    if (!question) return null;
    var m = question.match(/(\d+)\s*\+\s*times/i)
         || question.match(/at least\s+(\d+)\s+times/i)
         || question.match(/more than\s+(\d+)\s+times/i)
         || question.match(/(\d+)\s+or more times/i);
    return m ? m[1] : null;
  }

  function fmtVol(n) {
    n = Number(n || 0);
    if (!n || !isFinite(n)) return null;
    if (n >= 1e6) return ‘$’ + (n / 1e6).toFixed(1) + ‘M’;
    if (n >= 1e3) return ‘$’ + Math.round(n / 1e3) + ‘K’;
    return ‘$’ + Math.round(n);
  }

  function renderCard(market) {
    // { ticker, keyword, threshold, prob, vol }
    var keyword = extractKeyword(market.question);
    if (!keyword) return ‘’;
    var threshold = extractCount(market.question);
    var priceFrac = Number(market.yes_price);
    if (!isFinite(priceFrac)) return ‘’;

    var ticker  = extractTicker(market.question, market.speaker);
    var prob    = Math.round(priceFrac * 100);
    var probCls = priceFrac >= 0.5 ? 'yes' : 'no';
    var vol     = fmtVol(market.volume_total);
    var slug    = market.polymarket_slug;
    var href    = slug ? '/market/' + encodeURIComponent(slug) : '#';

    var thresholdHtml = threshold
      ? '<div class="nr-threshold">' + esc(threshold) + '×</div>'
      : '';
    var volHtml = vol
      ? '<div class="nr-vol">' + esc(vol) + ' in play</div>'
      : '';

    var imgUrl = market.image_url || '';
    var imgAttr = imgUrl ? ' data-img="' + esc(imgUrl) + '"' : '';

    return '<a class="nr-card" href="' + esc(href) + '"' + imgAttr + '>'
      + '<div class="nr-ticker">' + esc(ticker) + '</div>'
      + '<div class="nr-keyword">"' + esc(keyword.toUpperCase()) + '"</div>'
      + thresholdHtml
      + '<div class="nr-prob ' + probCls + '">' + prob + '% YES</div>'
      + volHtml
      + '</a>';
  }

  function applyCardImages(container) {
    var cards = container.querySelectorAll('.nr-card[data-img]');
    cards.forEach(function(el) {
      var url = el.getAttribute('data-img');
      if (!url) return;
      var img = new window.Image();
      img.onload = function() {
        el.style.backgroundImage =
          'linear-gradient(to bottom, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0.85) 100%), url(' + url + ')';
      };
      img.src = url;
    });
  }

  function init() {
    fetch('/api/mentions-heatmap', { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) {
        if (!d) return;
        var tiers = d.tiers || {};
        var all = [].concat(
          Array.isArray(tiers.jumbo)  ? tiers.jumbo  : [],
          Array.isArray(tiers.large)  ? tiers.large  : [],
          Array.isArray(tiers.medium) ? tiers.medium : [],
          Array.isArray(tiers.small)  ? tiers.small  : []
        );
        // Sort by lifetime volume desc, take top 8
        all.sort(function(a, b) { return (Number(b.volume_total) || 0) - (Number(a.volume_total) || 0); });
        var cards = all.slice(0, 8).map(renderCard).filter(Boolean);
        if (cards.length < 2) return;
        var sec = document.getElementById('newsroom');
        var container = document.getElementById('newsroom-cards');
        if (!sec || !container) return;
        container.innerHTML = cards.join('');
        applyCardImages(container);
        sec.style.display = 'block';
      })
      .catch(function() {});
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();

// ────────────────────────────────────────────────────────────────────
// LIVE MENTION MARKETS heat-map (PR 2 UI of mentions rescope).
// Fetches /api/mentions-heatmap, renders tier-bucketed grid, wires
// the Heat-map | By event toggle with localStorage persistence.
// Graceful empty-state: if heat-map returns zero tiles, auto-flip to
// calendar view (the existing #upcoming-events section).
// ────────────────────────────────────────────────────────────────────
(function () {
  const LS_KEY = 'hf_mentions_view_mode';
  const TIER_ORDER = ['jumbo', 'large', 'medium', 'small'];

  function escHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function fmtVolume(n) {
    if (!n || !isFinite(n)) return '$0';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'k';
    return '$' + Math.round(n);
  }

  function fmtCents(price) {
    if (price == null || !isFinite(price)) return '—';
    return Math.round(price * 100) + '¢';
  }

  function speakerMonogram(speaker) {
    return speaker ? String(speaker).charAt(0).toUpperCase() : '?';
  }

  let _maxVol24h = 1;  // updated after grid load to compute vol bar widths

  function renderTile(market, tier) {
    const cid = escHtml(market.condition_id || '');
    const q = escHtml(market.question || '');
    const speaker = market.speaker || '';
    const speakerSlug = market.speaker_slug || (speaker ? speaker.toLowerCase().replace(/[^a-z0-9-]+/g, '') : '');
    const monogram = escHtml(speakerMonogram(speaker));
    const slug = market.polymarket_slug || '';
    const href = slug ? '/market/' + escHtml(slug) : '#';

    const yesPrice = market.yes_price;
    const priceText = fmtCents(yesPrice);
    const priceClass = (yesPrice != null && yesPrice < 0.5) ? 'hm-price no-leaning' : 'hm-price';

    const volTotal = Number(market.volume_total) || 0;
    const vol24h   = Number(market.volume_24h) || 0;
    const volText  = fmtVolume(volTotal);
    const vol24hChip = (vol24h >= 100) ? ' · ' + fmtVolume(vol24h) + ' 24h' : '';

    // Image: Polymarket CDN full-bleed with gradient overlay on tile
    const imgUrl = market.image_url ? escHtml(market.image_url) : '';
    const speakerFallback = speakerSlug ? '/speakers/' + escHtml(speakerSlug) + '.jpg' : '';
    const portraitImg = imgUrl
      ? '<img src="' + imgUrl + '" alt="' + escHtml(speaker) + '" loading="lazy"'
        + ' onerror="' + (speakerFallback ? 'if(this.src!==\'' + speakerFallback + '\'){this.src=\'' + speakerFallback + '\'}else{this.remove()}' : 'this.remove()') + '">'
      : (speakerFallback
          ? '<img src="' + speakerFallback + '" alt="' + escHtml(speaker) + '" onerror="this.remove()" loading="lazy">'
          : '');

    const state = market.state || 'live';
    const badgeHtml = (state === 'pending' || state === 'resolved')
      ? '<div class="hm-badge ' + state + '">' + state + '</div>'
      : '';

    const yesNum = Number(market.yes_price);
    const extraCls = [
      (isFinite(yesNum) && yesNum < 0.10) ? 'low-conviction' : '',
      (vol24h > 50000) ? 'hot-vol' : '',
    ].filter(Boolean).join(' ');

    // Volume bar width as % of max 24h vol in this view (set after render)
    const volBarPct = _maxVol24h > 0 ? Math.min(100, Math.round((vol24h / _maxVol24h) * 100)) : 0;

    return ''
      + '<a class="hm-tile ' + tier + (extraCls ? ' ' + extraCls : '') + '" href="' + href + '" data-cid="' + cid + '" data-vol24h="' + vol24h + '" data-imgurl="' + imgUrl + '">'
      +   '<div class="hm-tile-top">'
      +     '<div class="hm-portrait" data-monogram="' + monogram + '">' + portraitImg + '</div>'
      +     '<div class="hm-speaker">' + escHtml(speaker) + '</div>'
      +     badgeHtml
      +   '</div>'
      +   '<div class="hm-q">' + q + '</div>'
      +   '<div class="hm-tile-bottom">'
      +     '<div class="' + priceClass + '" data-price="' + (yesNum || 0) + '">' + priceText + ' YES</div>'
      +     '<div class="hm-vol">' + escHtml(volText + vol24hChip) + '</div>'
      +   '</div>'
      +   '<div class="hm-vol-bar-wrap"><div class="hm-vol-bar" style="width:' + volBarPct + '%"></div></div>'
      + '</a>';
  }

  function applyTileImages(grid) {
    // Set CSS custom property --tile-img on tiles that have a valid CDN image
    grid.querySelectorAll('.hm-tile[data-imgurl]').forEach(el => {
      const url = el.getAttribute('data-imgurl');
      if (!url) return;
      const probe = new window.Image();
      probe.onload = () => {
        el.style.setProperty('--tile-img-grad', 'linear-gradient(to top,rgba(6,13,26,.95) 0%,rgba(6,13,26,.7) 50%,rgba(6,13,26,.45) 100%)');
        el.style.setProperty('--tile-img', 'url(' + url + ')');
      };
      probe.src = url;
    });
  }

  function renderGrid(payload) {
    const tiers = (payload && payload.tiers) || {};
    // Compute max 24h vol across all tiles for proportional volume bars
    const allMarkets = TIER_ORDER.flatMap(t => Array.isArray(tiers[t]) ? tiers[t] : []);
    _maxVol24h = allMarkets.reduce((mx, m) => Math.max(mx, Number(m.volume_24h) || 0), 1);
    const parts = [];
    for (const tier of TIER_ORDER) {
      const arr = Array.isArray(tiers[tier]) ? tiers[tier] : [];
      for (const m of arr) parts.push(renderTile(m, tier));
    }
    return parts.join('');
  }

  function applyMode(mode) {
    const heatSec = document.getElementById('mention-supply');
    const grid    = document.getElementById('hm-grid');
    const calSec  = document.getElementById('upcoming-events');
    if (!heatSec) return;
    if (mode === 'calendar') {
      if (grid) grid.style.display = 'none';
      if (calSec) calSec.dataset.hmToggled = '1';  // mark forced-visible
      if (calSec) calSec.style.display = 'block';
    } else {
      if (grid) grid.style.display = '';
      if (calSec && calSec.dataset.hmToggled === '1') {
        calSec.style.display = 'none';
        delete calSec.dataset.hmToggled;
      }
      // When mode==heatmap, the upcoming-events section follows its own
      // auto-show logic from the prior IIFE (only shown when supply exists).
    }
    const toggle = document.getElementById('hm-toggle');
    if (toggle) {
      toggle.querySelectorAll('.hm-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
    }
  }

  function wireToggle() {
    const toggle = document.getElementById('hm-toggle');
    if (!toggle) return;
    toggle.addEventListener('click', function (e) {
      const btn = e.target.closest('.hm-tab');
      if (!btn) return;
      const mode = btn.dataset.mode;
      if (mode !== 'heatmap' && mode !== 'calendar') return;
      try { localStorage.setItem(LS_KEY, mode); } catch (_) {}
      applyMode(mode);
    });
  }

  function readMode() {
    try {
      const v = localStorage.getItem(LS_KEY);
      return (v === 'calendar') ? 'calendar' : 'heatmap';
    } catch (_) { return 'heatmap'; }
  }

  function init() {
    const sec = document.getElementById('mention-supply');
    const grid = document.getElementById('hm-grid');
    const sub = document.getElementById('hm-sub');
    if (!sec || !grid) return;

    fetch('/api/mentions-heatmap', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d) return;
        const total    = Number(d.total_markets) || 0;
        const volTotal = Number(d.total_volume) || 0;
        const vol24h   = Number(d.total_volume_24h) || 0;
        if (!total) {
          // Empty heat-map -> auto-flip to calendar so the user lands on
          // a populated surface; no skeleton, no empty grid.
          if (sub) sub.textContent = 'No live markets right now · showing event calendar';
          sec.style.display = 'block';
          applyMode('calendar');
          wireToggle();
          return;
        }
        grid.innerHTML = renderGrid(d);
        applyTileImages(grid);
        if (sub) {
          // "$ in play" framing -- lifetime volume primary, 24h secondary
          // chip only when meaningful (>= $1k) so the header doesn't lead
          // with a stale "$3K 24h" when most supply is closed-but-historic.
          const totalChip = volTotal > 0 ? fmtVolume(volTotal) + ' in play' : '';
          const day24Chip = vol24h >= 1000 ? ' · ' + fmtVolume(vol24h) + ' 24h' : '';
          sub.textContent = total + ' market' + (total === 1 ? '' : 's') +
            (totalChip ? ' · ' + totalChip : '') +
            day24Chip +
            ' · ranked by volume';
        }
        sec.style.display = 'block';
        wireToggle();
        applyMode(readMode());
      })
      .catch(() => {
        // Fetch failed -> keep section hidden; calendar IIFE handles
        // its own visibility from its own fetch.
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();

const STATE = { events: [], typeFilter: 'all', speakerFilter: 'all', domainFilter: 'all', subjectFilter: 'all' };

// Friendly labels for the Domain filter chips. Falls through to the
// raw value (formatted) when an unknown domain shows up — gives the
// page graceful behavior the moment a new domain row lands.
const DOMAIN_LABELS = {
  fed_monetary_policy: 'Federal Reserve',
  us_politics:         'US Politics',
  geopolitics:         'Geopolitics',
  corporate_earnings:  'Corporate',
  tech_executives:     'Tech',
  central_banks_intl:  'Intl Banks',
};
function fmtDomain(d) {
  if (!d) return 'Unknown';
  if (DOMAIN_LABELS[d]) return DOMAIN_LABELS[d];
  // Snake_case → Title Case for unknown values
  return d.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', timeZone: 'UTC' });
}

function fmtEventType(t) {
  if (!t) return '';
  if (t === 'fomc_presser') return 'FOMC presser';
  if (t === 'speech') return 'Speech';
  if (t === 'testimony') return 'Testimony';
  if (t === 'op_ed') return 'Op-Ed';
  return t.replace(/_/g, ' ');
}

function pill(stance, confidence) {
  const s = (stance || 'neutral').toLowerCase();
  const c = (confidence || 'medium').toLowerCase();
  return `<span class="pill s-${esc(s)} c-${esc(c)}">${esc(s)}</span>`;
}

function truncate(s, n) {
  if (!s) return '';
  if (s.length <= n) return s;
  // Cut on a sentence boundary if one is near the cap, else hard truncate.
  const sentenceEnd = s.slice(0, n).lastIndexOf('. ');
  if (sentenceEnd > n * 0.6) return s.slice(0, sentenceEnd + 1);
  // Otherwise cut on word boundary
  const wordEnd = s.slice(0, n).lastIndexOf(' ');
  return s.slice(0, wordEnd > 0 ? wordEnd : n).trim() + '…';
}

// Phase 4 close: cards lead with the live market hook (when one
// exists) and demote the stance pill to a bottom-left accent.
// composed_only events keep the posture-as-headline behavior because
// the pill IS the headline for them.
//
//   card_type='language'  → headline = market question, line 2 = top
//                            candidate "X leads at Y%" (cyan), line 3 =
//                            volume traded, foot = stance pill + TRADE →
//   card_type='outcome'   → headline = market question, line 2 = "Y%
//                            YES" (cyan), line 3 = volume, foot =
//                            stance pill + TRADE →
//   card_type='composed_only' → headline = posture-as-of-date, blurb,
//                            stance pill + RECEIPT →
function renderCard(ev) {
  const dateStr = fmtDate(ev.event_date || ev.event_at);
  const typeLabel = fmtEventType(ev.event_type);
  const compared = ev.compared_to_speaker
    ? `<div class="compared-chip">vs <strong>${esc(ev.compared_to_speaker)}</strong></div>`
    : '<div class="compared-chip" style="visibility:hidden">·</div>';

  const cardType = ev.card_type || 'composed_only';
  const tm = ev.top_market || null;
  const ctaLabel = (cardType === 'language' || cardType === 'outcome') ? 'Trade →' : 'Receipt →';

  // Live dot fires only on language cards (the marquee shape). Outcome
  // cards still get the cyan TRADE CTA but no live-dot pulse.
  const liveDot = cardType === 'language'
    ? '<span class="live-dot" aria-hidden="true"></span><span class="live-label">Live</span><span class="sep">·</span>'
    : '';

  let body;
  // Prefer pct_display (formatted "X%" or "X¢" string from the server)
  // and fall back to the legacy integer-pct field for any cached response
  // shipped pre-cents-formatter.
  const pctDisplay = tm && tm.leading_outcome_pct_display != null
    ? tm.leading_outcome_pct_display
    : (tm && tm.leading_outcome_pct != null ? tm.leading_outcome_pct + '%' : null);
  if (cardType === 'language' && tm) {
    const leaderLine = (tm.leading_outcome_label && pctDisplay != null)
      ? `<div class="card-leading">${esc(tm.leading_outcome_label)} leads at <span class="card-leading-pct">${esc(pctDisplay)}</span></div>`
      : '';
    const volLine = tm.volume_display
      ? `<div class="card-volume">${esc(tm.volume_display)} traded · ${tm.candidate_count} candidates</div>`
      : '';
    body = `
      <div class="card-headline">${esc(tm.question || ev.speaker + "'s posture")}</div>
      ${leaderLine}
      ${volLine}
    `;
  } else if (cardType === 'outcome' && tm) {
    const pctLine = (pctDisplay != null)
      ? `<div class="card-leading"><span class="card-leading-pct">${esc(pctDisplay)}</span> YES</div>`
      : '';
    const volLine = tm.volume_display
      ? `<div class="card-volume">${esc(tm.volume_display)} traded</div>`
      : '';
    body = `
      <div class="card-headline">${esc(tm.question || ev.speaker + "'s posture")}</div>
      ${pctLine}
      ${volLine}
    `;
  } else {
    // composed_only — posture-as-headline, with the existing blurb
    // truncated short. Stance pill stays prominent in the foot since
    // the pill IS the headline for these events.
    const blurbShort = truncate(ev.blurb || '', 140);
    body = `
      <div class="card-headline">${esc(ev.speaker)}'s posture as of ${esc(dateStr)}</div>
      <div class="card-blurb">${esc(blurbShort)}</div>
    `;
  }

  return `
    <a class="card t-${esc(cardType.replace('composed_only', 'composed'))}" href="/event/${esc(ev.slug)}">
      <div class="card-eyebrow">
        ${liveDot}
        <span class="speaker">${esc(ev.speaker)}</span>
        <span class="sep">·</span>
        <span>${esc(dateStr)}</span>
        <span class="card-type">${esc(typeLabel)}</span>
      </div>
      ${body}
      <div class="card-foot">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          ${pill(ev.dominant_stance, ev.dominant_confidence)}
          ${compared}
        </div>
        <span class="card-arrow">${esc(ctaLabel)}</span>
      </div>
    </a>
  `;
}

// Powell-collapse — when a speaker has > THRESHOLD published events,
// show first INLINE inline + an expander that reveals the rest. Per-
// speaker state lives in STATE.expandedSpeakers (Set of speaker names).
const COLLAPSE_THRESHOLD = 5;
const COLLAPSE_INLINE = 3;
STATE.expandedSpeakers = new Set();

function applyCollapse(events) {
  // Group by speaker, collapsing only when filter doesn't already pin
  // a single speaker (no point hiding within a single-speaker view).
  if (STATE.speakerFilter !== 'all') return { rendered: events, collapsed: [] };
  const counts = new Map();
  for (const ev of events) counts.set(ev.speaker, (counts.get(ev.speaker) || 0) + 1);
  const seen = new Map();
  const rendered = [];
  const expanders = [];
  for (const ev of events) {
    const total = counts.get(ev.speaker) || 0;
    const so_far = seen.get(ev.speaker) || 0;
    if (total > COLLAPSE_THRESHOLD && so_far >= COLLAPSE_INLINE && !STATE.expandedSpeakers.has(ev.speaker)) {
      // Skip rendering this row, but make sure exactly one expander
      // exists per collapsed speaker.
      if (!expanders.find(e => e.speaker === ev.speaker)) {
        expanders.push({ speaker: ev.speaker, hidden: total - COLLAPSE_INLINE });
      }
      seen.set(ev.speaker, so_far + 1);
      continue;
    }
    rendered.push(ev);
    seen.set(ev.speaker, so_far + 1);
  }
  return { rendered, expanders };
}

function applyFilters() {
  const events = STATE.events.filter(ev => {
    if (STATE.domainFilter !== 'all' && (ev.domain || 'fed_monetary_policy') !== STATE.domainFilter) return false;
    if (STATE.subjectFilter !== 'all' && (ev.subject || '') !== STATE.subjectFilter) return false;
    if (STATE.typeFilter !== 'all' && ev.event_type !== STATE.typeFilter) return false;
    if (STATE.speakerFilter !== 'all' && ev.speaker !== STATE.speakerFilter) return false;
    return true;
  });
  const host = document.getElementById('grid-host');
  if (!events.length) {
    host.innerHTML = '<div id="empty"><div>No matches</div><div id="empty-msg">Try a different filter combination.</div></div>';
  } else {
    const { rendered, expanders } = applyCollapse(events);
    // Render cards in original event_date order, but interleave the
    // expander chip after a speaker's last visible card. Simpler:
    // render all visible cards first, then a row of expanders below.
    const cards = rendered.map(renderCard).join('');
    const expanderHtml = (expanders || []).map(e =>
      `<div class="speaker-expand" data-speaker="${esc(e.speaker)}">View all <strong>${e.hidden + COLLAPSE_INLINE}</strong> ${esc(e.speaker)} events →</div>`
    ).join('');
    host.innerHTML = '<div class="grid">' + cards + expanderHtml + '</div>';
    // Wire expander clicks
    host.querySelectorAll('.speaker-expand').forEach(el => {
      el.onclick = () => {
        STATE.expandedSpeakers.add(el.dataset.speaker);
        applyFilters();
      };
    });
  }
  const count = document.getElementById('count-line');
  count.innerHTML = `<strong>${events.length}</strong> ${events.length === 1 ? 'event' : 'events'}` +
    (events.length !== STATE.events.length ? ` <span style="color:var(--muted)">of ${STATE.events.length}</span>` : '');
}

// Filter chips reshape per-domain: when the user picks a domain, the
// subject + speaker rows rebuild to show only values present in that
// domain. Subject row stays hidden when the active domain has no
// non-null subjects (Fed events don't carry meaningful subjects).
function _eventsInDomain() {
  if (STATE.domainFilter === 'all') return STATE.events;
  return STATE.events.filter(e => (e.domain || 'fed_monetary_policy') === STATE.domainFilter);
}

function _renderChipRow(rowEl, values, currentValue, onChoose, formatter, allLabel) {
  rowEl.querySelectorAll('.fchip').forEach(c => c.remove());
  const allValues = ['all'].concat(values);
  for (const v of allValues) {
    const btn = document.createElement('button');
    btn.className = 'fchip' + (v === currentValue ? ' active' : '');
    btn.textContent = v === 'all' ? allLabel : formatter(v);
    btn.dataset.value = v;
    btn.onclick = () => onChoose(v);
    rowEl.appendChild(btn);
  }
}

function rebuildSubjectAndSpeakerRows() {
  const subjectRow = document.getElementById('subject-row');
  const speakerRow = document.getElementById('speaker-row');
  const inDomain = _eventsInDomain();
  const subjects = Array.from(new Set(inDomain.map(e => e.subject).filter(Boolean))).sort();
  const speakers = Array.from(new Set(inDomain.map(e => e.speaker).filter(Boolean))).sort();

  // If the current subject filter no longer applies in the new domain,
  // reset to 'all' so the user isn't filtered down to zero rows.
  if (STATE.subjectFilter !== 'all' && !subjects.includes(STATE.subjectFilter)) {
    STATE.subjectFilter = 'all';
  }
  if (STATE.speakerFilter !== 'all' && !speakers.includes(STATE.speakerFilter)) {
    STATE.speakerFilter = 'all';
  }

  if (subjects.length >= 1) {
    _renderChipRow(subjectRow, subjects, STATE.subjectFilter, v => {
      STATE.subjectFilter = v;
      rebuildSubjectAndSpeakerRows();
      applyFilters();
    }, s => s, 'All subjects');
    subjectRow.style.display = 'flex';
  } else {
    subjectRow.style.display = 'none';
  }

  _renderChipRow(speakerRow, speakers, STATE.speakerFilter, v => {
    STATE.speakerFilter = v;
    rebuildSubjectAndSpeakerRows();
    applyFilters();
  }, sp => sp, 'All speakers');
}

function buildFilters() {
  const domainRow = document.getElementById('domain-row');
  const typeRow = document.getElementById('type-row');

  const distinctDomains = Array.from(new Set(STATE.events.map(e => e.domain || 'fed_monetary_policy'))).sort();
  const types = Array.from(new Set(STATE.events.map(e => e.event_type).filter(Boolean))).sort();

  // Domain row only renders when 2+ distinct domains exist. Phase 4
  // foundation: with one domain (Fed), the row stays hidden so the UI
  // doesn't surface a meaningless single-option filter.
  if (distinctDomains.length >= 2) {
    _renderChipRow(domainRow, distinctDomains, STATE.domainFilter, v => {
      STATE.domainFilter = v;
      rebuildSubjectAndSpeakerRows();
      applyFilters();
    }, fmtDomain, 'All domains');
    domainRow.style.display = 'flex';
  }

  _renderChipRow(typeRow, types, STATE.typeFilter, v => {
    STATE.typeFilter = v;
    applyFilters();
  }, fmtEventType, 'All');

  rebuildSubjectAndSpeakerRows();

  document.getElementById('filters').style.display = 'flex';
  document.getElementById('count-line').style.display = 'block';
}

// Live countdown ticker — reads the SSR'd target ISO from the hero
// data attribute. Server already rendered a static value; this just
// ticks it forward every minute. Skips silently if the hero is in
// 'live' mode (no countdown digits) or absent.
function startCountdownTicker() {
  const el = document.getElementById('hero-cd-digits');
  if (!el || !el.dataset.target) return;
  const target = new Date(el.dataset.target).getTime();
  if (!isFinite(target)) return;
  function tick() {
    const diff = target - Date.now();
    if (diff <= 0) {
      el.textContent = 'live';
      return;
    }
    const dayMs = 24 * 60 * 60 * 1000;
    const days = Math.floor(diff / dayMs);
    const hours = Math.floor((diff % dayMs) / (60 * 60 * 1000));
    const minutes = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
    el.textContent = `${days}d ${hours}h ${minutes}m`;
  }
  tick();
  setInterval(tick, 60 * 1000);
}
startCountdownTicker();

async function load() {
  try {
    const res = await fetch('/api/mentions');
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    STATE.events = Array.isArray(data.events) ? data.events : [];
    if (!STATE.events.length) {
      document.getElementById('grid-host').innerHTML =
        '<div id="empty"><div>No events</div><div id="empty-msg">No events published yet.</div></div>';
      return;
    }
    buildFilters();
    applyFilters();
  } catch (e) {
    console.error('[mentions]', e);
    document.getElementById('grid-host').innerHTML =
      '<div id="empty"><div>Could not load mentions</div><div id="empty-msg">Try refreshing in a moment.</div></div>';
  }
}

load();

// ── TRENDING BAR — entity pills that filter the heatmap grid ──────────────
(function() {
  var _activeEntity = null;

  function fmtPillVol(v) {
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return '$' + Math.round(v / 1e3) + 'K';
    return '$' + Math.round(v);
  }

  function filterGrid(pattern) {
    var grid = document.getElementById('hm-grid');
    if (!grid) return;
    var tiles = grid.querySelectorAll('.hm-tile');
    tiles.forEach(function(tile) {
      var q = (tile.querySelector('.hm-q') || {}).textContent || '';
      var speaker = (tile.querySelector('.hm-speaker') || {}).textContent || '';
      var text = q + ' ' + speaker;
      tile.style.display = (!pattern || pattern.test(text)) ? '' : 'none';
    });
  }

  function renderPill(topic) {
    var btn = document.createElement('button');
    btn.className = 'trend-pill' + (topic.hot ? ' hot-topic' : '');
    btn.setAttribute('data-label', topic.label);
    btn.setAttribute('data-pattern', topic.pattern_str || topic.label);
    btn.innerHTML = topic.label + ' <span class="trend-vol">' + fmtPillVol(topic.volume_24h) + '</span>';
    return btn;
  }

  function init() {
    fetch('/api/trending-topics', { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) {
