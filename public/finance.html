<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Intelligence — HYPERFLEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0e0e15;
  --paper-2:#16161f;
  --paper-3:#1e1e2a;
  --ink:#f0f0f5;
  --dim:#8888a0;
  --soft:#aaaabe;
  --border:#1e1e2a;
  --green:#00e68a;
  --red:#ff4d6a;
  --blue:#4d9fff;
  --purple:#a855f7;
  --amber:#f59e0b;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
#nav-root{position:relative;z-index:200}
.container{width:100%;max-width:none;margin:0;padding:0 24px}

/* HEADER */
.hero{padding:36px 0 24px;border-bottom:1px solid var(--border)}
.hero-eyebrow{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:10px}
.hero h1{font-weight:800;font-size:36px;line-height:1.1;letter-spacing:-0.02em;margin-bottom:8px}
.hero-sub{font-size:13px;color:var(--dim);max-width:600px;line-height:1.6}
@media(max-width:768px){.hero h1{font-size:26px}}

/* EDGE BANNER */
.edge-banner{background:rgba(245,158,11,0.06);border-bottom:1px solid rgba(245,158,11,0.18);padding:10px 0}
.edge-banner-inner{font-size:12px;color:var(--soft);line-height:1.6}
.edge-banner-inner span{color:var(--amber);font-weight:600}

/* SECTION HEADER */
.fn-section-header{display:flex;align-items:center;gap:10px;padding:28px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.fn-section-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.fn-bar-fed_rates{background:#6688ff}
.fn-bar-crypto{background:var(--amber)}
.fn-bar-macro{background:var(--green)}
.fn-bar-politics{background:var(--red)}
.fn-section-icon{font-size:15px}
.fn-section-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:1px}
.fn-section-count{font-size:11px;color:var(--dim);margin-left:auto;font-family:var(--mono)}

/* GRID */
.edge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-bottom:8px}
@media(max-width:680px){.edge-grid{grid-template-columns:1fr}}

/* CARD — exact alpha classes */
.edge-card{
  background:rgba(22,22,31,0.8);
  border:1px solid var(--border);border-radius:14px;
  position:relative;cursor:pointer;
  transition:border-color .15s,box-shadow .15s;color:inherit;display:block;
  animation:fadeUp 0.4s ease both;
}
.edge-card:hover{border-color:rgba(77,159,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.edge-card-inner{overflow:hidden;border-radius:14px}
.edge-card-body{padding:20px}

/* Card image */
.fi-img-wrap{position:relative;height:160px;overflow:hidden;background:var(--paper-2)}
.fi-img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block;filter:brightness(0.4)}
.fi-img-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(22,22,31,0.9) 100%)}

/* Card top */
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.yes-price-wrap{display:flex;flex-direction:column;align-items:center;min-width:60px}
.yes-price-l{font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:2px}
.yes-price-n{font-family:var(--mono);font-weight:800;font-size:32px;line-height:1;letter-spacing:-0.5px}
.yes-price-n.high{color:var(--green)}
.yes-price-n.low{color:var(--red)}
.yes-price-n.mid{color:var(--amber)}
.no-price-sec{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:3px}

.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:0.02em}
.badge-vol{background:rgba(77,159,255,0.1);color:var(--blue);border:1px solid rgba(77,159,255,0.25)}
.badge-whale{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}

/* Question */
.card-q{font-size:15px;font-weight:500;color:#e0e0e8;line-height:1.55;margin-bottom:12px;min-height:40px}

/* Signal strip — the edge reason, visible on every card */
.signal-strip{font-size:13px;color:#8890c0;line-height:1.6;padding:9px 12px;background:var(--paper);border-radius:8px;border:1px solid rgba(245,158,11,0.18);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ss-edge{font-size:9px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:2px;margin-right:8px}

/* Trade CTA — edge side + payout, one click to the market */
.card-cta{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px;font-weight:700;padding:9px 12px;border-radius:8px;transition:background .15s}
.card-cta .arrow{font-weight:400;opacity:.6}
.cta-yes{background:rgba(0,230,138,0.10);color:var(--green);border:1px solid rgba(0,230,138,0.25)}
.cta-no{background:rgba(255,77,106,0.08);color:var(--red);border:1px solid rgba(255,77,106,0.22)}
.edge-card:hover .cta-yes{background:rgba(0,230,138,0.18)}
.edge-card:hover .cta-no{background:rgba(255,77,106,0.16)}

/* States */
.loading{color:var(--dim);text-align:center;padding:80px 20px;font-size:13px;letter-spacing:0.1em;text-transform:uppercase}
.err{color:var(--red);text-align:center;padding:40px 20px;font-size:12px}

.content-wrap{padding:0 0 80px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Wide screens: 4-column grid */
@media (min-width: 1440px) {
  .container, .content-wrap {
    padding-left: 56px;
    padding-right: 56px;
  }
  .edge-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
  }
}
</style>
</head>
<body>
<div id="nav-root"></div>

<div class="hero">
  <div class="container">
    <div class="hero-eyebrow">Finance Intelligence</div>
    <h1>Where's the edge?</h1>
    <p class="hero-sub">Highest volume markets ranked by structural edge and whale positioning.</p>
  </div>
</div>

<div class="edge-banner">
  <div class="container">
    <div class="edge-banner-inner">
      Polymarket markets resolve NO at <span>4×</span> the rate of YES. Markets priced under <span>10¢</span> YES resolve YES only <span>1.1%</span> of the time. Sharp money exploits this bias.
    </div>
  </div>
</div>

<div class="container content-wrap">
  <div id="sections"><div class="loading">Loading markets…</div></div>
</div>

<script src="/nav.js"></script>
<script>
(function() {
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtVol(v) {
    if (!v || v < 1) return null;
    if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
    if (v >= 1e3) return '$' + Math.round(v/1e3) + 'k';
    return '$' + Math.round(v);
  }
  function yesClass(yp) {
    const pct = Math.round(yp * 100);
    if (pct < 35) return 'low';
    if (pct > 65) return 'high';
    return 'mid';
  }

  var SECTIONS = [
    { key: 'fed_rates', icon: '🏦', title: 'FED & RATES' },
    { key: 'crypto',    icon: '₿',  title: 'CRYPTO' },
    { key: 'macro',     icon: '📈', title: 'MACRO' },
    { key: 'politics',  icon: '🏛️', title: 'POLITICS' },
  ];

  function renderCard(m, idx) {
    var yp = m.yes_price != null ? m.yes_price : 0.5;
    var pct = Math.round(yp * 100);
    var delay = Math.min(idx * 0.06, 0.36);

    var vol = fmtVol(m.volume);
    var badges = '';
    if (vol) badges += '<span class="badge badge-vol">' + esc(vol) + '</span>';
    if (m.whale_count > 0) badges += '<span class="badge badge-whale">&#x1F40B; ' + m.whale_count + '</span>';

    var imgHtml = '';
    if (m.image) {
      var proxied = '/api/img-proxy?url=' + encodeURIComponent(m.image);
      imgHtml = '<div class="fi-img-wrap">' +
        '<img class="fi-img" src="' + esc(proxied) + '" loading="lazy" alt="" ' +
        'onerror="this.onerror=null;this.style.display=\'none\';this.parentElement.style.background=\'linear-gradient(135deg,#16161f,#0e0e15)\';">' +
        '<div class="fi-img-grad"></div>' +
      '</div>';
    }

    // Edge side + payout. 40-60% markets are filtered server-side, so every
    // card leans one way: low YES = structural NO edge, high YES = consensus.
    var edgeNo = pct < 50;
    var side = edgeNo ? 'NO' : 'YES';
    var sidePrice = edgeNo ? (100 - pct) : pct;
    var mult = sidePrice > 0 ? (100 / sidePrice) : 0;
    var ctaCls = edgeNo ? 'cta-no' : 'cta-yes';
    var ctaText = 'Trade ' + side + ' @ ' + sidePrice + '¢ — pays ' + mult.toFixed(2) + '×';

    return '<a class="edge-card fn-market-card" href="/market/' + esc(m.slug) + '" style="animation-delay:' + delay + 's">' +
      '<div class="edge-card-inner">' +
        imgHtml +
        '<div class="edge-card-body">' +
          '<div class="card-top">' +
            '<div class="yes-price-wrap">' +
              '<div class="yes-price-l">YES</div>' +
              '<div class="yes-price-n ' + yesClass(yp) + '">' + pct + '%</div>' +
              '<div class="no-price-sec">NO ' + (100 - pct) + '%</div>' +
            '</div>' +
            '<div class="badges">' + badges + '</div>' +
          '</div>' +
          '<div class="card-q">' + esc(m.question) + '</div>' +
          '<div class="signal-strip"><span class="ss-edge">Edge</span>' + esc(m.edge_signal || '') + '</div>' +
          '<div class="card-cta ' + ctaCls + '"><span>' + ctaText + '</span><span class="arrow">→</span></div>' +
        '</div>' +
      '</div>' +
    '</a>';
  }

  function renderSection(def, markets) {
    if (!markets.length) return '';
    var header = '<div class="fn-section-header">' +
      '<div class="fn-section-bar fn-bar-' + def.key + '"></div>' +
      '<span class="fn-section-icon">' + def.icon + '</span>' +
      '<span class="fn-section-title">' + def.title + '</span>' +
      '<span class="fn-section-count">' + markets.length + ' market' + (markets.length !== 1 ? 's' : '') + '</span>' +
    '</div>';
    return header + '<div class="edge-grid">' + markets.map(renderCard).join('') + '</div>';
  }

  fetch('/api/finance/markets?_v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var sections = (data && data.sections) ? data.sections : {};
      var el = document.getElementById('sections');
      var html = SECTIONS.map(function(def) {
        return renderSection(def, sections[def.key] || []);
      }).join('');
      el.innerHTML = html || '<div class="loading">No markets available.</div>';
    })
    .catch(function() {
      document.getElementById('sections').innerHTML = '<div class="err">Could not load markets.</div>';
    });
})();
</script>
</body>
</html>
