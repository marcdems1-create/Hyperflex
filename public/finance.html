<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Intelligence — HYPERFLEX</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #08080f; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; color: #e8e8f0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.topbar { height: 44px; background: #0d0d16; border-bottom: 1px solid #1a1a28; display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
.logo { font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.logo span { color: #6366f1; }
.nav-tabs { display: flex; gap: 2px; margin-left: 8px; }
.nav-tab { font-size: 12px; padding: 4px 10px; border-radius: 6px; color: #555; cursor: pointer; text-decoration: none; }
.nav-tab.active { background: #1a1a28; color: #fff; }
.live-pill { margin-left: auto; font-size: 11px; color: #22c55e; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); border-radius: 20px; padding: 3px 10px; }

.edge-banner { background: #0d0d16; border-bottom: 1px solid #1a1a28; padding: 6px 20px; font-size: 11px; color: #555; flex-shrink: 0; }
.edge-banner b { color: #f59e0b; font-weight: 600; }

.app-body { display: flex; flex: 1; overflow: hidden; }

.sidebar { width: 180px; background: #0a0a12; border-right: 1px solid #141420; padding: 12px 0; overflow-y: auto; flex-shrink: 0; }
.sg { margin-bottom: 16px; }
.sg-label { font-size: 10px; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 2px; padding: 0 12px; margin-bottom: 6px; }
.si { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; cursor: pointer; border-radius: 6px; margin: 0 4px; transition: background 0.15s; }
.si:hover { background: #111120; }
.si.active { background: #13132a; border-left: 2px solid #6366f1; padding-left: 10px; }
.si-left { display: flex; align-items: center; gap: 8px; }
.si-dot { width: 7px; height: 7px; border-radius: 50%; }
.si-name { font-size: 12px; color: #666; }
.si.active .si-name { color: #fff; font-weight: 500; }
.si-count { font-size: 10px; color: #333; background: #111118; border-radius: 4px; padding: 1px 5px; }

.main-feed { flex: 1; overflow-y: auto; padding: 16px; }
.feed-header { margin-bottom: 12px; }
.feed-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.feed-sub { font-size: 11px; color: #444; margin-top: 2px; }

.mrow { display: flex; align-items: center; background: #0d0d18; border: 1px solid #141420; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; gap: 12px; transition: all 0.15s; }
.mrow:hover, .mrow.active { border-color: #252535; background: #111120; }
.mrow.active { border-color: #6366f1; }
.mimg { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #1a1a28; }
.mbody { flex: 1; min-width: 0; }
.mcat { font-size: 10px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.mq { font-size: 13px; font-weight: 500; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.medge { font-size: 11px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mright { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.mprice { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.mprice.yes { color: #22c55e; }
.mprice.no { color: #ef4444; }
.mprice.mid { color: #f59e0b; }
.mlabel { font-size: 10px; color: #444; }
.mvol { font-size: 10px; color: #333; }

.detail-panel { width: 280px; background: #0a0a12; border-left: 1px solid #141420; overflow-y: auto; flex-shrink: 0; }
.dp-img { width: 100%; height: 150px; object-fit: cover; object-position: center center; filter: brightness(0.5); display: block; background: #1a1a28; }
.dp-body { padding: 14px; }
.dp-cat { font-size: 10px; font-weight: 700; color: #6366f1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.dp-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.45; margin-bottom: 12px; }
.dp-price-row { display: flex; align-items: baseline; gap: 12px; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #141420; }
.dp-yes { font-size: 36px; font-weight: 800; color: #22c55e; letter-spacing: -1px; }
.dp-no { font-size: 14px; font-weight: 600; color: #ef4444; }
.dp-vol { font-size: 11px; color: #333; margin-top: 2px; }
.dp-edge-box { background: #0d0d1a; border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.dp-edge-label { font-size: 9px; font-weight: 700; color: #f59e0b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
.dp-edge-text { font-size: 12px; color: #8890c0; line-height: 1.6; }
.dp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.dp-stat { background: #0d0d1a; border-radius: 6px; padding: 8px; }
.dp-stat-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.dp-stat-val { font-size: 14px; font-weight: 700; color: #ddd; }
.dp-cta { display: block; width: 100%; background: #6366f1; color: #fff; font-size: 13px; font-weight: 600; text-align: center; padding: 11px; border-radius: 8px; text-decoration: none; transition: background 0.15s; }
.dp-cta:hover { background: #7577f5; }

.empty-state { text-align: center; padding: 40px 16px; color: #333; font-size: 13px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">HYPER<span>FLEX</span></div>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Feed</a>
    <a href="/alpha" class="nav-tab">Alpha</a>
    <a href="/finance" class="nav-tab active">Finance</a>
    <a href="/signals" class="nav-tab">Signals</a>
    <a href="/predictors" class="nav-tab">Predictors</a>
  </nav>
  <div class="live-pill" id="live-count">● 0 live</div>
</div>

<div class="edge-banner">
  Polymarket markets resolve NO at <b>4×</b> the rate of YES. Markets priced under <b>10¢</b> resolve YES only <b>1.1%</b> of the time. Sharp money exploits this bias.
</div>

<div class="app-body">
  <div class="sidebar" id="sidebar"><!-- rendered by JS --></div>
  <div class="main-feed" id="main-feed">
    <div class="feed-header">
      <div class="feed-title">Where's the edge?</div>
      <div class="feed-sub" id="feed-sub">Loading markets...</div>
    </div>
    <div id="market-list"></div>
  </div>
  <div class="detail-panel" id="detail-panel">
    <div class="empty-state">Select a market to see the edge breakdown.</div>
  </div>
</div>

<script>
// State
let allMarkets = [];
let activeCategory = 'all';
let activeMarketSlug = null;

// Fetch markets
async function loadMarkets() {
  try {
    const res = await fetch('/api/finance/markets?_v=' + Date.now());
    const data = await res.json();
    const sections = data.sections || {};

    // Flatten all markets with category
    allMarkets = [];
    const catOrder = ['fed_rates', 'crypto', 'macro', 'politics'];
    for (const cat of catOrder) {
      const markets = sections[cat] || [];
      markets.forEach(m => { m._cat = cat; allMarkets.push(m); });
    }

    // Update live count
    const liveCount = allMarkets.filter(m => m.yes_price > 0).length;
    document.getElementById('live-count').textContent = '● ' + liveCount + ' live';
    document.getElementById('feed-sub').textContent = liveCount + ' directional markets · Updated just now';

    renderSidebar(sections);
    renderMarkets(allMarkets);

    // Auto-select first market
    if (allMarkets.length > 0) selectMarket(allMarkets[0]);

  } catch(e) {
    document.getElementById('feed-sub').textContent = 'Failed to load markets';
  }
}

// Sidebar
const CAT_LABELS = { all: 'All', fed_rates: 'Fed & rates', crypto: 'Crypto', macro: 'Macro', politics: 'Politics' };
const CAT_COLORS = { all: '#6366f1', fed_rates: '#60a5fa', crypto: '#f59e0b', macro: '#22c55e', politics: '#ef4444' };

function renderSidebar(sections) {
  const counts = { all: allMarkets.length };
  for (const [cat, markets] of Object.entries(sections)) counts[cat] = markets.length;

  const cats = ['all', 'fed_rates', 'crypto', 'macro', 'politics'];
  let html = '<div class="sg"><div class="sg-label">Categories</div>';
  for (const cat of cats) {
    if (cat !== 'all' && !counts[cat]) continue;
    html += `<div class="si ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">
      <div class="si-left"><div class="si-dot" style="background:${CAT_COLORS[cat]}"></div><div class="si-name">${CAT_LABELS[cat]}</div></div>
      <div class="si-count">${counts[cat] || 0}</div>
    </div>`;
  }
  html += '</div>';

  document.getElementById('sidebar').innerHTML = html;
  document.querySelectorAll('.si[data-cat]').forEach(el => {
    el.addEventListener('click', () => {
      activeCategory = el.dataset.cat;
      document.querySelectorAll('.si[data-cat]').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      const filtered = activeCategory === 'all' ? allMarkets : allMarkets.filter(m => m._cat === activeCategory);
      renderMarkets(filtered);
      if (filtered.length > 0) selectMarket(filtered[0]);
    });
  });
}

// Market list
function edgeStars(yes_price) {
  const pct = Math.round(yes_price * 100);
  if (pct <= 5 || pct >= 95) return { stars: 5, label: 'Max edge', color: '#22c55e' };
  if (pct <= 10 || pct >= 90) return { stars: 4, label: 'Strong edge', color: '#22c55e' };
  if (pct <= 20 || pct >= 80) return { stars: 3, label: 'Moderate edge', color: '#f59e0b' };
  if (pct <= 30 || pct >= 70) return { stars: 2, label: 'Lean edge', color: '#f59e0b' };
  return { stars: 1, label: 'Weak edge', color: '#555' };
}

function renderStars(yes_price) {
  const { stars, color } = edgeStars(yes_price);
  const filled = '★'.repeat(stars);
  const empty = '☆'.repeat(5 - stars);
  return `<span style="color:${color};font-size:12px;letter-spacing:1px">${filled}<span style="color:#252535">${empty}</span></span>`;
}

function shortEdge(m) {
  const pct = Math.round((m.yes_price || 0) * 100);
  if (pct <= 5) return 'Structural NO — <1% resolve YES at this price';
  if (pct <= 10) return 'Strong NO bias — 1.1% resolve YES historically';
  if (pct <= 20) return 'Lean NO — ~5% resolve YES. Sharp money fades.';
  if (pct >= 90) return 'Near-certain YES — consensus pricing';
  if (pct >= 80) return 'High conviction YES — sharp money loaded';
  if (pct >= 70) return 'Moderate YES — watch whale confirmation';
  return 'No clear edge — check /signals for positioning';
}

function priceClass(pct) {
  if (pct >= 70) return 'yes';
  if (pct <= 30) return 'no';
  return 'mid';
}

function fmtVol(v) {
  if (!v) return '';
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + Math.round(v/1000) + 'K';
  return '$' + Math.round(v);
}

function renderMarkets(markets) {
  const list = document.getElementById('market-list');
  if (!markets.length) { list.innerHTML = '<div class="empty-state">No markets found in this category.</div>'; return; }

  list.innerHTML = markets.map((m, i) => {
    const pct = Math.round((m.yes_price || 0) * 100);
    const img = m.image ? `/api/img-proxy?url=${encodeURIComponent(m.image)}` : '';
    return `<div class="mrow ${m.slug === activeMarketSlug ? 'active' : ''}" data-idx="${allMarkets.indexOf(m)}">
      ${img ? `<img class="mimg" src="${img}" onerror="this.style.display='none'" alt="">` : '<div class="mimg"></div>'}
      <div class="mbody">
        <div class="mcat">${CAT_LABELS[m._cat] || m._cat}</div>
        <div class="mq">${m.question || ''}</div>
        <div class="medge">${renderStars(m.yes_price)} <span style="color:#555;font-size:11px">${edgeStars(m.yes_price).label} — ${shortEdge(m)}</span></div>
      </div>
      <div class="mright">
        <div class="mprice ${priceClass(pct)}">${pct}%</div>
        <div class="mlabel">YES</div>
        <div class="mvol">${fmtVol(m.volume)}</div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.mrow').forEach(row => {
    row.addEventListener('click', () => {
      const m = allMarkets[parseInt(row.dataset.idx)];
      if (m) selectMarket(m);
    });
  });
}

// Detail panel
function selectMarket(m) {
  activeMarketSlug = m.slug;
  document.querySelectorAll('.mrow').forEach(r => r.classList.remove('active'));
  const idx = allMarkets.indexOf(m);
  const rows = document.querySelectorAll('.mrow');
  if (rows[idx]) rows[idx].classList.add('active'); // Note: index may differ if filtered

  const pct = Math.round((m.yes_price || 0) * 100);
  const img = m.image ? `/api/img-proxy?url=${encodeURIComponent(m.image)}` : '';
  const slug = m.slug || m.conditionId || '';
  const edgeColor = pct >= 70 ? '#22c55e' : pct <= 20 ? '#ef4444' : '#f59e0b';
  const { stars, label, color } = edgeStars(m.yes_price);
  const starsHtml = '★'.repeat(stars) + '<span style="color:#252535">☆</span>'.repeat(5 - stars);

  document.getElementById('detail-panel').innerHTML = `
    ${img ? `<img class="dp-img" src="${img}" onerror="this.style.display='none'" alt="">` : ''}
    <div class="dp-body">
      <div class="dp-cat">${CAT_LABELS[m._cat] || m._cat} · ${label}</div>
      <div class="dp-title">${m.question || ''}</div>
      <div class="dp-price-row">
        <div>
          <div class="dp-yes" style="color:${edgeColor}">${pct}%</div>
          <div class="dp-vol">YES · ${fmtVol(m.volume)} volume</div>
        </div>
        <div class="dp-no">NO ${100-pct}%</div>
      </div>
      <div class="dp-edge-box">
        <div class="dp-edge-label">Why this has edge</div>
        <div class="dp-edge-text">${m.edge_signal || shortEdge(m)}</div>
      </div>
      <div class="dp-stats">
        <div class="dp-stat"><div class="dp-stat-label">Volume</div><div class="dp-stat-val">${fmtVol(m.volume)}</div></div>
        <div class="dp-stat"><div class="dp-stat-label">YES price</div><div class="dp-stat-val" style="color:${edgeColor}">${pct}¢</div></div>
        <div class="dp-stat"><div class="dp-stat-label">Edge type</div><div class="dp-stat-val" style="color:${color}">${starsHtml}</div></div>
        <div class="dp-stat"><div class="dp-stat-label">Category</div><div class="dp-stat-val">${CAT_LABELS[m._cat] || m._cat}</div></div>
      </div>
      <a class="dp-cta" href="/market/${slug}">View full analysis →</a>
    </div>
  `;
}

loadMarkets();
</script>

</body>
</html>
