<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Trader Profile | HYPERFLEX</title>
<meta name="description" content="Multi-platform trader profile — Polymarket positions, P&L, and analytics."/>
<link rel="icon" href="/hyperflex-logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#141412;--card:#1a1917;--border:#2a2a25;--gold:#c9920d;--gold-lt:#e0b340;--text:#e8e4d9;--dim:#7a7870;--green:#22c55e;--red:#ef4444;--blue:#0066ff;--purple:#7c3aed;--sans:'Syne',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
a{color:var(--gold);text-decoration:none}

.container{max-width:1000px;margin:0 auto;padding:24px 20px}
.back{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:24px;display:inline-block}
.back:hover{color:var(--text)}

/* Hero */
.hero-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:20px}
.hero-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:18px;font-weight:700;color:#000;flex-shrink:0}
.addr{font-family:var(--mono);font-size:14px;color:var(--text);cursor:pointer;border-bottom:1px dashed rgba(201,146,13,0.3)}
.addr:hover{color:var(--gold)}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.05em}
.badge-poly{background:rgba(0,102,255,0.15);color:var(--blue);border:1px solid rgba(0,102,255,0.3)}
.badge-hfx{background:rgba(201,146,13,0.15);color:var(--gold);border:1px solid rgba(201,146,13,0.3)}
.follow-btn{font-family:var(--mono);font-size:11px;padding:6px 16px;border-radius:6px;border:1px solid var(--gold);color:var(--gold);background:none;cursor:pointer;transition:all .15s;margin-left:auto}
.follow-btn:hover{background:rgba(201,146,13,0.1)}
.follow-btn.active{background:var(--gold);color:#000}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat-pill{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.stat-val{font-family:var(--sans);font-size:22px;font-weight:800}

/* Chart */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.chart-title{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
canvas{width:100%;height:160px;display:block}

/* Sections */
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-title{font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}

/* Tables */
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
td{font-family:var(--mono);font-size:12px;padding:10px;border-bottom:1px solid rgba(42,42,36,0.4)}
tr:last-child td{border-bottom:none}
tr:hover{background:rgba(201,146,13,0.03)}
.side-yes{background:rgba(201,146,13,0.12);color:var(--gold);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.side-no{background:rgba(255,255,255,0.06);color:var(--dim);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.side-long{background:rgba(0,200,100,0.15);color:#00c864;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.side-short{background:rgba(231,76,60,0.15);color:#e74c3c;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.pnl-pos{color:var(--green);font-weight:700}
.pnl-neg{color:var(--red);font-weight:700}
.win-badge{background:rgba(34,197,94,0.15);color:var(--green);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.loss-badge{background:rgba(239,68,68,0.15);color:var(--red);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.mkt-link{color:var(--text);text-decoration:none;border-bottom:1px dashed rgba(201,146,13,0.3)}
.mkt-link:hover{color:var(--gold)}

/* CTA */
.cta-section{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 20px;margin-top:16px}
.cta-section h3{font-size:18px;font-weight:700;margin-bottom:6px}
.cta-section p{font-family:var(--mono);font-size:12px;color:var(--dim);margin-bottom:20px}
.cta-btn{display:inline-block;background:var(--gold);color:#000;font-family:var(--mono);font-weight:700;font-size:13px;padding:14px 28px;border-radius:8px;text-decoration:none;transition:all .15s}
.cta-btn:hover{background:var(--gold-lt);transform:translateY(-1px)}

.loading{text-align:center;padding:80px 20px;font-family:var(--mono);font-size:13px;color:var(--dim)}
.error-state{text-align:center;padding:80px 20px}
.error-state h2{font-size:20px;margin-bottom:8px}
.error-state p{font-family:var(--mono);font-size:12px;color:var(--dim)}
.empty{font-family:var(--mono);font-size:12px;color:var(--dim);padding:20px;text-align:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;font-family:var(--mono);font-size:12px;font-weight:700;padding:10px 20px;border-radius:8px;z-index:999;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

@media(max-width:768px){
  .container{padding:16px}
  .hero-top{gap:10px}
  .avatar{width:40px;height:40px;font-size:14px}
  .stat-val{font-size:18px}
  .follow-btn{margin-left:0}
  td{padding:8px 6px;font-size:11px}
  th{font-size:9px;padding:6px}
}
</style>
</head>
<body>
<div id="nav-root"></div>
<script>if(typeof polyRef==="undefined")window.polyRef=function(u){return u};</script>
<script src="/nav.js?v=6"></script>

<div class="container">
  <a href="/predictors" class="back">&larr; Back to Predictors</a>
  <div id="loadingState" class="loading">Loading trader profile...</div>
  <div id="errorState" class="error-state" style="display:none"></div>
  <div id="content" style="display:none"></div>
</div>
<div id="toast" class="toast"></div>

<script>
function escH(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmt$(n){if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(0)}
function fmtPnl(n){var s=n>=0?'+':'';var c=n>=0?'pnl-pos':'pnl-neg';return'<span class="'+c+'">'+s+fmt$(n)+'</span>'}
function timeAgo(ts){if(!ts)return'';var d=Date.now()-(typeof ts==='number'?ts:new Date(ts).getTime());if(d<60000)return'<1m ago';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago'}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

function getAddress(){
  var parts=window.location.pathname.split('/');
  return parts[parts.length-1]||'';
}

var _data=null;

async function loadProfile(){
  var addr=getAddress();
  if(!/^0x[0-9a-fA-F]{40}$/i.test(addr)){
    document.getElementById('loadingState').style.display='none';
    document.getElementById('errorState').style.display='';
    document.getElementById('errorState').innerHTML='<h2>Invalid Address</h2><p>Please provide a valid EVM wallet address (0x...).</p><a href="/predictors" style="display:inline-block;margin-top:16px;color:var(--gold);font-family:var(--mono);font-size:12px">Back to Predictors &rarr;</a>';
    return;
  }
  document.title=addr.substring(0,6)+'...'+addr.slice(-4)+' \u2014 Trader Profile | HYPERFLEX';

  try{
    var r=await fetch('/api/trader/'+addr+'/profile');
    if(!r.ok)throw new Error('API error '+r.status);
    _data=await r.json();
    if(_data.error){throw new Error(_data.error)}
    render();
  }catch(e){
    document.getElementById('loadingState').style.display='none';
    document.getElementById('errorState').style.display='';
    document.getElementById('errorState').innerHTML='<h2>Profile Error</h2><p>'+escH(e.message)+'</p><a href="/predictors" style="display:inline-block;margin-top:16px;color:var(--gold);font-family:var(--mono);font-size:12px">Back to Predictors &rarr;</a>';
  }
}

function render(){
  var d=_data;
  document.getElementById('loadingState').style.display='none';
  var el=document.getElementById('content');
  el.style.display='';

  var shortAddr=d.address.substring(0,6)+'...'+d.address.slice(-4);
  var avatarChars=d.address.replace(/^0x0*/,'').substring(0,2).toUpperCase()||'??';

  // Badges
  var badgesHtml='';
  if(d.polymarket&&d.polymarket.active)badgesHtml+='<span class="badge badge-poly">POLY</span>';
  if(d.has_hfx_account)badgesHtml+='<span class="badge badge-hfx">HFX</span>';

  // Follow button
  var followHtml='';
  if(d.has_hfx_account&&d.hfx_user_id){
    followHtml='<button class="follow-btn" id="followBtn" onclick="toggleFollow()">+ Follow</button>';
  }

  // Stats
  var pnlColor=d.summary.total_pnl>=0?'var(--green)':'var(--red)';
  var statsHtml='<div class="stat-pill"><div class="stat-label">Total P&L</div><div class="stat-val" style="color:'+pnlColor+'">'+(d.summary.total_pnl>=0?'+':'')+fmt$(d.summary.total_pnl)+'</div></div>';
  if(d.polymarket&&d.polymarket.active&&d.polymarket.roi_pct){
    statsHtml+='<div class="stat-pill"><div class="stat-label">Poly ROI</div><div class="stat-val" style="color:'+(d.polymarket.roi_pct>=0?'var(--green)':'var(--red)') +'">'+(d.polymarket.roi_pct>=0?'+':'')+d.polymarket.roi_pct+'%</div></div>';
  }
  statsHtml+='<div class="stat-pill"><div class="stat-label">Open Positions</div><div class="stat-val">'+d.summary.open_positions_count+'</div></div>';
  statsHtml+='<div class="stat-pill"><div class="stat-label">Platforms</div><div class="stat-val">'+d.summary.platforms_active+'</div></div>';

  // No activity
  if(!d.polymarket.active){
    el.innerHTML='<div class="hero-card"><div class="hero-top"><div class="avatar">'+avatarChars+'</div><span class="addr" onclick="copyAddr()">'+shortAddr+'</span></div></div><div class="empty" style="padding:60px">No activity found for this address on Polymarket.<br><a href="/predictors" style="color:var(--gold);margin-top:12px;display:inline-block">Browse active traders &rarr;</a></div>';
    return;
  }

  var html='';

  // Hero
  var extLinksHtml='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">'+
    (d.polymarket&&d.polymarket.active?'<a href="'+polyRef('https://polymarket.com/profile/'+d.address)+'" target="_blank" rel="noopener" style="font-family:var(--mono);font-size:11px;color:var(--blue);border:1px solid rgba(0,102,255,0.35);border-radius:8px;padding:6px 14px;text-decoration:none;background:rgba(0,102,255,0.06);transition:all .15s" onmouseover="this.style.background=\'rgba(0,102,255,0.12)\'" onmouseout="this.style.background=\'rgba(0,102,255,0.06)\'">&#x1F50D; Polymarket Profile</a>':'')+
  '</div>';
  html+='<div class="hero-card"><div class="hero-top"><div class="avatar">'+avatarChars+'</div><span class="addr" onclick="copyAddr()">'+shortAddr+'</span><div class="badges">'+badgesHtml+'</div>'+followHtml+'</div><div class="stats-grid">'+statsHtml+'</div>'+extLinksHtml+'</div>';

  // Chart
  html+='<div class="chart-wrap" id="chartWrap"><div class="chart-title">Cumulative P&amp;L (30d)</div><canvas id="pnlChart"></canvas></div>';


  // Polymarket section
  if(d.polymarket.active){
    html+='<div class="section"><div class="section-header"><span class="section-title">\uD83D\uDCCA Polymarket Positions</span><span class="badge badge-poly">POLY</span></div>';
    if(d.polymarket.open_positions.length){
      html+='<table><thead><tr><th>Market</th><th>Side</th><th>Value</th><th>P&L</th><th>Odds</th></tr></thead><tbody>';
      d.polymarket.open_positions.sort(function(a,b){return Math.abs(b.pnl)-Math.abs(a.pnl)});
      d.polymarket.open_positions.forEach(function(p){
        var odds=Math.round(p.cur_price*100);
        html+='<tr><td><a href="'+escH(p.market_url)+'" target="_blank" rel="noopener" class="mkt-link">'+escH(p.question.length>50?p.question.substring(0,47)+'...':p.question)+'</a></td>';
        html+='<td><span class="side-'+(p.side==='YES'?'yes':'no')+'">'+p.side+'</span></td>';
        html+='<td>'+fmt$(p.value)+'</td>';
        html+='<td>'+fmtPnl(p.pnl)+'</td>';
        html+='<td>'+odds+'\u00A2</td></tr>';
      });
      html+='</tbody></table>';
    }else{html+='<div class="empty">No open positions</div>';}
    // Won positions
    if(d.polymarket.won_positions.length){
      var wins=d.polymarket.won_positions.filter(function(w){return w.payout>0});
      var losses=d.polymarket.won_positions.filter(function(w){return w.payout<=0});
      if(wins.length){
        html+='<div style="margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Recent Wins ('+wins.length+')</div>';
        wins.slice(0,10).forEach(function(w){
          html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,42,36,0.3);font-family:var(--mono);font-size:11px"><span class="win-badge">WIN</span><span style="flex:1;color:var(--dim)">'+escH(w.question.length>45?w.question.substring(0,42)+'...':w.question)+'</span><span class="pnl-pos">+'+fmt$(w.payout)+'</span></div>';
        });
      }
      if(losses.length){
        html+='<div style="margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Recent Losses ('+losses.length+')</div>';
        losses.slice(0,5).forEach(function(w){
          html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,42,36,0.3);font-family:var(--mono);font-size:11px"><span class="loss-badge">LOSS</span><span style="flex:1;color:var(--dim)">'+escH(w.question.length>45?w.question.substring(0,42)+'...':w.question)+'</span>'+fmtPnl(w.payout)+'</div>';
        });
      }
    }
    html+='</div>';
  }


  // CTA
  html+='<div class="cta-section"><h3>Track your own portfolio</h3><p>HYPERFLEX syncs Polymarket + Kalshi + Manifold in one dashboard.</p><a href="/creator/signup" class="cta-btn">Get Started Free &rarr;</a></div>';

  el.innerHTML=html;

  // Draw chart
  drawPnlChart();

  // Check follow state
  if(d.has_hfx_account&&d.hfx_user_id)checkFollowState();
}

function copyAddr(){
  navigator.clipboard.writeText(_data.address).then(function(){showToast('Address copied!')}).catch(function(){});
}

function drawPnlChart(){
  var canvas=document.getElementById('pnlChart');
  if(!canvas||!_data)return;
  var points=[];
  // Build timeline from Poly wins
  if(_data.polymarket&&_data.polymarket.won_positions){
    _data.polymarket.won_positions.forEach(function(w){
      if(w.end_date)points.push({t:new Date(w.end_date).getTime(),pnl:w.payout});
    });
  }
  if(points.length<3){
    var wrap=document.getElementById('chartWrap');
    if(wrap)wrap.style.display='none';
    return;
  }
  points.sort(function(a,b){return a.t-b.t});
  // Cumulative
  var cum=0;
  points.forEach(function(p){cum+=p.pnl;p.cum=cum});

  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  var w=canvas.offsetWidth;var h=200;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);

  var vals=points.map(function(p){return p.cum});
  var mn=Math.min(0,...vals);var mx=Math.max(0,...vals);
  var range=mx-mn||1;
  var padL=60;var padR=16;var padT=16;var padB=32;
  var plotW=w-padL-padR;var plotH=h-padT-padB;

  // Grid lines + Y-axis labels
  ctx.font='10px "Space Mono",monospace';
  ctx.textAlign='right';
  var ySteps=4;
  for(var i=0;i<=ySteps;i++){
    var val=mn+(range/ySteps)*i;
    var py=padT+plotH-(val-mn)/range*plotH;
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(w-padR,py);ctx.stroke();
    ctx.fillStyle='#5a5752';
    var label=Math.abs(val)>=1000?(val>=0?'+':'')+'$'+(val/1000).toFixed(1)+'K':(val>=0?'+':'-')+'$'+Math.abs(val).toFixed(0);
    ctx.fillText(label,padL-6,py+4);
  }

  // Zero line (thicker)
  var zeroY=padT+plotH-(0-mn)/range*plotH;
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(padL,zeroY);ctx.lineTo(w-padR,zeroY);ctx.stroke();
  ctx.setLineDash([]);

  // X-axis date labels
  ctx.textAlign='center';ctx.fillStyle='#5a5752';
  var dateStep=Math.max(1,Math.floor(points.length/5));
  for(var i=0;i<points.length;i+=dateStep){
    var x=padL+i/(points.length-1)*plotW;
    var d=new Date(points[i].t);
    ctx.fillText((d.getMonth()+1)+'/'+d.getDate(),x,h-6);
  }

  // Fill area — green above zero, red below
  var finalPnl=points[points.length-1].cum;
  var fillColor=finalPnl>=0?'rgba(34,197,94,0.10)':'rgba(239,68,68,0.10)';
  ctx.beginPath();
  points.forEach(function(p,i){
    var x=padL+i/(points.length-1)*plotW;
    var y=padT+plotH-(p.cum-mn)/range*plotH;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.lineTo(padL+(points.length-1)/(points.length-1)*plotW,padT+plotH);
  ctx.lineTo(padL,padT+plotH);ctx.closePath();
  ctx.fillStyle=fillColor;ctx.fill();

  // P&L line
  var lineColor=finalPnl>=0?'#22c55e':'#ef4444';
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;ctx.beginPath();
  points.forEach(function(p,i){
    var x=padL+i/(points.length-1)*plotW;
    var y=padT+plotH-(p.cum-mn)/range*plotH;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // End dot
  var lastX=padL+(points.length-1)/(points.length-1)*plotW;
  var lastY=padT+plotH-(finalPnl-mn)/range*plotH;
  ctx.beginPath();ctx.arc(lastX,lastY,4,0,Math.PI*2);
  ctx.fillStyle=lineColor;ctx.fill();

  // End label
  ctx.textAlign='left';ctx.font='bold 12px "Space Mono",monospace';
  ctx.fillStyle=lineColor;
  var endLabel=finalPnl>=0?'+$'+Math.abs(finalPnl).toLocaleString(undefined,{maximumFractionDigits:0}):'-$'+Math.abs(finalPnl).toLocaleString(undefined,{maximumFractionDigits:0});
  ctx.fillText(endLabel,lastX+8,lastY+4);
}

async function toggleFollow(){
  var btn=document.getElementById('followBtn');
  if(!btn||!_data||!_data.hfx_user_id)return;
  var token=localStorage.getItem('hf_token')||localStorage.getItem('hf_creator_token');
  if(!token){showToast('Sign in to follow');return}
  var isFollowing=btn.classList.contains('active');
  var endpoint='/api/predictors/'+_data.hfx_user_id+'/'+(isFollowing?'unfollow':'follow');
  try{
    var r=await fetch(endpoint,{method:isFollowing?'DELETE':'POST',headers:{Authorization:'Bearer '+token}});
    if(r.ok){
      btn.classList.toggle('active');
      btn.textContent=isFollowing?'+ Follow':'Following \u2713';
    }
  }catch(e){}
}

async function checkFollowState(){
  var token=localStorage.getItem('hf_token')||localStorage.getItem('hf_creator_token');
  if(!token||!_data||!_data.hfx_user_id)return;
  try{
    var r=await fetch('/api/predictors/'+_data.hfx_user_id+'/follow-status',{headers:{Authorization:'Bearer '+token}});
    if(r.ok){var d=await r.json();if(d.following){var btn=document.getElementById('followBtn');if(btn){btn.classList.add('active');btn.textContent='Following \u2713';}}}
  }catch(e){}
}

loadProfile();
</script>
</body>
</html>
