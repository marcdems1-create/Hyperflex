<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — HYPERFLEX</title>
<link rel="icon" href="/hyperflex-logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e0c;color:#f0ebe3;font-family:'Space Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#141412;border:1px solid #222;border-radius:12px;padding:40px 36px;width:100%;max-width:420px}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:28px}
.logo span{color:#c9920d}
h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
p{color:#888;font-size:13px;line-height:1.6;margin-bottom:24px}
input{width:100%;padding:12px 14px;background:#0e0e0c;border:1px solid #2a2a26;border-radius:6px;color:#f0ebe3;font-family:'Space Mono',monospace;font-size:13px;margin-bottom:12px;outline:none;transition:border-color .15s}
input:focus{border-color:#c9920d}
button{width:100%;padding:13px;background:#c9920d;border:none;border-radius:6px;color:#0e0e0c;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
button:hover{background:#d9a01d}
button:disabled{opacity:0.5;cursor:not-allowed}
.msg{display:none;margin-top:14px;padding:12px 14px;border-radius:6px;font-size:12px}
.msg.success{background:rgba(0,200,100,.1);color:#00c864;border:1px solid rgba(0,200,100,.2)}
.msg.error{background:rgba(200,50,50,.1);color:#e05252;border:1px solid rgba(200,50,50,.2)}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>HYPER</span>FLEX</div>
  <h1>Set new password</h1>
  <p>Enter your new password below.</p>
  <div id="formArea">
    <input type="password" id="pw1" placeholder="New password (min 8 chars)" autocomplete="new-password"/>
    <input type="password" id="pw2" placeholder="Confirm new password" autocomplete="new-password" onkeydown="if(event.key==='Enter')submitReset()"/>
    <button onclick="submitReset()" id="submitBtn">Set New Password &rarr;</button>
  </div>
  <div id="msg" class="msg"></div>
  <div id="loginLink" style="display:none;margin-top:20px;text-align:center">
    <a href="/creator/login" style="color:#c9920d;font-size:13px;text-decoration:none">Sign in with your new password &rarr;</a>
  </div>
  <div id="expiredMsg" style="display:none;text-align:center;margin-top:16px">
    <p style="color:#e05252;font-size:13px;margin-bottom:12px">This reset link is missing or invalid.</p>
    <a href="/creator/login" style="color:#c9920d;font-size:13px;text-decoration:none">Request a new one &rarr;</a>
  </div>
</div>
<script>
var token=new URLSearchParams(window.location.search).get('token');
if(!token){document.getElementById('formArea').style.display='none';document.getElementById('expiredMsg').style.display='block'}
async function submitReset(){
  var pw1=document.getElementById('pw1').value;
  var pw2=document.getElementById('pw2').value;
  var btn=document.getElementById('submitBtn');
  if(!pw1||pw1.length<8){showMsg('Password must be at least 8 characters.',false);return}
  if(pw1!==pw2){showMsg("Passwords don't match.",false);return}
  btn.disabled=true;btn.textContent='Saving\u2026';
  try{
    var r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,password:pw1})});
    var d=await r.json();
    if(d.ok){document.getElementById('formArea').style.display='none';showMsg('Password updated! You can now sign in.',true);document.getElementById('loginLink').style.display='block'}
    else{showMsg(d.error||'Something went wrong.',false);btn.disabled=false;btn.textContent='Set New Password \u2192'}
  }catch(e){showMsg('Network error. Please try again.',false);btn.disabled=false;btn.textContent='Set New Password \u2192'}
}
function showMsg(text,success){var el=document.getElementById('msg');el.style.display='block';el.className='msg '+(success?'success':'error');el.textContent=text}
</script>
</body>
</html>
