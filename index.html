// ─── HYPERLIQUID INTEGRATION ──────────────────────────────────────────────────
// Official HL endpoints
const HL_INFO_URL   = "https://api.hyperliquid.xyz/info";
const HL_EXCHANGE_URL = "https://api.hyperliquid.xyz/exchange";
const HL_WS_URL     = "wss://api.hyperliquid.xyz/ws";

// ── REST helpers ──────────────────────────────────────────────────────────────
async function hlPost(url, payload) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error(`HL API ${res.status}`);
  return res.json();
}

// Fetch spot/perp mid-prices for a list of coins
async function hlGetMids(coins = ["BTC","ETH","HYPE"]) {
  const data = await hlPost(HL_INFO_URL, { type: "allMids" });
  // data is { COIN: "price", ... }
  const result = {};
  coins.forEach(c => { if (data[c]) result[c] = parseFloat(data[c]); });
  return result;
}

// Fetch user's USDC + HYPE spot balances
async function hlGetSpotBalances(address) {
  const data = await hlPost(HL_INFO_URL, { type: "spotClearinghouseState", user: address });
  const balances = {};
  if (data && data.balances) {
    data.balances.forEach(b => { balances[b.coin] = parseFloat(b.total); });
  }
  return balances;
}

// Fetch user's perpetual account summary (margin, unrealised PnL, etc.)
async function hlGetPerpState(address) {
  return hlPost(HL_INFO_URL, { type: "clearinghouseState", user: address });
}

// ── WALLET CONNECT — MetaMask direct OR WalletConnect via Web3Modal ──────────
async function connectMetaMask() {
  if (!window.ethereum) throw new Error("MetaMask not found — install the extension");
  const provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  const signer = await provider.getSigner();
  const address = await signer.getAddress();
  return { provider, signer, address };
}

async function connectViaWeb3Modal() {
  const modal = window.__w3modal;
  if (!modal) throw new Error("WalletConnect not loaded yet — please try again");

  // Open the modal and wait for the user to connect
  await modal.open();

  return new Promise((resolve, reject) => {
    let settled = false;

    const unsub = modal.subscribeProvider(({ provider, providerType, address, isConnected, error }) => {
      if (settled) return;
      if (error) { settled = true; unsub(); reject(new Error(error.message || "Connection failed")); return; }
      if (isConnected && provider && address) {
        settled = true;
        unsub();
        const ethersProvider = new ethers.BrowserProvider(provider);
        ethersProvider.getSigner().then(signer => {
          resolve({ provider: ethersProvider, signer, address });
        }).catch(reject);
      }
    });

    // Timeout after 3 minutes (user closed modal)
    setTimeout(() => {
      if (!settled) { settled = true; unsub(); reject(new Error("Connection timed out")); }
    }, 180000);
  });
}

// ── PLACE ORDER on Hyperliquid ────────────────────────────────────────────────
// coin: "BTC", isBuy: true, limitPx: "95000", sz: "0.001", reduceOnly: false
async function hlPlaceOrder({ signer, address, coin, isBuy, limitPx, sz, reduceOnly = false }) {
  const timestamp = Date.now();

  // Build the action object per HL spec
  const action = {
    type: "order",
    orders: [{
      a: 0,          // asset index — HL resolves by coin name server-side when using meta
      b: isBuy,
      p: String(limitPx),
      s: String(sz),
      r: reduceOnly,
      t: { limit: { tif: "Gtc" } },
    }],
    grouping: "na",
  };

  // EIP-712 domain & types as per HL docs
  const domain = {
    name: "Exchange",
    version: "1",
    chainId: 1337,
    verifyingContract: "0x0000000000000000000000000000000000000000",
  };
  const types = {
    Agent: [
      { name: "source", type: "string" },
      { name: "connectionId", type: "bytes32" },
    ],
  };
  const connectionId = ethers.keccak256(
    ethers.toUtf8Bytes(JSON.stringify(action) + timestamp)
  );
  const value = { source: "a", connectionId };

  const signature = await signer.signTypedData(domain, types, value);
  const { r, s, v } = ethers.Signature.from(signature);

  const payload = {
    action,
    nonce: timestamp,
    signature: { r, s, v },
    vaultAddress: null,
  };

  return hlPost(HL_EXCHANGE_URL, payload);
}

// ── LIVE PRICES via WebSocket ─────────────────────────────────────────────────
// Returns an unsubscribe function. onPrice(coin, price) called on each tick.
function hlSubscribePrices(coins, onPrice) {
  let ws;
  let reconnectTimer;
  let alive = true;

  function connect() {
    ws = new WebSocket(HL_WS_URL);
    ws.onopen = () => {
      if (!alive) return ws.close();
      ws.send(JSON.stringify({ method: "subscribe", subscription: { type: "allMids" } }));
    };
    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.channel === "allMids" && msg.data && msg.data.mids) {
          coins.forEach(c => {
            if (msg.data.mids[c]) onPrice(c, parseFloat(msg.data.mids[c]));
          });
        }
      } catch {}
    };
    ws.onclose = () => {
      if (alive) reconnectTimer = setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
  }
  connect();
  return () => { alive = false; clearTimeout(reconnectTimer); ws && ws.close(); };
}

// ─── MINI ODDS CHART (Polymarket chart inspiration) ──────────────────────────
function OddsChart({ marketId, currentYes }) {
  const points = [];
  let val = currentYes - 15 + Math.random() * 5;
  for (let i = 0; i < 30; i++) {
    val += (Math.random() - 0.48) * 3;
    val = Math.max(5, Math.min(95, val));
    points.push(val);
  }
  points[points.length - 1] = currentYes;
  const w = 120, h = 40;
  const minV = Math.min(...points), maxV = Math.max(...points);
  const range = maxV - minV || 1;
  const coords = points.map((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((p - minV) / range) * (h - 4) - 2;
    return `${x},${y}`;
  }).join(" ");
  const isUp = points[points.length - 1] >= points[0];
  const color = isUp ? "#2d9b5f" : "#c0392b";
  return (
    <svg width={w} height={h} style={{display:"block"}}>
      <defs>
        <linearGradient id={`grad-${marketId}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon
        points={`0,${h} ${coords} ${w},${h}`}
        fill={`url(#grad-${marketId})`}
      />
      <polyline points={coords} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ─── ORDER BOOK (Kalshi order book inspiration) ───────────────────────────────
function OrderBook({ yes }) {
  const baseYes = typeof yes === "number" && !Number.isNaN(yes) ? yes : 0;
  const asks = [
    { price: baseYes + 3, size: 420 }, { price: baseYes + 2, size: 280 }, { price: baseYes + 1, size: 650 },
  ].reverse();
  const bids = [
    { price: baseYes, size: 890 }, { price: baseYes - 1, size: 340 }, { price: baseYes - 2, size: 210 },

  return (

// Category → icon + background for market cards
function getCategoryIcon(m) {
  const cat = (m?.cat || m?.category || "").toString().toLowerCase();
  const sector = (m?.sector || "").toString().toLowerCase();
  const q = (m?.q || m?.question || "").toString().toLowerCase();
  const badge = (m?.badge || "").toString().toUpperCase();
  if (sector === "crypto" || cat.includes("bitcoin") || cat.includes("ethereum") || cat.includes("hyperliquid") || q.includes("bitcoin") || q.includes("hype token")) return { icon: "₿", bg: "#e27625" };
  if (cat.includes("gold") || q.includes("xau")) return { icon: "🥇", bg: "#f5c842" };
  if (cat.includes("silver") || q.includes("xag")) return { icon: "🥈", bg: "#8a9ba8" };
  if (cat.includes("oil") || cat.includes("wti") || cat.includes("crude") || q.includes("wti")) return { icon: "🛢️", bg: "#1a1a1a" };
  if (sector === "earnings" || cat.includes("earnings")) {
    if (badge.includes("AAPL") || q.includes("apple")) return { icon: "AAPL", bg: "#1a5c3a", ticker: true };
    if (badge.includes("NVDA") || q.includes("nvidia")) return { icon: "NVDA", bg: "#1a5c3a", ticker: true };
    if (badge.includes("TSLA") || q.includes("tesla")) return { icon: "TSLA", bg: "#1a5c3a", ticker: true };
    return { icon: "📊", bg: "#1a5c3a" };
  }
  if (sector === "macro" || cat.includes("fed") || cat.includes("monetary") || cat.includes("recession")) return { icon: "🏛️", bg: "#1e3a5f" };
  if (cat.includes("iran") || cat.includes("geo") || q.includes("iran") || q.includes("geopolitical")) return { icon: "🌍", bg: "#2563eb" };
  if (cat.includes("uranium")) return { icon: "☢️", bg: "#2d5a27" };
  if (cat.includes("copper") || cat.includes("base metals")) return { icon: "🟤", bg: "#8b6914" };
  return { icon: m?.icon || "🪨", bg: "#2a2a26" };
}

      if (c === "earnings") return "EARNINGS";

      if (!Number.isFinite(raw)) return 50;

      return Math.max(1, Math.min(99, Math.round(raw)));
    };

    const toCloses = (m) => {
      const d = m?.resolution_date || m?.expiry_date || m?.closes;
      if (!d) return "TBD";
      const parsed = new Date(d);

      if (sector === "CRYPTO") return "₿";

          </button>
        </div>

        {/* STREAK WIDGET - always visible */}
        <StreakWidget/>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #2a2a26",marginBottom:14}}>
          {[["markets","Markets"],["combos","Combos ✨"],["jackpot","Jackpot 🎯"],["portfolio","Portfolio"],["leaderboard","Board"],["profile","Profile"]].map(([t,label]) => (
            <button key={t} onClick={()=>{setTab(t);if(t==="markets")setMarketDetailView(null);}} style={{flex:1,padding:"9px 0",background:"transparent",border:"none",borderBottom:tab===t?"2px solid #c9920d":"2px solid transparent",color:tab===t?"#e0a820":"#555550",cursor:"pointer",fontFamily:"inherit",fontSize:8,fontWeight:tab===t?700:400,letterSpacing:0.5,textTransform:"uppercase",transition:"all 0.2s",whiteSpace:"nowrap"}}>
              {label}
            </button>
          ))}
        </div>

        {/* MARKETS */}
        {tab==="markets" && (
          marketDetailView ? (
            <MarketDetail m={marketDetailView} onBack={()=>setMarketDetailView(null)} onTrade={notify} hlSigner={hlSigner} hlAddress={connected} refreshBalances={refreshBalances}/>
          ) : (
            <div className="fade-in">
              {/* Sector filters */}
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
                {SECTORS.map(s => (
                  <button key={s} onClick={()=>setSector(s)} style={{whiteSpace:"nowrap",padding:"5px 10px",background:sector===s?"#2a2200":"#0a1020",border:`1px solid ${sector===s?"#c9920d":"#2a2a26"}`,borderRadius:20,color:sector===s?"#e0a820":"#555550",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,letterSpacing:0.5,transition:"all 0.2s",boxShadow:sector===s?"0 0 10px rgba(99,102,241,0.2)":"none"}}>
                    {SECTOR_META[s].icon} {s}
                  </button>
                ))}
              </div>

              {/* Sub tabs */}
              <div style={{display:"flex",gap:4,marginBottom:12}}>
                {["hot","all","new"].map(t => (
                  <button key={t} onClick={()=>setSubTab(t)} style={{flex:1,padding:"7px 0",background:subTab===t?"#2a2200":"#0a1020",border:`1px solid ${subTab===t?"#c9920d":"#2a2a26"}`,borderRadius:3,color:subTab===t?"#e0a820":"#555550",cursor:"pointer",fontFamily:"inherit",fontSize:10,fontWeight:700,transition:"all 0.2s"}}>
                    {t==="hot"?"🔥 Trending":t==="all"?"All Markets":"✦ New"}
                  </button>
                ))}
              </div>

              {/* Stats bar */}
              <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}}>
                {[{l:"Total Volume",v:"$124M+"},{l:"Markets Live",v:"34"},{l:"Traders",v:"48,291"}].map((s,i) => (
                  <div key={i} style={{flex:1,background:"#0a1020",border:"1px solid #2a2a26",borderRadius:3,padding:"7px 10px",textAlign:"center",minWidth:80}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#e0a820"}}>{s.v}</div>
                    <div style={{fontSize:8,color:"#555550"}}>{s.l}</div>
                  </div>
                ))}
              </div>

              {/* Commodities explainer shown when COMMODITIES filter is active */}
              {sector==="COMMODITIES" && (
                <div style={{background:"linear-gradient(135deg,#0d0f0a,#1a1800)",border:"1px solid #4d7c0f",borderRadius:4,padding:14,marginBottom:14}}>
                  <div style={{fontSize:9,color:"#84cc16",fontWeight:700,letterSpacing:1,marginBottom:6}}>WHY COMMODITIES?</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {[
                      ["$10T","Global commodities market — zero crypto prediction coverage until HYPERFLEX"],
                      ["10M","Monthly precious metals readers with strong commodity convictions and no way to act on them on-chain"],
                      ["0","Competitors on HyperLiquid HIP-4 covering silver, gold, copper, uranium or lithium"],
                    ].map(([stat,desc],i)=>(
                      <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                        <div style={{fontSize:16,fontWeight:700,color:"#a3e635",minWidth:40}}>{stat}</div>
                        <div style={{fontSize:10,color:"#4d7c0f",lineHeight:1.5}}>{desc}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1a2e05",fontSize:9,color:"#365314"}}>
                    💡 Real-time XAG, XAU, WTI, Copper, Uranium · Settling in USDH on HyperLiquid
                  </div>
                </div>
              )}

              {/* AI Scanner section header — shown when there are new markets */}
              {filtered.some(m=>m.isNew) && (subTab==="hot"||subTab==="all"||subTab==="new") && (
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,marginTop:4}}>
                  <div style={{flex:1,height:1,background:"linear-gradient(90deg,#c9920d,transparent)"}}/>
                  <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",background:"rgba(201,146,13,0.08)",border:"1px solid #2a2a26",borderRadius:3}}>
                    <span style={{fontSize:8,color:"#e0a820",fontWeight:700,letterSpacing:1}}>✦ NEW TODAY</span>
                  </div>
                  <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,#c9920d)"}}/>
                </div>
              )}
              <div className="markets-grid">
                {(subTab==="new"
                  ? filtered.filter(m=>m.isNew)
                  : subTab==="hot"
                    ? filtered.filter(m=>m.hot)
                    : filtered
                ).map(m=>(
                  <MktCard key={m.id} m={m} onSelect={()=>setMarketDetailView(m)}/>
                ))}
              </div>
            </div>
          )
        )}

        {/* COMBOS — DraftKings Same-Game Parlay style */}
        {tab==="combos" && (
          <div className="fade-in">
            <div style={{background:"linear-gradient(135deg,#0d0a1a,#2a2200)",border:"1px solid #3a2d00",borderRadius:4,padding:14,marginBottom:14}}>
              <div style={{fontSize:9,color:"#e0a820",fontWeight:700,letterSpacing:1,marginBottom:4}}>COMBO MARKETS</div>
              <div style={{fontSize:15,fontWeight:700,color:"#ddd8cc",marginBottom:4}}>Stack multiple markets for bigger payouts</div>
              <div style={{fontSize:11,color:"#7a7870"}}>All legs must win. Higher risk, exponential reward.</div>
            </div>
            {COMBO_MARKETS.map(combo => (
              <ComboCard key={combo.id} combo={combo} onSelect={()=>notify(`✓ Viewing ${combo.name} · ${combo.multiplier} payout`)}/>
            ))}
            <div style={{background:"#1c1c19",border:"1px solid #2a2a26",borderRadius:4,padding:14,marginTop:8}}>
              <div style={{fontSize:11,color:"#7a7870",marginBottom:8}}>🛠️ Build Your Own Combo</div>
              <div style={{fontSize:10,color:"#555550",marginBottom:10}}>Select 2-5 markets to create a custom combo with calculated multiplier</div>
              <button onClick={()=>notify("Custom combo builder coming soon!")} style={{width:"100%",padding:"11px 0",background:"#2a2200",border:"1px solid #b8820c",borderRadius:4,color:"#e0a820",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                + Create Custom Combo
              </button>
            </div>
          </div>
        )}

        {/* JACKPOT — DraftKings pools style */}
        {tab==="jackpot" && (
          <div className="fade-in">
            <DailyJackpot answers={jackpotAnswers} setAnswers={setJackpotAnswers} onSubmit={()=>{setJackpotSubmitted(true);notify("✓ Jackpot entry submitted! Results at midnight.");}} submitted={jackpotSubmitted}/>
            <div style={{background:"#1c1c19",border:"1px solid #2a2a26",borderRadius:4,padding:14}}>
              <div style={{fontSize:9,color:"#555550",fontWeight:700,letterSpacing:1,marginBottom:10}}>PRIZE STRUCTURE</div>
              {[["5/5","$10,000 🎯"],["4/5","$500"],["3/5","$50"],["2/5","Entry refund"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #2a2a26",fontSize:12}}>
                  <span style={{color:"#a09890"}}>{k} correct</span>
                  <span style={{color:"#3dbd73",fontWeight:700}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PORTFOLIO — Kalshi portfolio tracking style */}
        {tab==="portfolio" && (
          <div className="fade-in">
            <Portfolio/>
          </div>
        )}

        {/* LEADERBOARD */}
        {tab==="leaderboard" && (
          <div className="fade-in">
            <div style={{display:"flex",gap:4,marginBottom:12}}>
              {["weekly","monthly","alltime"].map(t=>(
                <button key={t} onClick={()=>setLeaderTab(t)} style={{flex:1,padding:"6px 0",background:leaderTab===t?"#2a2200":"#0a1020",border:`1px solid ${leaderTab===t?"#c9920d":"#2a2a26"}`,borderRadius:3,color:leaderTab===t?"#e0a820":"#555550",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,transition:"all 0.2s"}}>
                  {t==="alltime"?"All Time":t.charAt(0).toUpperCase()+t.slice(1)}
                </button>
              ))}
            </div>
            {leaderboardData.length === 0 ? (
              <div style={{textAlign:"center",padding:24,color:"#7a7870",fontSize:12}}>No leaderboard data yet. Place settled trades to appear here.</div>
            ) : (
              leaderboardData.map((p)=> {
                const isCurrentUser = user && p.user_id === user.id;
                const pnlStr = p.total_pnl >= 0 ? `+$${Number(p.total_pnl).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` : `-$${Math.abs(p.total_pnl).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
                return (
                  <div key={p.user_id + '-' + p.rank} style={{background:isCurrentUser?"#0d1a10":"#0a1020",border:`1px solid ${isCurrentUser?"#1a5c3a":"#2a2a26"}`,borderRadius:4,padding:14,marginBottom:8,display:"flex",alignItems:"center",gap:10,position:"relative",overflow:"hidden"}}>
                    {p.rank<=3&&<div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:p.rank===1?"#e0a820":p.rank===2?"#a09890":"#cd7c4e"}}/>}
                    <div style={{fontSize:18,fontWeight:700,color:"#555550",minWidth:28,textAlign:"center"}}>{p.rank === 1 ? "👑" : p.rank}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:isCurrentUser?"#3dbd73":"#ddd8cc"}}>{p.username}{isCurrentUser ? " (You)" : ""}</div>
                      <div style={{fontSize:9,color:"#7a7870"}}>{p.total_trades} trades · {p.win_rate}% win rate</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:14,fontWeight:700,color:p.total_pnl>=0?"#3dbd73":"#d44c4c"}}>{pnlStr}</div>
                      <div style={{fontSize:10,color:"#e0a820"}}>{p.win_rate}% wins</div>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        )}

        {/* PROFILE */}
        {tab==="profile" && (
          <div className="fade-in">
            <div style={{background:"#1c1c19",border:"1px solid #2a2a26",borderRadius:4,padding:16,marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:42,marginBottom:8}}>⭐</div>
              <div style={{fontSize:16,fontWeight:700,color:"#ddd8cc",marginBottom:2}}>YOU</div>
              <div style={{fontSize:10,color:"#7a7870",marginBottom:12}}>BRONZE TIER · Rank #8</div>
              <div style={{display:"flex",justifyContent:"center",gap:16}}>
                {[{l:"P&L",v:"+$2,140"},{l:"ROI",v:"+42%"},{l:"Trades",v:"12"},{l:"Streak",v:"🔥4"}].map(s=>(
                  <div key={s.l}>
                    <div style={{fontSize:14,fontWeight:700,color:"#e0a820"}}>{s.v}</div>
                    <div style={{fontSize:8,color:"#555550"}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Achievements */}
            <div style={{fontSize:9,color:"#555550",fontWeight:700,letterSpacing:1,marginBottom:8}}>ACHIEVEMENTS</div>
            {[
              {icon:"🎯",name:"First Blood",desc:"Placed your first trade",done:true},
              {icon:"🔥",name:"4-Streak",desc:"4 correct picks in a row",done:true},
              {icon:"🏆",name:"Top 10",desc:"Reached the leaderboard",done:true},
              {icon:"💎",name:"Diamond",desc:"Trade $100K+ total volume",done:false},
              {icon:"🐋",name:"Whale",desc:"Hold $50K+ in one market",done:false},
            ].map((a,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:a.done?"#0d1a10":"#0a1020",border:`1px solid ${a.done?"#1a5c3a":"#2a2a26"}`,borderRadius:4,marginBottom:6}}>
                <span style={{fontSize:20,opacity:a.done?1:0.3}}>{a.icon}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:a.done?"#ddd8cc":"#555550"}}>{a.name}</div>
                  <div style={{fontSize:10,color:"#7a7870"}}>{a.desc}</div>
                </div>
                {a.done&&<span style={{marginLeft:"auto",fontSize:9,color:"#3dbd73",fontWeight:700}}>✓</span>}
              </div>
            ))}

            {/* Referral */}
            <div style={{background:"linear-gradient(135deg,#1c1c19,#2a2200)",border:"1px solid #3a2d00",borderRadius:4,padding:14,marginTop:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#e0a820",marginBottom:4}}>💰 Refer & Earn</div>
              <div style={{fontSize:10,color:"#7a7870",marginBottom:10}}>Get $25 for every friend who trades $100+</div>
              <button onClick={()=>notify("✓ Referral link copied!")} style={{width:"100%",padding:"10px 0",background:"#2a2200",border:"1px solid #b8820c",borderRadius:3,color:"#e0a820",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>
                Copy Referral Link
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",background:"#141412",borderTop:"1px solid #2a2a26",display:"flex",padding:"8px 0 12px"}}>
        {[["markets","📊","Markets"],["combos","🎰","Combos"],["jackpot","🎯","Jackpot"],["portfolio","💼","Portfolio"],["leaderboard","🏆","Board"]].map(([t,icon,label])=>(
          <button key={t} onClick={()=>{setTab(t);if(t==="markets")setMarketDetailView(null);}} style={{flex:1,background:"none",border:"none",color:tab===t?"#e0a820":"#555550",cursor:"pointer",fontFamily:"inherit",fontSize:8,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color 0.2s"}}>
            <span style={{fontSize:18}}>{icon}</span>
            {label}
          </button>
        ))}
      </div>

      {/* Wallet Modal */}
      {walletOpen && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setWalletOpen(false)}>
          <div style={{background:"#1c1c19",border:"1px solid #2a2a26",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:430,maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            {connected ? (
              <>
                <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Wallet Connected</div>
                <div style={{fontSize:10,color:"#7a7870",marginBottom:16,wordBreak:"break-all"}}>{connected}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                  <div style={{background:"#0a1020",border:"1px solid #2a2a26",borderRadius:4,padding:"10px 12px"}}>
                    <div style={{fontSize:8,color:"#7a7870",marginBottom:2}}>USDC BALANCE</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#3dbd73"}}>${balance.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
                  </div>
                  <div style={{background:"#0a1020",border:"1px solid #2a2a26",borderRadius:4,padding:"10px 12px"}}>
                    <div style={{fontSize:8,color:"#7a7870",marginBottom:2}}>HYPE BALANCE</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#e0a820"}}>💧 {hypeBalance.toFixed(4)}</div>
                  </div>
                </div>
                <a href={`https://app.hyperliquid.xyz/portfolio?address=${connected}`} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:"10px 0",background:"#0a1020",border:"1px solid #2a2a26",borderRadius:3,color:"#e0a820",textDecoration:"none",fontFamily:"inherit",fontSize:11,fontWeight:700,marginBottom:8}}>
                  View on Hyperliquid ↗
                </a>
                <button onClick={()=>{setConnected(null);setHlSigner(null);setBalance(0);setHypeBalance(0);setWalletOpen(false);notify("Wallet disconnected");}} style={{width:"100%",padding:"10px 0",background:"#1a0e0e",border:"1px solid #5c1a1a",borderRadius:3,color:"#d44c4c",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>
                  Disconnect
                </button>
              </>
            ) : (
              <>
                <div style={{fontSize:13,fontWeight:700,marginBottom:16}}>Connect Wallet</div>
                {WALLETS.map(w=>(
                  <button key={w.id} onClick={()=>connectWallet(w.id)} disabled={!!connecting} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:connecting===w.id?"#2a2200":"#1c1c19",border:`1px solid ${connecting===w.id?"#c9920d":"#2a2a26"}`,borderRadius:4,color:"#ddd8cc",cursor:"pointer",fontFamily:"inherit",marginBottom:6,transition:"all 0.2s",textAlign:"left"}}>
                    <span style={{fontSize:22}}>{w.icon}</span>
                    <div><div style={{fontSize:13,fontWeight:700}}>{w.name}</div><div style={{fontSize:10,color:"#7a7870"}}>{w.desc}</div></div>
                    {connecting===w.id&&<span style={{marginLeft:"auto",fontSize:10,color:"#e0a820"}}>Connecting...</span>}
                  </button>
                ))}
                <div style={{fontSize:9,color:"#555550",textAlign:"center",marginTop:12}}>🔒 Non-custodial · Powered by Hyperliquid · Your keys, your funds</div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
