<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 300px;
  background: #141412;
  color: #ddd8cc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 20px;
}
.logo {
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 0.08em;
  color: #c9920d;
  margin-bottom: 4px;
}
.sub {
  font-size: 12px;
  color: #7a7870;
  margin-bottom: 16px;
  line-height: 1.5;
}
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat {
  background: rgba(201,146,13,0.06);
  border: 1px solid rgba(201,146,13,0.12);
  border-radius: 8px;
  padding: 10px;
}
.stat-label {
  font-size: 9px;
  color: #7a7870;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 3px;
}
.stat-value {
  font-size: 16px;
  font-weight: 800;
  color: #c9920d;
}
.link {
  display: block;
  text-align: center;
  padding: 10px;
  background: #c9920d;
  color: #141412;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 700;
  font-size: 13px;
}
.link:hover { opacity: 0.9; }
.footer {
  text-align: center;
  margin-top: 12px;
  font-size: 10px;
  color: #7a7870;
}
.loading { text-align: center; color: #7a7870; font-size: 12px; padding: 16px 0; }
</style>
</head>
<body>
  <div class="logo">HYPERFLEX</div>
  <div class="sub">Whale tracking for Polymarket. See where smart money is moving.</div>
  <div id="stats" class="stats">
    <div class="loading" style="grid-column:1/-1">Loading whale data...</div>
  </div>
  <a class="link" href="https://hyperflex.network/data" target="_blank">Open Full Dashboard</a>
  <div class="footer">v1.0 &middot; hyperflex.network</div>

  <script>
    fetch('https://hyperflex.network/api/whale-index')
      .then(r => r.json())
      .then(data => {
        const picks = data.picks || [];
        const totalCap = picks.reduce((s, p) => s + (p.total_capital || 0), 0);
        const totalWhales = picks.reduce((s, p) => s + (p.whale_count || 0), 0);
        const strong = picks.filter(p => p.strength === 'STRONG').length;

        const fmt = n => n >= 1000000 ? '$' + (n/1000000).toFixed(1) + 'M' : '$' + Math.round(n/1000) + 'K';

        document.getElementById('stats').innerHTML = `
          <div class="stat">
            <div class="stat-label">Markets Tracked</div>
            <div class="stat-value">${picks.length}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total Capital</div>
            <div class="stat-value">${fmt(totalCap)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Whale Positions</div>
            <div class="stat-value">${totalWhales}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Strong Signals</div>
            <div class="stat-value">${strong}</div>
          </div>
        `;
      })
      .catch(() => {
        document.getElementById('stats').innerHTML = '<div class="loading" style="grid-column:1/-1">Could not reach HyperFlex API</div>';
      });
  </script>
</body>
</html>
