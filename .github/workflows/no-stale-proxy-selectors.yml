name: Stale Polymarket factory selector guard

# Fails the build if the dead Polymarket Safe-factory selector reappears
# in server.js, public/, or anywhere else in the repo outside of
# lib/polymarket-proxy.js (the incident-doc file that intentionally
# names the dead hex in its header comment for future debuggers).
#
# Background: a fictional 4-byte selector that didn't match any real
# function on the Safe factory at 0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b
# propagated across six independent inline eth_call patterns in server.js,
# with conflicting comments claiming three different function names
# (computeProxyAddress / proxies / proxyFor) — none of which actually
# compute to that hex. Every server-side proxy derivation reverted as
# a result, silently filling the 995-user "polymarket_proxy = NULL"
# bucket while the client path (via ethers ABI encoding) worked correctly.
#
# All call sites have been migrated to lib/polymarket-proxy.js which
# derives the selector from an ABI string at runtime via ethers — making
# function-name typos break loudly (clear "function not found") instead
# of silently reverting on-chain. This guard prevents the dead selector
# from re-entering the codebase by accident.
#
# To discuss the dead selector by name in commit messages, docs, or new
# comments outside lib/polymarket-proxy.js — rephrase as "the legacy
# 4-byte selector" or "the broken hardcoded selector." Keeps the guard
# unambiguous.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  no-stale-proxy-selectors:
    name: Block dead Polymarket selector from reappearing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # git grep only needs the working tree

      - name: Scan tree (excl. incident-doc helper + this workflow)
        run: |
          set -e
          # Use `git grep` with pathspec exclusion (`:!path`) — unlike
          # `grep --exclude` which has subtle basename-vs-path behaviour
          # that differs between GNU grep versions and shells, git grep
          # treats `:!path` as a literal repo-relative path exclusion.
          # No glob ambiguity, version-portable, and tested locally
          # against the same tree CI will scan.
          if git grep -nE '0x4d0c6cdb' -- \
                ':!lib/polymarket-proxy.js' \
                ':!.github/workflows/no-stale-proxy-selectors.yml' \
                ':!package-lock.json' ; then
            echo ""
            echo "::error::Dead Polymarket factory selector detected outside lib/polymarket-proxy.js."
            echo "::error::This selector doesn't match any function on the Safe factory and silently reverts on-chain."
            echo "::error::Use polymarketProxy.derivePolymarketProxy() from lib/polymarket-proxy.js instead — it derives the correct selector from the ABI at runtime."
            echo "::error::See lib/polymarket-proxy.js header for the full incident notes."
            echo "::error::To discuss this selector by name in docs/comments, rephrase as 'the legacy 4-byte selector' or 'the broken hardcoded selector' so this guard stays unambiguous."
            exit 1
          fi
          echo "OK: no stale Polymarket factory selectors found outside the incident-doc file."
