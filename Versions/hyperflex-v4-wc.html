// Official HL endpoints
const HL_INFO_URL   = "https://api.hyperliquid.xyz/info";
const HL_EXCHANGE_URL = "https://api.hyperliquid.xyz/exchange";

// ── REST helpers ──────────────────────────────────────────────────────────────
async function hlPost(url, payload) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error(`HL API ${res.status}`);
  return res.json();
}

// Fetch spot/perp mid-prices for a list of coins
async function hlGetMids(coins = ["BTC","ETH","HYPE"]) {
  const data = await hlPost(HL_INFO_URL, { type: "allMids" });
  // data is { COIN: "price", ... }
  const result = {};
  coins.forEach(c => { if (data[c]) result[c] = parseFloat(data[c]); });
  return result;
}

// Fetch user's USDC + HYPE spot balances
async function hlGetSpotBalances(address) {
  const data = await hlPost(HL_INFO_URL, { type: "spotClearinghouseState", user: address });
  const balances = {};
  if (data && data.balances) {
    data.balances.forEach(b => { balances[b.coin] = parseFloat(b.total); });
  }
  return balances;
}

// Fetch user's perpetual account summary (margin, unrealised PnL, etc.)
async function hlGetPerpState(address) {
  return hlPost(HL_INFO_URL, { type: "clearinghouseState", user: address });
}

// ── WALLET CONNECT — MetaMask direct OR WalletConnect via Web3Modal ──────────
async function connectMetaMask() {
  if (!window.ethereum) throw new Error("MetaMask not found — install the extension");
  const provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  const signer = await provider.getSigner();
  const address = await signer.getAddress();
  return { provider, signer, address };
}

async function connectViaWeb3Modal() {
  const modal = window.__w3modal;
  if (!modal) throw new Error("WalletConnect not loaded yet — please try again");

  // Open the modal and wait for the user to connect
  await modal.open();

  return new Promise((resolve, reject) => {
    let settled = false;

    const unsub = modal.subscribeProvider(({ provider, providerType, address, isConnected, error }) => {
      if (settled) return;
      if (error) { settled = true; unsub(); reject(new Error(error.message || "Connection failed")); return; }
      if (isConnected && provider && address) {
        settled = true;
        unsub();
        const ethersProvider = new ethers.BrowserProvider(provider);
        ethersProvider.getSigner().then(signer => {
          resolve({ provider: ethersProvider, signer, address });
        }).catch(reject);
      }
    });

    // Timeout after 3 minutes (user closed modal)
    setTimeout(() => {
      if (!settled) { settled = true; unsub(); reject(new Error("Connection timed out")); }
    }, 180000);
  });
}

// ── PLACE ORDER on Hyperliquid ────────────────────────────────────────────────
// coin: "BTC", isBuy: true, limitPx: "95000", sz: "0.001", reduceOnly: false
async function hlPlaceOrder({ signer, address, coin, isBuy, limitPx, sz, reduceOnly = false }) {
  const timestamp = Date.now();

  // Build the action object per HL spec
  const action = {
    type: "order",
    orders: [{
      a: 0,          // asset index — HL resolves by coin name server-side when using meta
      b: isBuy,
      p: String(limitPx),
      s: String(sz),
      r: reduceOnly,
      t: { limit: { tif: "Gtc" } },
    }],
    grouping: "na",
  };

  // EIP-712 domain & types as per HL docs
  const domain = {
    name: "Exchange",
    version: "1",
    chainId: 1337,
    verifyingContract: "0x0000000000000000000000000000000000000000",
  };
  const types = {
    Agent: [
      { name: "source", type: "string" },
      { name: "connectionId", type: "bytes32" },
    ],
  };
  const connectionId = ethers.keccak256(
    ethers.toUtf8Bytes(JSON.stringify(action) + timestamp)
  );
  const value = { source: "a", connectionId };

  const signature = await signer.signTypedData(domain, types, value);
  const { r, s, v } = ethers.Signature.from(signature);

  const payload = {
    action,
    nonce: timestamp,
    signature: { r, s, v },
    vaultAddress: null,
  };

  return hlPost(HL_EXCHANGE_URL, payload);
}

// ── LIVE PRICES via WebSocket ─────────────────────────────────────────────────
// Returns an unsubscribe function. onPrice(coin, price) called on each tick.
function hlSubscribePrices(coins, onPrice) {
  let ws;
  let reconnectTimer;
  let alive = true;

  function connect() {
    ws = new WebSocket(HL_WS_URL);
    ws.onopen = () => {
      if (!alive) return ws.close();
      ws.send(JSON.stringify({ method: "subscribe", subscription: { type: "allMids" } }));
    };
    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.channel === "allMids" && msg.data && msg.data.mids) {
          coins.forEach(c => {
            if (msg.data.mids[c]) onPrice(c, parseFloat(msg.data.mids[c]));
          });
        }
      } catch {}
    };
    ws.onclose = () => {
      if (alive) reconnectTimer = setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
  }
  connect();
  return () => { alive = false; clearTimeout(reconnectTimer); ws && ws.close(); };
}

// ─── MINI ODDS CHART (Polymarket chart inspiration) ──────────────────────────
function OddsChart({ marketId, currentYes }) {
  const points = [];
  let val = currentYes - 15 + Math.random() * 5;
  for (let i = 0; i < 30; i++) {
    val += (Math.random() - 0.48) * 3;
    val = Math.max(5, Math.min(95, val));
    points.push(val);
  }
  points[points.length - 1] = currentYes;
  const w = 120, h = 40;
  const minV = Math.min(...points), maxV = Math.max(...points);
  const range = maxV - minV || 1;
  const coords = points.map((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((p - minV) / range) * (h - 4) - 2;
    return `${x},${y}`;
  }).join(" ");
  const isUp = points[points.length - 1] >= points[0];
  const color = isUp ? "#10b981" : "#ef4444";
  return (
    <svg width={w} height={h} style={{display:"block"}}>
      <defs>
        <linearGradient id={`grad-${marketId}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon
        points={`0,${h} ${coords} ${w},${h}`}
        fill={`url(#grad-${marketId})`}
      />
      <polyline points={coords} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

      const coin = coinMap[m.sector] || "BTC"; // default BTC for non-crypto markets
      const isBuy = side === "YES";
      // Use the market's yes% as a price signal; user enters USDC amount
      const pricePx = limitMode ? parseFloat(limitPrice) : (isBuy ? m.yes : 100 - m.yes);
      const contracts = parseFloat(amt) / pricePx;

      const result = await hlPlaceOrder({
        signer: hlSigner,
        address: hlAddress,
        coin,
        isBuy,
        limitPx: pricePx.toFixed(2),
        sz: contracts.toFixed(4),
      });

      if (result && result.status === "ok") {
        const fills = result.response?.data?.statuses;
        const filled = fills && fills[0]?.filled;
        notify(`✓ Order filled · ${side} ${contracts.toFixed(4)} ${coin}`);
        if (refreshBalances) refreshBalances();
        onTrade && onTrade(`✓ Trade placed on Hyperliquid`);
      } else {
        notify(`⚠️ ${result?.response?.data?.statuses?.[0]?.error || "Order rejected"}`);
      }
    } catch (err) {
      notify(`✗ ${err.message || "Trade failed"}`);
    } finally {
      setPlacing(false);
      setAmt("");
    }
  };

  const [marketDetailView, setMarketDetailView] = useState(null);
  const wsUnsubRef = useRef(null);

  // ── Live price WebSocket ───────────────────────────────────────────────────
  useEffect(() => {
    const unsub = hlSubscribePrices(["BTC","ETH","HYPE","SOL","BNB"], (coin, price) => {
      setLivePrices(prev => ({ ...prev, [coin]: price }));
    });
    wsUnsubRef.current = unsub;
    return () => unsub();
  }, []);

  // ── Poll REST prices as fallback (every 10s) ───────────────────────────────
  useEffect(() => {
    const poll = async () => {
      try {
        const mids = await hlGetMids(["BTC","ETH","HYPE"]);
        setLivePrices(prev => ({ ...prev, ...mids }));
      } catch {}
    };
    poll();
    const t = setInterval(poll, 10000);
    return () => clearInterval(t);
  }, []);

  const notify = (msg) => {
    setNotification(msg);
    setTimeout(() => setNotification(null), 3000);
  };

  const filtered = ALL_MARKETS.filter(m => sector === "ALL" || m.sector === sector);

  // ── Real wallet connect ────────────────────────────────────────────────────
  const WALLETS = [
    { id:"metamask",      name:"MetaMask",        icon:"🦊", desc:"Browser extension · direct connect" },
    { id:"walletconnect", name:"WalletConnect",    icon:"🔗", desc:"QR code · any mobile wallet" },
    { id:"coinbase",      name:"Coinbase Wallet",  icon:"🔵", desc:"Mobile & browser extension" },
    { id:"phantom",       name:"Phantom",          icon:"👻", desc:"Browser extension · EVM mode" },
  ];

  const connectWallet = async (id) => {
    setConnecting(id);
    try {
      let signer, address;

      if (id === "metamask") {
        ({ signer, address } = await connectMetaMask());

      } else if (id === "walletconnect" || id === "coinbase") {
        // Both use Web3Modal — WalletConnect shows QR, Coinbase shows its own flow
        ({ signer, address } = await connectViaWeb3Modal());

      } else if (id === "phantom") {
        // Phantom EVM (window.phantom.ethereum)
        const phantomProvider = window.phantom?.ethereum;
        if (!phantomProvider) throw new Error("Phantom not found — install the extension");
        const provider = new ethers.BrowserProvider(phantomProvider);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        address = await signer.getAddress();

      } else {
        throw new Error("Unsupported wallet");
      }

      setHlSigner(signer);
      setConnected(address);

      // Load balances from Hyperliquid
      try {
        const spotBals = await hlGetSpotBalances(address);
        setHypeBalance(spotBals["HYPE"] || 0);
        const perpState = await hlGetPerpState(address);
        const usdc = perpState?.marginSummary?.accountValue
          ? parseFloat(perpState.marginSummary.accountValue)
          : (spotBals["USDC"] || spotBals["USDC:0xaf88d065e77c8cc2239327c5edb3a432268e5831"] || 0);
        setBalance(usdc);
        notify(`✓ Connected · ${address.slice(0,6)}…${address.slice(-4)} · $${usdc.toFixed(2)} USDC`);
      } catch {
        notify(`✓ Wallet connected · ${address.slice(0,6)}…${address.slice(-4)}`);
      }

    } catch (err) {
      if (err.message !== "Connection timed out") {
        notify(`✗ ${err.message || "Connection failed"}`);
      }
    } finally {
      setConnecting(null);
      setWalletOpen(false);
    }
  };

  // ── Refresh balances after a trade ────────────────────────────────────────
  const refreshBalances = async () => {
    if (!connected || connected === "0x0000000000000000000000000000000000000000") return;
    try {
      const spotBals = await hlGetSpotBalances(connected);
      setHypeBalance(spotBals["HYPE"] || 0);
      const perpState = await hlGetPerpState(connected);
      const usdc = perpState?.marginSummary?.accountValue
        ? parseFloat(perpState.marginSummary.accountValue) : (spotBals["USDC"] || 0);
      setBalance(usdc);
    } catch {}
  };

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#050810",fontFamily:"'IBM Plex Mono', monospace",color:"#e2e8f0",paddingBottom:80}}>

      {/* Live ticker */}
      <LiveTicker prices={livePrices}/>

      {/* Notification */}
      {notification && (
        <div style={{position:"fixed",top:36,left:"50%",transform:"translateX(-50%)",background:"#1e1b4b",border:"1px solid #6366f1",color:"#e2e8f0",padding:"10px 20px",borderRadius:10,fontSize:12,zIndex:9999,animation:"fadeSlide 0.3s ease",whiteSpace:"nowrap"}}>
          {notification}
        </div>
      )}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid #0f1a30",background:"#050810",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <HyperflexLogo size={28}/>
          <span style={{fontSize:14,fontWeight:700,letterSpacing:2,color:"#e2e8f0"}}>HYPERFLEX</span>
          <span style={{fontSize:7,background:"rgba(99,102,241,0.2)",color:"#818cf8",border:"1px solid rgba(99,102,241,0.4)",borderRadius:4,padding:"1px 6px",fontWeight:700}}>v4</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right"}}>
            {connected ? (
              <>
                <div style={{fontSize:8,color:"#475569"}}>HL BALANCE</div>
                <div style={{fontSize:13,fontWeight:700,color:"#4ade80"}}>${balance.toLocaleString(undefined,{minimumFractionDigits:2})} USDC</div>
                {hypeBalance > 0 && <div style={{fontSize:9,color:"#818cf8"}}>💧 {hypeBalance.toFixed(2)} HYPE</div>}
              </>
            ) : (
              <>
                <div style={{fontSize:8,color:"#475569"}}>BTC LIVE</div>
                <div style={{fontSize:13,fontWeight:700,color:"#4ade80"}}>{livePrices.BTC ? `$${livePrices.BTC.toLocaleString(undefined,{maximumFractionDigits:0})}` : "—"}</div>
              </>
            )}
          </div>
          <button onClick={()=>setWalletOpen(true)} style={{background:connected?"#052e16":"#1e1b4b",border:`1px solid ${connected?"#166534":"#4f46e5"}`,borderRadius:8,color:connected?"#4ade80":"#818cf8",padding:"6px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>
            {connected ? `● ${connected.slice(0,4)}…${connected.slice(-3)}` : "CONNECT"}
          </button>
        </div>
      </div>

      <div style={{padding:"12px 16px"}}>

        {/* STREAK WIDGET - always visible */}
        <StreakWidget/>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #0f1a30",marginBottom:14}}>
          {[["markets","Markets"],["combos","Combos ✨"],["jackpot","Jackpot 🎯"],["portfolio","Portfolio"],["leaderboard","Board"],["profile","Profile"]].map(([t,label]) => (
            <button key={t} onClick={()=>{setTab(t);if(t==="markets")setMarketDetailView(null);}} style={{flex:1,padding:"9px 0",background:"transparent",border:"none",borderBottom:tab===t?"2px solid #6366f1":"2px solid transparent",color:tab===t?"#818cf8":"#334155",cursor:"pointer",fontFamily:"inherit",fontSize:8,fontWeight:tab===t?700:400,letterSpacing:0.5,textTransform:"uppercase",transition:"all 0.2s",whiteSpace:"nowrap"}}>
              {label}
            </button>
          ))}
        </div>

        {/* MARKETS */}
        {tab==="markets" && (
          marketDetailView ? (
            <MarketDetail m={marketDetailView} onBack={()=>setMarketDetailView(null)} onTrade={notify} hlSigner={hlSigner} hlAddress={connected} refreshBalances={refreshBalances}/>
          ) : (
            <div className="fade-in">
              {/* Sector filters */}
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
                {SECTORS.map(s => (
                  <button key={s} onClick={()=>setSector(s)} style={{whiteSpace:"nowrap",padding:"5px 10px",background:sector===s?"#1e1b4b":"#0a1020",border:`1px solid ${sector===s?"#6366f1":"#1e293b"}`,borderRadius:20,color:sector===s?"#818cf8":"#334155",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,letterSpacing:0.5,transition:"all 0.2s",boxShadow:sector===s?"0 0 10px rgba(99,102,241,0.2)":"none"}}>
                    {SECTOR_META[s].icon} {s}
                  </button>
                ))}
              </div>

              {/* Sub tabs */}
              <div style={{display:"flex",gap:4,marginBottom:12}}>
                {["hot","all","new"].map(t => (
                  <button key={t} onClick={()=>setSubTab(t)} style={{flex:1,padding:"7px 0",background:subTab===t?"#1e1b4b":"#0a1020",border:`1px solid ${subTab===t?"#6366f1":"#1e293b"}`,borderRadius:8,color:subTab===t?"#818cf8":"#334155",cursor:"pointer",fontFamily:"inherit",fontSize:10,fontWeight:700,transition:"all 0.2s"}}>
                    {t==="hot"?"🔥 Trending":t==="all"?"All Markets":"🆕 New"}
                  </button>
                ))}
              </div>

              {/* Stats bar */}
              <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}}>
                {[{l:"Total Volume",v:"$124M+"},{l:"Markets Live",v:"34"},{l:"Traders",v:"48,291"}].map((s,i) => (
                  <div key={i} style={{flex:1,background:"#0a1020",border:"1px solid #0f1a30",borderRadius:8,padding:"7px 10px",textAlign:"center",minWidth:80}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#818cf8"}}>{s.v}</div>
                    <div style={{fontSize:8,color:"#334155"}}>{s.l}</div>
                  </div>
                ))}
              </div>

              {(subTab==="hot"?filtered.filter(m=>m.hot):filtered).map(m=>(
                <MktCard key={m.id} m={m} onSelect={()=>setMarketDetailView(m)}/>
              ))}
            </div>
          )
        )}

        {/* COMBOS — DraftKings Same-Game Parlay style */}
        {tab==="combos" && (
          <div className="fade-in">
            <div style={{background:"linear-gradient(135deg,#0d0a1a,#1e1b4b)",border:"1px solid #312e81",borderRadius:12,padding:14,marginBottom:14}}>
              <div style={{fontSize:9,color:"#818cf8",fontWeight:700,letterSpacing:1,marginBottom:4}}>COMBO MARKETS</div>
              <div style={{fontSize:15,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>Stack multiple markets for bigger payouts</div>
              <div style={{fontSize:11,color:"#475569"}}>All legs must win. Higher risk, exponential reward.</div>
            </div>
            {COMBO_MARKETS.map(combo => (
              <ComboCard key={combo.id} combo={combo} onSelect={()=>notify(`✓ Viewing ${combo.name} · ${combo.multiplier} payout`)}/>
            ))}
            <div style={{background:"#0d1220",border:"1px solid #1e293b",borderRadius:12,padding:14,marginTop:8}}>
              <div style={{fontSize:11,color:"#475569",marginBottom:8}}>🛠️ Build Your Own Combo</div>
              <div style={{fontSize:10,color:"#334155",marginBottom:10}}>Select 2-5 markets to create a custom combo with calculated multiplier</div>
              <button onClick={()=>notify("Custom combo builder coming soon!")} style={{width:"100%",padding:"11px 0",background:"#1e1b4b",border:"1px solid #4f46e5",borderRadius:10,color:"#818cf8",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                + Create Custom Combo
              </button>
            </div>
          </div>
        )}

        {/* JACKPOT — DraftKings pools style */}
        {tab==="jackpot" && (
          <div className="fade-in">
            <DailyJackpot answers={jackpotAnswers} setAnswers={setJackpotAnswers} onSubmit={()=>{setJackpotSubmitted(true);notify("✓ Jackpot entry submitted! Results at midnight.");}} submitted={jackpotSubmitted}/>
            <div style={{background:"#0d1220",border:"1px solid #1e293b",borderRadius:12,padding:14}}>
              <div style={{fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1,marginBottom:10}}>PRIZE STRUCTURE</div>
              {[["5/5","$10,000 🎯"],["4/5","$500"],["3/5","$50"],["2/5","Entry refund"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #0f1a30",fontSize:12}}>
                  <span style={{color:"#94a3b8"}}>{k} correct</span>
                  <span style={{color:"#4ade80",fontWeight:700}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PORTFOLIO — Kalshi portfolio tracking style */}
        {tab==="portfolio" && (
          <div className="fade-in">
            <Portfolio/>
          </div>
        )}

        {/* LEADERBOARD */}
        {tab==="leaderboard" && (
          <div className="fade-in">
            <div style={{display:"flex",gap:4,marginBottom:12}}>
              {["weekly","monthly","alltime"].map(t=>(
                <button key={t} onClick={()=>setLeaderTab(t)} style={{flex:1,padding:"6px 0",background:leaderTab===t?"#1e1b4b":"#0a1020",border:`1px solid ${leaderTab===t?"#6366f1":"#1e293b"}`,borderRadius:8,color:leaderTab===t?"#818cf8":"#334155",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,transition:"all 0.2s"}}>
                  {t==="alltime"?"All Time":t.charAt(0).toUpperCase()+t.slice(1)}
                </button>
              ))}
            </div>
            {LEADERBOARD_DATA.map((p,i)=>(
              <div key={p.rank} style={{background:p.isUser?"#0d1a10":"#0a1020",border:`1px solid ${p.isUser?"#166534":"#0f1a30"}`,borderRadius:12,padding:14,marginBottom:8,display:"flex",alignItems:"center",gap:10,position:"relative",overflow:"hidden"}}>
                {p.rank<=3&&<div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:p.rank===1?"#f59e0b":p.rank===2?"#94a3b8":"#cd7c4e"}}/>}
                <div style={{fontSize:18,fontWeight:700,color:"#334155",minWidth:24,textAlign:"center"}}>{p.badge||p.rank}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:p.isUser?"#4ade80":"#e2e8f0"}}>{p.name}{p.isUser?" (You)":""}</div>
                  <div style={{fontSize:9,color:"#475569"}}>{p.trades} trades · {p.vol} volume</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#4ade80"}}>{p.pnl}</div>
                  <div style={{fontSize:10,color:"#818cf8"}}>{p.roi} ROI</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* PROFILE */}
        {tab==="profile" && (
          <div className="fade-in">
            <div style={{background:"#0d1220",border:"1px solid #1e293b",borderRadius:14,padding:16,marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:42,marginBottom:8}}>⭐</div>
              <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",marginBottom:2}}>YOU</div>
              <div style={{fontSize:10,color:"#475569",marginBottom:12}}>BRONZE TIER · Rank #8</div>
              <div style={{display:"flex",justifyContent:"center",gap:16}}>
                {[{l:"P&L",v:"+$2,140"},{l:"ROI",v:"+42%"},{l:"Trades",v:"12"},{l:"Streak",v:"🔥4"}].map(s=>(
                  <div key={s.l}>
                    <div style={{fontSize:14,fontWeight:700,color:"#818cf8"}}>{s.v}</div>
                    <div style={{fontSize:8,color:"#334155"}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Achievements */}
            <div style={{fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1,marginBottom:8}}>ACHIEVEMENTS</div>
            {[
              {icon:"🎯",name:"First Blood",desc:"Placed your first trade",done:true},
              {icon:"🔥",name:"4-Streak",desc:"4 correct picks in a row",done:true},
              {icon:"🏆",name:"Top 10",desc:"Reached the leaderboard",done:true},
              {icon:"💎",name:"Diamond",desc:"Trade $100K+ total volume",done:false},
              {icon:"🐋",name:"Whale",desc:"Hold $50K+ in one market",done:false},
            ].map((a,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:a.done?"#0d1a10":"#0a1020",border:`1px solid ${a.done?"#166534":"#0f1a30"}`,borderRadius:10,marginBottom:6}}>
                <span style={{fontSize:20,opacity:a.done?1:0.3}}>{a.icon}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:a.done?"#e2e8f0":"#334155"}}>{a.name}</div>
                  <div style={{fontSize:10,color:"#475569"}}>{a.desc}</div>
                </div>
                {a.done&&<span style={{marginLeft:"auto",fontSize:9,color:"#4ade80",fontWeight:700}}>✓</span>}
              </div>
            ))}

            {/* Referral */}
            <div style={{background:"linear-gradient(135deg,#0d1220,#1e1b4b)",border:"1px solid #312e81",borderRadius:12,padding:14,marginTop:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#818cf8",marginBottom:4}}>💰 Refer & Earn</div>
              <div style={{fontSize:10,color:"#475569",marginBottom:10}}>Get $25 for every friend who trades $100+</div>
              <button onClick={()=>notify("✓ Referral link copied!")} style={{width:"100%",padding:"10px 0",background:"#1e1b4b",border:"1px solid #4f46e5",borderRadius:8,color:"#818cf8",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>
                Copy Referral Link
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#050810",borderTop:"1px solid #0f1a30",display:"flex",padding:"8px 0 12px"}}>
        {[["markets","📊","Markets"],["combos","🎰","Combos"],["jackpot","🎯","Jackpot"],["portfolio","💼","Portfolio"],["leaderboard","🏆","Board"]].map(([t,icon,label])=>(
          <button key={t} onClick={()=>{setTab(t);if(t==="markets")setMarketDetailView(null);}} style={{flex:1,background:"none",border:"none",color:tab===t?"#818cf8":"#334155",cursor:"pointer",fontFamily:"inherit",fontSize:8,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color 0.2s"}}>
            <span style={{fontSize:18}}>{icon}</span>
            {label}
          </button>
        ))}
      </div>

      {/* Wallet Modal */}
      {walletOpen && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setWalletOpen(false)}>
          <div style={{background:"#0d1220",border:"1px solid #1e293b",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:430,maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            {connected ? (
              <>
                <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Wallet Connected</div>
                <div style={{fontSize:10,color:"#475569",marginBottom:16,wordBreak:"break-all"}}>{connected}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                  <div style={{background:"#0a1020",border:"1px solid #0f1a30",borderRadius:10,padding:"10px 12px"}}>
                    <div style={{fontSize:8,color:"#475569",marginBottom:2}}>USDC BALANCE</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#4ade80"}}>${balance.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
                  </div>
                  <div style={{background:"#0a1020",border:"1px solid #0f1a30",borderRadius:10,padding:"10px 12px"}}>
                    <div style={{fontSize:8,color:"#475569",marginBottom:2}}>HYPE BALANCE</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#818cf8"}}>💧 {hypeBalance.toFixed(4)}</div>
                  </div>
                </div>
                <a href={`https://app.hyperliquid.xyz/portfolio?address=${connected}`} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:"10px 0",background:"#0a1020",border:"1px solid #1e293b",borderRadius:8,color:"#818cf8",textDecoration:"none",fontFamily:"inherit",fontSize:11,fontWeight:700,marginBottom:8}}>
                  View on Hyperliquid ↗
                </a>
                <button onClick={()=>{setConnected(null);setHlSigner(null);setBalance(0);setHypeBalance(0);setWalletOpen(false);notify("Wallet disconnected");}} style={{width:"100%",padding:"10px 0",background:"#1c0a0a",border:"1px solid #7f1d1d",borderRadius:8,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>
                  Disconnect
                </button>
              </>
            ) : (
              <>
                <div style={{fontSize:13,fontWeight:700,marginBottom:16}}>Connect Wallet</div>
                {WALLETS.map(w=>(
                  <button key={w.id} onClick={()=>connectWallet(w.id)} disabled={!!connecting} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:connecting===w.id?"#1e1b4b":"#0d1220",border:`1px solid ${connecting===w.id?"#6366f1":"#1e293b"}`,borderRadius:10,color:"#e2e8f0",cursor:"pointer",fontFamily:"inherit",marginBottom:6,transition:"all 0.2s",textAlign:"left"}}>
                    <span style={{fontSize:22}}>{w.icon}</span>
                    <div><div style={{fontSize:13,fontWeight:700}}>{w.name}</div><div style={{fontSize:10,color:"#475569"}}>{w.desc}</div></div>
                    {connecting===w.id&&<span style={{marginLeft:"auto",fontSize:10,color:"#818cf8"}}>Connecting...</span>}
                  </button>
                ))}
                <div style={{fontSize:9,color:"#334155",textAlign:"center",marginTop:12}}>🔒 Non-custodial · Powered by Hyperliquid · Your keys, your funds</div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
