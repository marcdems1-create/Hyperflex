[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
solc     = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir   = true

# HyperEVM does not support EIP-1559 — must use legacy transactions
# Always pass --legacy to forge script

[rpc_endpoints]
hyperevm_testnet = "https://api.hyperliquid-testnet.xyz/evm"
hyperevm_mainnet = "https://api.hyperliquid.xyz/evm"

[etherscan]
hyperevm_testnet = { key = "placeholder", url = "https://explorer.hyperliquid-testnet.xyz/api" }
